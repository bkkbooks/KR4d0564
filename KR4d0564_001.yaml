body:
  text: 梧溪集卷一元王逢撰孔子琴操四首去魯作汶泗交流兮龜䝉相繆兮鬱乎尼丘兮禮樂賜自周兮大夫好修兮吾將返吾輈兮過匡作文王徂兮道在豫兮天蓋常時則渝兮二三子毋徐徐兮伊草露之濡兮去衛作我行於衛有淇湯湯彼或知本伊流則長載儃載徊禾黍芒芒匪邶鄘豫傷武公其亡厄陳作天地塞兮日月食兮君子厄兮周公云逺心不知所底極兮顔子琴操一首居陋巷作陋巷我居孰隘湫兮薄田我田孰嗇收兮我順我安親同休兮仲尼聖也道孰侔兮孰愈豫身從其遊兮吳季子琴操一首聘魯作白日晚兮浮雲滋馬吾秣兮車吾脂望岐周兮不見念泰伯兮在兹惟山有龜兮惟水有沂禮樂在魯兮高深如斯聖不我棄兮吳其庶幾衛女琴操一首思歸作有序琴操曰衛有賢女邵王聞其賢請聘之未至而王薨太子曰吾聞齊桓公得衛姬而霸今衛女賢欲留之大夫曰不可若賢女必不我聽若聽必不賢不可取也太子留之果不聽拘於深宫思歸不得援琴作歌曲終縊而死古有絃無歌今絃亦絶矣因補一章恭承母命兮奉先王晐姓後宫兮備酒漿中路王薨兮妾或未亡遂太子之過兮何有三綱淇水沄沄兮菀乎女桑目冷絃絶兮義也難忘席帽山辭席帽山兮岧亭山之人兮朝鉏暮經日月往來兮雲下上俯萬物兮塵冥冥塵冥冥兮江介黑彼山人兮衣苧白帶杜蘅兮咀松柏心周流兮影斯息出無節兮入無時猿鳥胥樂兮樵牧我知學茍修兮行著槁死岩壑兮豫焉悲寄所思二首七澤連三湘衆水相沿洄青青江蘺草緣生洲渚隈蒼梧下白日佳人獨徘徊容光與香艷幸好未衰摧采采盈襜裳寄子楚王臺願表貞素節路紆難自來處女難自媒才士難自薦自薦時尚可自媒令人賤猗儺牽牛花弱蔓緣蒹葭光風拂衢路蘭自老幽遐豈無上尊酒灧灧傾紫霞公庭大酺暇儻寄天之涯龎公攜家圖引為張橘隱題鴻鵠巢高林黿鼉穴深淵所以龎德公躬耕峴山田當時劉表儕雄材萬金足置燕王臺臺成禽荒甘鴆毒醉韝臂錦呼鷹來鷹飢受呼飽則去非熊之倫孰得馭諸兒豚犬遺以危况復蒼生天下慮蘇嶺石鹿雙聳然霞日絢爛芝莖鮮囊衣裹粻車連連白騾青牸驂後先舉家相攜入長烟竟托採藥終天年至今事跡有在心無傳嗚呼孔明不遇大耳主亦必老而隆中眠虞美人行贈邵倅大王氣蓋世力拔山七十餘戰龍蛇間得人為霸失人虜有妾如花無死所夜寒蒼蒼星月高不惜傾身帳中舞大王恩深淺東海青血熒熒春草在當時早化劒雙飛四面楚歌那慷慨芒碭山開五色雲雌雉竟與雄鸞羣嗚呼後世亂紛紛非君擇臣臣亦當擇君芒碭山山字一作天唐馬引明皇樂極天寶年拏舟將求海上仙一朝神遊跨八極數十萬騎屯雲烟赤文緑字不復見錦幪黃帕爭來獻衆中一匹目如電膺門沫赭珠流汗龍顔眷愛不肯騎蕭蕭弄影華清池奚官日給三品料教駣攻駒隨所之是時羊車行幸早柳暗花柔忘却曉夢驚鼙鼓遂播遷凝碧空凉遺宿草顛危注意大將賢有馬如此無人前至今悲風起毫素濩略欲飲長城泉書生亦自心嗒然危腦帽歌讀五代前蜀史有感作白兜羅青衲襫金鴉翠翎七寶飾圓方反正無定式國人戴之天下惜後宫如花醉妝美名王無心冠帶理大木晝拔貪狼風猶泛樓船濟江水承平禮樂亦草草豈但當時帽危腦可憐來者忘喪元紅纓末亂如雲擾君不見玉帛萬國先王朝會辨如星麗九霄鳳凰麒麟在郊棷夔龍前殿奏簫韶天門引天門高高俯四極寸田尺地登版籍澤梁無禁漁者多瀚海橫戈恣充斥去年官餉私敓攘今年私醝官價償屠燒縣邑誠細事大將不死鯨鯢鄉謂博囉特穆爾左丞烹羊椎牛醉以酒腰纒白帶紅帕首定盟歃血許自新禦冦征蠻復何有國家承平歲月久念汝紛紛迫糊口羽林堅鋭莫汝攖慎勿輕夸好身手春風柳黃開陳雲號令始見真將軍銀瓶娘子辭有引娘子宋嶽鄂王女聞王被收負銀瓶投井死祠今在浙西憲司之左逢感其節孝敬為之辭蒼梧月落烏號霜寒泉幽凝金井牀綺疏光流大星白夢驚萬里長城亡女郎報父收囹圄匍匐將身贖無所官家聖明如漢主妾心愧死緹縈女井臨交衢下通海海枯衢遷井不改銀瓶同沈意有在萬歲千春露神采魂今歸來風泠然思陵無樹容啼鵑先王墓木西湖邊江浙平章薩木丹巴勒宅觀敕賜龍電劍引有劍有劍龍電名白水為質金為精虹光夜貫斗牛氣玉匣晝起波濤聲藏之九廟社稷重用之六合風塵清英宗皇帝加撫惜八十一鱗寒動色灤陽氷泮臥蜿蜒海子雨來翻霹靂神物自從前代寶國公親授彤庭錫鸊鵜膏瑩今幾年淮汴襄漢興妖祅吕䖍大刀霜雪鍔頓芒挫鋒莫敢前公身佩之下幽燕獨當一面東南天馬蹄所過春草歇百里青見孤炊烟古來克敵與制勝未有如公忠勇盛主將無慚李二師偏裨亦是花敬定四郡九州聨貢篚千村萬落歸亡命劍當是時成大勳凱旋却掛吳山雲歌長奔騰木石怪酒酣激烈貔虎羣復欲叩閽斬佞臣以謝父老安生民於乎此劍實與國公出處相類也不久踴躍變化延平津任月山少監職貢圖引好風東來快雨俱夫須亭觀職貢圖厥酋高鼻深目胡冠插翟尾服繡襦革帶鞮鞻貂襜褕左女執盞右執壺手容恭如下大夫酋妻髻椎將湛盧五采雜佩相縈紆轉顧飛虎飛龍旟鎪耳者殿帕首驅瓔珞袒跣兩侏儒一擎木難珊瑚株一戴玉琢狻猊罏神獒髬髵狀乳貙復誰牽之鬈髮須最後峩辨飾寶珠若將入朝謹進趨秃奚踉蹡亦在途錦膊驄帶汗血駒尊貴卑賤各爾殊經營意匠窮錙銖唐稱二閻道元吳今也少監稱京都少監材抱豈畫史禹跡曾為帝親理河伯川后備任使無支祈氏甘胥靡大德延祐貞觀比輦陸航海填筐篚鳥言夷面逺能邇少監臨古不無以趙公商公暨高李頡頏霄漢嗟已矣霱雲曙開儼斧扆包茅不入顙誰泚周編大書王會禮安得臣臣奉天紀陋儒作歌歌正始淮南忠武王箭歌題埀虹橋亭淮王昔下江南城萬竈兵擁雙霓旌錦裘繡帽白玉帶金戈鐵馬紅鞶纓皂鵰羽箭三十六一一插向鯊魚箙鹿麛晝號猿抱木王師所過全生育彤弓親授聖天子弓影射入東吳水水波恍浸銅柱標仰見浮屠半霄起王當是時戢武功指顧草樹生春風宋家降璽朝暮得思罷貫革埀無窮浮屠上層龍所宫寶盤紺碧蓮花同弦張滿月報騶發忽露半笴薌雲中鐃歌啁轟鼓笳競父老頓足歡聲應泗州使返睢陽亡漢關將入天山定兩賢成敗關衰盛雄材逸氣王誰並我浮扁舟五湖興載拜何由重安靖猛士經過合深省僧蓮松檜圖歌書遂昌山人鄭明德序後蓮公畫稱東吳精草蔓花房未嘗寫森張意象亭毒表輒有神人助揮灑常州貌得劍井松劍氣曣㬈相鬱葱膏流節離禍幸免至今顔色青於銅孔廟之檜尤硉矹地媪所守龍所窟欒柯落蔭根走石疑是忠臣舊埋骨松兮檜兮豈偶然凌霜鑠雪兵燹年箭痕刀瘢盡皸裂用命欲拄將崩天王姚王安節姚訔憑城親被堅身殱城破百代傳無人上請配張許日夜二物風雷纒鄭君鄭君古君子此文此畫良有以我題短章非鬭靡用弔忠魂附遺史吁嗟烈士長已矣敬題楊山居太史所藏文皇帝御書奎章閣碑本後先皇龍鳳姿談笑夷內難萬方賀清寧人文劃昭煥奎章崇延閣天藻發宸翰字畫擬庖犧贊詠缺姬旦璇霄麗日月華露濯河漢流腴蓬萊池埀輝鳷鵲觀今王廣舊制碑本無㸃竄璽封賜臣瑀豈是世所玩為爾忠義心可與金石貫蟲蛇探禹穴蟬蚋飛簡汗寶藏風塵外永夜卿雲爛相逢感頭白展卷復長歎游鯈懷故淵老驥戀餘棧誰昔侍經筵流連忘筆諌七里灘夜泊山經富春來百里紫翠接嚴灘十八曲曲曲屏數疊兩崖負金鼇一水流氷硤直上石作臺梯磴緣嶻嶪雲霏變朝夕天地齊浩劫緬懷巢許徒適一作遁此誠所愜千秋釣游地不屬漢臣妾客星在泬寥五緯光相協澄潭龍偃臥影帶沙棠楫風吹澗沚毛露灑松桂葉先民不可見思從漢臯涉夜久蜻蛚高長歌振疲苶王貞白墓在信州永豐縣道出縣西門屣履可百步巋然翠石表有唐校書墓校書吾宗人天馬謝馽御首登上升名晚獲鄉曲譽至今坊改貫當時官復賦流傳折楊栁婉婉春態度載拜還汛掃良非汾陽慕龍貴德自潛豹貴文不露邱園望京洛豺犬方反顧竟抱孤臣憂白日空復暮樵童指梧檟往往冠蓋駐珠襦玉匣葬麥飯曾不具神飊薦林響公意答知遇惟南豐山高靈溪浩東注馬洲望孤山海門窺長江巨浸天浩渺山根纒坤軸百里見孤杪風披陰霾晝露灑石黛曉龍來碧一作蒼林濕鷗舞白浪杳居然蔽中洲隱若壓外徼幽貞水仙態軒特國士表時時降天人旌斾光縹眇豫將展高步兵氣秋見兆嚴霜草不殺悵望翠潰悄浮雲非無蒂薄暮心裊裊揚子舟中望鵝鼻山時聞黔南消息山環芙蓉城私怪鵝鼻狀奔濤鎖長薄大石山名凛相抗勢雄千軍壘氣敓萬鍾藏草樹春不蕃莓苔滑難傍剛風過靈雨復值桃花漲破暝鷗鷺盤乘陰龍魚王飄鼓一葦間攬之膽增壯謝安晉元臣豈局江海量蒼生方顛連其敢遂疏放黔陽百粵地黃霧吹虎韔再觀神秀姿不止西北向焞焞蒼精出閃閃白月漾三叫馮夷宫吾奚獨惆悵奉題高宗答刑部侍郎衛膚敏詔後為其七世孫仁近賦詔文附勑衛膚敏省所奏辭免尚書刑部侍郎恩命事具悉朕倉卒渡江圖籍散亡深慮吏緣為姦奏牘稽留平讞失當以卿平日正色侃侃論議堅明據理守節屢觸權貴必能為朕分别隱微章明枉直與其殺不辜寧失不經欽哉汝諧毋廢朕命所請宜不允故兹詔示想宜知悉七日建炎龍渡江中外極觀仰赫焉志恢復寖爾濫刑賞公時命秋官固辭表三上夙忝絲綸日春班朝元仗乘輿今播遷宗社亦震蕩空言忤權貴曷以錯諸枉放棄樗櫟材庶全雨露養皇覽賜手詔於昭日月朗大禹舍臯陶欽恤義誰廣巍巍白雲司濯濯金仙掌𤣥陰閟棘木一旦風颯爽省疏甚詆佛無愧十八丈佘山儼遺墓世世敦禮享文光掩虹霞精氣懾䕫魍卓落羣松冷萎蕤叢蘭長經過率下馬謂有神還往我昨歌大招空谷答靈響衣冠久徘徊氛壒方坱莽願公降生申吾得操几杖處女篇奉寄靳奉使東州有處女門户代清白七歲承母訓十歲遵內則及筓秉機杼縠錦雲霧色蟋蟀秋梨陰想像龍鳳織雙星望埀近河漢終阻隔不遺猗蘭佩香艷竊比德世無梁伯鸞死化山下石日薄黃塵暮誰任補衮職凡百慎裁量願售古刀尺三歎掩明妝遲君心鑒識題烈女廟有引女何江陰人少有容操五季時避亂前湖舟中賊持兵犯之何泣曰吾身墮汝手肯從吾禱之於天於父母乎賊由是少懈何乃起立且拜且祈乘間竟投水死後里父夢見何曰吾當血食此地伺湖成田則廟貌祀我既而果然今廟在華藏寺南郡志所載略異逢蓋得先大母所傳云遺廟湖陰四百年斑斑江竹映嬋娟魚龍水落萑蒲外雞犬村成檿柘邊不待清名埀女史尚存貞魄降神弦君王社稷今焉在伏臘粢盛自儼然帷箔夜凉臨月榻佩環晨響起雲軿湘靈鼓瑟虞風盛蔡琰聞笳漢鼎遷嗟彼生還羞故國何如死節報皇天明妝靚服黃塵裏重為傷時涕泗漣錢塘春感六首紫罽軿車從六龍盡隨仙曲度青空蒼山樓闕旃林裏赤羽旌麾野廟中百姓未忘周大賚成都元有漢遺風流鶯不管傷春恨衝落桃花滿樹紅王氣凌虛散曉霞虎闈麟閣靜烟花中天日月迂黃道滄海風雲冷翠華望帝神遊䕫子國烏衣夢隔野人家當時舉目山河異豈但紅顔泣塞笳周南風俗漢衣冠五色雲中憶駐鑾瓔珞檜高藏白獸蕊珠花發降文鸞河通織女機絲濕雨歇巫娥翠黛寒滿地吳山誰灑淚一江春水獨憑闌日華初動衮衣明劍佩千官隱繡楹五色黼函開玊座九重湯藥下銀罌書題鳳尾仙曹喜恩浹螭坳學士榮文化有餘戎事略銅駝草露不勝情瑶池青鳥集觚棱白塔金鳬閟夜燈雲母帳虛星采動水晶宫冷露華凝驪山草暗墟周業郿塢花繁失漢陵白馬素車江海上依然潮汐撼西興金爵觚棱月向低泠泠清磬萬松西五門曙色開龍尾十日春寒健馬蹄紅霧不收花氣合緑波初漲栁條齊遺民暗憶名都會尚繞湖漘唱大堤讀謝太皇詔藳半壁星河兩鬢絲月華長照素簾埀衣冠在野收亡命烽火連營倒義旗天地晝昏憂社稷江淮春漲泣孤婺矛牙十行哀詔無多字落葉虛窗萬古思讀德祐元年悔過詔藳趙壁潛張赤幟旗東南民物苦流離白毛地冷陽春歇天目山崩王氣移罪在股肱知太晚患成心腹悔何追兩宫無復西湖路落日傷心草詔時題宋進士謝安節故堂有引公為晉太傅二十九世孫諱國光字觀夫登宋進士補太學上舍江南內附侍御史程巨夫薦召不起以隱德終於松江之立極所居安節堂翰林應奉宇文子貞嘗為記至是孫晉徴題是詩晉字彥明善醫有文行安節堂開秋浦湄戔戔束帛聘當時星辰盡拱天樞象鴻鵠終巢越樹枝多士頌周成廟樂兩生辭漢闕朝儀雲霄一去高風在手折芙蓉為所一作仰思登飛龍亭在集慶永夀宫文皇帝潛邸時嘗幸焉冶城新築紫金臺亭俯青松面面開南國風雲龍鳳起隂山霜雪鴈鴻來秦王大業知無敵泰伯高名動九垓天意竟乖方寸願遺民搔首重興哀寄題張太𤣥天師素華臺二首玉臺岌嶪上氷輪風露清虛隔幾塵珠樹鶴羣長繞夜金莖仙掌靜融春斗牛星淡臨南極龍虎山高俯七閩中外晏安祠事少一瓢明水獨朝真星斗闌干露氣清神飊吹動佩環聲雲封玉長生藥人在丹邱不夜城隱隱笙來王子晉迢迢夢隔許飛瓊世間福地俱仙境何日從容散髮行寄偰公逺應奉一作應舉桂樹團團不易攀吹香墮子月中間君家總在蟾蜍窟朝士同趨虎豹關夜秉金蓮當閣道時承玉食自天顔别來已覺升沈異休問牛歌未出山簡毅夫同知簡字下一本有帖字三月春雲拂殿低千官喜氣溢金閨策陳讜議龍顔恱表謝殊恩虎拜齊南國幾年沾化雨朔州今日現文奎故人身在江湖上不擬看花信馬蹄讀國信大使郝公帛書有序霜落風高恣所如歸期回首是春初上林天子援弓繳窮海纍臣有帛書中統十五年九月一日放鴈獲者勿殺國信大使郝經書于真州忠勇軍營新館書蓋如此公字伯常仕世祖皇帝庚申歲使宋為賈似道拘幽十有六年此書當在至元十一年是時南北隔絶但知紀元為中統也先是公羈旅日有以鴈四十餉公內一鴈體質稍異命畜之於後鴈見公輒張翮引吭而鳴公感悟擇日率從者三十七人具香北拜二人舁鴈跽其前手書尺帛親繫鴈足且致祝曰纍臣某敢煩鴈卿通信朝廷鴈其保重欲再拜鴈奮身入雲而去未幾虞人獲之苑中以所繫帛書託近侍以聞上惻然曰四十騎留江南曾無一人鴈比乎遂進師南伐越二年宋亡書今藏諸祕監河南主客劉淡齊云西北皇華早東南白髮侵雪霜蘇武節江海魏牟心獨夜占秦分清秋動越吟蒹葭黃葉暮苜蓿紫雲深野曠風鳴籟河橫月映參擇巢幽鳥逺催織候蟲臨衣攬重裁褐貂餘舊賜金不知年號改那計使音沈國久虛皮幣家應詠藳砧豚魚曾信及鴻鴈豈難任素帛辭新館敦弓入上林虞人天與便竒事感來今憶舊遊三首醉酒高陽里題詩左氏莊碧雲埀草帶紅旭散花房流水循除活飛絲拂鬢長座中誰潦倒遺却紫香囊臺迥林光合峯孤嶽影分勢從平地湧心與異人羣解佩春相贈鳴榔夜忽聞時來面風渚瀟灑誦吾文紫藟妨過馬青苔委佩魚名通天上籍腹有架間書春水浮齊艦山雲落板車尚懷仁里好耕鑿對休居過余剛中常清雲林二首靈草緑含烟桃花紅滿川淡餐雲外粥清供石間泉雨響注春酒風鳴彈夜絃經過恐難覓養鶴洞門前一畝閒齊館三年守道心乍來驚野鹿久住識山禽亂石浮春氣長松落晝陰世人知一作如有此翻畏白雲深光相洞光相何年有元和敕賜名金天靈鷲下黑雨石龍鳴莎草迷行迹桃花隔櫂聲神遊到仙境童子恍吾迎同周南野遊雨石山洞地主周顒後邀遊一作登雨石山風岩寒六月雲岫闢重關珠閣參差是芝田儻莽一作曭㬒間洞天仙有籍君得上清班重遊光相洞霜葉下楓楠蒼青石洞􅛦六丁非假鑿大禹若為探下接炎州海幽生白日嵐人傳古尊宿曾此作禪龕洞虛觀玩月獨立鬢蕭騷天風吹綺袍石林秋後薄香殿月中高句落丹山鳳神遊滄海鼇仙人渺何所靈響度雲璈靳士達憲幕遣從子惟正邀飲西湖二首樓艦圍青幕宫壺絡錦絲忘形犀首飲留意鹿鳴詩十里天開畫雙峯月上眉湧金饒夜色歌吹送行遲湖山千古勝富貴一時心茉莉花浮酒芙蓉火炷沈驄文停岸馬繡羽並沙禽再度雲回曲蕭蕭鶴滿林題埀虹橋亭長虹埀絶岸形勢壓東吳風雨三江合梯航百粵趨葑田連沮洳鮫室亂魚鳬私怪鴟夷子初心握霸圖感宋遺事二首有引至元十三年正月巴延丞相入杭二月起宋三宫赴上都五月見世祖皇帝尋命幼主為檢校大司徒封瀛國公十二日內人安康朱夫人安定陳夫人二侍兒失其姓浴罷肅襟閉門焚香於地並雉經死衣中有清江紙書云不免辱國幸免辱身不辱父母免辱六親藝祖受命立國以仁中興南渡踰三百春躬受宋祿羞為北臣大難既至守於一貞焚香設誓代書諸紳忠臣義士期以自新丙子五月吉日泣血書五月無花草滿原天回南極夜當門龍香一篆魂同返猶藉君王舊賜恩天遣南姝死北燕宋朝家法最堪傳當時賜葬崇雙闕混一當過億萬年題馬逺小景二首半天飛殿壓金鼇一島春雲護小桃爭捧夜香薰御榻君王來聽月中濤斑管書殘女史針水精深殿樂登臨荷花大得薰風意一夏吹香上玉琴題趙文敏蘭邯鄲夢覺䇿羸驂薊雪幽霜味飽諳手寫蕙蘭天上滿歸來春草暗江南題林和靖詩意圖研池氷合草堂深月在梅花鶴在陰一日盛傳詩句好百年誰識紫芝心和靖未嘗娶傳經業于猶子至登第以其事如元魯山故云題柯博士墨竹奎章博士寫蒼筤葉葉中含雨露香華髮歸來無限思九疑山逺暮雲長題四皓圖二首皓首龎眉四隱家商顔山下逺秦蛇未應羽翼高飛鵠回愧東陵五色瓜萬古乾坤一局棋五文雲采九莖芝高皇自墮張良計肯下山來進諫辭題南園菜亭下竹此君同我出林丘自有清風一種秋不作長鞭及馬腹却持貞節過人頭鄉人丁祐妻沒不再娶號有髮僧豫喜其有子為贈絶句以發其微意傳家有子日將車散髮從容候曉霞若也斷絃膠可續後堂風雨暗楟花題畫牛南山春草碧油油夕陽在背餘光留僅容寧戚歌扣角不受梁武金籠頭題杉溪老人家壁六言四首十角犁牛前巷一機黃絹比鄰婦事姑嫜婉順兒看賓客情親朝夕一盂白飯東西幾緉青鞋邀客烹葵别墅課兒題竹高齊紅白花明水寺青蒼樹繞沙村夜多凉月照席日有清風掃門掛巾藤蘿石上濯足芙蓉水頭落日不逢過馬東風忽亂驚鷗題李後主墨竹斬斬金錯刀稜稜鐵鉤鎖寫盡江南春曾不得蓬顆題趙子固蘭月冷湘江佩風傳鄭國香氣同堯二女秀比謝諸郎題李息齊竹雨露恩深沐風霜節愈高本無斑染淚秋思滿湘臯齊居雲來長川白雨歇高林青正自捫膝坐况有太𤣥經懷燕操七國孰大兮金孰與多燕最小兮金臺峩峩地高天下兮桑田海波昭王禮賢兮臺用不磨於乎有志憂世兮它心謂何西日操日之暹兮四海蒼凉日既中兮萬彚寵光中不我臨兮西下不照我桑白虹上奸兮妖氛肆揚於乎授戈于天兮人誰魯陽望鄉操春水兮滑柔春林兮蓊稠春莫不好兮我心則憂徘徊顧瞻兮非先子所釣游於乎人生不歸兮狐死之羞精衛辭維山兮有石維木兮有枝朝銜暮銜兮填無已時形瘁翮鎩兮口血淋漓海之大兮天倪海之浸兮天池海變田兮天實我為身甚微渺兮心莫海窺於乎如精衛之人兮誰其汝悲涵泳齊辭有引雲間謝仲允架閣扁所居齊曰涵泳以延其師以教其子而屬豫為之辭辭曰聖教其淵兮聖化其天兮于躍于飛其魚鳶兮道不言而傳兮涵泳名齊為學然兮心游六經左右逢原兮時雨春風尚詠歎乎斯弦兮題俞氏錦野亭詩意圖有序錦野亭詩者宋吏部侍郎臨安俞公烈若晦傷在昔錢氏為國斂重民困而作也公登淳熙初第纍遷中書舍人會宗室希誾由官所奔喪歸誤伐韓托胄祖壠傍竹為造墓具法司承托胄意㫖援持仗竊盜例公曰墟墓非人室比兼未嘗持仗今追兩資送它州安置罪涉太重夫有官之家猶得贖例矧希誾在屬籍特不得贖乎遂獨以聞止罪伐竹者托胄痛銜之尋嗾言事者論去家食凡五年起知贑明鎮江三郡時饑疫並興活淮民流移者不可勝計又捐己田倡義役鄉人多德之後召為吏部卒麟蓋其裔也麟築室松江之青龍存志畎畝曰不忘先澤因取詩意繪圖屬豫序而歌之用啓孝子順孫之永慕也孰有血氣兮不知所天孰知禮義兮而忘其先錢社既屋兮錦野草莽俞有詩存兮風系吳土萬支一本兮何間今古顧瞻畎畝兮匪稌伊黍黍稌播兮畝鍾日鼓腹兮歌雍雍謂燕雀兮毋逺爾鷇子若孫兮肯搆張叔夜衣冠墓高林度疏風僧迎黃葉行興言張叔夜遂謁衣冠塋白河幾橫流寶氣餘峥嶸傍開洞若堂周抱山如城無時旌棨下中夜珂佩鳴得非忠義魄遙過謝先生疊山先生死固晚並有夷齊清越禽巢相依歲歲樂生成微物知所止見護虞與衡我來屬盛世浩思秋雲平留夷糅衆草瀼露亦以盈未知百載下誰復踐其形題墨禾先王厚稼穡訓言載書詩後賢懼荒怠圖以鑒來兹嗚呼人文弊遂有丹青師甚至被龍衮殿上染花枝纎穠極天真何益家國為相氏一作柏氏代北胄乃背世俗馳手寫一穟稻自比九莖芝浥浥瀼露漙裊裊秋雲埀所願天下民與帝躬耘耔殊鄉布穀歇稊稗搖風漪稊稗熟尚可蟊賊害方滋作歌歌道周庶幾良牧知宿浙江館雲腳霾日車石角鬭潮音朔風回薄暮故故吹我襟我始適大邦思快父母心置酒商女館送目浙江潯歌鐘殷廣陌樓閣帶遙岑帆轤聨亹亹駟牡馳駸駸明王都在昔上相鎮斯今本將元方車豈為莊舄吟梅花耿玉雪坐久香滿林終宵樂清夢不記歲華陰草萍值雪蔣蓮雲四合草萍雪紛雨飂飂山寒徑慘慘野色暮茅茨道傍舍槎枿溪口樹猿猱憑深林僕馬疲中路雙親各埀老顧我仍百慮天嗇孝養歡徒攜甘㫖具薪蒸燎衣褐筐筥陳薯蕷窮冬且加餐無為迫前騖玉山道中羣山奠南服秀色競東迤我迎懷玉來一雪淨百里氷溪馳晝夜湍激石齒齒風林回蒼寒雲日開繡綺役夫前呼抃繚繞入峻峗時無盜賊虞地有形勝美沽帘矗深崦燈鼓動虛市時時斑白民出售貍與麂乾封古名鎮烟火望中是何得一囊錢親筵致甘醴自乾封歸省祖壠過大南嶺向玉山從親客殊鄉所欣塵事屏兹乘有方役願言千里騁朝辭縣北山午踰虛南嶺濕嵐沍浮陰高日下疏耿亂田麥蕃膴絶壁松秀整登登箯輿勞委委蘿徑永異跡辨䕫足獨往見僧影沖襟暢寬曠𤣥趣集深靜邱墓躬泛掃庭闈念定省僕夫戒期程烏啼復豫警感託上任中丞秦治書四首西北雄都城岧嶤蒼龍闕御溝紆河漢端闈夾日月穹窿復道上劍佩儼森立聲教被不毛琛贄來窮髮始駝白馬經載降瑶池節華音流僸佅庭舞散渾脫陛下鼎盛年行矣纂謨烈西日下五城歸騎飛輕蓋美人遊蘭苑公子車同載噦噦八鸞音裔裔雙珠佩華星爛復閣翠島涵清瀨鳴絃文魚泳飛觴王雎邁佳期樂焉極芳年諒難再誰其守寒閨寤寐衣裳會長安多列侯甲第青雲衢熊羆布畫㦸贔屭承銅鋪恩分玉液酒敕賜虎文駒香塵霏步障光風轉流蘇朝除大黃門夕拜執金吾器盈靡善持車敗良疾驅鐘鼎宜享德貴寵祇禍愚由來明哲士兢惕保身圖車鳴何彭彭馬馳亦啾啾輕裾從長蓋相適江南州江南信樂土璇題麗飛樓王餘吳下膾春雪郢中謳故里難重懷震駴決河流桑棗歲漸薪風俗日復偷華夏何由實杞臣一作民徒煩憂靈岩涵空閣望太湖懷隱士具區古震澤壯麗東南州長風地軸動初旭鼂采浮白榆根株懸夜久光相繆三江混一氣四湖匯支流橫從鳬鴈沙晦昧蛟龍湫蔥青匝水樹丹碧涵岑樓盤盤洞庭山橘如粳稌稠餘甘釀㫖酒亦博千户侯詎無英豪士産兹山澤陬手披金薤文身被翠羽裘蒼生不當問於焉以遨遊遨遊道有在誰將候虛舟分題得劍池送張吳縣之嘉定同知東吳古澤國虎丘萃磅礴泰媪閟神秀巨靈為開鑿嶻嶭立蒼翠􅞛呀露齗齶兩崖日色寒一道天光落闔閭葬其下風雨夜移壑至今斗牛間紫氣常炳若我嘗俯瞰之或恐蛟龍躍令尹儒家子物理素精博五年飲此水遂蘇吳民瘼遷官槎江上百鷙見一鶚宿暝褰汶濟秋容淨伊洛行須頌河清休聲著延閣復如乾封晚經漁浦窮曛經漁浦寒水白於練總總星東出獵獵風北轉眼中獸蹄過笛裏魚狀變稍聞刁斗應漸喜烟火見誰家長林根繫艇沙渚面天含瀟湘思山錯吳越甸承平謝憂患少壯忘羇賤瓜橋往未遑雲源訪殊便明涉子陵灘桂酒同一奠韓醴泉先輩余麯車道士邀遊東歡橋釣磯岩壁既赴鄭漕臺宴衆謂豫有高世志屬賦進酒歌遂走筆我志千載前而生千載後間勞濟勝具或寓醉鄉酒東郊秀壁參錯明螮蝀下飲波神驚看雲衣上落照赤放櫂却赴漕臺盟漕臺筵開戛秦筑霜寒入簾吹絳燭沈香刳槽壓蔗露風過細浪生紋縠水精碗蒼玉船載酬載酢陶自然鼻頭火出逐麞未必樂髀裏肉消騎馬良可憐五侯七貴莫糞土蜀䨲越蜀越一作蜀䴰仉如飄烟聞雞懶舞飯牛恥中清中濁方聖賢豈不聞縣譙更闌漏遲滴又不見天漢星疏月孤白幾家門鎖友一作瓦松青僅留校書墳上石墳上石終若何醴泉麯車更進雙叵羅寄程嶺程撝謙憶君城南同筆研别來十載不相見好風吹我千里行又得游從永豐縣永豐縣前山崇牙永豐溪頭水齧沙栗留亂叫格磔語庭雪落盡櫻桃花邇一作遙知肥遁雲深裏猩聞酒香屐折齒青草陂塘魚噞喁黃泥茇舍蠶眠起尊翁其父名楨頒白棄手板弟郎羈貫親文史滄浪或接莞爾笑空谷只待跫然喜我亦長歌求友章時一作昨復夢對月滿牀明河埀地斗轉曙蔣家尖刺青微茫三樓岩六峯石釋楊仙陳此其宅洞歌幼眇天唄殷木蜜甘馨土瓜白安得胎禽各一隻下上烟霞縱心迹却過程嶺論程易篤敬夫御史夜過蘿月山房我僑縣北西岩阿石上夭矯皆藤蘿緣牆蔓屋帶松桂夜有霽月相婆娑蒼苔露濕籟逾靜顛倒空明天地影天孫橋渡鵲休飛木客壺傾鶴初醒此時嫦娥朝廣闕太乙仙遊杖烟熱漆書竹簡動蝌蚪布襪青鞋冷霜雪御史鄰居偶扣扉攀蘿弄月樂忘歸蘿與月兩無違願月慎敵太陽體願蘿常緝幽人衣山靈指示邑可改稅駕息馬惟子待陪曲達嚕噶齊主簿遊平門山還飲鄭氏水閣階前神駿驕逸羣席上賓客多能文千瓢酒㵼椰子露一岸紅浸桃花雲行庖香狸面如玉篳篥烏兔一作羌眼瞳緑鈎簾不下山四寒絳紗歷亂風林燭三岩行宋邑人蔣䕫僧楊氏咸隱此皎皎停白駒翩翩上雙鳬槁項黃馘相候呼草木為我咸敷腴峽然黝色壁崖起王孫罷吟鶴來跂徑紆石角斜斷鋒溪染花香淨流泚混沌之竅三層開呀若疊浪龍門來得非地設仙境界無乃天造真樓臺雲關岫幌謝斧迹露下嵐生翠成滴我方骯髒對竒賞僧何因緣此長寂西偏尋丈基階荒讀書嘗隱蔣賢良松根久冷青燐火觚稜還飛金鳳凰世上繁華易塵土可歎山間亦非古樵兒安知時代序爭和牛歌出林莽僧慧畹畝同芳圖引慧沈姓嘉定儒家子今名復字復之隱居教授鄉里君山秀蔚大江白慧書記者山椒宅愛吟楚詞畫楚蘭宿世應為獨醒客靈均獨醒那復見見蘭猶見靈均面邇來蘭亦少見之騷人志士良心眷一春天氣今日美思攬山雲櫂江水席帽飄蕭蒼隼林松腴爛漫氷蠶紙澧花沅蕊淡不嬌光風入簾佩影搖婉乎凌波之微步隱然拔俗之清標孤竹孑孑節自持似與玉樹賓朝暉女蘿婦寺態倒舞崖石青裳衣却憶驂鸞夢逺馳洞庭瀰茫吞九疑蒺藜平接賈傅井鷓鴣叫斷湘妃祠湘妃祠賈傅井跽招魂兮魂莫省先民不作兮淳風曷回木魅前跳兮山鬼後騁慧也釋氏英意匠撋染趙弟兄子願除結習我願離夢想方駕太史窺荆衡桂酒奠芳烈琴絲發商聲以寫我曠世感慕之中情奉寄王丁二御史春風浩蕩東南來弔古訪舊金陵臺龍蟠鍾山石虎踞二十四豸臨三台其中弸彪兩柱史飯疏日飲青溪水女牛翼軫避法星文章禮樂羅賢士玉宸帝居霱雲鄉一塵不動間琳琅煮茶數對冶亭晚黃雪滿地松花香君不見六朝前後三百霜當時王氣回天章瓦棺閣廢辱井在王謝宅燕他家翔又不見自唐逮宋為政好顔張二吕程公皓勞勞故址蟪蛄鳴幾多人迹埋烟草榮華如夢足驚心惟有清名世共欽願言白馬之生且復諫庶使丹雞之盟良可尋前六峯行貽葉舜可有引信州永豐縣東下五十里地名柘川有峯六筆圭屛蟾鼇抱兒是也陳真人祠龍井並在靈雨岩下陳五代末得道者甲申春二月豫同道士余常清訪其地主葉舜可為兹峯遊適大雷雨因賦是詩舜可負材德弗仕咸稱之為長者云客樓拂曙嵐光入起見千山萬山集紫騮小縱春風韁六峯秀拔當前立六峯僻處始我遭井翻霹靂龍為逃斯須靈雨過絶巘呈態獻狀爭雄高老蟾膨脝飛不得巨鼇憑陵氣相食屛開琉璃圭拱璧抱兒嬌媠愁無色惟餘孤銛之筆勢卓然倒影畫破清泠泉王珣江淹夢已逺紫翠長掃烟雲天天低石林籟自響攂具拄頤神獨往泥蕨叢生虎迹間岩花却墮鷹巢上乍來毛骨恍塵蛻久憩衣巾颯秋爽日靜時飄大梵音月明忽降瑶臺仗武夷九曲仙所都江郎參倚尤魁梧南東相望德不孤足配嶽牧臨方隅子何尚友山澤癯涵泳聖真咀道腴許我畫入幽居圖寄王率初野人性僻貪出遊不知我者云何求仙風道骨本來有詩債未了今生酬去年匹馬當春色作賦天山動山碧君家銀瓶五尺高日西橫臥青苔石高齊三宿人事紛掉頭又入三岩雲棠梨花開叫杜宇思歸便發長江櫓彌旬路近芙蓉城却望乾封涕如雨乾封親老拘微官芙蓉城外松楸寒艱難臥病傍鄉戚去住兩意含辛酸辛酸有時已去住何由已笛樓雁過林滿霜織户蛩嘶月涵水衣裝蕭蕭餘藥餌放懷且眺東南美泰伯祠高閶闔門堯天宅化弦歌里承平况是官府好甲第埀槐拂除道相逢英采識周郎任擲金錢喚蘇小蘇小裙拖湘漢烟蜚襳埀髾珠翠鈿斂蛾含貝立在前檀槽玉軸鳴鵾絃絃聲腸斷暫停手君佐新歡命行酒野人曠誕禮法疏自起嗚嗚衆擊缶如泥之醉不省知就睡夢繞豐溪泥鯉魚竹笋倣佛見愴恍重與君攜離攜離二三月君尚留西浙歲晏問君回頓解憂思結今年天山我再來海棠暖照吹笙臺巫峯一半落杖屨地有六峯竟為十日終徘徊終徘徊太潦倒世上悠悠似君少高盟端可同死生細故那能掛懷抱㑹當通家復通譜更共拜親仍拜嫂自此襟期霄漢間尺書長寄南飛鳥敬題諭淮安朱安撫詔後詔文附大元一本上有上天眷命四字皇帝聖㫖諭淮安州安撫朱煥據陳楚客奏臣與朱安撫同年又有通家之好自戊午歸順之後不相見者十有八載今王師弔伐諸道並進數內一路領漣河清河將士攻取淮東未附州郡竊恐城陷之日玉石俱焚臣於故人情分不容緘默且彼所以嬰城自守者無它原其本心但未知趨向之方初無執迷抗拒之意今大江南北西至全蜀悉入版圖若蒙聖慈特發使命宣示德音開其生路彼亦識時達變之士也寧不以數萬生靈為念乎臣昧死上言伏候敕㫖准奏今遣使持㫖前去宣布大信若能識時達變可保富貴應在城守禦將帥同謀歸順者意不殊此故兹詔示想宜知悉至元十二年七月漢兒字書九鼎沸莫止大厦傾莫支太陰初陽不得燭下土小龍望望閩之陲六宫掩泣向北去孤臣憑城尚南顧也知天命有所歸忍為生靈貸生路當時不死良為此至今人說姜與李君家富貴八十年露臺風館啼猩鬼世事茫茫難具論遺詔幸得傳諸孫烏絲細字書題罷黃葉乘秋正打門題張彥升省掾所藏代馬圖緑睛鬈髮黃鬚兒翠裘錦帽當軒墀紫絲遊韁玊花馬意氣八極同驅馳浮雲滿身雪滿足阿母瑶池向曾浴霜風蕭蕭八尺影在野猶自空天育吾聞真龍非豢牧一食或盡一石粟天寒日暮長楸間鈍質駑材當俯伏為君三歎三祝之慎勿輕受黃金羈聽鄭廷美彈琴畫欄月照芙蓉霜博山水暖薔薇香石屏石几青黛光鄭鄉君子琴中堂榴裙蕙帶辭羅洞玉佩珠瓔脫飛鞚何處春深雲滿林小巢並語梧花鳳君不見湘靈鼓瑟湘江滸苦竹祠荒愁暮雨遺音一聽增感傷使我無言重懷古重懷古雞喔喔明星爛漫東城角誰家尚奏桑間樂婦董行有前後引婦董滕人劉進妻也進與兄順並以勇稱金季山東亂盜蜂起因共募丁壯保里閈天兵駐嶧山進單騎覘之中流矢死順徙家淮南舉室溺淮水董為宋招撫吕文德禆將所獲欲犯之度不免乃謂曰夫喪不逺家難荐臻一身流離娩在旦暮死生非我有願將軍勿疑夜果生一男先是順已入濟州訴于石太尉圭曰順有弟不幸沒于敵其妻在孕為南軍拘幽舟中萬一不得收遺息使弟為厲實順之罪也惟明公是圖石為發步卒三百人跡其所往次淮揚始知董所在陰使人偵之生子蓋三日矣及見具道順意董悲感不自勝且抆淚一作收涕曰妾以妊不得先夫死今幸不辱先所天使有後皆伯賜敢名此子曰伯祐以志不忘遂抱授偵者目送數十步投江以死至正五年秋進𤣥孫士行語其事於逢逢高其節義作詩哀之北軍南軍和議時兩壘對立龍鸞旗羣雄棋峙國瓦解乃與婦董光門楣星辰錯亂風雲氣乾坤造就氷雪姿渾家性命葬魚腹一舸涕淚隨鴟夷長眠自足為義鬼後死只望余孤兒兒在腹中兵在目憶夫心頭臂消肉日晝慘慘陰靈歸夜黑冥冥波浪觸馬駝磧逺暗塵土雞犬村空疏樹木嶧山誰收白玉骨蔡州地陷黃金屋太尉前歸明主化招撫姑存寡妻宿羞看人面問消息强通語笑寬羈束伯順見義勇著鞭鋭士協力鋒爭先道傍弩伏荆棘底掌上珠還江海邊將門有後傳世世墓祭無所從年年湘妃摻袂一作袪遡寥廓漢女結珮窮幽𤣥縞衣綦巾共縹眇文魚赤鯶長周旋脣亡未久齒亦喪獨聞其風猶凛然中原山河想如故目斷幾㸃滕州烟逢為是詩已士行復述順一事尤卓卓順既得伯祐以行時董死事覺招撫發步卒亟追之賴左右弓弩手散去還白太尉甚義之處之麾下凡兩致太尉命往覲太祖皇帝于魚兒泊之行營賜金幣鞍馬且命撫循邢磁贊黃十餘城用寧謐上功受黃金符官昭勇大將軍行右副元帥濟兖單州等處管民長官在官十餘年士民翕服晚有子五人未老棄官以伯祐襲其爵為奉訓大夫濟州管民長官是年至元元年也故録於詩後併以俟執史筆者采焉後六峯行一名六石去年六石遊炮車雲合龍起湫滂然雨過景新沐爽氣欲與胸次侔今年遊六石燕子風輕好春色坡陀下馬入崦坳怪木長蘿始捫歷巫峯失却青半壁方蓬倍列神仙域泰階南斗遙相望夜夜分光委空碧高寒積陰自太古此日羣巒霽亭午桃花千樹鷓鴣鳴柏葉深林麝香舞五季陳道者道成竟霞舉閒騎蘇耽鶴或跨茅君虎祠前溪流窅窕通蒲牙短刺沙抹紅聲聞天樂覓無處雞犬尚隔烟蔥蘢岩呀谷露轉清絶女絲男薪總欣恱山中樂土無代謝世上朱門有傾奪我時縱觀心神舒授簡忝後諸大儒興發不顧三足蜍尺箠願䇿金鼇魚東踰扶桑南蒼梧回轡北謁承明廬圭以面龍衮筆以草諫書屏以坐至尊下令黎民同晏如獨憐抱兒之小姑身死猶望邊征夫乾坤終窮亦不免萬物變化無時無撫掌自笑愚公愚高景山一本山下有中字蟠松歌朝廷無遺材而我觀蟠松松高僅尋丈足當高景山竒雄外惟英華發內實神秀鍾氣食白額虎勢挾蒼睛一作精龍鱗張鬛奮角爪露兔絲纍絡苔花封支離偃蹇盤礴倨驁百千狀葉擁車蓋萬箇青童童東柯西幹尤不同隱若雲鵬離溟渤六翮始舉扶搖風幾欲徑上天摧碎霹靂鋒䕫魖獝狂莫敢近上帝素有生全功貞姿森森凛鐵石靈響殷殷來笙鐘流膏伏晶化苓珀屢起凋瘵蘇疲癃胡乃甘自屈跡吳沼中我持美酒玻瓈紅三酹載拜十八公今之拳攣突梯世不容公其正身直節以答上帝衷三辰復朗曜四海無困窮野夫獻頌蓬萊宫奉寄劉廷幹都漕名貞終南臺侍御史東南蕃殖數吳疆太府均輸百萬糧夜對紫微星直上曉經黑海路彌長商蠻載肉蘄神嘏父老傾都望米檣黃帕越羅天水色玉瓶官酒鬱金香殊恩厚錫當霄漢盛德高名著廟堂劉晏從容邦國富蕭何談笑甲兵强士林爭售來禽帖故郡猶歌召伯棠花底佩行清染露柏邊旄節迥含霜每憂野逸為牛後思正朝儀接鷺行他日與聞當世事山林朝市孰相忘奉送董孟起水軍赴樞密判官名摶霄馹使傳宣下紫冥陽侯隨節渡滄溟雕題外服思文化白髮中原望將星秋入羽林兵衛肅夜經龍島劍花腥久懷令聞如楊素今喜威名過衛青猛士固應煩練習時奉㫖練習軍馬遺黎終得慰飄零依稀桑棗空原野蒼莽茅篁接塞庭此日朝廷深倚注百年河嶽載清寧陋儒材力慙無補惟待燕然續漢銘題宋太學鄭上舍墨蘭有序公諱思肖字所南肖與南何居義不忘趙北面他姓也世家三山曾大父咸仕宋父起淳祐道學君子公太學上舍應博學宏辭科會元兵南叩闕上宋太皇幼主疏不報國初諸父老猶能記誦之語切直犯時禁俗以是爭目公公遂變今名隱吳下所居蕭然坐必南向遇歲時伏臘輒野哭南向拜而返人莫測識焉有田三十畝邑宰素聞其精墨蘭不妄與人因紿以賦役取之公怒曰頭可得蘭不可得宰竒而釋之又嗜詩題蘭云玉佩清風挽不回暮雲長合楚王臺青春好在幽花裏招得香從筆研來過齊子芳書孰云天埀古色照柴門昔日傳家事具存此世但除君父外不曾别受一人恩寒菊云寧可枝頭抱香死何曾吹落北風中禦寒不藉水為命去國自同金鑄心其為文操行率類此晚年益究天人性命之學竟以夀終舊傳獨行老康成文物衣冠魯兩生甘與秦民同一作潛避世恥為殷士祼如京天池水淺鯤南息衡嶽峯高雁北征三百運終遺墨在秋風九畹不勝情王公詩蓋賦於元時已作避秦恥殷語若見所南心史當更有深服處題信州總管耶律輿誦卷此首原本在送賈靜安後蒼翠千峯拱上游地同吳楚控南州繭絲歲貢親王賦風俗今移列郡侯春日歌鐘停舞燕晨星鼓角動鳴騶四民共話深仁澤桑柘連雲麥蔽邱簡盧起先御史名嗣宗疏齊之後御史承恩出帝廬弓裘文采照圖書雲烟飛動龍香劑風日雍容豹尾車青草瘴消炎海外碧桃春透故園初懸知袖有征蠻䇿不學盧鴻遂隱居送賈靜安員外之行都水丞水部中朝世胄家兩曾畫省對薇花九關好附升天翼萬里初乘貫月槎龍返故宫遺蜆蚌民移高阜失桑麻宣防何似河清頌早播皇風被邇遐登信州溪山第一亭亭扁晦庵先生書第一溪山屬考亭周遭樛木自林坰中流半夜飛星白絶壁高寒過雨青上界異香雙鳳下仙家橫玉小龍聽登臨偶憶徐元杰為摘梅花薦爽靈寄理幕蔡君美兼簡東流陳尹羣山龍鳳仰重暉一水芙蓉近紫薇南渡流風文墨盛北來王化簡書稀黃鬚白馬凌晨出烏榜紅舷犯月歸思得東流陳令尹裹茶相與看烟霏喜朱子才知事迎太夫人至二首白馬青袍幕下賓樓船迎養太夫人關山迢遞孤雲暮雨露涵濡寸草春屏障久虛金孔雀兒孫俱長玉麒麟知君順色非難事心待平反答至親畫舫青簾駐日斜綵衣白髮照江沙風塵忽見老萊子庭院正開萱草花鸞錦載頒新誥命魚軒穩稱小香車珍膎調罷親弦頌盛事由來出故家題汪叔志賢母傳後母陵陽陳氏寧國郡尉孫和父妻也阿㜷强健髮如新重閣修簾坐錦茵萱草雪霜深待臘桃花風雨暗移春兒成近續潘郎賦女大還依孟氏鄰輿誦總歸慈訓力史褒貞節更無倫貢泰甫待制降香南閩中途有司業之命北還奉贈千里閩江宿瘴開九重天使降香來風雲篋笥芝蘭氣星斗文章館閣才金節本隨神馭下綵船仍被聖恩回諸生顒望陽司業化雨行分到草萊寄楊鐵崖司令先生就隱東南地罷賦甘泉奏漢皇春雨正來龍尾道長鑱猶斸禹餘糧天孫無奈宗元拙力士安知太白狂清夜一星江漢裏幾人云是少微光寄堵無傲宣使雲開斗北鳳鸞飛天入江南馹騎肥星月五更丞相府風烟萬里使臣衣薇花露冷香渾濕柿葉秋深樹半稀新比鄭䖍詩畫好草堂野趣莫辭揮寄邊伯京帥史六朝故地起秋烟並馬清遊記昔年消息近傳閩海上襟期猶在斗牛邊元臣外閫旌旗合從事多才贊畫賢二月榕陰叫鸚鵡題詩兼寄百蠻箋邵伯岡縣尉有一竒石子一作豫名為蘂珠峯為題一作復題是詩君家石笋光於雪秀與昆侖一氣鍾雲液暖蒸珠蓓蕾月波凉浸玉芙蓉根移瀚海三千劫影入天門第九重不待竒章識神品研池春水化游龍聞武岡消息萬里南荒瘴未消桄榔椰葉嘯鴟梟石頭飲羽終疑虎蛋一作蛋種稱臣尚姓猫金鑄甲衣懸醜地黃封乳酒下青霄三軍再一作戴荷天王德擬奏鐃歌協舜韶題明妃圖書鄉先達陸子方詩後詩附忍辭漢月戴胡天鴈帶邊聲落馬前地出黑河非故國草生青冢自常年朔風寒雪凋雙鬢舊思新愁寫四絃聞道至今魂不返夜深直上氣蒼然青冢在黑河傍夜四更氣蒼然直上