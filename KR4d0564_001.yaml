守蘄水亦死之十月雅州司吏劉處岩守南關巷戰死十二月𣙜一作權香山巡檢張德興以不從叛亦死宗顯贈廣州總管諡良愍元吉贈香山縣尹宗澤贈松江府判官國寶贈南海縣簿尉桓贈禮部尚書諡忠潔如玉贈平樂府判官孝先贈河南參政諡義愍處岩贈睢陽縣尉德興贈奉元府判官右前後二十二人嗚呼殉死者大傳偷生者不大愧耶送談仲張知事儒官登幕府勝地數郴州五嶺深開壁三湘逺合流文興由孟綰城築始楊璆雪普民豐樂秪應坐嘯秋題靜安寺雲漢昭回之閣有引閣本光宗皇帝在潛邸時書賜安撫使錢良臣後閣廢子孫捨石刻置寺閣曇琛二上人徴題詩云雲漢昭回夜新登最上頭叢林幾度臘片石百年秋爽氣隨天盡疏星帶月流身今在析木無暇顧牽牛句容縣望三茅峯斗邑抱重岡三茅峯頡頏地呈青玉案雲羃翠瓔房靈籟殷天樂大丹流月光神遊猛虎外身與意都忘衢州華豐樓望柯山江郎石華豐樓信美登望久踟蹰木落偃王廟天寒姑蔑墟屏開山石逺青鎖洞霞虛不有從親役乘風振珮琚送張子恭憲史還鄉遷母葬復之婺州張仲霜臺彥還鄉妥母靈山人攜絮酒太史撰埋銘黃先生清佳氣雲霞色芳羞沼沚馨慈烏感孝行飛候最髙亭送鄧伯林判官還江西黃田寒浪稀衣錦上船歸天上梅開遍山中桂合圍鄴侯書具在孺子宅相依便好全高節東湖玩夕暉壬辰冬十一月避亂綺山簡邱文中貢原父二教授雲掩金戈日風生鐵馬塵亂離誰事主貧賤獨為民雞犬人烟絶鼪鼯草木鄰喜聞同舍語天已厭荆榛至正十二年題內兄李四彥梁所遺溫日觀蒲萄有序逢與內兄遭乙未亂相失又五年始邂逅婁上勞問間見僧溫蒲萄圖益為愴惕嘗記埀髫至十五六時侍大母徐氏諱閏芳側纍聞之曰吾舍西舊有蒲萄因樹為架凉天佳月而祖諱亮字潛昭偕四三友朋歌樂其下醉乃休而祖殁蒲萄亦一作從而枯殆二紀矣間又誨曰而祖上自高曾逮而父咸獨植門户汝僅有弟唐寶又早喪使汝苟富而玷宗不若素貧而承祀薄田敝廬可粗守也汝其毋忘大母夀八十六卒且二十稔內兄久辭閫曹年已六十逢竊伏江海亦四十餘矣觸物感心不自覺涕泗泫然也內兄以圖遺逢因序而詩之是年至正己亥乙未至正十五年己亥十九年吾家先大父嘗愛草龍珠一樹紫烟濕八窗清露濡干戈形逺夢江海見斯圖歷歷重闈訓終身誓不渝台州吳子中過侍郎橋客樓夜話為贈八句主簿别來久掛名材傑間挑燈且說劍憂世未歸山石匱波上閣玉門天外關心期遂雄覽華頂厠仙班仙茅塢夜宿仙茅塢金鼇湧亂山天風來海外烟火落人間白石思同煮青蘿喜獨攀絺衣弄華月公子亦忘還韓蘄王墓道過韓王墓停驂淚滿巾中興無輔相恢復有勳臣碑冷靈岩月山還古寺春雲仍尚詩禮時薦碧溪蘋題賈性之市隱卷簾戶隔塵闤幽花坐可攀題詩江令宅採藥越王山日覺雲林隘春餘漏水閒龎公謝劉表何事不知還題沈和齊尊師水西亭髙人沈東老亭在水西頭光湧金波月凉分白帝秋芙蓉連桂館翡翠立蓮舟獨許浣花客時來同釣游題畢天池道士太霞樓畢卓太霞樓霜清一作晴錦樹稠天光開日觀海色動崑丘織女機橫夜仙人坐對秋時將白玉尺醉擁翠雲裘常州分省席上二首玉帳虎文茵弓旌左右陳鸞刀分臠炙龍勺灧浮春舞困珠瓔脫歌深翠黛顰心存大臣體授簡屬嘉賓兵戈時事改貧賤道心同泥飲悲長夜高歌憶大風龍銜劍花白鳳繞燭蓮紅猶得斯須間賓僚語即戎題西施洞響􅓏廊二首石扇天開蔓草平斷雲殘雨古今情洞靈花一作抱月長幽泣不與西施受惡名金蓮步冷草啼螿羅襪塵空葉滿廊獨憶愛姬為隊長一雙鸞血釁干將乾封西山狀神秀豫名曰青猊書絶句崖石上青猊狰獰孕金精為王爪牙足扞城我豈龍蟠鳳逸士醉來背上躡雲行溪山第一亭望靈山兼辭聞雲􅾗道士辭一作寄􅾗一作茇天高亭空霜鶴盤烏桕落子楓香乾千六百里斷鄉信七十二峯來翠寒靈山道者碧瞳方抱琴一童如鶴長雲根羊臥水晶一作精璞木杪磬懸蜂蜜房贈龍秀一作虎山人鄭良楚有引良楚修潔士也癸未春來乾封及還教諭許仲宣偕儒先鄭叔芳韓養正徐明立黃以道等飲餞鸕鷀陂上咸詠歌之豫亦一作姑贅絶句二首一本明立下有徐明善韓積之施國禎韓大正四人無等字太行黃河快壯遊歸田無復夢神州蒼龍朱鳥掛庭户詩罷滿林風露秋百藥籠頭餘一琴病夫不拒愛知音石田歲稔茅屋好種菊乞詩虞翰林謝睢陽朱澤民為畫六和塔前放船圖有後序青城丹丘舊所賢畫圖曾惹御爐烟一官歸老天宫裏為寫浙江秋水船六和塔前江水流天清無雲風始秋夕陽半落錦萬頃著我一箇發仙舟行行緑水鶯花供吳山越山作騶從乘壺美酒鱸十頭只少桓伊笛三弄右歌逢丁亥歲作也越一紀君訪逢吳門偶見而歎詠久之翌日逢謁君天宫坊寓隱案間筆研楚楚然徐示圖曰烽烟良阻子其意遊乎逢喜而持歸敬題絶句青城丹丘謂虞柯二公舊推重君者君名德潤嘗受知英宗尋逺引去題鮮于太常食膾詩後白鵝羣聚碧溪潯青李來禽滿院陰臨罷太常鱸膾帖日斜無限故園心題李陵泣别圖節毛風動馬騑騑塞日無光漢月輝不謂家聲竟隤落壯心曾待斬關歸登越城故基吳王臺對越王城歲歲春風燕麥生一片范家湖上月照人心事獨分明重裝黃荃雀哺雛卷題梁先生序贊後序贊附江陰王庫使家藏黃荃雀哺雛後有後村詩跋嘗聞古院畫率皆有名義是三雀者殆取詩禮春秋傳三爵之義歟荃蜀人故云浣花溪耳雖然姑置老荃而論後村方宋氏叔末時王臞軒劉後村文章聲錚錚相頡頏臞軒元宵詩首押稱科末押民膏後村此雀詩和韻乃竄入雛韻王以詞賦高科第二人及第劉以名臣子孫有文辭賜及第真西山為中舍舉之自代皆非不諳韻者直狃于閩人一本有語言二字聲音不覺跌宕當不以過余既贅論且贅贊云觀雀哺雛可以知仁仁於曷知於雀之身雀知有子子知有母飢焉思哺食在母口嗟彼雀矣以鞠以育矧伊人矣孰無天屬幼資于親長養其親天屬至親朂哉世人庚辰三月三山梁益黃荃三雀寓官規劉筆梁文重秉彛野淨草薰風日美冥鴻亭上看多時和張率性經歷竹枝詞二首溪上鵝兒栁色黃溪邊花樹妾身長浮薸可是無情物采得歸來好遺郎無情物一作無根蒂道傍花發野薔薇緑刺長條絆客衣不及沙邊水楊栁葉間開眼望郎歸葉間一作葉葉送盧希尹之金華兼簡其兄希閔憲郎路入蘭溪第一程滿船月色聽灘聲雍渠飛傍青驄馬最愛君家好弟兄丙戌二月草六日夜夢遊異境見碧玉樓三字為賦二首山開玉峽㵼清湍風挾微霜灑面寒春樹兩邊條怒發一羣仙鶴從文鸞夢上仙家碧玉樓靚桃纎栁帶春洲天風微動簾齊捲銀漢中間璧月流馬大沙獨遊沙路泥乾信馬蹄水村風靜迥聞雞春光搖蕩無人見滿眼蒼烟竹樹齊題墨芙蕖太華峯開玉井未央殿立金莖誰甘六郎風度不愛君子令名馬大沙陳氏席上走筆贈鎮南王府史府尉四首驊騮白玉珂蒲萄紫金碗半醉臥花間宫袍月華滿吹笳風動木走馬雷盈谷笑拈金僕姑射殺一白鹿鼓行沙漠風鞍臥關山月老矣歸去來心神夜飛越貂襜狐白裘蒼鷹錦臂韝據鞍笑上馬馳入長林楸梧溪集卷一
