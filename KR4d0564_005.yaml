錫許輹茶陵書至報及李一初御史卒甥館家書至儒林訃問俱節存陶栗里醇近董江都斗角文星淡禺中舊月孤追思與班老班彥功提學堂下接王符癸丑九月松府遣徐掾具舟再辟復謝免口號簡徐采藥去柴荆周旋荷友生府中將命重月下返舟輕鸚鵡籠無奈鶢鶋饗若驚千山兩猿鶴蕭灑歲華清寄和柏雍中舍并簡其弟柏顔太祝王父登青竹郎君謝紫薇庭容駟馬卧目送一鳶飛躍冶金俱爍韜山玉自輝情親有仲氏辭祿亂前歸續夢中詩髙閣俯通衢長垣帶碧梧風生捫虱論山對問牛圖時世常憂戚神明或感孚鬃瓢果吾貸先擬澤焦枯松府行鄉飲禮宗倅致書使枉招不果赴為寄一首賢倅黃堂暇書函逮布衣義敦鄉飲酒禮過士招旗浦暖鷗波灔園春藥草肥行過子游室就送長卿歸松守王蒼崖遣儒職問候口號宗長優為政勞賢問子桑入城笻力短遁野漏聲長悵望陳懸榻欣聞蓋舍堂宋纎世或有五馬賁輝光題柯博士敬仲宫詞後宫詞附帝作奎章擬石渠花明長日幸鑾輿丹丘詞氣凌司馬封禪何如諫獵書萬國貢珍羅玉陛九賔傳贊卷朱簾大明前殿筵初秩中貴先陳祖訓嚴傳宣大府頒宫錦近侍承恩拜榻前製得袍成天未曉著來香殿賀新年官家明日慶生辰准備龍衣尉帖新奉御進呈先取㫖隋珠錯落間奇珍四海升平一事無常恭已散集諸儒傳宣羣玉看名畫先進開元納諫圖天街女樂擁祥烟梵坐一作座春游夾一作浹管弦齊望綵樓呼萬歲柘黃只在五雲邊黃金幄殿載前驅象抹駝峯盡寶珠三十六宫齊上馬太平清暑幸灤都萬里名王盡入朝法宮置酒奏簫韶千官一色真珠襖寶帶攢裝穩稱腰玉碗調氷涌雪花金絲纒線繡紅紗綵箋御製題端午敕送皇姑公主家珠宫賜宴慶迎祥麗日初隨綵線長太史院官新進厯榻前一一賜諸王皇心簡在勛臣舊未有人知擬拜除宣索彩箋濡玉筆榻前先命小臣書古宫怨四首萬年枝上月團團一色珠衣立露寒獨有君王遙認得扇開雙尾簇紅鸞十二瑶階入鳳臺梧花開盡鳯當來夜深不敢吹橫玉壁月珠星繞上台雨餘螢冷入秋衣織女星明婺女微二十五弦香殿裏一聲聲作雁雙飛誤報迎鑾出禁宫階前草是雁來紅玉顔豈就秋枯落萬一和親在選中寄題頴上賈歸治惟敬所寓咏軒有跋五弦絶響二南衰歎息蘭芳繼黍離羡爾不隨淮枳化客軒長咏考槃詩凡作詩忌俗欲清忌熟欲生忌肉欲骨骨去露生去怪清去薄本之六義參諸經史百氏詩道備矣豫嘗以是訓子弟今惟敬篤志于詩漫録絶句後士之才者來游軒中尚采擇焉題士女圖二首一作士女圖為大同張履謙題二首淺傅蜂黃淡掃睂小蜂平苑幾紬思落盡梅花折盡栁祗因直管却橫吹不字佳人玉氣溫那知長信月過門分明畫是平生夢一扇薰風一扇恩雜題洄塘昨夜緑波增偶策交州鬼面藤一雨百花香洗盡流春矼上立魚鷹紫桐生乳竹含胎草細花幽石徑回獨自去來人不覺茶烟風揚過池臺几杖琴尊共一丘燕歸巢近午香篝游絲不挂山人眼直趂東風入一作過別樓越羅衫子暮春裁席帽飄蕭映水苔人事暗隨塵裏去天光倒向鏡中開浴罷香分碧甃瓜池臺深坐轉風車不將鐵杖穿林過恐有月中金背蟇閒身日放石林中退髮朝隨野水東猶有未灰心一寸小池量雨愧神功長夏徐行野水湄蝦跳鰍舞樹交枝雲文風色殊千萬靜裏天光日影隨紫艷薇花月晦冥翠香荷葉露晶熒偶因石几流螢過微見瑶徽一兩星變風變雅不圖聞菌桂申椒遍地芬一片古懷人不解竹光凉動九疑雲榴房風拆瓠犀開柿影離離葉滿苔雞黍今無丘嫂作清談初為阿戎來水凉風攪一池荷睡眼醒來手自摩數席雲隂亂疏樾髫孫驚報鶴羣過歲晚無他靜是謀發一作幾微詩興欲全休雀銜竹葉風頭過魚戴氷澌日影游藻池岸匝水仙開滿面香飄玉蝶一作疊梅遺事罷書山館寂鼠狼行過雉雞來蕉石士女為真定吕子敬稅使題翠石芭蕉競爽清玉階綷􅀈一作䌨綺紈聲佳人的是姮娥影一片團圓故國情許由還山圖為李生守道題不是長辭萬乘堯還山髙掛樹頭瓢九年百姓顛連苦莫遏江鼉海蜃驕山居雜題七首白雲不歸青山空女蘿水上桃一作花隂紅扁舟無事臥一覺滿面春光如醉中石窪明月手可杯松林無風聲自流山人素志非懶出白雲常在青雲頭燈花明滅香散簾藤子亂落秋風簷詩書百氏束閣上箕鬼一星騎漢南謂傅說星茶鐺無烟童未還白鶴思靜青松閒流泉不放澤下土日夜琴調鳴空山野鹿角解山澗坳老樵視如枯樹稍雨巾風瓢乞我挂答以仙脯天㕑肴山翁了了玉匱文客來掩耳事絶聞笑指丹霞與白石酒材萬甕羊千羣偶從道士飲碧螺手把桐角吹山歌千壑萬谷響應答天風黃鵠雙飛過贈朱克用嘗受知文宗於潛邸為說書後官千戶荒茅苦竹兩江間踏獸輕車共往還老作孤臣重歸國忍聞神女度巫山布衣染翰侍明光時忌翻為執㦸郎最是聖恩忘不得誤題詩句滿宮墻江邊竹枝詞有序豫童丱年輒聞里中謳水調如游鯉山髙等句不一狗呌沙在蔡港西北歲産荻茅官為薄賦豫家分佃頃半庚辰冬因取其入過嚴氏子恪甚秀敏得陪逰望沙與蝦蟇山鞋浦相連告以水調遂托舊聞釐正之得十首書遺恪云游鯉客山髙刺雲天門山小舊稱君插江鵝鼻移沙脉愁殺浪撞黃歇墳亂石呀聲大小灣石中無玉作連環楚江風浪吳烟雨翠鎖修睂八字山聲一作聱馬沙十八里江程潮落潮生船送迎南來士氣漸吳習北下農謳變楚聲社酒吹香新燕飛遊人裙幄占灣磯如刀江鱭白盈尺不獨河魨天下稀南北兩江朝莫潮郎心不動妾心搖馬駝少箇天燈塔暗雨烏風看作標北望大江南望城席帽馬鞍並山名屏障橫儂是小山漁泊户水口風門過一生石筏橫津蛟莫窺近山張弩或眠旗儂作神衫與神女祈水祈風郎不知巫子驚湍天下聞商人望拜小龍君茹蘆草染榴紅紙好剪凌波十幅裙潮落蟆山連狗沙黃泥鞋浦趂江斜阿儂十指年嬌小曽比箇中春荻芽山望五狼風不淳狼邊人接販私人那得椎一作推狼葬天塹官賣賤鹽郎貴身題荀陳德星圖難兄難弟配八龍太丘不讓朗陵崇誰知羣彧心忘漢不及曹家阮嗣宗時苗留犢圖為維揚林彥初題夀春父老送車音黃㹀寧無砥犢心不是縣公能謝過一作激建安風氣異桃林壬寅歲經時宰別第栁烟花霧暖成團蜂蝶交飛滿畫䦨舊主未歸新主入春光俱作夢中看聞蛙書事有序先朝布爾罕皇后出居東安州日其地多蛙后遣人諭㫖蛙遂屏息迄今不鳴翠幰文茵紫罽車東安有㫖禁鳴蛙如何信及豚魚類青草閒門度月華題王冕墨梅有引冕㑹稽狂士少明經取科第不中遂放曠江海間士之負才氣者爭與游嘗韀牛游京城名貴咸側目平生嗜畫梅有自題云氷花箇箇團如玉羌笛吹他不下來或以是刺時欲執之一夕遁去霜落銀河月在天美人松下鬬嬋娟一枝倒影吳牛角曽比知章踏酒船真氏女二首有序牧庵姚承㫖一日玉堂宴集諸姬奏伎有真真者或作南音問之泣曰女童建寧人西山之後也父嘗管庫濟寧坐償官負故流落娼家息公惻然遣使白丞相三保努命去教坊籍遂呼翰林小吏一作史曰汝未娶以真女配汝吾即其父也或賦長詩意有未足用補二絶娶一作婚管庫曾無升斗糜闕獲到妻兒如何學士身千百不著陽和獨見私處妾兹晨洗艷容遙承當代一儒宗斯文骨肉無疏逺何得曹瞞反愛雍梧溪集卷五
