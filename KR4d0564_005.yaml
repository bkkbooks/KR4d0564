一家村月細哀猿抱風髙駭鹿奔尚遺流矢痛堪吊不堪捫丁未夏四月三日淞島兵變禍延城邑邑士沈騰氏挈妻孥走草野二子雍穆守家廟不去悍卒排闥入二子走發二矢穆中臂雍中左髀仆户外卒復引刃擊其項背穆以身障雍跪祈曰吾兄儒者為鄉社師不可殺某不才願以代兄死兄亦訴曰吾弟力田養吾親不可殺寧殺吾儒懦兒卒感而止曰弟義兄友殺之不祥遂兩舍之前進士楊維楨録之曰在古兄弟直盜爭死有伋夀救戰有襄萇庇幼有肱江讓肥有孝禮豈誠不愛其身哉身可滅而天不可滅也吾聞張氏亡其臣有相率而死曰滕氏漆機也海獠弄兵兄弟有爭相死而不死曰沈氏雍穆也滕氏死以忠沈氏生以義忠義一天也顧世有利害未一髮而遽以食其天於乎吾不知其何心也於乎吾不知其何心也題陸緒曽祖翠岩諱大猷自題佚老堂詩後翠岩宋學官元初忠武王版授江浙提學不就以隱德終佚老堂無恙居然見典刑心存趙氏日跡隱謝敷星金玉餘清響蘋蘩只舊馨分湖春酒緑思過翠岩亭寄李元直待制有序元直名秉方李忠介公黼之子也廕授同知常州㑹中吳陷供億無錫官兵豫避地次嘗一言為贈既無錫亦陷元直與郡總管完顔以義丁合宜興分師嚴䝉古布哈騎步卒退保陽山其地阻湖憑險順逆不常至是山氓委心戮力戰拒張氏凡十六月張降浙省朝廷録功嚴拜浙省參政完顔擢浙憲使元直待制翰林南北使往還數承記問因賦八句以寄虎穴子俱班陽山試百艱不圖黑子地如在玉門關壁立孤危影天回只尺顔絲綸煥五色思睹水雲間哭雲間衛叔剛有引叔剛諱近仁好學績文敦孝友行嘗遊吳興守將候見之送餼米百斛既舉幕官並辭太尉闢延賔館幣使聘焉亦謝免或問所存曰所薦非正人所依非真傑吾得裘葛老余山墓側足矣惡用虛名致實禍為哉祖謙闕初以宋資政殿大學士宗武後授溫州路治中不就父諱德嘉潮州路儒學正失儷二十有八年不二娶養髙詩書里中幼而壯者罕識其面年四十七卒豫素友重將冒風雪送葬不果及晴畢葬乃系之引哭之詩曰有慟名臣裔嘗辭太尉招珮閒寒水玉蕨老故山苖臨帖烏絲盡聯詩絳燭消遺餘行卓絶足礪俗浮澆寄林季文周叔彬二進士時訓松庠弟子員才名江記室鄉校趙衙推上下床無間東南運載移鵠袍聯射圃魚飯獨經帷九折王陽坂應同老闕辭缺文一作此寄徑山淑象元長老秀爽東西目行峯五葉分翠虛靈鳥道水殿毒龍雲異茗先雷擷疏鐘渡瀨聞禪林肯相見采閲大蘇文寄朱仲威編修有引名桓常熟人力學負志張氏有吳中桓航海上書於朝授編修官復朝服極言上儲宫不報竟以憤疾卒使臣傳爾信南士盡稱奇蟻悃通宸極魚頒撼震維暑風行瘴逺寒斗轉杓遲正好輸忠赤騎鱸莫咏詩謝邾仲義進士寄題澄江舊藳邾詩附釋褐平生友郎官辟共辭復形椽筆夢過誦櫂歌詩樓蜃雲霞錯沙鷗霧雨悲歸舟阻習險士雅莫吾期半山昔拜少陵像謂公詩與元氣侔後五百歲無繼者元氣茫茫散不收我朝詩𣲖因中州氣節首推劉靜修宋季陋習兹一灑天運亦復詩家流楊趙馬范虞揭歐金華莆田誰與儔亂來風雅久衰落喜向澄江聞櫂謳澄江席帽同羊裘風塵之表從天游每和君山老父笛不換華頂仙人舟有時擊節驚陽侯百怪莫敢窺十洲鯨波可蹈惜沈劍鼇嶠欲踏思連鉤澄江浪髙江月浮江神迎櫂風飂飂雲機上割天孫錦底用枯槎橫斗牛放歌濯足銀河秋洄沿不為澄江留誰道澄江淨如練我視澄江真若漚此日相逢東海頭東海纎塵生我眸醉擊珊瑚碎蓬礫笑委鮫珠輕摶骰俗淫世靡吾所羞孤鳳默默羣鳥啾夏舷一扣海能小祖楫載誓天何尤澄江櫂歌歌未休凝碧管弦非所憂君詩非豫得稱好贈言請視今汪周哀髙照磨有序奉符髙孝子名自松入池遷父照磨公葬將歸祔先隴也豫嘉名孝嘗贈詩一日拜豫且泣曰名家本汴大族髙曾祖並仕金節度使子孫散處青齊先君晚祿下位蘊弗大施殁于亂平生行義粗具池陽洪仲遵九江僧觀空海序文敢復以哀詩請公蓋岑諱長卿字性剛潔遇事不阿撓俗號別子初為掾集慶㑹大夫納鱗一作麟建議溧陽二州漕粟舟繚二千里始抵龍灣候海運民病之宜興距二州百里聽民陸輦置倉便公于是將命中書往復論列利害幾二載不以艱窶受攬輸豪氓所賂神疲慮殫克允厥猷者公之力也既調池民有以筒密藏銀策十雙于雙底用報德覺焉怒民挾筒退兵興逹實丞相以分帥曲律薦版授池州路照磨軍缺儲禮勸義激巨室咸奉命時至正十五年也越二年江南北皆敵境池最後陷曲律帥被執不屈死公尚督戰備于外聞池不守遂隱九華復徙建德明年卒其友陳中殯之敬哀以辭曰白首操氷蘖青衫困簡書日回戈浸逺山采蕨無餘多士交作文潛德遺民式葬墟兒賢天所報骸骨遂歸歟送黃黼成章還潁上別業兼示其弟黻巨室隨王運憐生亦播遷關山孤漢月草木慘淮烟哭母千行淚存心一寸田夭風動潁水急買載家船題沈秋田推官續言行録有後序言行何人録歸田沈節推修存忠厚意非出見聞私天逺青雲鵠山深白石芝兩生髙漢史猶恨姓名遺逢式觀是録誠一代明良之士為多可稱者焉若大德辛丑七月颶風海鹽水暴溢旄倪驚奔官屬備舟遁知州于𢎞毅浩卿獨朝服臨洶拜籲天曰邑以淪鋪某將安往乞死于此語竟反風水復故道時江隂尤甚編氓胥漂溺避而存者纍纍咸告飢州聞于省未報知事宋仲仁春卿聊城人亟發廩賑之曰人七日不食且死躐位矯令惟某罪省檄果踰月始下史繩武正翁睂山人主簿淦之興國也適三月至七月旱民有陽八死者兄陽坐訟連八十五人贓七千五百緡由繩武察陽八為盜被殺坐實首惡遂伏辜所連獲釋是夕大雨昻吉治中之在信州也故椽嘗輸庫鈔江