body:
  text: 梧溪集巻二元王逢撰題徐孺子小像士何以居亂世兮言欲遜而行危茍背夫聖哲之明訓兮罹刑戮也固宜昔漢室猶大木將顛兮非一繩之能維故先生有見於斯兮蕃瓊辟而悉辭蚌以珠而腹披兮孰若閟采於川坻金不為燥濕而變渝兮常介然而自持夫窮達之道同兮樂天命而焉悲矧髙風軼節之不可攀兮足以振頑懦而羞汙卑像載拜酒載薦兮微先生而吾誰師懐賢懐王光大有引光大宣州太平縣人世大族從文節汪公明春秋科舉罷學古詩文於逢有神交之道因慕梁鴻之懐高恢也作懐賢一章姓吾同兮道吾同神相交兮見無從孰謂今人兮無國士之風懐德懐王道山有序王先生諱森字道山建徳人性機警夙喪父得廢疾母患其生業未植聞有道士黄雲西自陜来推人命若神俾先生贄見之白其故黄慨然納為弟子盡傳其學後一本無後字有冠遊二字術大行母賴以夀終江西省達官側室被幽置數年一日召先生推其命先生曰是婦當因子而貴且容徳全真賢媛也達官感悟見其子歡如初内御史篤敬夫之父靖江公居信州永豐素無子後得御史於其侍婢母夫人嫉之先生時挈家是邑得所生辰輒颺言曰異日狀元也夫人知愛若已出年十九果及第世服先生長者也至正壬午逢侍先君之永豐首幣見問所奥喜謂曰子姑習儒俟子旋里當不辭千里行以授所藴竟如其言留江陰三閱月逢送至錢塘先生訣别曰吾瞑目有日子行負大名幸毋忘逢受命惟謹先生抵家大會親友凡七日無疾而卒夀六十七子三先生貌古怪明洪範易素問名公卿道過信率遣使致書饋或即其廬禮焉先生多本君平之言答之始先生薄遊永豐豐之人尊信恐後為築室娶婦買田園畀之或䠥􅍷出閭巷人争候欵間留旬日而返猶洛人之事康節翁也如是者三十年特為逢一出及還遂長逝嗚呼哀哉作懐德一章髮種種兮衣巾道吾傳兮忘吾貧来為死别兮畢初志山迢路脩兮再見無因於乎孰謂先生兮今世之人命婦詞二首凉風灑魚軒纎月照蛾眉瑶琴歇清奏更㸃何其遲鯤鯨深跋浪良人海中坻不死盜賊手為是千金兒隠忍就功名末路將有為念昔從征日堂堂天王師星羅烏蜑船雲布蚩尤旗號令非已出三軍血流澌秋高氣蒼然蕭藿零露滋河漢横閣道孤鴻鳴多時夜闌燈結花試卜歸来期寒月照象服乃在深房櫳蘭蕤馥甲帳憂心獨冲冲良人忠孝門載筆明光宫日賜水晶鹽夜繼蓮炬紅推恩到箕帚雙闕尤穹隆燕鴻天北南牛女河西東補衮無失遺抱衾甘長終兵戈寖蜂起篁竹嘯悲風山川路相繆十信還一通雲臺漢光業石鼓周宣功相望善終始目冷青青松舊衣篇唁失位者舊衣丘中麻新衣陌上桑桑蠶輸繭絲瀠一作染織雲錦裳一作章麻成布在軸皎白如雪霜皎白貧賤宜妻著奉姑嫜夫今位上公紈綺魚貫行身被龍五爪賜自吾天王既貴習乃移舊衣棄固當沐猴且冠帶輿臺尚銀黄腐儒餘束書芰製松桂航薄遊滄江岸事至涕忽滂狐裘三十年徳盛國益强青氊一微物偷兒亦驚惶願言收所棄澣濯還暉光顛倒憶一作慎雞鳴厭浥防露瀼椸笥復虚設鼠蠧卒壊傷春風花落時盍記雙上堂古来敝帷蓋猶備狗馬藏新衣窄從短舊衣寛較長閒歌舊衣篇舊人詎終忘奉謝楊山居宣慰寄遺繭紙明公枉珍遺開緘霜雪色自非玉女舂必假天孫織剡藤失浮薄海苔無光澤元是秘府藏親向御手得秋風柿葉館筆研久荒寂飛来一朶雲列第厭金碧如何上所賜波及滄浪客焚香再封裹還坐翻太息盜發唐昭陵無復晉墨蹟顧兹抱貞素恬閱世代易尚憐先代時龍翰溢邦國蠶絲一作繰盡輸征鶉結曾不惕吾元本恭儉世祖膺聖徳羊鞹代白麻遂爾混區域侈用幾何年離亂亦以極明星爛河嶽雞叫扶桑白當寫大寶箴直上玉階側詎敢輕㸃涴令人却湔滌無家燕嗟嗟無家燕飛上商人舟商人南北心舟影東西流芹漂春雨外花落暮雲頭豈不懐故栖烽暗黄鶴樓樓有十二簾一一誰見收衆雛被焚蕩雙翅亦斂揫含情盼鬼蝶失意依訓猴茅茨固低小理勢難久留昔本烏衣君今學南冠囚燕燕何足道重貽王孫憂題天台陶宗儀母趙縣主徳真墓志銘後趙系出汴宋至今人猶以縣主稱云陶母趙宗室貞静白雲姿明璫秋水佩幼小比光輝自通良人姓三星天一涯孔雀金繡褥十年夢參差手製丹霞帔及嫁不稱時造次井臼間跬步必中規良人既祿仕婉娩黄髮期落月鑒綺疏春霜薄羅帷生而賢且淑焉用夀考為銘旌書縣號琬琰瘞華辭念昔岐山鸞其徳未云衰王風遽淪變撫巻慨如一作今斯烏鵲橋銀河青鳥使瑶池何如五采羽来儀竹梧枝梧竹日夜長雨露深孝思孝思人子慕為述二南詩古孝篇贈軍曹陳貞軍曹例視為軍役不丁憂貞獨能行之貞睦人走有跪乳羝飛有反哺烏誰使人無親不以喪制拘卓哉軍曹掾嘗事鄉大儒親老得抱關尚敢辭卑汙寒城落葉暮聞訃即就途公侯苦遮留泣告奚他圖孝居百行首違孝忠焉輸三軍各縞素送别恐踟蹰我適遇諸野感動復歎吁國家猶大木百世雨露濡不知衞本根立見枝悴枯吾元敦孝治王風諒交孚茍能大一統悖犯無足誅著兹古孝篇河當鑒狂愚秋夜歎大星芒鬛張小星光華開皇天示兵象勝地今蒿萊河岳氣不分燭龍安在哉參贊道豈謬積陰故遲回疎風夜蕭蕭野燐紛往来安知非游魂相視白骨哀汨汨飲馬窟雲㝠一作㝠㝠望鄉臺於時負肝膽慷慨思雄材積雨齋居積雨生夏寒盛陰失朝景白鳥巢依閣青梧葉埀井幽觀知候變逺引忘世梗淮水方浸淫吾甘繋烟艇獨夜獨夜臥齋館斜月半窓白露草濕熒熒水禽啼嘖嘖神超赴清漏慾寡忘久客蓬莱在市朝弱水非所隔帖侯歌有引昌國州達嚕噶齊髙昌特穆爾平章敏珠爾之猶子也海冦犯境侯連與戰破之衆寡不敵或勸侯遁去侯曰是吾死所也遂死之江浙省參政樊執敬為文遣使致祭請諡于朝逢為作歌云仙居縣丞冦海邦白晝突入干矛鏦帖侯親騎大宛馬快劍躍出蒼龍雙鬚張眥裂赫如虎殺氣雄風助虓武髑髏擲地血飛雨短兵未接冦偃鼓天南弧矢夜掩光狼角赭赤雲𤣥黄洪濤鯨鯢去咫尺再戰身與城存亡艨艟千百水犀手主者誰歟仆旗走岳立不轉鏦殺之殉忠國家良亦厚君不見台州牧長金兜鍪氣節自是名臣流情鍾兒女挫堅銳卒墮賊計空貽羞男兒真偽那料得長松古柏寒增色鴻飛㝠㝠我何及落日荒山淚横臆孝僧行天姥山中好慈竹竹上慈烏雛並宿小雛飛隨白鸚鵡學念觀音淞水曲觀音念得孝感生一啄一飲難為情故園花滿紫荆樹春雨春風啼野鶯僧康辭親今十載堂上手縫衣帶在關梁阻絶音問疎霜露侵尋鬢根改鬢根改兒身長兒身徒長無羽翼兒心不定空飄揚祗有瞻雲雙眼淚夜灑黄金獅座傍孟郡王印歌有引宋太師信安郡王諱忠厚六世孫崇明同知集復得王所佩印於中吳里第古牆下逢歌曰黄葉道左秋風前故人邂逅何愴然手持古印不敢釋却立載拜徴詩篇印銅空青幾風雨近出故居牆下土堂燕頻移百姓家官物猶存郡王府宋朝前後十六王外戚功臣三四數至今孟氏孫獨賢為有詩書繼鄒魯我試拂拭生耿光篆文蔚然龍鳳驤歸而寶之金玉相公侯復始世其昌則天皇后玉璽歌楊山居宣慰徴賦皇朝内府多舊璽盡畀太師作鷹墜至元巴延丞相黨臣勢焰同薫天亦得分為玉押字武后佩璽雪瑩如璞薄文深難改圖當時還收藝文監此獨善後咸驚呼唐家諸陵寶氣息后墓至今華表直天遺尤物鑒来者我歌君聞秋四壁月落雞鳴大江白松石歌夀劉澹齋總管吾聞丣山在處州之上松林稠樛枝連蜷陰蔽牛儲英孕秀三千秋精靈夜逐仙人遊仙人氏葉喬松儔栖神鍊魄道並修功成朝帝白玉樓雞犬亦得沾餘休彼辭斧斤謝薪槱化為異石森琳球好事深入窮冥搜不逺千里貢劉侯劉侯置之軒檻側波濤之痕雲霧色盤根錯節不肯直戴癭銜瘤裁咫尺瓌竒合有神䕶惜偃蹇欲與天終極閶闔風来翠欲滴昆侖日下光相射春生寒盡土花蝕驥伏龍驤勢俱敵時時青嵐紫烟羃沆瀣淋漓收不得翻愁雷公鞭霹靂取向鴻濛女媧國劉侯自是天門客大手真能補天坼乗槎路逺銀潢隔老臥江南一區宅賓筵大開浮大白香重光寒凝琥珀霓裳曲停第三拍聴我狂歌墮巾幘松兮石兮夀千百故將軍歌有序故將軍歌哀上萬户蒙古氏察蘓侯也侯字静如以世勲佩三珠金虎符官昭勇大將軍鎮江陰謙恪尚義人恱慕之至正十一年淮西亂督軍九江取道安慶時湖廣威順王在道王聞侯頓兵即帳下以退守地虚弱强侯為張飲之會宣讓王遣使諭㫖曰安慶控江淮要衝命侯就鎮前後出師凡二十九捷十二年冬十一月冦悉衆水陸並進侯連破之翼日復大破輕舟追後中流矢卒是月二十九日也二王哭之哀給白銀五十兩賻其葬先是逢與宴侯第時海内無事嘗謂侯曰太歳在辰侯當保障一方戰勝恐後不利盍慎諸侯曰大丈夫戮力王室死無憾也侯事親孝征閩冦衞濱咸有功云一本無濱字有海漕二字將軍舊乗青驌驦蒼龍金虎雙輝光揚旌伐鼓靖閩徼山鬼迸落黄茅岡長鯨喊呀欲東噬以身扞海民樂康十年楊栁蔭環堵一夜苜蓿空沙場淮江蕭條咽流水殺氣妖氛亘彭蠡提兵假道古舒州親王遮留勞玉趾王言三邊盜緣蟻將軍不止我其死月氏髑髏酒數升諾重泰華輕邱陵儲胥孤懸使雜守睥睨危急期先登萑蒲獵獵開金翅篁竹深深攒鐵菱長驅大捷二十九生俘千人梟萬首狰獰健兒駿奔走電掣雷訇若神授東南瘡痍合未蘇終焉性命豺狼有仲冬炎風動地吹太陽血赤芒星埀將軍百射百中之弓撥矢鈎天爾為黄蕉丹荔芳菲菲保障千里今誰祠霜繁雪稠侯我思送宋宗道歸洛陽選郎分手楚天涯萬里春明穏到家庭下已生書帶草馬頭初見米囊花汴淮湠漫經梁苑星斗參差犯漢槎中國正應風俗美舊京寧覺路途賖鮫宫獻佩當明月鵠殿一作鶴馭吹笙隠大霞貂弊世憐蘇季子賦成人哭賈長沙若為撫事傷遺跡正用懐才待物華聞道鄉閭諸父母一作父老杖藜期看馬卿車寄謝靳士達分憲過舉遺逸朱紱銀魚古諫臣紫髥驄馬異常倫百司揚厲風霜節一道涵濡雨露辰幕静柏陰髙轉午庭深花萼暖輝春臺評屢動天朝聴社署曾聨宰相裀雲路久隨鵬直上泥塗今見蠖初伸行囊何有惟書劍歳晚相攜願卜鄰毘陵秋懐有後序老兵為說劉都統起坐舟中思滿襟𤣥武城危寒日短紫駝塵暗朔風臨江山不盡新亭淚天地長懸即墨心宋祚未移中道死至今劍井蟄龍吟至正甲申秋八月逢金陵歸泊常城下有老兵能道劉都統事劉名師勇山東文安縣人少英銳涉獵經史包恢平長興盜師勇與有功授都統制守濠至元十一年王師渡江過常州時宋徳祐元年春三月知州趙汝鑒遁通判錢彬以城降與宋鑑少異師勇前已入衞至是與都統王安節殿帥張彦受命克復之以姚訔知州事因共樹柵鑿濠為扞禦計夏五月安節自吕城出迎王師戰不利彦尋以衆降且廹彦招訔訔罵曰若食國厚祿不能死難反說我耶狗彘辱吾甚矣唾之冬十月大軍圍城數重宋丞相文天祥發兵来援連戰不利降臣吕文煥射書入城諭以禍福流矢中之文煥怒白巴延丞相建鈎援之屬晝夜力攻餘五十日師勇登陴裹創拒戰且曰吾城即破金山長矣丞相因䜟其語命舁金山寺沙門問計沙門實無計猥言城狀如龜撃其尾則四足披露矣十一月用牛馬革為屋以蔽矢石趨死士相銜輦土填塹灌脂砲中焱焰栝發急攻南門城遂陷訔戰死安節被執終死不屈師勇從八騎手殺哨騎數十百人易其衣甲以混北軍禆將張超墜馬師勇斬其頭以紿衆曰亟追劉都統所向披靡得從間道赴行在扈二王入閩至紹興憤懣疽發背卒江陰孫謨所傳亦然特少異耳師勇嘗經江陰悟空寺時烈寒氷血膠手湯解之射一箭于寺塔意氣慷慨復題一詩于壁乃去孫能記誦之或曰國初吳城外僧舎有一老僧長七尺許居十餘年未嘗面北坐人詰其姓名輒不答死之日僧開其篋笥得師勇官誥豈其人耶抑其騎士耶不可考矣逢論曰趙宋茍安吳會奸臣擅權國以殄瘁天兵所臨望風潰散襄陽一文煥以孤軍抗守六年卒以援兵不至而降失江漢蔽因以危亡師勇與訔等一本師勇與訔智足以濟難職分所寄僅得收復一城無等字率創殘之卒以禦百萬之師雖古雄烈蔑以加此訔之死綏亦足愧死汝鑒彬彦之徒矣師勇智略絶人其軼出重圍可謂驍將戰之不利天也扈王入閩猶昔人即墨之志事之成敗君子有不論焉文丞相嘗謂滿城皆忠義鬼是誠徳化所致若安節出處大畧更强毅不屈凛然有烈士之風嗚呼偉哉送任子羽赴太醫院辟天醫臺院五雲深曳紫腰犀雜佩音中使日供駝背酒六宫時賜褭蹄金丹砂鍾乳来南國赤箭青芝滿上林知爾去鄉承薦剡贈言慙比太和箴寄謝貢司業枉訪碧雞坊裏皇華使沈香亭前宫錦袍五月江城駐車轍百歳老翁觀節旄不及將迎具茶果應訝環堵翳蓬蒿至今驪珠照篋笥夜夜令人魂夢勞贈顯上人陰陰萬木蔭孤村雞犬無聲日閉門河海自隨儒化逺山林惟識梵王尊石潭龜上青蓮遍玉笈蟲書貝葉昏偶說漢家来白馬欲從葱嶺訪崑崙夜宴葉氏莊曉登悠然樓作百尺飛樓俯碧湍六峯秀色繞闌干杏花落盡東風惡燕子歸来社雨寒夢裏香烟生繡幌酒醒紅蠟膩銅盤一春樂意朝来好千里家書席上看送朱自明辟閩憲奏差閩中烏府小清都列郡山巒紫翠紆王化直来天北極文星多聚海南隅暖塵花氣隨驄馬春日榕陰滿鷓鴣况有翰林持使節憲郎應得效馳驅翰林指歐陽學士時除閩使奉簡劉澹齋總管南極高天動壁奎青山落日夢金閨花間春並連錢馬竹下晴看吐綬雞漢室二疏遺跡在建安諸子大名齊闌干角畔梧桐葉吟得宫詞細細題送吳伯顒遊武當山得試心石命題紫霄之岩千仞高上有一石懸根牢劍客無地露肝膽肉身昔年生羽毛北極虛危夜氣肅中州豫雍風物豪送君此去攬神秀應鄙望夫雙眼勞夜宿宗陽宫簡俞明元縣尹時自徳興棄官將歸吳門六月仙家氷雪壺一簾荷氣簟紋鋪圖書天府占東壁道徳清光揖老儒五栁傳成超晉宋三苗民化樂唐虞公嘗為荆湖帥幕歸舟誰盡傳經禮玉佩金魚擁道隅奉題先世所藏嚴子陵小像有後跋千仞臺臨七里灘羊裘鶴髮老魚竿客星帝座分天象潁水箕山並曉寒遂起後塵甘黨錮尚存餘烈愧南冠桂叢苯䔿蘋花薄悵望高風一羽翰客星犯帝座當時天象已示光武之為帝座子陵之為客星太史又奏如此雖讓萬乗位與之不屑也博士范叔之奏固謬拜子陵諫議大夫不大失歟然則子陵蓋巢許其人也題馬州書院有序馬州書院者孔聖五十二代孫元䖍昆季所建也其五世祖若罕高抗不羣長於春秋當宋南渡自闕里將之衢留滯泰興見河流達南江詢之老人曰此龍開河也西北通淮泗因歎曰吾洙泗龍泉之支流其在兹乎遂築室河上與其子端志各授弟子業從遊日衆乃有菑田百畝人助以力官復其稅戒子孫治生勿求富讀書勿求榮邑大夫嘉之易名龍開河曰敭教示崇化也年六十卒葬河之陽端志克守父道薦辟不起淳祐元年冬邑燬于北兵元䖍避地是州咸淳間書院落成教授復如初然皆無後今崇聖寺旁惟破屋蔓草遺像瓦爐而已逢懼變遷殆盡故敘其槩於壁間庶後之起廢者得以考焉詩曰蝌蚪秦皆廢靈光魯獨存豆籩漂海國丹雘暗淮村苔蘚花侵礎蒲蘆葉擁門青春深霧潦白日老乾坤徳化三王並威儀百代尊郊麟初隠遁野兕遂崩奔先輩俱㝠漠諸生罷講論斷編塵樹冷遺像網蟲昏不改絃歌俗終歸禮義源江南游學士瞻拜敢忘言送郡知事李仲常還金華列郡歌岑晊孤城頌李膺文華仙掌露人品玉壺氷畫本黄荃學詩兼畢曜能關河千里道風雨十年燈薦鶚知無忝登龍貴早承朔雲低紫禁東壁映青綾郎署新帷幄儒門古豆豋黿梁初隠見羽檄遂飛騰軍事諸曹服元僚太守稱芙蓉秋獨臥驃騎日同興衆仰寛民力誰堪作帝肱掃除塵澒洞屛蔽雪侵陵野戌銷鋒鏑田家罷棘矜昆侖天柱正宸極泰階升顧此心常切多君興逺乗崇桃紅霧斂豐草綠波増諭蜀漢司馬歸吳張季鷹宦情輕比蛻行色澹於僧三洞金晶發雙溪白練澄過家饒賞詠来紙細緘縢奉題薛茂𢎞所示張仲舉承㫖藏經序銘後序銘附北斗道經一巻故太史清江范梈所書貴溪薛毅夫奉而藏諸禹穴承母命也母倪姓諱瑞貞世大族生於至元之庚寅生之夕父母覩北斗光燭於庭故長而事斗極䖍日誦其經年十九歸薛昶氏昶早卒時甫二十一作三十孀節卓偉訓毅夫詩禮為名士毅夫一日過清江謁太史告以故太史為書經俾歸遺母母得之喜曰比夜夢汝執經我側今致此非偶然也吾百歳後可藏諸名山慎毋忘暨毅夫終母喪乃上會稽詣禹穴藏經已而屬太史氏襄陵張翥為之銘銘曰禹陵之洞陽明虚中閟玉匱遁甲圖孰敢窺之神所徂有孝子毅精誠孚斗七宿經史梈書𤣥黓攝提月在如翥也作銘古作謨歴厥世百文弗渝後有道者其徴且薛母高門女生時斗燭庭紅顔斑竹淚白首蕊珠經鶴繞香千匝龍辭海獨聴妙音遺杳眇陰徳著幽㝠月墮朝朝鏡雲生夜夜輧翰林留製作禹穴䕶精靈地接曹娥廟天低婺女星輝光同百世事跡有餘馨送太常奉禮郎劉仲庸以二宫命使南省織金段龍帳還京師二首澤國李膺舟風霜季子裘家依南越鳥身適大宛騮甲乙帷虚夜蓬莱殿敞秋到京王母喜休語萬方憂秋風吹蕨薇宫使别鄉闈中夏蒼黄色孤舟錦繡輝勾驪龍晝偃瑶水鳥雲飛萬一回天睠均裁大布衣辛卯仲冬廿四日吳山游望虹霓生海國薄暮太陽通徑掩廣寒殿經横長樂宫暈浮蛾黛綠氣雜蜃樓紅願得為龍衮端埀我聖躬鷊蒼莽炎州地生成五色文不司天上曉常吐日邊雲孔翠名雙重鵷鸞類孰分祗宜駭巨室切莫誑明君藤詰曲紫藤樹檀欒蒼葉敷時時上蝘蜓夜夜走鼪鼯雨露不偏沐風霜先自枯深求造化理重笑水中蒲送靳利安之常州同知經横林洛社舟中作二首金湯遲建節斑白半為魚烟冷漁商市霜晴鳥雀墟丹心憂國遍畫舫上官初素著循良蹟綏民早駕車敗氷流滿川茅舎啄烏鳶埀喪期頥老猶傷乙亥年亂離今日繼風俗幾時遷洛下衣冠族宜先解倒懸感宋遺事二首有引文一作支漸資陽縣民元豐間母喪躬負土葬賴錫山中廬於墓側布素糲食而已日三時號慟有白黒雀各雙巢墳松間斑狸白蛇兔毎自山下来顧視漸久之乃去又有白鴉及五色雀千萬餘圍繞飛鳴縣令以聞勅賜粟帛文漸元豐士浮沈四百年孝曾蒙帝寵名復待予傳白歸蟾窟青松合墓田感懐龎禮部不忍釋遺編高處士名繹長安人有古人絶行慶厯中召至京師欲命以官固辭歸山特賜安素處士家貧妻子寒餒鄉人或饋以財終不受閉門讀書而已昔王霸憐其子蓬髮投米愧臥不起前賢之所難處士蹈之裕如也嘗見古老說种放隠終南山召拜起居舎人賜告西歸有一高士隠居三世以野䔩一盤詩一篇贈放云接得山人號舎人朱衣前引到蓬門莫嫌野菜無多味我是三追處士孫放國史有傳若夫志意修則忘富貴惟安素可以無愧矣南安龎元英文昌錄中所紀如此英嘗為神宗儀曹官長安高處士氣得伯夷清安素承殊渥歸来遂隠名雪寒深屋臥雨夜一經横太白鴻飛闊思瞻紫翠晴塞上曲五首木葉滿關河轅門肅佩珂將軍提劍舞烈士撃壺歌月黒輝銅獸風高嘯紫駝不堪城上角五夜落梅多將令傳中閫交驩浹兩軍地形龍虎踞陣伍鳥蛇分清野輝燕日黄河㵼岱雲生靈如有賴絳灌不無文月照小長安風生大將壇虎皮開玉帳牛耳割銅盤伯氣寒逾肅軍聲夜不讙皇天眷西顧慎取一泥丸鞗革帶鉤膺聨鑣獵楚陵白肥霜後青沒海東鷹千里榛蕪闢三年稆穀登中郎示閒暇呼酒出房烝諸夏皇威立三邊敵氣衰角弓分虎圈乳酒下龍墀蠭午歊氛逺鼉更窟宅移輿圖欲盡入中道勿班師聞武昌廬州二藩王渡海歸朝茅土分封在金章渡海歸事殊生馬角心愧著戎衣星月晶光並山河帶礪非秋風紫塞上依舊雁南飛贈李宣使秋水浄菰蒲天風送舳艫海雲紅日近江國使星孤帝運無盆子戎行有亞夫傷時恨離别林下重咨諏和張率性推官小遊仙詞四首西王春宴百娉婷玉碧桃花滿洞扃自飲一杯瓊屑露東風吹夢不曾醒銀河澹澹月輝輝洞草岩花夕露微笑踏青鸞作龍馬九天凉動五銖衣雲幢烟節紫霞裾齊御泠風集步虚若受人間塵一㸃長門又屬漢相如雙成今是五雲仙得捧長書玉帝前天上星河春似海人間風雨夜如年登雙鳳普福宫東樓贈吳道傳時周境存隠君同席道人獨坐覽輝樓海底青天入座流燕子飛来又飛去游絲掛在玉簾鈎樓殿岧嶤上赤霞水紋蟠鳳臥靈槎石棊盤静香烟直簾下雙頭百合花題王若水墨鳩澹竹花開碧草叢日暄風静見沙蟲鵓鳩不忘相呼逐偶與孤臣飲啄同送堅上人歸省高堂白一作鶴髮不勝簪大地叢林已遍參好去雕闌認春草草中萱是舊宜男題焦白所畫其父奉禮府君夜直詩意圖有引憶昨停驂便殿西栁溝風軟絮沾泥一彎月子梨花上冷浸香雲伴鳥栖右社稷署奉禮郎焦君追念先朝眷遇之隆而作也君諱文炯字仲明淮揚人少通敏由文皇東宫時說書為前職而卒白君之次子也日誦其詩尤拳拳孝思不忘於心乃手寫詩意圖屬予和其上詩曰露濕金莖月轉西披香太液浄無泥朶一作梨雲散盡千官影獨見桐花小鳳栖題林芝隠所藏龔翠岩臨昭陵什伐赤馬圖龔詩附龔名關宋季淮陰人自題云赤驥駝僧去玉關換他白馬載經還誰憐什伐蜚龍子贏得金創臥帝閑風雨昭陵戰伐秋赤流汗血尚成溝畫工解貌千金骨不抵東家缺戴牛缺文一本亦作牛字題馬和之園有桃詩意圖華髮無情賦黍離何堪盡託衞風詩漢皇日宴西王母合賜東方酒一卮避地梁鴻山六言四首舎邊新花夜合井上老樹冬青孟光齊眉舉案倪寛攜鋤帶經三百銅錢斗酒一雙蠟屐千山莫問雲浮富貴且消天與清閒北里戎衣袴褶南鄰墨勅斜封多我幽居水竹有誰高臥雲松風塵涉五六載忠孝錄數十人已判詩移白日更須藥駐青春重題余常清雲林四首花揺暖溪雲蘿裊春輝月高坐無人来清琴數聲發葛巾灑風凉桃笙臥月色意行嘉樹林濃露如雨滴鶴鳴山館晨魚跳野塘午如何凉已深菰蒲數聲雨積雪攲岩松回風簸溪篠道人不知寒焚香坐来曉秦孝友先生迎享送神辭有引先生諱玉字徳卿少游之裔受學於蛟峯方公隠居崇明淑門弟子若干人先生卒門弟子以行業私諡孝友請祠于州庠其子崇徳儒學教授徴迎享送神辭於逢辭曰海東隅兮三洲宅黿鼉兮蛟龍湫羌聲教兮邈悠靈斯藏兮道斯修道不行兮長邁祀學宫兮子孫永賴日薄渚兮風林鳴如聞聲之謦欬楚葵青兮靡靡牲甚肥兮酒甚㫖皎白駒兮焱馳儼衣冠兮戾止有聖賢兮依歸川魚泳兮鳥雲飛靡潛伏兮弗昭著靈自今兮欽孰違維杭美沈省掾從董參政出師有功沈名兼善維杭大藩阻江負山千秋獨松昱嶺其關草風則塵潦水則瀾帝十二載民脅冦蠻遂據天險遂肆㝠頑相命董公以靖以安公威巖巖公師桓桓公佐孔文弗猛而寛曰彼霜露天用戒寒非冦倒戈胡寧野丹民信不疑駢壺聨簞市如其歸堵如其觀既肉我骨復完我殘昔顛而飢今坐而餐羊牛雞豚亦充于闌社賽廟享鬼神具歡佐我父母公我王官匪父母私佐才實難溪激其湍嶺嶪其盤陵夷谷湮徳功不刋復三關美沈都事帝十六載盜起昱嶺蛟蚋坌人蟭螟附逞黔黎煽變郡縣傳警相臣先見兵且徐整乃詢于塗乃咨于省僉謂沈公遺愛是境俾佐廟謨往則綏靖公勇承命星駕露舎有單其童有隻其馬扶攜偶旅叩首馬下始公未来龍蛇草野及公復来雞豚井社冥頑不靈陶之坯冶顛連無愬庇之大厦摧輪于攲蹶踶于危王良韓衮一作哀安乎驅馳既貸以生又訓以辭常人之恩僅止父師鯤魚躍矣必遨天池欲祝之福有詔在逵重關峻厓含精耀曦勒兹頌言永我去思望江郎石仲春天氣佳萬象欣改色我行六峯外遥見江郎石二儀闢混沌牽牛委晶魄鼎立台輔姿玉藴珪璋徳三神浮瀛海噴薄東一極鉅鼇因戴之仙宫晃金碧斯連厚坤軸乃棄姑蔑域直上青蓮花或隕樵舎側安知非異境自與三神敵于時攬深秀雲霧忽巾羃微風稍飄颻空翠疑亂滴雜英敷陽艷嘉木生午寂交交黄鳥音好在千丈壁三年思晤對百里今咫尺烟波動落照道路陰已夕尚戀女媧功躊躇望西北周處讀書臺偶遊鹿苑寺遂登孝侯臺當時斬蛟虎折節事賢材詩書夜繼日奥義旋兼該篝燈委紅炧掛劍蝕青苔黙語三十篇若出造化裁純誠被幽魄勁氣懾上台翹翹毋望深急急將命催孟明哭蹇叔子路死孔悝天不卹忠良寧馨真禍胎吾儕千載下野眺相徘徊秋原風藿慘夕殿薌花開白馬從素車恍渡秦淮来故都凡幾姓醜地餘刼灰此臺異呼鷹靈光共崔嵬私傷過英武不得盡竒才送篤御史自永豐遷生母葬北還春城澹欲秋晝日黯不輝諫官素車馬南州䕶喪歸歸程數千里居庸山光紫野桑鳴雉鷇津栁巢烏子時清無虎豺薤露歌徘徊生芻豈無人親戚羅上台淑魂久鬱鬱今得歡從匹豐碑凌雲霄墓道臨警蹕為母有此郎百世餘耿光願言移孝節終始奉君王題程員外撰汪夫人傳後傳附弱齡身服苴盛年髻束髽孤生况新寡不謂夀命遐牆陰斷膓草牆外合歡花衰榮異本根且復藝桑麻桑麻日以長雨露日以養夫幸從弟賢命子承祭饗洋洋靈在天蒼蒼天在上忍為奔月娥冥心共泉壤夫人名悌婺源下港里程昌文女也四歳父死于兵事母汪以孝聞伯父草亭先生憐之選嫁名家子汪徳裕生一女而寡公始懼其不能安也使問之對曰妾不幸夫亡尚幸公姑在得備奉養何忍更適人或勸之曰夫人年少無子不以此時從良人後將何悔夫人曰吾聞女不事二夫夫天也天一而已夫死而遂去之是背天也背天不祥或又曰夫人今嫁幸而有子不猶愈於持孤身托冷室乎公姑固不汝望也何乃自苦夫人泣曰雖然吾父早世吾母守志數十年至今吾身一為汪家婦知死汪家而已奚恤其他里之富人因媒妁具聘幣伺間以請者數輩卒不許家貧紡績自給課童奴樹萟歳時奉祭祀如夫在時公姑殁喪葬盡禮今年已七十餘老矣猶執女工不倦閭里姻戚稱夫人之徳無間言初徳裕從弟澤民幼附夫人夫人子畜之及澤民長乃立其子梓為裕後以奉夫人梓事夫人益孝謹如實生已程文曰予從閣老著書睹春官旌表節義事甚悉率多京畿内郡之民閭閻幽逺蓋罕焉及讀陳助教繹曾作夏侯玉珍傳許汻卿善錄載許伯冬妻頗與汪夫人類皆節義卓卓可以羽翼名教朝廷著旌表之令風勸天下而有司莫之省使志行湮鬱不顯白於世悲夫予弟嘗為平江幕官嘗言某帥妻詣官自陳願上所受封比齊民得再嫁嗚呼以禮坊民民猶有踰者若是哉予故論著汪夫人之事以俟察民風者覽焉題華亭吕徳恒徳厚伯仲市義巻百里不販樵千里不販糴君家獨市義人用羞貨殖璜溪流湯湯合境咸飲徳頎然先處士首倡扞冦敵生死肉骨餘老稚仍仰食時平倐淹逝二子承世澤焚葬貴當作券責報天焉計鉏當作鉅萬石田文昔舉此史稱多賢客豈若伯仲間惠施本心臆我浮五湖舸撫巻增歎息日青野蒼凉靡靡漸一作新烟白昔如鹿犄角今比烏戢翼襁負歸流亡来遊復阡陌官曹得公輩自足蘇民力重懐吳泰伯三以讓去國淮南尺布謡同氣有遺戚贈言廣孝愛福祿將永錫贈錢掾衮錢塘錢慶餘系出吳越後眉豐目秀廣質礦氣沖厚家乗久曠一作壙僚青氊遵世守放膽論道義小心取升斗晨昏曲奉養及親未白首親終表其墓翠琰照林藪宗弟為人奴恐辱大父母贖歸故閭里甘苦願同受孝誠出天性薄俗所未有兒也弄文墨婦也躬井臼衣冠俎豆間揖遜動曰某千載不平事醒醉常在口鎮西陸將軍遜廟食采地久松人媚淫祀加置神木偶上疏乞去之以時致牲酒豺狼恣跋扈鷹犬廹飛走衆方立殊勲而甘伏田畝行藏悉無愧所愧寡知友竹光青連榻蘭艷綠當牖篇詩涉教化毎諷賓客右我嘗駛風帆臥數峯過九鱸蓴一水外念子非狗茍遭亂顛躓餘始得屢握手高盟俎金石雅興謝塵垢偃蹇七尺軀相視覺老醜春芳到鶗鴂生意付蒲栁勗哉令善名是則窮谷叟觀錢塘江潮時嘉琿平章大讌江上蒼蒼吳越山對峙東江腹江開白銀甕一浪天四蹴金晶王高秋風露氣轉肅當年駭壯觀委巷雷撃轂今年官增威旌麾被川陸羅衣繡龍鳳玉帶瑑蠶粟牙牀錦屏帷蠻毯隨步蹙温温香卷陣婉婉眉鬭綠微聞伊涼音淥酒光動縠鮮醲片晌盡望姓空側目懼成庾郎哀竊效杜陵哭冥頑鱗一作鱷魚彚屢覆舟萬斛梟雄扈將軍謂福建扈海元帥竟作机上肉大浸交烽火血胔腥草木地媪為之愁兼恐河源縮熟聞靈胥廟歳祭莫敢黷三叫三酹觴願與赤水族錢王射强弩至今有遺鏃何當起英魂少助八州督時汝潁等州陷中原日無事海㝢蒙景福尚虞多戕殘洒淚逃亡屋月夜醉歸舟中二首推篷滿船霜長嘯仰見月清光溢懐袖披拂青燐滅身不在隴頭無救水嗚咽水田一萬頃龍魚舞空明醉坐大蓮葉水底招台衡台衡光逺却散髮自吹笙題觀瀑圖中天㵼雪瀑清氣涵澗谷餘濺落人間猶作珠萬斛負手者誰子於焉送遐矚天池石壁翠微蓄天池白晝積水黒窪涵南斗天峽束太古石初月猿下飲先雷龍起蟄濯足者何人袖中有溟渤鸛山下厲老人餉墨蕈一本墨字上有研字老人餉墨蕈殷勤貴適口形微桑上鵞味勝杞下狗山肴雜秬黍一本作粔籹瓦盆注醇酒問我兵興來此樂可曾有觀兵婁城震雷過髙城草木咸敷榮大江流春氣一雨暢民情靡靡冠蓋會蕭蕭車馬鳴無勞漢天子係敵賜長纓古從軍行七首少年快恩讐辭家建邊勲手中弄銑鋧目空萬馬羣轉壁入不毛水咽山留雲槥還親撫哭悔識李將軍義結豪俠塲日趨燕趙風攻城數掠地帝賚主將功玉帶十毬馬金鏑雙騂弓弓馬分賜誰赤脈千綠瞳大旗蕭蕭寒長槊列萬夫令下簸邏鳴鐵騎分四驅塵黄日黒慘相視人色無鋒交血濺野首將方援枹白月流銀河三五星芒寒牛馬臥草上帳幔羅雲端錞鼓舂容鳴衆饗獨鮮驩羣敵在吾目九地攒吾肝彼敵或有人我師豈無名上計貴伐謀掩襲非示征草塞狼反顧一水西流聲冦恂斬皇甫餘子烏足程郤縠敦詩書祭遵事雅歌非才衒空名覆敗誠不多小范真我師匹馬雙導戈笑擁兵十萬夜下白鹿坡大鈞播萬物無言自功成酈生掉寸舌不智遭鼎烹非熊為王師飯牛慙客卿轅門鼓角動整駕河漢横攄懐六首陰風動長淮嘆一作噴奮三江漘羈人滯中谷鬱鬱憂彌臻躑躅就長道延企望清塵吳天回銀河魏闕直鈎陳西来一黄鵠翼欲覆八垠中焉離矰繳孝鳥共悲辛南服奠會稽西江導峨岷休明始華夏攬轡諒有人促織嘖嘖啼布穀交交鳴士無濟世念品庶同毎生陰陽運四時日月麗太清如何流離鳥卒不反善名滄江增深波黄葉委前榮漏半笳始寂嘒彼星東横天命自阨窮民情何怔營懐哉古大聖待旦整朝纓大星動欲落草木氣含霜驚風薄前營步騎勢翕張美哉同心友劍佩相徊徨游鴻噭荒徼毚竄崇岡旁顧阻太湖不見舟與梁茍容諒非道單居念流光寒菊已復花蟋蟀鳴我牀結交兩憂患夙好終不忘征塵一何黄征衣一何素衣素易染塵况復冠帶具忽忽葉變秋瀼瀼草漙露莽莽關山長悒悒歳月度豈無新相知戀戀情如故范叔未至寒綈袍受良難曜靈升扶桑萬彚希朝采故山互蔽虧新陰復晻靄楚楚園葵花傾心若為待凱風幸時拂天道從小改客有採珠人逺渡鴨綠海歸戀一作懸雙明月家喪踰十載兵烽何日息素念無時怠引領望反照桑榆四三在猗蘭生窮谷偶與惡木鄰惡木集鴞鶬一旦摧斧斤歸人白日晚躧履盼餘春滋露留古艷好風薦幽芬東君義相望大夫惡得紉大夫紉秋佩卒染清路塵九節石上蒲服食良葆真蒲也真自葆蘭甘谷中老題梅花士女彼美空谷人梅花是前身手披先天易心融大地春素衣杲霜雪孤根堅石鐵不夢趙師雄長終抱明月往敭名開化二鄉掩骼分藩多賢勞不敏忝賓客雖無官守縻亦復與言責二鄉䖍劉禍慘甚長平厄先王制禮經孟春當掩骼僕夫有難色欵段纔任䇿駸駸度岡坂眇眇循藪澤稍稍烟微青歴歴野四白游魂行草上遺老候道側我豈物役徒兹来出心臆皇天久下憫赤子非冦敵鴟鳥何不仁銜啄血更瀝因歌戰城南風悲淚狼籍題沈氏死節巻有引沈苕溪邵婦艾而美至正十六年為淮兵所逼投水埀死適浙省都事張英過之命其下拯救得活且諭曰汝配張官人不榮幸乎沈謝曰幸諸君活我我以夫遇害知殉夫而已忍他聞也既置舟中夜四鼓陰納束筯口中面舟木觸喉而死張葬焉黄金無留礦白璧難混瑕坤裳義安貞適然暗塵沙寧死嗚咽水不望菖蒲花感君回存妾妾命薄如葉此心許所天羅帶難再合君殊野鴛鴦妾非鬼蝴蝶清風何揺揺吹彼溪上苕山光浮茞佩空響度瓊簫至今一坏土民自戒芻樵題福天然開士水木軒軒榮彌清華一水帶嘉木幽光湛深黝餘潤裛髙綠名緇結長夏居然媚孤獨春辭灼灼芳日冷疎疎煜雲行天體臥境静物理燭時諷霞上篇逺縱林下躅本源茍途舛文字徒形牿我来兩忘言山童報茶熟題鄒常伯雪文閣齋閣嘉樹寂幽徑綠苔滋美人琴尊暇焚香聊自怡天書譎詭篆峯回裊窕姿因花紅變霧度草碧縈絲鵲尾黄金鑄螭頭紫袖攜神徂榮願俱意適清賞隨疎漏下深迥餘馥尚委蛇宴安諒加儆移以奉親知題黄常叔友古齋一本常叔下有彛字意黄名也彼美特立士素為鄉里欽蟬蛻謝汙濁鳳歌邁遐深宿雲曉承宇洄溪日循林囊餘不琢玉壁有無絃琴琴貴長藴古玉貴弗售今羲皇陶所慕管樂葛同心是山出地中来者仰崟岑聖緒存著述試扣洪鐘音過楊員外别業有序至正十六年今大府開中吳時公先以杭州陷非罪被黜依故人彰徳路同知上海章元澤居或傳大府將起公笑曰吾豈事二姓使果至公知不免往辭章曰某行矣敢以家累君章曰友責當爾也既歸誨二子卣卓事君立身之道乃就寢久之卣卓入見則縊死矣案上得遺訓云死生如晝必有夜何足介懐吾老矣獲全臣節死固甘心卣卓其以麻衣屨為斂歳時祭止蔬食此蓋晚年至願卣卓益宜修省勿貽人誚也章殯之公名乗字文載濟南人少負氣博涉經史由參議府掾累官拜監察御史遷浙省員外郎十八年中外臺臣昭雪其前後事贈某諡某卣廕山東宣慰司都事卓清忠書院山長翠羽無深巢麝香無隠穴由来老蚌珠淚泣滄海月於乎楊員外竟類膏自爇憶昨佐南省四境正騷屑朝廷忌漢人軍事莫敢說遂罹池魚殃遄被栁惠黜寄身傍江潭乃心在王室星躔錯吳分氣候乖鄒律天風揺青薲徒步空短髮譙𤣥初謝遣龔勝終守節譬如百鍊鋼不撓從寸折又如合抱松豈藉澗底蘗我時浮扁舟鷗外候朝日荒郊無留景别業自深鬱時清議勸忠公寃果昭晰大名流天地當與河水竭結交卣卓間遺言見餘烈三孀辭書陳衆仲監丞傳後有引相人李柔母陳兄嫂王王之女三婦咸早寡守節里稱三孀云一本無三婦二字相州城中三羈雌相依相呼李樹枝青春雪白花照帷淚痕㸃㸃鬢絲絲鬢絲日夜短淚痕無時斷將影對孤月同虧不同滿鸞兮一作分忍聞膠可煎舊御尚掛鴛鴦絃一門孀居天使然辱天何敢况辱先生當同室死同穴史筆遂屬陳莆田嗚呼歳暮空谷裏佳人無媒埀老矣徐本童權陳濓三友陪遊飛来峯還宴濂面峯溪堂東南名都萃炳靈山出萬朶芙蓉青其峯飛来最嶄絶見之身欲生羽翎金晶藴結天地秀石樓盤囷岩洞扃風高力鬼負鼇極月黒毛女捫牛星時維奔雷急雨歇澗合源泉魚藻活數聲清磬猿嘯外百尺浮圖鸛巢末重江複湖氣溟涬陰嵐晴霏翠轇轕挺拔多異材可望不可識得非共命鳥銜種自西域古松曾經尊宿坐怪藤一似蛟龍踣三友今日無凡憂探竒覽勝忘少休鏘然衿佩崖壁面咳吐散落空中漚傳車官馬素不到到此乃是高人儔牧樵往往誤題誌焉用某職煩雕鏤人生貴富如雲浮乗興再登雲上頭桂香載道酒波㵼還坐大牀酣晏秋於乎安得三友為我常追遊北丘耕隠歌贈簳山謝逸人九山西南来簳為北道主鬱積氣饙餾盤薄秀鍾聚神丁刲却蓬莱股一鼇首戴奠兹土平原内史曾未覩崑陰答陽僅容與謝逸人者晉相孫玉樹其皎天球温素歆李渤栖少室近比杜甫居東屯大田䆉稏横跨泖高埭楊栁全遮門有作古詩好有釀新酒渾酒從席帽醉詩對鐵笛論指楊亷夫號鐵笛翁月下蘿蔦嘗同捫風露響落秋林根崖顛夷曠擬築臥游閣泉竇寒冽願鑿抔飲尊頻年目苦兵塵昏長材美箭無幾存雨花洞鎖白蝠舞試劍石泐蒼精奔蘇吳為沼亦復見龎公遺安良可羨自今三老雲霞交他日無勞真隠傳新舊庵辭新庵丹堊輝庭户舊庵四壁穿風雨新舊庵僧自相語新者父葬舊者祖詵詵玉佩紫金魚青松花開笑殺渠連環歌有序連環歌為杜先生夫婦而作也先生諱文一作友開字陽父世居江陰之君山教授數十年資束脩自奉妻吳辟纑以助之天厯間菑荒學徒散去先生竟餓死初吳昆弟屢勸斬邱木鬻墓地可少延性命先生在羸憊中堅持不可繼欲挈吳以歸吳曰夫既盡孝妾獨不能以義自處寧不食若粟遂相枕籍而卒後十一年逢過其里獲見一古研乃先生故物其銘曰置之而水凝凄然其似秋嘘之而露泫熙然其似春惟有徳以自潤能不言而詔人何以觀之吐墨如雲觀此益信其行噫先生之計善矣當是時穀價踴貴人食樹皮糠覈非困於飢則殆乎沴矧二者罹於埀老待盡之日料邱木墓地不過易斗斛粟活旬日而死寄客土且身受不孝之名尚從父母為地下遊乎先生卓然先見者以此吳生為士妻共患難同貧賤道也夫既委順于正又肯愛餘齡就昆弟食哉抑以一作歸于二字昆弟之言非導人以義者也吳判然不移下從良人者以此噫亦義矣哉使二人有一裹飯君子則天理人倫反未必章章如此一本無如此二字有鄉里况天下耶六字逢懼歳逺而事泯也故序而歌之歌曰白玉雙連環瘞在春申山山前夫婦義同死心與連環鎮相似日月合照無欠虧天地相依共終始天地日月非彈丸環兮環兮氷雪寒張春兒有引春兒葉縣軍士李青妻也至正戊子青病革時年甫二十青曰吾殆矣汝善事後人張截髮示信曰妾生寒門頗曉夫婦大義萬一不諱惟有死耳青卒哭之垢面流血且諭匠者造大棺將盡納其衣服劍器匠如其㫖既斂張自縊庭樹下閭里遂同葬之有司上於省旌其墓復其家獨未有形容其心者故予補歌一章紅顔夫婦當作壻羽林兒汙馬未騎身早萎娶時衣裝不忍見及將殉葬心思徧衣裝憑妾得歸土妾今無從苦復苦誓為月魄入九泉長與地下夫團圓憂傷四首上樊時中參政蘇伯修運使古青徐十連五屬桑棗墟黄河失經人化魚吕梁設險豺為徒船多纔通玉帛貢車多始登牛馬途守無官軍法度疎居無鉅室城隍虛欲去擄掠當何如合置官軍合實郡縣古青徐歳久致君心煩紆竹笠黄時有盜戴竹笠拒官軍黄金兜鍪勢相當兜鍪本居大將壇左劍右印増威光邊隅將校望塵拜州縣曹佐聞風僵况從元首授元柄稍忤言意違軍令不因舊疫自焚船乃一作那致生靈輕隕命竹笠黄兜鍪相當雞一作難走藏兜鍪旦晚先戎行官栁場青芒芒野鷹交飛撲馬驤年年十月轅門張元戎始来坐虎牀翼舒箕哆魚麗行鼓進金退兵家常起伏見譏孫武子勾卒貽笑曹成王千夫散盡旌旗定偏禆隊伍相呼應幾處私恩誤主恩一回酒令行軍令酒醉邊隅事不聞邊隅擾擾多烟氛江海壖家家浮生多在船船居無租出無禁競賣田宅行鹽錢私鹽漸多法漸宻隩裏干戈攘白日尋常惡孽不肯除本固枝蕃禍非一虎符龍節王者師赦過錄功先自欺諫臣上疏劾已晚蔓延及今歸咎誰地官合為𢎞逺計鹽價減徴同賦稅盜源既清民瘼除五風十雨歌康衢送童子陽北上中天繁星如撒沙婺女獨與金争華金華山人應星象閉户讀書飡紫霞銅盤沆瀣碧于水瑶草石芝香薿薿袖藏明月雙驪珠願獻元臣作充耳今年手分五朶雲染成五色組繡文上期黼黻聖明帝下欲覆幬窮荒民風寒雪暮陰曀昏梅花江國留兼旬春潮一夜上沙尾拂劍笑問黄河津黄河動地翻海渾銀漢滉瀁通昆侖太行羊腸路九折不有壯志俱消魂吾王之門虎豹蹲舔舕㬦睒毛甡甡楯郎㦸士露肝膽不有意氣難為倫君才具美合致身少壯易老毋逡巡商翁佐漢還遁去魯連却秦終隠淪功成名遂信有在贈言聊識平生親小匕首歌水精生苗月牙直彗芒披雲電流隙蟄蛇斷尾短草間海鶻褪翎霜雪色宋斤魯削讓陗刻金錯錐刀豈其敵吳鴻扈稽飛著體不曾為主開邊鄙嗟兹神物久泥滓用之可以報國士簷氷卓筯日黯空稍玩股掌生雄風鮫魚室臥縞帶影長鈹辟易萬雉墉古昔客揕秦王胸幾什翠鳳咸陽宫由来意氣泰山重命甘燎毛不旋踵誰隳古制鑄小之佩稱衣冠加珌琫我歌三歎淚滿裾曹鱄豫聶無時無孫道絢有引龍江曾見可家藏宋樂府中載縉華鬼仙汝州官妓詞皆淫靡後讀建安黄雲軒知縣妻孫氏醉思仙調曰霽霞紅看山凝暮紫烟暗孤松動霓裾風袂翩若驚鴻心似鑒鬢如蓬弄清影月明中謾悲凉歳冉冉蕣花潛改衰容前事消凝久十年光景匆匆念雲軒一夢回首春空采鳳逺玉簫寒夜悄悄恨無窮歎黄塵久埋玉斷腸揮淚東風殆見孤凰於百鳥羣也因表而出之孫名道絢中原人能文詞盛年孀節卓偉鄉族尊之白鶴山中雪衣女花静春移綺窓户夢逐雙鳬天外飛影作孤鸞鏡中舞鏡中舞鳴聲悲殘編留得斷腸詞天寒翠袖渺何所日暮碧雲無限思丁清風有序余作衞女引之明日於宋樂府復得一婦人焉曰蜀士大夫妻丁氏美姿色善詩文自號清風居士宣和間夫浮家赴閩求調王黼薦丁姓名於禁中時尚文女郎才慧者多得選一作進於是有㫖召見丁曰吾夫庶官吾非命婦安有入内見君之理不敢拜命且謂夫曰君素非貪冒富貴者何苦自辱題詩汴邸竟不知所往詩曰西嶺雌雄鳥雙雙覽徳輝陽臺遲雨散滄海㑹塵飛夜月㕘差玉春雲窈窕衣君王宴阿母却寄碧桃歸是日客有談都城事者有感併補一章河洲氷膠雲塞野林栖雎鳩歸牝馬收書驚見雙青鸞蕭郎弄玉風斯下金水暗侵燕地氛明月長掛真珠裙靚桃花碧宴紫府雙星在天靈夜語宣和皇帝何如主投贈柯博士鍾阜天回王氣新憶君扈從入楓宸旋平内難櫜弓矢遂沐殊恩列縉紳元宰或同司雨露史官曾擬奏星辰羽旌影動宫花日龍鼎香傳禁樹春白馬獨遊絲鞚好縹醪雙賜玉壺醇委蛇退食收金鑰怵惕存心表翠珉文皇常賜其父江西提學謙訓忠碑三絶鄭䖍親帝許四愁平子舊誰倫僑居暫作東吳客奉引依然上國賓稔歳葑田饒蟹稻高秋松水長鱸蒓神馳紫塞風生角夢隔瑶池月照裀白首馮唐仍晚遇青袍杜甫豈長貧明河近望清如洗行駕仙槎復問津客金陵遇有以茂才異等為薦者以病歸泊龍灣二首寄丁仲容婁行所二先輩柂樓釃酒出金陵病後衣裳體不勝風雨滿江寒贔屭庭闈何處髮鬅鬙周璆實下諸侯榻王式虚䝉博士徴一曲離歌凝客思幾行疎樹隔漁燈鳳凰臺上酒如川醉擬題詩李謫仙鑿齒已成耆舊傳真長空覓孝亷船十年螢案書連屋八月龍灣浪拍天無那病懐兼旅思白雲遥望夕陽邊遊永夀宫文皇帝潛邸時幸臨六朝龍虎氣回春草木均沾雨露新羽葆蓋車雄萬乗金銀觀闕現三神樓船不見歸童女桂館徒勞立從臣深幸先皇潛邸日祝釐無乃為生民簡謝性源同是風流王謝家雲萍漂轉各天涯忽逢落日烏衣巷並立東風白鼻騧蕉葉深杯情潦倒桃花團扇墨横斜賢人在位親無恙八月須乗奉使槎題下砂場丞韓景陽世綵堂時親年八十桐木韓家世綵堂五更環立佩蒼蒼晚年夢與雞聲逺春日情無鶴髮長風細絃歌生暖響花交簾幙散清香聖朝孝治恩尤洽兒得焚魚進夀觴敬題直學士周公書贊先君庫使遺訓後贊附吾平生持畏遇小事如大事面欺人不忍為心欺神明尤不忍為也右庫使江陰王君惠之常以是言自警其子逢求予書以為家訓既為作篆又為贊曰人心即天天即神明一欺吾心天罰是懲允矣王君持心孔平戒慎於微弗歉弗盈有子克紹學古行清銘其庭訓終底于成番陽周伯琦書先君遺訓幾經時大篆新承閣老書三代鼎彛宗史籀泰山銘刻陋秦斯雲霄上日瞻文藻雨露濡春起孝思鄉里未歸身骨立揺揺寸草獨天知題鄒旅雲青山老隠圖有引青山老隠圖者予友鄒君時昌追慕其先道鄉先生而作也先生有墓有祠在毗陵青山門外中書左丞吕公思誠為浙憲時嘗展拜祠下命有司禁樵採後毗陵失守時昌避池海上欲歸省不可得乃繪是圖復自號曰青山老隠以示不忘首邱之義予敬題以詩青山郭外道鄉祠宰木溪毛幾歳時繡史罷伸芻牧禁畫圗深寓釣游思疎星皓一作皎月飛烏鵲細雨東風過子規更有張翰首邱賦倩予盥露寫烏絲送何伯大判官辟中書掾從丞相出師丞相興師出薊邱萬蹄千乗壓中州旌旗露濕星河曉鼓角風髙草木秋號令不聞鵞鸛列謀謨初定鬼神愁獻俘太廟陳歌頌獨有儒曹業最優送于子實辟淮閫掾淮海風高急鼓鼙潁川烽起照淮西餱粻幾道通流馬樓櫓重城望火雞星入夜寒芒角動地連秋暝瘴氛低君今掉鞅元戎幕肯慰流亡父老啼寄鄧筠谷鍊師别後雷岩結搆成靈風灑掃四時清經繙白石天人下屐響青林木客迎萬葉動星幽氣合三花埀露薄寒生鶴雛長就車輪羽好在髙秋載玉笙題衞叔静樂静山房名仁復七世從祖膚敏宋㕘政七世祖上達禮部尚書新營别業逺風埃山綠湖光故故来四壁有時聞葉墜一門無事看花開圖傳龍馬尊家學冠䕶貂蟬憶相才巢燕不隨浮世變將雛依舊拂蒼苔寄題瑣憲臣萬戸星湖釣隠圖笳鼓歸来理釣絲星連文石漾淪漪征袍漸喜團花暗小艇還從細栁維邊地雪霜憐馬革五湖烟雨夢鴟夷野人不待傳雙鯉釣出珊瑚寄一枝和沈掾中秋月月入高天更漏遲天香消盡桂花枝金晶氣爽飄風露銀漢波翻動鼓旗二星名蟋蟀滿林羅袖濕駱駝千帳笛聲悲柴門此夜光如練喜與休文一詠詩送陳昌道北上江海才名二十年振衣吳楚上幽燕交游豈在䕫龍後夢寐常居虎豹前天入紫微瞻爽氣野空黄落見疎烟從征早下陳琳檄遂使三軍樂晏眠題葉子澄雪蓬軒歳晚天寒雪一蓑滿船書畫壓銀河鮫人室露雙氷鯉神女峯沈幾翠螺夢裏客星辭帝座尊前小海渡漁歌高明益進中庸學日看東家綠樹多清碧軒晏坐簡汪文裕學正萬竹無聲風露微野夫相對遂忘歸琴彈流水神魚出目送遥天鸛雀飛自煑蓴絲同晚飯肯分苔色上春衣廣文盛說休官好更覺閒情與世違題夏士文書聲齋璜溪溪上魯東家四壁無塵䕶絳紗春水研池窺乳燕午香簾幙度飛花賓筵優禮同三釡秘閣遺書共五車總羨韋賢家教美滿籯金碧視泥沙題松江府學訓導胡師善遺跡後有後序春回澤國草青青不見斯人舊典型守廟義同全趙璧禦灾心似哭秦庭蝸行蘚壁留題字燕入芸帷罷講經百世祀從先哲後可能無憾久沈㝠師善名存道越人通春秋禮遊吳二十年無知之者晚益竒頓意晏如也至正乙未冬僉憲趙承禧廉問松江知其賢命知府崔思誠延之於學善曰吾不得用於世亦庶幾以淑諸人明年春二月叛將熸城善親冒烟焰籲天呼地願捐生衞廟學俄大風返火未幾參政楊完者調苗丁来守墮掠尤甚善語同舎林以莊宋處元曰諸侯死社稷吾儒視學校毁于兵可乎既矢石聲迫近善出與苗言學校不可毁於是遇害明年逢避地海上謁先聖廟見善誌救火於廡壁得臨死事實於進士潘元慶洎見予友孫作而又聞嘗謂作曰城池多艱君有親可亟去吾以死扞廟學廟學不存士日不競因感泣而别於乎善之死蓋不待決於倉卒患難之間或者乃弗是之過矣夫朱泚之亂何蕃一叱叛者遂為傳宗今苗闞廟學士於其時如禮所謂朝不坐燕不與潔身引去固無可罪若胡先生不從然其死其志蓋可哀也逢以其生既不偶死復泯泯乃為賦詩且論列于左和吉州何節婦詩韻有序何婦賀永新人至正十二年蘄兵殺其夫將汙之賀曰竊聞師令嚴淫虐者斬以徇汝獨不懼徇乎兵以一作退言諸帥帥議聘焉賀曰彼禁淫虐乃欲委禽未亡人耶未幾聘至賀閉户不納齧指血題詩曰涇渭難分清與濁妾身不幸厄紅巾孤兒尚忍更他姓烈女何曾嫁二人白刃自揮心似鐵黄泉欲到骨如銀荒村日落猿啼處過客聞之亦愴神遂自刎死東海徐蹇趙郡趙錫各賦古風予和韻云風塵旦暮未亡身厖吠何堪動帨巾斗血倒流三尺劍九泉下見一心人竹祠長夏飛蒼雪月闕中天爛白銀聞道琵琶亭在望賣降舊鬼獨傷神題張會嘉桶底圖有後序道者深藏玉斧才罷修明月下蓬莱笑隨流水天台去袖裹登州海市来霧幌雲窓開翠壁異薌靈響接瑶臺神遊萬里愁回首故國蒼凉獨雁哀右圖出吾鄉葛氏葛世居青暘鄉宋名臣邲之後内附初家貧惟母在夫婦資賣酒以養凡為具務罄利之入極母所嗜好或雨雪晦暮庭戸掃迹屢傾貲如所奉一夕有一老道士酤百錢已宿焉明晨夫婦蚤作候道士不見問諸保者曰道士酣寢時見一彈丸丹光奕奕射木榻外既聞爪甲聲若蟲食葉藿然餘不知也夫婦驚惋熟視臥内惟有所刻畫桶底耳當是時好事者購墨本惟恐後而母氏卒賴以夀終君子謂葛夫婦孝感所致云送陳檢校從藩臣分鎮淮安闔閭城外陣雲興草木依微殺氣凝雪霽長淮齊飲馬烟消清野疾飛鷹羽林宻號傳符刻幕府初筵列豆豋有道折衝千里外牙旗小隊看春燈題天竺妙侍者所藏訢笑隠張伯雨倡和什後湯休麗藻世無多修静清名孰有過赤水𤣥珠歸象罔寶花丈室散維摩日邊並倚凌雲作林下新傳撃壤歌句曲長干舊游地鵲飛無奈月明何山行二首有序庚子十月二日董竹林居士邀予出吳城西遊十餘里捨舟循花鹿白鶴等山度鳳凰峴觀紫牛洞遂登宋張監遐觀亭故基斷岡殘隴四顧蔓草五世孫天祐讀書力穡其下忻然接予曰自兵興来學士大夫罕有至此者因題詩壁間水送山迎風滿衣荈花栀子散林扉紫牛一去洞雲合白鶴重来人世非亭倚高寒瓴甋在仙遊長夜佩環輝諸孫為具蒸藜餉自笑登臨不當歸是午由牛圈塢南行數里得覺林院少憩既西折登百餘步林楚就暝遂止興教寺僧源肅吾二人具酒饌沾醉乃寢五夜驚聞雨㸃聲甚繁載聴之蓋鐘振木葉墜露耳徐起盥櫛源備湯供延坐小軒軒面蒼峭壁泉玉色瀦壁下僅尋墨許指笑曰是足供千百衆然未有名予名曰咸泉取澤在山也移時過竹院飯偕眺尤美亭巘崿斗絶捫蘿蔦而上仰蓮華峯殊神秀亂石虎搏人立杉楠楓榆相參錯為丹厓翠壑天風泠泠迴見鳥背使人作凌虚想源曰亭右埀有石扉側開陿隘纔容身中則寛廣時雲氣上齊若葆蓋羽車然意必靈異所宫欲下燭幽隠辭姑名曰靈雲之洞又言峯絶頂俯太湖洞庭光爽滿面宜吾二人者老此或與飛仙接二人者董竹林居士其一也居士吳産累遷儒官晚慕晉七賢用是號潛其名云源愛文章因居士首倡四韻懇求和并紀泉洞得名自予始詩曰袖中詩巻杖頭錢十里雲山一宿緣曙鐘響振珠林露天供香分石壁泉葆蓋羽車靈岫出丹厓翠壑小亭連擬吸具區三萬頃頡頏飛上大青蓮題程達觀外史洞雲深處洞雲深處神仙宅空翠不收常晝暝金鵲尾横香案静青蛇影臥土花腥天壇瑞草敷雷雨石竇寒泉注月星更闢一氊高爽地遲予来守内黄庭同鄭遂昌山人張谷賢俞樵夫艤舟石湖登拜郊臺留題上方寺高秋木落紫嵐開載酒登臨第一回京國不無西子恨拜郊猶有借王臺上方樓閣中天倚直北風雲幾日来三老班荆話閒樂石湖魚鳥莫驚猜故封安陸府同知飛騎尉華亭縣男謝公德嘉挽詞執友懐材徳人皆長者呼官封安陸府宅抱澱山湖華胄遥通晉榮光近接吳書詩陳典雅環珥侍瑶瑜襟量黄生匹交情鮑叔俱墓山依客鬼有義山葬寓公死者金帑貸家奴奴嘗盜金置不問鱸釣蒓波闊池驚草露濡兵戈十年内不忘禮王符龍江治圃原憲安貧久樊遲學圃初總名江泌菜不是鮑焦蔬甲坼烽燒外心承雨澤餘酒香兼果蓏羮美帶蝦魚華髮氷壺傳茅齋種樹書鶉衣分晚摘肉食鄙春鋤嗜欲情除妄逍遥道集虚妻孥防歳饉甕盎備冬儲洛陽靳惟正信州總管利安公之子太平總管處宜公之從子太平先殉節死丞相達公以惟正廕太平同知將有事中朝枉顧海上時予病聊短述以贈梧竹鵷鸞羽蘭苕翡翠衿舲船淞泖入圭竇草莱深藥煆芙蓉火冠投玳瑁簪山人非索價公子素存心天府周南國霓旌漢上林高秋使命返金玉俟徽音送僧蘭古春亂後還省先塋儒行蘭開士先塋在富春摸金無校尉掛劍有行人薤露傷歌早松風入夢頻杯浮羅刹渡酒酹客星鄰天地啼鵑血庭闈戰馬塵式瞻追逺義孝治若為臻哭吕貞惠處士南國長林楚西崑片玉英周旋鄉里難終始歳寒盟甲第風塵合璜溪月露清義聲驩勇弁私試集文衡屢散千金積還辭七品榮性中天爵重身外野袍輕栁送浮春鷁花邀囀曙鶯深期陪几杖俄報舉銘旌世亂嗟新俊秋高哭老成名公題翠石來裔照華纓節婦謝淑秀詩有序淑秀宋太學上舎國光孫隠居教授進修女淑性闓敏年二十贅里中許楙室家雍穆逾十年楙早世有女孟柔子龍囦皆幼或諷使再適圖終養計淑曰吾不幸早寡猶幸生詩禮家不見奪于共姜之父母又幸不見迫于媯覽吕超之權勢况有母恃養無足憂者吾惟志是守子是鞠承乃宗祀而已尚何言諷者赧而退淑清苦自持及終母制孟柔歸某氏龍囦知樹立亟命學醫因誨曰夫醫治亂不廢之業且樹徳莫醫若汝其毋怠後果亂龍囦以醫母獨優裕今六十餘矣人又以許賢母稱云貞居婦謝氏名重陸雲鄉頭雪機猶織眉青瑟罷張野霜遺秉浄池雨漚麻香團鏡收来匣長檠棄在牆壼闈恬布素家廟肅珩璜祖澤詩書逺兒醫徳業昌柏舟多後勸栁絮有餘芳水落新魚罶春回舊燕堂中庭孀月白四野戰塵黄倍感陶嬰操因之補一章趙長者詩有序長者名禮字信父泰州之丁溪人生而寛厚未冠父聞同里孟翁女有容徳為聘之時女年十四矣初翁有子女輒殤夭晚得是女鍾愛之及笄以目疾瞽翁病焉辭婚于其父父以語長者長者曰不可始孟氏許我時目固明非誑我也今不幸致此而悖常渝盟逺近知其為瞽女誰乎娶翁夫婦老且死女無適從人必責我大義不若堅前好焉父喜謂其母曰吾兒直有華隂吕氏之風後其昌乎既娶相敬如賓生子女十一人玉其中子也中年家益饒迎翁夫婦就養翁殁葬猶父母鄉大夫士咸稱趙長者趙長者云長者事親孝與兄裕弟璧無間言以夀終于家玉之外祖母嘗以子撫育之長而知讀書奉外祖母如其父母卒服衰三年歳時不絶其祀今為水軍都萬戸淑女春蘭秀仙郎玉樹姿目從何日瞽義守百年期團月開紈扇雙星結彩褵韜輝唐鏡匣流響蜀琴絲遂叶熊占夢旋生燕頷兒徳齊中饋禮恩出外家慈蒿薤俄霜露蘋蘩數歳時留題長者傳庶望厚民彛宫中行樂詞六首羽獵罷長楊宸遊入未央鸞開雙畫扇鶴舞百霓裳玉盞瓊花露金盤紫蔗霜長門誰閉月流影在倉琅望幸影娥池微吟紈扇詞露盤迎月早宫漏出花遲佩雜鑾和響雲連雉尾移君王肯時顧從愛趙昭儀明月窺彤管雙星直罽軿宴分王母樂詔擬薛濤箋穀雨親蠶近花朝拾翠連魚龍曼衍戲次進玉階前積翠微波闊披香暖殿開天低烽火樹日動蔓金苔獺髓勻猶濕羊車過不回賸陳列女史萬一漢皇来芍藥為離草鴛鴦是匹禽君無神女夢妾有楚王心日短黄金屋宵長綠綺琴相將戒霜露拜月繡簾陰金鑰魚司夜瑶筝雁列春後庭通綺閣清路接芳塵同備三千數誰辭第一人君王夀萬歳行樂此時均聽葉琴師觀光操有序觀光操者三衢毛敏仲所作也至元間仲偕武林葉蘭坡徐秋仙一作山遊京師三人者咸能琴受知宰執薦名世祖皇帝仲以為士之道莫尚於賓王先王之化尤莫尚有虞氏之教故緣徴度聲作是操以應制比召客死館舎予聞其音激越悽惋不純乎徴傳曰徴亂則哀仲其自哀也夫雖然仲之心至矣是時海内外羣生萬物方旁達交暢仲首擬南薫之歌用啓聖聰比隆有虞中道而止豈先王之樂未當復歟於乎先王之樂不見復于世皇制作之日畢竟何時興耶使後有吳季子必曰樂有在也蘭坡孫惟一彈是操且語是言因序其事而系以詩夜聽觀光操心神四座開馬駝千里道龍虎五雲臺長養南薫入紆徐一作餘白雪来世皇虚席待竟起伯牙哀觀楊一枝外史鳴球琴元贊附温潤而實玉其質也清越不淫磬其音也朝陽之桐絃徽被之彼美天球維其似之驪龍珠四八共爾久浮沈造化深藏器神明宻賞音水蒼寒軫玉星緯暗徽金拂拭煩君手朝陽作鳳吟得尚書汪公凶問凶問落江邊儒林氣愴然亂中天未定身後日同懸孝甚曾三釡廉殊寵一錢樗材荷推奬思報輯遺編錢公義舟中同賦薄暮扁舟發春陰生野寒赤莖看水栁清響送風湍詩好頻分札篷低屢整冠松鱸九峯酒爛漫罄餘歡倡婦徐序詩附至正壬辰冬缺人冦常召其婦佐飲憤罵弗聴冦馳殺之龍江章湖孟文詩曰平康巷裏掌中身翠舞珠歌玉樹春不得籍除今義死天容倡婦愧降臣逢詩云妾非花月舊時妖曾事忠良樂聖朝今日黄巾刀下死陽城下蔡莫魂消束帶朝衣供奉孫虜庭歕死報皇恩妾今一唱貞元曲孰濺西風碧血痕和戍婦陳聞雁有感四首有引浪喜燈花落又生夜寒頻放剪刀聲游鴻不寄征夫信顧影娉婷無限情右婦陳聞雁而作也題于華亭戍壁逢友張洙宗魯和云青蘋風起别鴻生寒盡春来不寄聲多少離羣歸欲盡天涯抛棄獨何情謝嘉維則擬答陳二首軍裏何曾髀肉生隴頭日夜血流聲内人莫怨孤征雁縱寄安書莫寄情缺月微明瘴霧生兩鄉夢斷玉簫聲無由並跨秦臺鳳夜夜離鴻别鶴情宗魯曰陳錢塘儒家女夫本縣曹吏國兵亂隸軍籍久在外或勸之曰若質美性慧往富室為女紅不猶愈守空戍忍飢寒乎陳答曰飢寒小事耳不已察而汝聴失節莫大焉或者慙而退未幾夫挈歸里人至今稱之羈雌見月可憐生月落江昏過雁聲不特題詩想夫壻漢家多少玉關情介胄多年蟣虱生客窓今夜落邊聲螭頭釵子鴛鴦股獨自挑燈萬里情兩地何知死與生雁来愁聴月邊聲多應萬里孤飛影只抵長門一片情江南江北荻花生妾處君邊第一聲何似春風湖上宅銀筝玉柱白頭情海宴軒前雙鴐鵞歌為曹涇分鎮朱芹湖作盛明天子狩有期鴐鵞若有神靈司剛風高寒翅盡直鷹師縱鷹雲眼碧斯須毛血灑行輦大官親庖奉玉膳當時畿甸禁罟嚴此日江淮矰弋滿朱然將軍興義風雌雄養之庭苑中文王沼上古月白房相池頭春草豐飲泉啄穀觀者美願爾雙飛上筵几亂離無復鳳来儀雄多被殺留其雌將軍必也放歸北天子厭兵今節食題楊元誠太史宫詞後有後序玉佩瓊琚雅頌詞流傳中禁萬方知獨憐夜草除奸詔親奉綸音改到時公嘗與范匯同草黜逐巴延太師之詔草文云詔書到日上曰自早至暮皆一日也可改作到時結句故云題謝太傅小像一起扶維半壁天未應絲竹醉嬋娟八公北下風雲冷想見山河月影全吳江書所見虬髥使者銀貂裘胡牀醉酒芙蓉舟文章太守不敢近一聲水調動一作勤回頭撅頭船兒葉不如漁郎衝風暮打魚傍人心怖自歌笑老龍正在江潭居題郡守翟仲直太白問月圖玉醪和露㵼頗黎鯨吸秋空萬象低奈爾浮雲翳明月清光不照夜郎西景陽井踏臂歌殘璧月昏驪一作驕龍猶藉井生存石闌漫涴臙脂色不似湘筠染淚一作淚洒痕簡任伯温檢校旌旗交影鳳池邊退食微聞午漏傳猶比至元無事日印文銅綠長苔錢官厨日送葡萄酒畫省春看芍藥闌不忘舊為丞相掾手圖天馬獻金鑾丙申正月十八夜吳門雨黒雨廿二日午見日中黒子劉都漕貢總管留不果既出舟次口號始憂黒雨夜傾城又駭無雲日晦明百口親鄰船倚著仲宣去住獨含情仲雍墓側晚峯青頭白烏啼滿驛亭太守心旌懸大樹故人書劍逐浮萍静安招提八詠為無為上人作碑存赤烏年僧指青燈夜風雨寒蕭蕭黄旗儼来下右赤烏碑水怪移象罔野火飛熠燿丈夫殉節榮足免行殯誚右滬瀆壘故國空蚯蚓老檜餘瓔珞根地終系陳不與庭花落右陳朝檜神僧聊示現肉眼為驚睅水浄天空雲何緣同一筦右鰕子禪縹帙白象籖金書貝多葉稍披四句偈已斷七支業右金經臺甘香蟻邱漿清凉楊枝露一勺遍大千天龍不敢吐右酒泉亭秋風兩岸著野水千家遶隻履自東歸零亂霜天曉右蘆子渡龍歸驟覺寒雞逺不知午長年四簷陰颸颸竹疑雨右綠雲洞梧溪集巻二
