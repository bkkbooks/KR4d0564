body:
  text: 梧溪集巻七元王逢撰連理梅頌有前後序逢謝病最閒園之十有七年上春海曙岩左藻徳池水陽梅大小榦四氣合理屬形色無間特然危立當龍門浪石偶始見焉僉愕愕以為瑞越二月二日家嫗告誕男孫乃仲子攝所生者是日長庚宿于奎栁逢命躔酉分適符而梅也藂蕚玉作花香艶景意動映㑹洽冝乎觴而頌曰猗歟梅瑞岩􅊤合衆榦返大朴理屬氣強兼弱先春蔓根性孤彚感清影肱江韻皇英颶弗撓雪愈貞石丈盟世澤涵嘉應毓隂徳積裕慶續宗毋吝家惟睦猶實有仁後其蕃熟也耶逢頌梅已竊興憶故園菜亭南紫薇木連理尤特異先嘉㑹君嘗慶宴里儒陳復雷軰于亭上時逢僅有長嗣掖従在侍陳執觴起進予曰而大母徐諱閏芳屬未有後視一作祝而伯父諱忠甫三嵗襁負避亂兵夜仆葑蕩數濱死有勸棄之者而大母輒涕咽良久誶語曰既子而棄焉與殺同寜死生俱也卒脫于難晚始得而父諱恵迨冠吏他郡月寄俸具鮭胰餘則班諸族之貧者寒陰雪雨隣伍有不能舉火嵗率濟饘粥而大父潜昭翁元初卒相傳好延士數至靡怠遇事謹敏宅心夷厚鄉稱長者而伯父至析㸑也而父義甚同胞倍與産業而姑歸而蚤喪又躬為殯埋盗盗其丘木則愬于官仍嵗謁時祭之兩甥女還往三十年䘏養如一日夫和氣致祥植物先應此豈偶然哉座客咸韙之盡歡醉散其所言厯厯今不忘於乎釣逰先跡愴墮夢境流滯餘喘行同朝露莫知人世竟奚如也雖然天理不冺世澤或未艾幼孤謂諸外孫壯寡謂孟仲二女乃復相尋於家事捐城跡屏病句有司迫於起藥石伏枕荒寂間時吏部敬依起取惟爾掖等上思繼夫志下見篤于行若孝若弟大有實兹頌聲則王氏黄灣諸靈將不在他日佳子弟一作孫是望是慰是年壬戌三月初度日書示掖攝拊係洪武十五年隠憂六章時有司奉吏部符敬依令旨起取箕舌兮房耳交燭兮東鄙顧謝病兮四三胡謡諑兮迭萋菲鵠髙飛兮翼焉假蘭幽幽兮林下爛晨霞兮莫飡潦秋清兮爰酌之斝獸有越阹魚有䟦扈居巢䖏穴知謹風雨辛洊臨兮丁載周以朝以夕兮五春十秋年老癃病兮勿遣有詔人事噂㳫兮紫芝藂桂聊夷猶芡團團兮藜葉長鏡吾知兮眉如霜車爾華兮服爾章素履諒旡咎兮貞也悔亡所未亡兮隠憂中膓虞工不往兮招維旌魯有兩生兮沒齒無名古道悠兮時事并疑莫稽兮拔茅征貞菊延年兮姑飡以露英鷄鳴嘐兮蒼龍上蟠寉駕其朝兮竊謝病枕安須捷楚人以衣被垢弊為須捷蕭蕭兮雲栖簷端於乎策良被輕兮七子闕下白㡌管寜兮亦容于野牛山兮鴞林林充兮培深彼藪澤兮大獮禽於乎窮簷短景兮身衰遐心震琳震琳震澤中洞庭樂石也震遺琳八琅音䕫擊節猿應吟却西琥謝南金樂哉幽深超果寺祥麐棷師頂相賛講師骨聳岩厓胸含氷雪具正法眼鼓廣長舌坐斷泖峯高清孤絶將使一華五葉之傳三草二木之喻殊途而同歸于轍者耶數珠銘有序瑪瑙數珠連瓔絡五事逢顯妣李氏諱靖真之手澤也妣氏平居江隂時嘗諷心經暇舉是謂逢曰吾有不可諱必納之窣堵中逢謹答曰唯命厥后倉卒去兵難舊物多所失遺而珠􅌂存追惟音容之隔已三十九年矣今年癸亥秋洪武十六年雲間㑹伏龍山唯菴然禪師於松隠禪林築報恩塔落成用蔵其所書華嚴大典乃以丹髹小盒置珠而附焉於乎妣氏念其忘乎重銘諸石曰唯心净基弗垢弗隳手澤塔是歸倘神龍䕶撝真率軒銘有序郕人士許思敬營别業於華亭縣庠之東偏嘗懲世之狃儉失常肆奢致剭者夥矣乃慕温國司馬公之真率也以名其軒而介合淝翟守仁氏徴余銘銘曰肉不掩豆齊相嬰脫粟布被漢臣𢎞日食錢萬晉何曾後賢真率世著稱簡素易直子其承儉徳堂陶爐蓋座二銘維葢覆爐猶天覆仁静翕太極動舒陽春涓塵海岱巨細念均至治馨香風氣載淳右葢銘后土其載磐石其固鼎位奠寜香是用籲何敢事天存養無素願兹墊民環堵永措右座銘節石銘石有節猶婦有烈孰謂之夫也志可奪乎擊石一首癸亥冬作有後序古垣黠鼠窺篝燈踈簾氄雀啄硯氷奉天殿㫖聴野處擊石為歌媪所稱孝姑周褚節彌厲挿秧播榖蠻謳避陳金寡得園種果䖝蟻餘生免湯火韓錢生長冨貴家義不再醮繅綿花葉徐竹房日蔬食隻影縫紉屛塗餙杜曾氷蘖善自持児作僮傅身母儀清河山孀手摛藻事母不欲煩兄嫂吾家髽女双練裙孟也枿牙蒙燹氛仲也藥種躬培耘備嘗茶蓼亦厭聞君不見檿絲貝織勒嵗貢龎吠鷄鳴驚夜夣鬼車嚘嚘風雨送錦字啼痕忍淹鳳畏途征嫠雛與共目冷青紅蜃交蝀嵐蛇霧螾腥林洞笱莫棄遺名義重時哉坤貞何乃衆君不見天孫左降雲擾鬗霜姝月姊相髙寒西王宴饗瑶池干衝牙觸璜鏘和鸞瓊真魚貫金桃蟠鳥使下上鋒劍翰於乎漆室䖏女紆憂端猶有薄薄翠袖空谷幽居安右擊石葢傷嵗景短迫男子多故婦女能勞而貞焉後皆鋪連空房逺道之不失其守者或謂予老伏荒逺無補于民生得録數節義鬼亦足自見然尚有遺者其一夏葉氏事姑盡孝敬翁病痿凡七載日滌簀易席必親翁卒喪製為強宗所奪躬再備弗較至辭色間終身不矜怨其一徐謝氏諱蠲素凝重當苖兵燬掠謝從夫逃適苖遇驅辱之時里閈少艾被縶相屬謝阻板橋遽厲聲曰橋有柱我儂趨擄可乎苗怒殺之既而悔語衆曰彼烏涇之清濟也衆唶唶去於乎元季不匡若葉謝者譬服古冠珮甘碎裂于食弱肉者側此無他世教民彞未嘗一息絶滅也逢追書于詩左古懐周秦廢兮民無為生逃而學老兮𤣥教浸興千載兮廬社晉之瘁兮賢簉林下菊既穢兮蓮有芳荆軻詠託兮古懐疇冩石田研銘石應兮文躔窪涵兮紫烟假吾道有年育材飯賢嘻世斯田蘄于天采芝辭有後序維北土岡兮維時金商芝藂生兮色中央莖玉紫兮霓白裳躬露采兮奉先聖王噫鷹擊兮草霜尚父邈兮斯文祥予自幼至壯詩夢頗多地荒存菊本人老發梅花紅芳飛血盡黄蝶上衣來犬眠牛斗地鯤躍鳳皇池乾坤人鮓甕嵗月鬼門関雪落蘋花盡靑浮山影來簾卷東風燕子還天清月浸淡梨花最後得艸霜鷹始擊之句今年丁夘埀七十矣八月二日己酉園北小山濯風所見芝藂茁草間因發笑曰静觀世間何者非夢耶遂作是辭漫紀如此丁卯洪武二十年瓢湖月夜舟中短歌鷖如舟兮舟如鷖我不知乘風兮風乘我為澱飛爽兮瓢揚漪星月倒兮相迎隨降泬寥兮金節舞空明兮文螭澹逰忘歸兮神昇天借嗟白日塵一㝠兮曾孰知有清夜壙銘有引戊辰元旦書時壽七十最閒園丁王逄門生周畿刻驪駒山園北小山儀鸞水所居張涇首西正丘有斐士詩旌忠孝節義鬼幣交將相公侯禮擕家辟地兩辰巳布衣蔬盤善修已草木禽魚知姓氏昨惺惺今起起無強近親鮮昆弟有芹薦者二三子美瞿彦徳有序彦徳名懿元故兩浙運使霆發之従曾孫也幼孤事叔猶父同居三十年一旦以非罪在徙中懿泣愬于官曰罪合坐懿叔無與官義而聴之及事白歸叔已病殁懿延師朂教其子里士鍾景元謂予曰運使公之子時習仕至潯州路縂管妻張氏鍾氏前後並事母姑葉夫人盡孝敬懿於家門無忝矣乞歌詩美之詩曰海邦甲第連雲起時異禁殊多外徙瞿家叔氏勢蒼黄姪動中心不能已廬殫地竭籍送官毅然代叔人具歡鵲烏罷遶星月夜鴛鴦䨇渡江淮寒望中溝填或野露䧺風獨轉金鷄樹凉天移席竹林遊曉漏整鞍茅店渡叔氏云亡弔影孤躬親致禮師訓謨行看長大率相保先為歌詩歌道途吴仲圭山水為李源復題李諱汧我生未了烟霞債見水見山心所快兵戈澒洞十年餘真水真山不如畫梅花道人呉仲圭斯畫乃出胸中竒無聲詩託有聲冩汧也笑謂非公誰沙洲吐吞石齟齬三脊仙茅雜香杜錦繡天開靈鷲雲笙竽籟過蒼龍雨一杖商翁自外歸方舟漁郎若相語葛藟古木苔蘚皴形若槁立腠理春屠蘓略彴密映帶老我顧作漁商鄰漁或釣周商避秦趙文敏所畫唐人馬楊銕厓魯道原二提學詩後為桃樹浦王叔潤題肉騣花驄真權竒彷彿出浴西瑶池細看元是勅賜太卿者鄧公奪取少陵哀賦詩黝雲湧身霜四蹄一目冀北空駃騱全神勃王房駟黯雙耳尖卓昆侖低奚官玉面如滿月闕次韻信道元長老菱溪草堂見寄之作有後序石橋方廣苔蘚生中有萬嵗之紫藤雲深幽磬響或作溪面落花香欲凝下方豐蔀金碧氣老禪跏趺蒼翠層天柱家山甚峻爽杖錫讓爾先攀登道元少與茅山道士張伯雨前進士會稽楊亷夫齊名嘗有西湖竹枝詞云湖西日脚欲沒山湖東新月牙梳彎南北兩峯船裏看却比阿儂䨇髻鬟至今為絶唱或者病其浮薄亷夫謂曰金沙灘頭菩薩亦隨世作戯耳或乃釋焉誠演二公與道元同字皆博學負重名而道元戾契度世僅住小山林而已今年八十餘託友生錢岐以詩見寄且囑曰幸致敬席㡌翁予不久天柱家山去也於乎台雁山天柱豈特道元龕在耶丁卯冬季即事庭樹禽翻鷄唱初缿筩錢罄老饕厨氷壺不忝元脩菜箬葉何慙丙穴魚一線漫長迷五色寸隂真足助三餘暖隨水霧元春發寒併氷山與嵗除立夏日書孟夏四月朔薰風當午時諸陽老益壯一氣轉何遲錦帶花裊裊黄精實纍纍青隂覆盤石無意坐彈棊病中述懐終老甘農圃烟蔬帶豆田無官天曲宥有住世旁縁暖趂茅茨日寒知竹栢年私懐復何慊吾道不無傳夀亭成罍盎浮春釀親朋慶夀亭麻衰萬石長襪㡌小城丁易卦懲同吝騷詞詫獨醒三郎市諸藥魚菜附歸舲題管夫人畫蘭趙管才髙柳絮風水晶宫𠂻冩幽藂秋來紉作夫君佩笑殺迴文漫自工題二喬圗並看兵書白象牀半生鴛被拆寒霜英䧺自伐蛾眉斧不寤齊王聘采桑題寗戚叩角圖南山石爛短衣單叩角歌興夜未闌一出客卿成底事莫將堯舜料齊桓謁陳烈士廟墓有後序夙負聪明號聖童野狐西闞白干虹颺言佳室青烏子效順長江赤鯉一作鯶公香案山朝雲泱欝翠茵沙枕樹蘢䓗饁夫釋耒談遺事餉吏連艘酹快風祀典寵輝荒寂表靈休昭降混茫中蘋蘩為寓維桑敬生氣英英月在空予謝病自上海還省江隂先隴道謁夏港陳烈士諱忠廟墓因憶幼侍大母徐氏傍嘗聞說烈士産杭宋末神采煥異羈貫當盛暑躬送壺飱于力田者隔溝潦輙騰擲畀之若有神助壺未始傾覆及叩妖祥類多中由是合境稱為聖童迨笠墩寺黨弗靖守將莫知禦備乃問諸烈士首對曰化機不可泄既不獲辭復曰某日某時必矙城廂校率兵如期以待亭午浸懈散而冦果至縦焚掠去守將無以籍口竟誣烈士殺之時白氣上干頃而雨父老謂天雪涕云姊夫俞善善曰烈士葬後有陰陽者流相墓位向當出土祇與侯封等其先蓋業漁同漁者網得一金赤鯉殊長大鬛尾奮掉目瞠然光射其先驚悟放之江是夕夢神孺告曰吾龍王第四子也誤麗之網賴公活焉公之孫姓將必陰祐于民社于洋溟者今烈士感通猶影響而比南餉舶安輸逾百稔田叟㕓氓及四方販丁庸夫争相奉香幣致牲醴籲禳恐少怠夢誠應耶夫幽明二支一本也烈士誕鍾炳靈生髪甫燥遽不幸死非罪而英爽凛卓弭災捍患且久兹膺褒命自天廟食世世視彼烽塵間起萑澤魚肉鄉子弟妻女者不翅數十恧汙于九泉也己予忝生同里懼冺遺跡於清暑暇謹繕録前後所聞于詩左庶俟來者于寳氏叅考焉善善名思齊予梧溪王逢過徐氏寛閒軒居及諸門生聨句附百畝寛閒野三間低小簷平生遵儉徳中嵗謝勞謙藥火蒸雲灶茶香出午簾泥塗盛車轍不是學陶潜園林聞獨樂逢几杖喜同操餉道疲牛馬名闕柴車載糗醪詩催時雨足名闕賢聚徳星髙一水圑精舍名闕餘寒戀敝袍少陵糧芋栗名闕仲蔚徑蓬蒿鷄對清談暇名闕魚忘赤尾勞香泥融燕寢名闕新盎響蠶繅交篤雲霄義名闕籩兼沼沚毛張儀徒事客名闕郭觧漫矜豪安得扶衰憊相隣遂晦韜逢周芙哀辭有序六磊周芙本細家息孔胥妻也孔素無鄉曲譽乙丑冬舟過塘上鄉人偽邀飲醉􅐁舟以民害愬于朝孔自度不免密書與妻蚤尋仙逰庶絶軍配族黨難諭之其妻覘得故神色不亂言笑如平常且備盛酒饌延親隣是夕素服雉經死時年二十九孔聞之曰予伏誅梟木無遺憾矣周一作園西媪張氏云潢潦奔流合東南淑氣鍾憐生俱薄陋就死獨従容道殣懐金璧閨情采菲葑親隣競嘉嘆不復佐嘗饔張貞哀辭有序予門生張敘女諱貞嫁海縣周曹以復入公門刺而瘐死先是貞在徙籍惧配軍投秦淮卒及周屍過其所貞湧浮水面神色踰五日不變認者曰此吕學諭甥張訓導女也殉夫蔵聚寳坑舅姑能無念乎予哀之曰堂上嚴君海縣儒素聞出嫁義従夫佳人命薄非今日那得將心報舅姑梧溪集巻七
