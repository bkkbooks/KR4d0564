body:
  text: 梧溪集巻六元王逢撰擬河清頌有序草野臣某言臣本江隂鄙人也素不希仕進甘分壟畮讀書向道以詠歌雍熈之治比鄉邑多故客逰吳下且七年今年春三月躬聞黄河變清混合雲漢昭融光岳青徐齊魯淮楚之間神人驩忭魚烏咸若卉木品彚盡沾休澤竊惟河源自天注地中經亘袤衍不計㡬萬里夏禹疏鑿功用同天厥後華夷殊域雖代見澄澈誠未足當天地嘉應我朝一海宇昆侖䓗嶺始在化内仁治徳流埀及百年天用彰報陛下陛下仰契俯察日夜澡滌心慮極塗炭下民以答我皇祖考之祜昔漢以甘露降而紀嵗唐以醴泉涌而製銘臣謂自三代來莫此為盛陛下聖徳逺邁河伯效􅎇固宜作為文章聲之樂官薦之清廟特著國典傳示無疆顧不偉歟臣思深涵育分踰賛述謹獻江浙省以聞頌曰皇帝即位三十春黄河變清月在辰乾端坤倪浩無垠一氣混合析木津昆侖䓗嶺涵大鈞洛渭淮泗嘉應臻風魚無菑龍擾馴桃花不動波􅔿淪陽和郊棷見鳯麟紫貝宫闕闡怪珍河伯率職海若賔天其念兹昏墊民于以净洗戎馬塵槎蘖沾丏咸與新江南布衣草野臣踊躍百拜頌斯陳於穆世祖堯舜仁大禹功澤歸聖神予讀王逢氏河清頌辭達而意敷得歸美之體鮑照不得專美于前矣故為書之前太史知制誥鄱陽周伯琦識逢擬此時至正甲辰嵗公則以江浙左丞遷南臺侍御史不赴遂告老中吳云逢敬書懐先民賦有序烏涇世儒僅有張氏其先開封人仕髙宗儀鸞司門既扈南渡樂是卜居後寖昌大離列苑第曰太祝曰上舍曰進士角徳翼義咸負譽望曰驥院質木饒貲益丕拓湖苑屬元初官脅售其第為倉征邏司族就衰替十有三世孫􅂭力田授徒幸延餘緒搜攟遺勝䟽洿剗荒於是小山平林襟帶溝池凡樹石􅑐􅊤一作磴以植以闢積勞于躬初有成趣至正丙申苖兵燬掠􅑎齋僅一作巋存又十年􅂭盡歸之於余乃因其舊稍更新之增崇浚深摽竒著美遂號曰㝡閒園且次其所在用載用詠之矣尤懼跡忘於漸事湮于久復名其山曰先民一丘溝曰先民一壑立表兩間清浥秀萃庶乎見景慕于前脩聊示崇廣于來裔也予不敏葢有賴先君子庫司勤公於兹土天用食報畀有世業於乎凡我來裔詢事考跡以無昧於先民則吾先君子之徳其忍有忘己乎序而繫之賦曰繄予嬰世患兮幸謝病於藩垣家轉徙而仁里是擇兮得儀鸞之故園仰有峙頫有流兮若天建而地闢矧磴繚峥崱列兮水菭盪夫横碧樹藂轇圍且合兮起拱把于封殖蔬畝麥疃胥映屬兮匪一朝之人力詢肇基于隣叟兮曰髙皇之南巡箕塊輦石畚鍤並興兮冠蓋繽如春雲迨國變而門祚中衰兮尚衿佩之振振何集蓼于暮齒兮室罄懸而研塵夫絺褐代服兮鼓鍾代奏鵲巢鳩有兮鳩弗善搆緬惟顯考兮著效兹土黙相俾承兮猶臼納杵期一日必葺兮覬三年有成懲鴆毒與狃安兮懐熊膽于劬經在舊喪有膞兮田祖有祭一丘一壑兮先民用字延余薛之顯爽兮激烏黄之濁流鑒雲間之聞唳兮杜谷口之鳴騶企文學于東吴兮夢禮樂夫西周庶景行奕葉之作者兮而忘其傚顰學步之貽羞亂曰饗有􅇨兮捫有蘿流浚深兮峙增峩月闖林兮露洒翠直少微兮迴明河魚戢戢兮沫煦寉翛翛兮影摩山鬼卷甲木客寢柯伊予弊冠藏之層阿造化邈焉畛域兮萬漚咸歸一波感氣類以相聚兮宜神鑣之聨過於乎孰謂同野可咈兮而争墩之可訶林屋餘清洞賦有序洞自予始而最閒園之清勝並萃前後左右中峙直節小峰一殆主山也下列樂石二曰泗磬曰豐鐘用節咏歌長夏客徑造團蒲㦯坐移日因作是賦以見慕志云爾餘清伊何秀割林屋土山抱石峰矗拱豆岡負甕谷頫菱茭仰篁木通壁門兮包洞腹雲一窩兮隂四緑氷百步兮寒三伏戞泗磬兮豐鐘口商歌兮踞吾足蜩如知兮移饗鵃胥志一作忘兮下浴水幽黝兮涵衣日旱暵兮隠轂夫赫使兮彈鴨陸魯望與兄兮友鹿李渉渤濟虎兮􅑐居單豹朱猿兮嵩􅅢髙大素彼或不死以尋盟願躬候兮􅜯躅好風誰將適洒徑苔髙士杖憇孤臣襟開我巾飄飄倒影在杯顧兹盍樂鑒昔可哀文賈謟于新室琴挑奔于蜀䑓鸚鵡殺其鼓吏沈香竄夫仙才幸羊質而早戰延馬齒之待摧葶悼暑王梧悲秋回㵼地苦汗漿征塗浩歊埃席㡌之翠岌然挹練江兮故園鞠為蒿萊兒且闢而且搆兮庶往還兮優哉童蚩蚩兮劃大笑奚嫁耻乎陶罍言歸吟歳反闗兮蓬户月㣲行兮藥圃兒相舂兮婦秉杼不遑家䘏兮寜疢世迕弧矢具弦兮狼角若崩雊以聞雉兮場安闕鷹霾黑颶作兮曛黄蜮興有求山人兮言歸于澄澄六歌有序六歌者最閒園丁之作也丁昏娶幸畢齒髪加暮才業不能上于人足跡則與勢途相背蓋二紀矣夫考槃采芝世莫追擬是什也竊惟豐山鐘霜至而自鳴歟其一禮雲曰雲何禮兮山中髙孑孑兮天南東或碧合兮素抱類愁思兮従無龍獸金睛一作精兮降西極挾風伯兮走沙石鷁退飛兮鴻無留跡𣺌親舍兮獨耿耿聊致恭乎松栢其二懐霖曰楚軍挾纊兮燕谷温我姑置兮緬懐殷人殷人兮為誰氏感高宗兮􅑐穴起霖大旱兮舟大川上􅆽析津兮騎箕尾聖途壅兮賢違有苗猖兮獸隨據梧瞑兮曾移時怳三尸兮籲帝以詞乘大輅兮冠哻雲翕奕兮降下土其三賓月曰寒霾轇兮安之陸媚狐兮川嗔鮧㡌髙屋兮裘重披偶賓月陽岡兮如夙之期光溢林兮爽浹豆巵石立諸生兮後先孔儀舞鷄念狂兮飯牛志暌氣夜存兮鄒孟實師井絡東上兮河鼓向西望舒駕邁兮影流堂墀今時何時兮斯覯匪夷其四埽葉曰冬迫兮秋徂鳳郊麟棷兮無時樵蘇溪園數畝兮兵殘燹餘林葉爕爕兮若天委地輸且箕且篲兮磬折老軀勞甚㸑骸兮心無其虞彼薪蠟屋珠兮貧莫我俱其五采薺曰山黄落兮虎現石體水歸源兮洲露鯨尾乖雷震兮喪七馬無􅎗兮車無柅病謝至屢兮鬒變餘幾童孫何知兮跪進素履諒苦節卒貞兮園菜有薺其六嘰和曰寒日薄兮西枝身重壯兮無時慕伯玉兮耆化忘李廣兮數竒維馬兮齒老前齊師兮病知道鱣􅁱大兮泳淵雉華章兮伏草誰其逃兮民之先嘰至和兮彈無弦白雲抱石兮青璧劍刺天闕柔不肉視兮内養維全黄良臣哀辭有序辛亥春某倉儲事覺上海連黄氏子良臣良佐械送秋曹臣謂佐曰元季凡𨽻於倉者猶荒雀趂熟耳今倉禁嚴飛灾况逮不翅火燎毛我本孤哀嬰保䕶之傅教之迨長皆叔父賜非叔父䖝出㡬何矣我幸無内顧辜功苐委之我爾生還葬我先壟以報叔父于地下殁存庶均安乎遂相對慟聞者莫忍仰視比推鞫一如所言而佐果得釋叔璟和謙慎好禮與予善臣氣幹類燕趙産孝友蓋由天性云佐一日衷麻拜請曰佐伯父母蚤世伯兄又徇義死黄氏徳祚延俾舍中有一尺雛必𦙍伯兄後先生丈人行辱過聴焉予嘉悼久因附其言於哀良臣序辭曰大夫殃及城火遺酷吏獄具牛毛辭借死厭衆古有之子安者何命非時驚風千林枝葉披栁車道擁山川祗伶俜従弟莫已思蘄天繼祀將弗隳我哀蔽以七字詩朱顔鐵肝天下竒焦徳乙郎哀辭有序焦諱白字任道本淮人􅁶長於呉材志不覊張氏初辭湖學教授避客􅍩海上興到作詩畵率不凡醉或濯風弄泉曵影月下俗目之迂白自若也張亡在所蒐儒遂變名徳乙郎浮寄冗食僧舍惟久於嘉定闕林原家一夕心動省母吴城為門校察延淑其子未㡬郡曹桓至部日以還養告弗獲窶且病或諷曰若頎而髯黄金加鞚爵列侯等不猶愈帶索耶輒不答去殆伏枕作書二一嘱嫂姪善事母一謝諸舊卒時嵗在龍夀甫五十考文坰天厯間社稷署奉禮郎予其兄行也哀之辭曰徳乙郎皎皎衣義不汨衊長干泥褁骸骨以歸無従淚揮噫曹傳哀辭有序傳字㓜􅑐宋賜金紫鄉先生碩之十五世孫也至正乙未亂父銅陵學諭諱思順憂悸歿辟地既兵猝至二妹義不受衊胥蹈刃死傳被創絶復蘓幸姊甥竄免共畢葬轉徙至海上丁酉秋以予薦主張林塘家首過焉出累葉遺槀一束謂曰傳僅保此天不斬藂桂餘澤使枿復芽而復有儒𦙍家難庶其忘乎予答曰仁者必有後自是交忘年十年屬嵗丁未八月適中寒卒於乎傳孝弟篤信人也奉姊稱賢節杜母訓甥矩作鄉社師在平居間言動文為又非淺露器而夀甫踰四十子嗣縉始二嵗嗣紳未晬其命耶賻以斛米斗酒哀之辭曰虎之斑兮雉儀恭敬輿兮持𠂻旗深褐衣兮鞶帶埀弗利逃亂兮適丁禍竒親憤卒兮妹義死痛巨創兮氣餘絲藳葬兮封土姊灰容兮共艱苦野晦眯兮鸛警晨沙衡従兮雁遵序蓬轉穭食兮方及此海塢假舘授徒兮粗緝世緒不大厥鑊兮烹小鮮無肉於豆兮有蔬于籩嬰襁褓兮乳下甥佔嗶兮膝一作席前夢藂桂曹氏坊名兮枿發懐孤栢父號栢窗兮蔓纒何東南洊變革兮終厭氛而長捐於乎命由天賦道繫時尼奚悲鵩止焉樂馬失諒消揺故鄉之先隴兮敔䓗蘢兮綺秀鬰孔襧交不可復得兮聊􅑱嫠是弔莫之以䘏爛雲兮華星愴對兮篇帙仲倩許生栒哀辭有序栒字友倫為同郡許泰和之季子予之仲倩也許氏醫承十有四葉而栒孝友睦䘏之聞錚錚族里間尤工詩鷊綬翬章影日林澗不幸三十卒予撫哭曰許氏杏失一林吾家詩减一派矣既哀辭曰榴英英兮朱房芰濯濯兮翠裳笋登葅兮蕙宜纕雨壊風折兮又隕以夏霜行豐夀嗇兮仲倩之傷傷之兮復何喟悔交來兮志孔厲髙扁鵲兮去晉陋華佗兮死魏已焉哉詩减一𣲖兮載滂予涕租籍銘有序租籍一帙先庫使菜亭翁之手書也逢倉卒去乙未亂物多散遺而此儼在沾洒伏覽尊容如對之字畫外因憶㓜侍側承言近代有王士良者本庸氓嵗租入義令種户自量士良字由自量易致感雨蘇旱見載鄭上舍所南録爾小子善推是心曷事不濟逢佩服幸老矣序而銘曰粤昔去亂廬􅑒田墟手澤之存百艱身俱維存維天猶古作則繁星寒芒蒼栢勁色秔冬麥夏平恕行槩醪胾餼漿汗力是貸偏陬下邑一石二科倍取旁歛貪涓成河孰善為導庶草風靡歎恨聲蠲胥樂田里孤露餘生弓箕忝承序銘籍左用飭後仍銀星硯銘有序硯江隂許泰和氏所藏物也膚理縝潤㣲縹有星熒熒然印若銀礫葢歙石之精者周郭纎圜上下均一而模製尤工既以徴予銘予謂許自扈宋駕南業醫凡十有三葉迨㤗和道益彰更涉世患族姓具全遺物並在其守之確施之溥者歟遂為銘銘曰少陽委精歙孕英金礪玉琢發素芒體垕用晦㤗和堂涉世多故同夀康孫孫善藏世永昌張氏石几銘有序几葢元故恭政公諱􅀈園堂中物也成宗朝家没几為隣有㡬六十年兵興世遷而公元孫守中文行日脩勵几復焉予嘉歎而銘曰趙歸璧合返珠兹几石二者殊不迷復有孫儒祖來馮光氣敷心祗若左右隅浦維黄涇維盧尚永傳戒爾孥章氏澂懐樓杯銘無查滓酒則澂無物欲懐則澂汪汪春波維徳之朋山雲杖銘鮮衣怒馬彼皆子舍敝裘帶索子不我却富貴多危貧賤乃安將子是倚是賴尋薇藿於山間㸔牛斗於雲端庶乎免世俗之難俗作路瘞冠銘有序冠名製不一予中嵗始冠處士冠養疴最閒園自是或峩而瞻仰而捫俯而擷者九閲寒暑一夕戴微月入幽貞谷將登濯風之所適露磴滑足側冠觗石以裂因憶九寒暑閒避兵塵再今儒卿守臣致書幣以予應詔三卒茍全且不起兾復舊業與之照影大江挹爽君山至同朽席㡌峯隴下詎非願歟冠已矣予忍敝之乃㑹數遺老甃而蔵識而銘曰予􅄠根于天禮維爾先寜觝石碎不抗塵全噫以爾闕不若扊扅以表以辭異夫敝帷首則惟新心其故心儉徳堂端研銘維平維方違險葢常兮維重維厚静乃克久兮玉韞闕類養引恬兮殆惡文著雲霞緘兮時否斯貞道亨其泰兮存心齋門銘為郡知事海寜楊子明作一氣肇分萬彚其芸芸乎命于兩間最靈其惟人乎心宰夫身其猶君乎六鑿其従而委臣乎其静也先天地而存乎其動也後天地而神乎疇亡其誠而離其真乎葢去其根乎倚歟元僚其探其存乎爰闢齊居八窗洞然其無塵乎蔵脩息游儼若思之辰乎存所存其事天乎推所推其新民乎朝斯夕斯將同歸道義之門乎鐘銘有序上海静安寺舊鐘入於官寺僧覺曇募銅至六千斤付鳬氏冶範成且有日乃介前净土住持元净乞梧溪山人王逢銘之銘曰金聲為物鉅曰鏞深徹泉府髙達穹谷傳海應流景風祈息諸苦開羣䝉耳根一作塵空净心觀通六忩其圎佛性同摶拊功施埀無窮虛龕箴有序韓景晹司丞子頥聞予宻室成為寄木綿布帳用資勤學因顔曰虚龕而贅箴左方龕中虚息以予予虛中静與俱夫舟載諸物轂運八徼光燭羣暗谷應萬窮虛其妙哉君躁於治而民轉犯虚其竅也臣急於察而吏愈貪虚其塞也父子夫婦兄弟朋友凡慊虚者世莫疚焉使一日拔地起山嶽而不為礙使一時亘斗彌雲霾而不為昧不隘于江海漲溢不動于風霆震駴斯虚之太者乎嗟夫顔子實若虚予老未聞道卧而氣昏坐而形枯烏知易之用二行六爻位蓋無中庸心學天人同徒將蹈晝寢聖謂何誅三教圖賛張渥叔厚畵題於味蓴軒中東魯一貫西方不二老氏得一教分道異忠恕而已竊聞諸師厥它未遑莫既賛辭石生賛二首有序宻室前列􅄘石二曰嶄角生玉筍生中置小碣命工剡辭發善懲逸庶望子弟焉耳石生嶄角重厚端確出我門地隠若一岳浩氣直養道體有卓立雪肅然類也古學礦頑受煉璞渾聴琢誰甘下愚視此罔覺玉筍石生秀鋭直貞抗節淇緑含和藍英伊誰偕藏嶃角肇纓梧月貺彩竹露與清軼塵虎丘嚮風榖城用黙絶晉永崇令名癭石賛在先民一丘間石有癭璞無脛無脛健走以售速剖有癭健守不偶致夀吁山藪蔵疾天造就爾質直節峯賛在林屋餘清洞間小峯直修磥砢錯節静壓巖洞崇餘林茇矯矯生風隠隠􅆆雪受命不回我瞻則悦鵧生鳸傳鵧性剛慓身視鴉不能十一凡見鴉經巢所輙不絶鳴奮焉翀旁批上擊鴉引去乃返若護林然故又名鴉舅鳥有蠟咮者子將誕巢率依鵧否則鷇為伯勞害伯勞即鵙鵙惡鳥今年丁巳鵧巢最閒園大柿木既産雛一狀鷙而小色竊古淺字藍元白間稍察一作睍之則鳸也鳸克自肉食徐逺適云或曰昔宋康王時雀生鸇不乆社屋今鵧遏惡保善俾他類遂生養與雀異􅟾種九出則一作咸應天時闗人事少皡用名農正官尤非鸇儗斯寵徴乎予聞而輾曰予涉強壯年未始禄升斗兹謝病且老尚奚覬然㡌峯隴畎在天其示歸田哉走菜對漁者市蟛蜞而號曰走菜怪而問焉漁者曰是蜞也俗以走菜名逢曰菜榖之配菜熟人無饉色此名辱菜甚漁者曰此菜名猶昔一作晉人以魚為菜也逢曰奚以走為豈其􅢗幟然其目炬然其足戈然其居穴視專城然水喣草食横行無前得無螳螂觸輪之勇乎漁者曰螳螂激壯士有功彼雖披堅執鋭不過㩀地貤貪而肆暴遇敵則走以幸生如是而已逄歎曰葢色厲而内荏者歟今食焉而避其難者亦其類耶時聞黄岩官兵不利一本此註即在題内漁者啞然笑曰子未知走菜曾不及烏賊胸中有甲也尚敢望螳螂哉題顧栢貞松泉巻長松䕃寒泉離離石堪把幽人於焉隠頫仰與世寡鶴巢雲卧時􅆐飲月明下悠然古根坐漪舞翠雨洒餘齡三休真咋一作昨夣一炊假萬有静觀妙庶希得道者松花釀來醇客至歡洗斝贈陸貞婦趙氏有序氏為安吉幕長澤之孫女而鄞處士陸燾之妻也至正間兩浙多虞燾辭海寕主塾與趙隠居松之瓢湖丁未夏四月海隅有警既兵猝至夫婦倉皇赴舟未逺同難者争舍舟陸􅇡燾登岸復將携趙以行而兵偪之傷刃者三遂仆深淖趙遂自投于淵時有歌之者曰四月三日兵撓湖婦女多被辱與驅殉節伊誰天水姝燾字子臨雅交于逢逢序而詩曰瓢居澤國奥艸木潤不枯十年滀清氣鍾毓貞趙軀貞趙名門息良人列仙癯廿載甘蓼同一旦幽明殊覘雨有穴螘相風有竿烏夫夫婦婦職焉知兵為虞維北崇澱山廟貎秦三姑似傳雲鶴君招要天水姝綃裳翠羽蓋明月雙佩珠邦侯俾従祀庶激後世洿愛萱堂有序愛萱堂者瓢湖夏生鼒奉母呉氏之所也鼒與母弟鼎㓜失怙呉時甫三十志不再醮撫育二子及長且延碩儒以訓淑之至是並敦學行崇孝養名其堂曰愛萱前進士錢思復為記其事母今埀老而康樂逾壯年予併美之詩曰故侯義種𤓰隠士義採芝孝子知愛萱樹對母氏帷雪芽獻春饌緗榮拱坤儀天人至交戕裕然全貞頥瓢湖清且漣鮫館氷蠶􅁝方諸净開鏡伯仲雙従嫠長願寸艸心釀作蟠桃巵嗟嗟凱風詩棘薪定無時故鄉先執贛州興國縣尹葉公挽詩有序公諱森字仲實其先江隂人凡七世止一子故無支親曾祖靑祖起采潜徳弗耀考祚蚤孤自樹會元師南下率西鄙數千百人逆謁裨將一本有陳字於陳沙莊畀矢一及尺帛答里族賴以全公性愷敏通蒙古字學郡推擇為譯史兩轉授將仕郎兩淮鹽使司監運綱船不勞而集改鹽官州判官適大䘲負海冦聚􅇯㷔蓬勃公擒其魁迨黨􅆆十八人時斗粟十千殍殣枕野屬倉庫並罄義激巨室發嬴粮三千二百二十九石鈔八百五十三定賑四萬七百人復以二千一百四十五石榖直續濟二萬六千六百六十六人不足又勸善富米一千六十石給三千餘人省臣嘉公救荒有緒檄攝富陽一如治鹽官得米二千三百石療饑民一萬一千一百一十九調新喻判官時蒙山銀塲以官值抑民市木炭由州抵蒙路陁靡即上白西省蠲之旱併僚吏齋沐以籲雨三日農以穰慶丁父艱起擢上髙縣尹俗尚訐有大猾况蕘挾子姓作民害言之部使者榜諸市仍䟽惡於門以㡬出入豪横股栗邑中浮梁當要衝嵗脩輒欹圯躬募義士黄氐等共分田置莊贍費自是梁永固官無煩焉繼母吴恭人訃聞奔還哀慕如實生已服闋陞承宜郎贛州興國縣尹比命下先道病卒時至治二年也夀五十八𦵏袝黄歇山祖塋子仁廕嘉興石門巡檢累遷至従七品樂平判官涖政綽綽有父風而優於問學樂平子材版授蘭溪判官蘭溪子齡一日袖同進士出身傳貴全録事所製公墓銘過予拜有請予惟生晚世一作厺亂甘晦以老竊嘗錄忠孝節義數十百於鄉先執敢辭乃敘其概追挽以詩曰老馬知歸途㳺子久異縣鑿鑿鄉執銘芝鳯喜及見士生遭登用似㠶得風便雀藂拔岩門菜色驩海甸山丁蠲徭役田畯慶豐羡猾懲蒙股栗梁鞏衆心眷訃奔繼母喪淚沁沙彌薦吉服戒中路河嶽氣䓗蒨遂成采真㳺孰謂㳺魂變幹蠱光後烈竊交忝遺彦大江流踈星其波自紆練安得六七公為嶽一作擬襄陽傳題金故翰林修撰魏公狀表後有序公諱璠字邦彦𢎞之順聖人也曾祖餘慶大理評事寃獄多平反祖子貞都木達館酒使父徳元甄官署令公忠明剛簡竒節自負由太學生中貞祐三年詞賦第丁内艱服闋調會州司候不赴正大初補尚書省令史時上廣言路公首論將相非其才且不當立宣宗徳陵脫河關失守必罹凶禍權殯隆徳宫便故事省史無言事例上優詔答焉事竟寢遂辭退遷裒信縣令邉邑也屯兵横虐民公按法不少貸衆擁其長挫辱之公正色折以理莫不裭服改儀封大建孔子廟三月政教興以母高年老請就養京師七年倒迴谷之役屢捷僉謂中興可冀然將臣駐兵關上莫肯席勝逐北當國者又力主投瓊孤注之説公憤然上封事引喻符秦淝水之戰甚剴切不報京師戒嚴復極言勢危􅕚矣外鎮曾無勤王者唯隴右守帥完顔呼沙呼可委仗宜遣入一作人論大計如訖無人臣請行又為權臣所柅閲數月沙呼提軍入援上悔無及桓一作恒山公武仙頓兵五垜山上欲趨之難其使近侍李大節薦公召拜朝列大夫翰林修撰時國門外烽警相望公感泣拜命比至仙已遁部曲散無㡬公撫集數千人推可帥者造符印予之自劾矯制罪以聞繼訪仙在留山公直踵焉或讒公奪若柄仙怒兵皆露刃外嚮顧一吏與公辯公大聲曰將軍過信䜛不加禮遇乃俾齪齪一小吏與天子使置對耶且將軍猶狐疑山谷間而左右無異心者以天子宿將故也茍不尊天子命安保麾下不有奸名犯分者乎將軍務鼔行毋慢王命也仙揆不能屈出見公公激進援卒不應聞乘輿播遷間道走行在仙已遣人誣奏公罪上以其謾不問天興三年再自歸德扈従幸蔡城陷北歸賢聞逹皇元庚戌嵗詔徴之尋卒賜諡靖肅無子従孫初後仕至南䑓御史中丞仁宗追贈公翰林承㫖初河南叅政諡忠肅其孫山東運司知事貫久避地吳淞世革後貧窶益甚而不苟禄仕間示予家乘既為題其九世從祖子平叅政致仕誥復合渾源劉郁河東髙鳴所製靖肅狀表序之詩曰維公發巍科戾契仁叔世疾風草彌勁錯節器乃利心折謝𤣥師志奪韓愈使及歸國如燬涓水莫止沸彼蒼鑒忠赤異代豐爵謚狀表埀百載讀之凛生氣羊頭醫一作翳桑乾貽厥漫刺字鱸江嵗復晏揺揺䨇蘭枻有懐置無言抽毫竦神思送楊生遂出贅有序生字士初為芝泉先生孫又従㳺予門兹出贅請别也贈以言曰秦俗行雲間弊滋甚矣近見巨室壻某老且有孫而家廟僅有妻祖禰神主因誶曰若承外宗則嵗時饗先將若何某哽泫不能對他可知焉生永嘉鼇步世儒族幸鑒此母蹈生拜受已徴詩詩曰秋清五綵輿僕夫臨庭除郎君美冠帶出贅南里閭借問何所將一笥先世書外翁朴茂質李延晚居士新婦玉雪如牛羊充後闌檿稌環前渠強近親復盛行矣慎向趨情眤移素存温飽忘逺圗願言于飛燕更效反哺烏同室異祖祠祭告誠交孚傭販化成俗毋煩邦大夫題武州守張公奉先遺槀後有序公諱思孝字奉先髙曾祖仕金世居潼因亂徙家雲中父林饒貲善殖閭一伍枉人貸錢粟輒予比償輒諭曰粟易㒺陳錢散罔盗予本意也奚以息為或婚喪弗舉助賻靡恡有相者曰若多隂騭當生子貴而受封公生年十三師事燕名士史彬然繼授尚書于姚匡弼遂博學長文辭由儒諭正遷前衛教授陞昌黎尹未赴分省圖嚕叅政辟為掾至正己亥冦闗偪城公率哨騎出翦六醜首還而圖嚕遁急追止曰兵民莫不奮志决鬬勝則功顯死亦忠也茍棄城走如責守何夜復潛徃請以族黨家僮前鋒自効卒弗聼既他將博囉代鎮朝廷咸推公謀辯改擢都事凡獄案覈讞平恕明允衆號曰秤都司云轉守武州皇贈林太府監丞尋以武重地常調官難設施奏署公行刑部貟外郎兼知州事於是材勇集爪牙樹法律嚴整強暴沮伏然忌將多弗恊戮而國步亦蹙矣洪武己酉召至時宰數奬勉留期年卒辭歸謂子亨曰此無負吾學耳夀六十四終妻夫人華亨婦劉罹兵不辱先公死之舅氏及繼母妹老無依養葬並如禮育婣舊子女孤貧者凡三人俾習善藝嫁娶焉迨所遺槀有訓亨曰意當極快䖏心有不平時少忍應無害欲言宜再思題二喬曰綺忩花落東風軟曾讀曹家女誡無懐慶道中曰一眼濁黄天塹濶半眉老翠太行昏辭歸述懐曰敢效子陵辭漢爵願同巢父樂堯年志行槩可見矣亨并乞予紀詠期慰公於無窮乃序而詩曰雲中漢名卿恒山南鬱紆桑源匯金龍池名栢林亘飛狐剛勁風氣闢文章肇崔浩虞世南彬彬張奉先發軔三轉儒􅅔省首食蘖花縣遑治蒲塔幢梢昴参公嘗登咏雷湫薦潢汙雷山嘗祈雨别業虎峪側棗柘聨𤓰壺霜寒快雪霽小隊短袴襦瘦馬従黄蒼逐兎充燕娱塵髙冦閼一作闗逼翦醜六血顱倡勇願率先遁將寢所謨朝命佐他幕蔚破楊誠俘一時秤都司綜覈無遺銖武州遂綰綬刑部仍公符堡列屬鼓鐃齋開衛戈殳焚黄拜酹酒五色日動曥不謂鄉困弊洊罹兵掠屠家蹈白刃䨇兒泣青燈孤雁賔羣入楚蜩蛻單達一作違吴有天戴重泉無地返故都槀遺累百首暗夜光璧珠烈烈悼亡詠汪汪運甓啚遲遲去國懐落落逆旅酤憂憤何當平忠義日月俱竊笑投閣老𤣥經與童烏史彬然者周王謀客也勸王即位虎林詔天下然後之京王遇鴆文宗搜邏謀者彬然聞張林重士尚義變姓名託焉至正初如京與宰相啟有曰運籌聖帷之内寢而不行草詔御榻之傍惜乎無用及見禮不少讓或勸之彬然曰我向侍先皇燕坐彼皆執酒炙者耳仕禄寜不得氣即不能下也既奏擢翰林應奉上曰此先帝遺宿宜奬大任宰相對以布衣湏循階秩彬然嘆曰吾衰矣豈為人應文字耶歸志浩然夀終髙唐鄉里其於經史天文術數罔不精該嘗語武州曰惜汝㓜不能書受吾學汝埀六十當見國改汝家子若女必有以忠烈顯者至是果騐云謁浙東宣慰副使致仕任公及其子台州判官墓有後序殘陽燠靑苔檜夾神道古眷惟任公塋穹碑㡬風雨龍江餘衣帶駝阜猶偃釜荒寒螘尊一作聚垤惨淡蛟徙戸舊封四名邦包絡吴水府不有疏導跡未已昏墊苦右軍社稷器世仰法書祖公也白公鄭渾才游戱追顧虎台州我姻嫵一作婭晚節託𤣥圃袝隴面北辰霜至亦宿莽愴怳来軒車頭顱愧章甫予避地靑龍時聞遺老言東盡艾圻浦皆葭荻茅篠居氓十餘家日弋水禽野雉為業公産是間輒異羣児習負笈力學年十八茅郡試既冠宋革命䄂一刺見游平章竒之辟宣慰掾繼省授靑龍邏官俘蟠龍寺作耗者盡釋脅従至元二十五年擢海道副千户以功轉正千户㑹征交趾改海船上千户是年浙西􅁋潦建言河沙匯乃吴淞咽喉不先此而他濬罔效大臣不納後果湮塞大徳七年重澇平章舍哩起公督七十餘里萬畚􅓩之役井然有條率入覲成宗勞賚有差進都水監丞至大元年除同知嘉興又明年遷中尚院判官適大都通恵河閘底鑚水汎湧流覆舟訛傳有怪物中書檄之不兼旬繕完㑹通梗澁復窒泉眼钁僵沙舟楫以達進都水少監河决汴梁溢入歸徳府治公結蘧篨鳯埽賓河口築堤五百餘里以扞横流編戸奠寜延祐三年出知崇明脩學闡教民胥興行至治二年鹽官海激岸圮一作崩鎮江練湖淤積並命公治海岸以固邦賦無阻㤗定改元詔賜銀幣與行省都本左丞部六郡夫疏導吳淞二道大盈鳥泥二河事竣加江隂尹以七袠聞上不聴特任都水庸田使司副使計創石閘六築塍圍八千浚溝􅆜千有竒太湖衆水東入于海四年鹽官海荐為害公一如制河决用再特安以中憲大夫浙東道宣慰使司副使致仕夀七十三卒公諱霆發字子明月山其號也所著水利書具存尤善畵其熈春天馬二啚仁宗詔藏秘監其先本徐邳三山人考珣贈髙郵知府妣夏妻髙贈樂安郡君子姓多致通顯曰賢明精竇太師針􅌊至正初學士揭徯斯引見上欲官之辭歸監丞陳旅送以序曰賢佐由廕累官台州判官階従五品遭亂遂逺引相知予久長児掖實娶台州女殁而自烏涇往祭就謁宣慰公墓宣慰孫璞嘗割田二頃贍青龍鎮學中年謝軍職迨世變一褐畝廬義不去圻上因示墓碑乃録其槩于詩後以歸之覽魯道原提學舊送巴延守仁會試序道原淳安人守仁善畵竹草𤣥收子雲養生殺叔夜言従奚行違腹誹或唾罵魯公山澤姿天子親策射一丞丁喪亂累辟力辭謝影息還栖􅆐臍退食柏麝兹文氣忠激玉杓迴紫華匪惟振懦頑實足裨教化千厓天機露萬水淮海㵼鋤菜少我匹畵竹無爾亞每過鄭同襟徑去阮獨駕春暝㑹飛舄兩兩淳安下帶蘿拂松花絮酒瀝蘭籍尚懐推兄行繆敬沈元舍沈元之杭士重義好客嘗辭文學官薦兒掖後執經燈前講王覇特立筆已矣竊嘉一作喜頓増價為移淇澳隂茅齊挹清暇鴈門秋意圗為大同郝雲表題雲表偕其弟驥久僑京口命費松年冩此以寓鄉里之思云代州嶺頭開北扉地形倍髙風阧威張遼爪牙將召在沙陀獨眼龍潛輝晉汾水落趙曰㣲楚萍實大吳菰肥雲中羽儀伯仲氏南來雨雪序不違北辰煌煌天旋機伯仲行逐春鴻歸春鴻歸氷蛆美拓拔舞進葡萄紫人生無如樂鄉里柳津孤雁圖題送烏涇黄生黻往潁上兄所浦水渾柳津一作條短短忍攀渾莫浣才郎衿佩靑於莎將隨孤鴻渡淮河酌之兕觥歌驪歌歌長酒深奈别何邊至愚竹雉圗歌有引至愚諱魯生宣城人材器超卓以南臺宣使奉臺命西諭時嘗為鐵厓楊提學冩此圖後至愚竟以不屈死朝廷追贈南臺管勾鐵崖既序其事復徴予為之歌曰南臺管勾有氣節手冩竹雉心石鐵鐵崖捫其三寸舌奉命西諭慎開說韓愈一使廷凑說竹不撓寜寸折雉寧死不茍活使衣無光日明滅悲風蕭騷一作梢吹駟驖齊城竟蹈酈生轍土花尚碧萇𢎞血我為作歌旌汝烈吴興楊烈婦辭有引楊節婦吴年二十五有殊色至正丙午秋八月大兵將偪城吴自揆汚辱生寜貞白死㩦二子竟投苕水逾月城破父媪見其母子並浮若不相離咸嗟異焉天台旭元明長老交吴之兄為誌其事予又因旭請詠于辭云丞相師昏長夜酒謂張士信司徒援絶憑城守七萬兵分諸將屯坐視霜風折蓉栁氷肌月貌忍泥滓錦䙀觿佩同歸水九原無愧先人面終身不作他鄉鬼君不見雕戈白馬氣如雲昨者烈丈夫今日降將軍於乎楊婦吴氏何可羣汝瓷觶引同張耘老薛古心倪自明三道叟賦有序鱓本宋髙皇夀成殿花瓶御書遺刻尚在既破而工人裁為觶故人某購得之數出以宴予後某以憤卒觶今見於他氏感歎不已形諸短引汝州瓷冶灰乆寒夀成宸翰猶龍鸞黄金為相號曰觶酒面絪緼舊花氣我嘗酹月江動揺故人掀髯把風袂君不見周鼎遷秦􅇲歇露盤傾唾壺缺嗚呼髯兮死憤嫉一鄉之翁得珍物親朋交歡勸酬密席端淚落哀慵筆贈朱生弦有序弦字孟清上海人性孝誼前邑長九柱閭云公見而器焉求于其父以為義子及閭公野處寠甚而弦克敬養歿買山葬如禮復營怡愉堂母事公妻夫人三十年猶一日民有盡棄􅃕償逋主者妻拏皇皇無栖弦贖還里婦相煽奔悉法曉教諭得止至若覊士趙謨廬墓教授駝􅀢被辟發顛疾走山澤中遇弦遂脱難知予南園隘購地廣之予固却弗之聴併用序而贈以詩噫豈溢美哉斯善善也詩曰雲東富家多北堂移孝義母無此郎竹萌戴土春鯉赤橘子滿庭寒雀黄雀為母灸魚為鮓朝進􅌉盂暮杯斝慷慨氣激燕趙間淫䵷俗悛桑濮下最閒園丁菜飽充即復廣園半百弓報之一字一絹直疇為賡歌愛日中瞿仲謙一作諒先世雲巖翁水雲自在堂巻趙松雪書馮海粟序在烏涇張氏舊月樓題黄茅斥連鉄菱沙靑牯嵗服官塩車變遷刼灰凡㡬見自在水雲餘一家髙堂巍若鏡光曉霱采倒令一作含峰影裊涵濡爽氣散金鯽厯亂空明兼白鳥軟莎幕石堪枕潄傴栁為梁謝工巧汪洋海度性天中欵乃湖歌人境表先朝詞翰兩勍敵三埋兵塵埋不得吾宗舊氊趙全璧世所共矜神所惜嗚呼書者把筆詩者口自吟仁義之澤詩書承最閒園丁病始興銅瓦日射烟紫凝蟻聪快聆鈞廣奏蛇綰愧續龍鸞騰春風酒熟當過汝月色灘聲㵼前爼破㡌縦横綉落花潭心鮫殷氷絲杼相􅂸一月四十五日醉莫問誰賔復誰主朱嘉努挽辭淮陰三月花開枳使君死作殊方鬼眼看骨肉不敢收奉仇稱奴聴頥指經遼涉海三嵗久以蝗為粻麥為酒㸑骸齩骨何足論親見徐山墮天狗今年始得間道歸城郭良是人民非主家日給太倉粟殘生猶着使君衣攬衣拭淚使君室凉月蕭蕭風瑟瑟回頭還語玉雪孤勿辭貧賤善保軀瞻屋未辨雌雄烏太真虢國二圖為郡牧張理熈伯雍題有唐社稷氷山重三白楊花同一夣就中玉環春思酣錦褓児將犀果弄児驕蹴踏飛龍鞚直把東君遥斷送馬嵬羅襪汚香塵杜鵑淚血啼秦鳳君不見陽臺神女楚襄王當年元有詞臣諷𤣥宗末年天降孽楊家有女俱朝列夫人身被六銖衣自一作日惹香烟下瑶闕侍児春閒雉尾扇紅脂半露桃花靣似言草草􅀞蛾眉猶及華清夜深宴君不見娥英泪染湘江竹􅀞昉見遺良惡俗唐子華知州山水唐侯至正辛卯間徘徊列宿郎官班是時元綱方解紐花縣尚爾琴書閒雲嵐黄旗紫葢氣木石牛鬼蛇神顔岧岧樓閣密寳綱蓊蓊蘿蔦深柴關扶藜老叟臨洄灣琴童殊覺徒步艱何人驢背兀吟影興寄亦厭窮躋攀君不見瀑流天半落佩環欵乃歌接漁舟蠻此中佳處未少我鑿徑擬背盧家山嗚呼􅀞史五馬何時還五馬􅀞史何時還重過望亭新城二堡丙申冬張氏築憶昔扁舟自西下二堡相望無一􅃕吴藩判樞翻覆兒窄衫小弓矜騎射歸人重經但流水豆隴彎彎低復起長途遺庶數十家三四酒旗風靡靡君不見邠公遷岐山衛人城楚丘外患内偹古所侔成同敗異嗟世偷題徐氏􅁱學卷有序今華亭縣學故徐徳卿氏義塾也㑹學燬于兵官遂即塾為學既徳卿子彦裕上陳願廣葺之期年告成並誌諸石而士之才者咸為歌頌予詩曰曩從辟地識徐卿義塾初開儼似黌負郭荐增田十頃延師躬淑里諸生魯隳孔壁聞絲竹吳破蘇臺走鹿麖令尹發揮新學記賢郎繼述舊家聲太倉給米來庖􅃕射圃揚旗拂棟甍登降有儀推揖讓仰瞻無極嘆髙明庭槐夾夏羣歊静水荇涵春半壁横把送自天麟五色褭蹄已鑄兩韓檠謹節堂有序謹節堂者華亭徐去奢居士為奉母夫人宋氏而作也初去奢在壯年負氣志部舟師𨽻東藩以功超遷亞中大夫江西福建僉樞既夫人齒邁即棄官歸里當是時妄躁子弟躐冨梯貴恐後孰肯一審慮耶迨事至患及而蹈趙括之轍者何限若漢孝子王陽去奢其庶㡬焉去奢名彦裕字仲寛世為素封之家又以庶民之孝痛自厲尤可稱也居士前為都䕶侯戈船犀甲戌東甌風連蜑海青蘋夜日薄慈闈赤葉秋三組授來丞相幕六珈光動老人丘忽興九折王陽歎絶逺長平趙括憂美笋嘉魚重鼎列諼花竒石半簾鈎導輿復見潘安賦墊角曽如郭㤗留堂上夀康猶事績郡中歌頌迭鳴球尚期丘嫂躬鷄黍客拜龍鸞禮並優寄石經厯兼柬林知府孟善時嵗庚戌謝病松江辱載臨别來兩地異㣲音朝盤苜蓿齊居静秋水芙蓉幙府深乘日文鰩飛有翼巢雲黄鵠去無心郡侯多暇風生塵幸説山人感至今松江謝病後寄林知府時嵗庚戌係洪武三年十載心存祖隴田六旬病守藥爐烟南歸始遂山人願上薦難忘府尹賢紫馬晝眠髙栁日白鷗秋入大江天戴符老去非安分浪受襄陽百萬錢松江謝病還顧孔文觸暑慰問口號以贈養疴涇上四逾年五畆園林十畝田白首素心無漢閣炎風朱日似堯天已從蔣詡三開徑不望劉惔再覓舩顧彧能詩頗癡絶汗流却話雪寒錢張光弼判樞逺過最閒園峯開南北再塵清耆舊惟存張步兵一日數程風楫順十年雙鬂雪絲輕詩題薜荔埀􅆐璧夢醉葡萄㰱馬營狡兎霜前落吾彀贈行聊激氣峥嶸寄題鄉縣丞晉陽李景儀雪岩精􅃕雪岩嶫峨汾水湄借問龍去㡬何時荒城莫辨産蛙竈舊隠適隣鳴犢祠春青木客嘯柯嶺夜黑昴精窺研池要知仕學本一致松􅆹退食静哦詩過劉縜元綱碩果軒效揚銕厓體澤縮壤裸山若孩爾家碩果熟徑開金刀下動鯉魚尾紅椒暗結梅花胎客衣風穿寒太銳酒槽雨鳴春小來匏𤓰老繫従苦葉上林全借屬英材張判府王上海數存問併答張巡檢枉顧酒在陶尊藥在壺田園傍舍未全蕪三時雨候占龍母草名十日春容付鼠姑牡丹别名生怪裨諶謀有獲老憐寗武使偏愚貴游下問終身事有愧鄒書大丈夫松守遣郡博士辟至府既病謝張上海招宴不赴雲林一辱徴書下客􅃕三煩齋馬過千里快風當六月中年斜日奈長疴饌違松上銀鱸膾酒逺洲前白鷺波野性自今甘放逐水禽山鹿不吾多觀静安鐘銘還訪王静習兼懐賴漁庄林澹菴湧泉澹井獨經㳺鄭氏橋西舍最幽避地無因同管華居鄰何道得羊裘漫推文字登鍾舞共慶章逢謝石頭藕大玉延誰貨得雪泥行韭屈金鈎㑹别馬潁漁别業歸來千里餘秦山傾葢喜無如青衫不汚新豐酒白髪終乘下澤車地入東南空驛騎雪消齊魯足淮魚彼行此住情俱得尚約鷄肥落木初聶松江遣和上海具舟餼過烏涇别業召見既病還荒鷄亂叫過隣墻茂宰驚來坐我床箭駛落潮千岸失皷懸斜日寸田方行􅄤却掃覊孤地奏目除名老病鄉試憶大儒誰第一仲舒裁是漢賢良庚申正月四日試筆是曉庭雪盈尺洪武十三年雪庭罷掃若為懐體力差康道氣佳鬼有文窮延上坐妻餘法喜共晨齋江鶯春淺猶巢谷野雀寒深自入淮挑菜燒燈連社酒本來時命不相乖寄錢㤗窩陳雲軒二遺叟天轉雲東上六符有懐無寐枕同孤紫芝隠曲歌商皓烈火殘經補漢儒私地春先梅老發盛隂雷疾草狂蘇祖生遲旦踈殊甚不計中流少一壺伏龍山然唯菴建塔松隠藏所書華嚴經因以先妣李氏瑪瑙素珠附焉并寄是詩然長干岩髙弟也風卷重茅葺未能報先崇塔壯神僧一鼇峰湧大圎鏡萬象天開一作周無盡燈負石鬼來雲似練一作漆散花仙至月如氷吾親手澤同悠久喜附龍函最上乘寄崇明秦文仲𣺌𣺌三洲東一隅葺茅先隴混畊夫道存醴酒曾賓楚城破干將不去吳白苧袍成雛養鶴水晶𤓰熟膾行鱸相望暮景湏陶冩可信歌㳺老伴無懐昆山顧瑛玉山嘗棄官與家隠同里僧舎一作寺吴門長嘯下青龍道過能詩秃髠翁九里水雲孤櫂泊半樓霜月兩尊同黄金浮世官俱棄白石眠雲草自豐俛仰舊㳺惟病在海濵倚釣㡬秋風題張後山西堂君子堂開枕九山翠屏玉案白雲間柳行接隴鶯聲逈棕影涵波鶴思閒伯仲􅆳歌皆耄耋里閭懐徳半痌癏重過話及張公藝亦欲凌虗駕上攀喜顔守仁教授留園舘信宿前朝進士過林扄信宿論心為竦聴雲氣夜蟠雄劍紫天光寒入舊氊青不同嘉樹生南國猶夣鯤魚化北溟老我歸田有龍具僅堪供卧讀牛經辛酉立春日溪園試筆寄錢艾衲張雲莊二叟雨雪相仍嵗又徂短衣楚製老東吴寳山偏聚刑餘鬼空谷先逃行獨儒海霽卿雲升日角岸寒髠枿長氷鬚為書春帖甞春酒早覺蘭風拂夀觚溪園秋燕又春鴻漸老形骸土梗同遑恤梟䧺奔在野敢聞騋牝集生風梅花占閣孤髙雪荻笋穿坻短小紅抱膝㣲吟忽成調一䨇瓢影順流東寄張戸部以忠就問死節丁敬可平章子伯堅消息丁嘗為主事張其吏也伯堅又嘗従予游於金陵侍郎南下喜尋盟有子能官養復榮淞泖雪鱸來曉案伊梁金雁歇寒筝職方圖版勞賢久神武冠纓入􅀞清聞道舊趨丁相幕巨源於紹不無情題朱松石左轄歸來堂舊時山色抱新堂西望遥伸燕賀章金甲樓船争破浪角巾藜杖獨還鄉寉孫影跨松間石鶯友聲過柳外墻盡屏陶朱老一作舊心事黒甜清洒一作枕到羲皇同誼書記逰查山留題净無餘一作染西南林􅊤地湧叢林小翠屏海吞孤嶂半螺青岩扉老衲忘人我石甃神丹䕶甲丁吴甸土寒黄耳魄春山草厭白蛇腥放歌適在風埃表幢節浮空若下聴寄濋蘭江長老時其徒勝文海主東禪乃蝦子道塲菰採三江同謝徴詩狂禪喝罷憑陵乾坤影合中條壙日月輝交丈室燈遺世久忘形似木扣雲曾得話如藤願言流水師今是萬翼神蝦再上升趙破螺徴士過園館言近况飲之以酒壯之以詩牧羝山澤避徴書還守駝墩小墓廬乘角履穿猶說劍一錢囊剩不思魚潢汙毛薦寒逾肅織誦聲連夜不虗况復永嘉天𣲖在左懸朱轂相王車同錢思復提學曹新民教授過松庠儒職沈蒓軒沈郎儉謹居松郭新築蒓軒小似蝸天厚水雲千畝利世輕鐘鼎五侯家執鞭一作邊况是清􅁱職登饌真便老鈍牙十載淡交方爾過萱長如帶杏初花辛酉雜題係洪武十四年斗酒豚肩鱉紫裙過家無日淚横紛兵餘姊妹皆黄土天晚江山自碧雲陸喜在吴嘉隠徳隨何遭漢擅名文先人遺體猶清健會倚隂陰里社枌遺經姑置楚包茅新筆工書蠱上爻利盡島溟珠象郡道湮鄒魯鳳麟郊㸔雲杖名暮影齊巾角滴露酒名春聲落枕凹自判優游不堪事鷾鴯添室翠分巢是嵗征雲南元梁王自縊槿籬莎徑入林堂春作無牽午漏長音歇野鶯新緑淺影浮潭鯽小紅香誰家數應中和節十畝寒輕二月霜忍貰緼袍償酒債時人將謂獨醒狂寄完節清卿叅政六月青暘一葉秋大叅躬自出遮留軍中取印舊赤手林下墊巾新白頭闔郡山園朝爽競㡬人漏盡夜行休宴游莫聴堂堂曲蟹紫橙香風露稠一作秋書西厦時洪武丙寅沿海築城係十九年事時多憤懣不平牀頭䲭卧久空金壁上蝸行尚有琴孺子成名狂阮籍覇才無主老陳琳虹霓氣冠登萊市蝙蝠群飛顧陸林環海烟沙翻萬里連村霜月抱孤衾秋詞香散天街静玉珂露臺風殿夜如何星従河漢淡中落秋在梧桐踈䖏多鸞影不曾離寳鑑蛛絲先已綴金梭君王蠒館詢遺事却擬鑾車共載過沙館簡陳氏五昆季兼示門生履道軰及似沙彦約沈鄉老鄉人陳漢翁時至正己丑時方太平無事家家門栁暗埀橋曲曲沙村逺應潮貧女採藍輸􅀞屋閒僧搥鼓慶青苖大江春信豚魚起絶島天荒牡雉驕地主幸敦仁厚俗欲従婣睦論虞姚聞䑓中丞陳子山死節兼懐陳東流身繫存亡社稷秋世皇神主義同流火雲鑠海黄金冶朔野埀星赤玉旒同産忍聞龍死蜀斯文真歎鳳衰周尚思弭櫂君山渡不及相陪宴太丘東流嘗請予陪宴公不果赴書無題詩後凡三首偶感燕太子丹事火流南斗紫垣虚芳草王孫心一作思愴如淮潦浸天魚有帛塞庭連雪雁無書不同趙朔藏文褓終異秦嬰袒素車漆女中心漫于邑杞民西望獨踟蹰塞空霜木抱猿啼草暗江南罷射麛秦地舊歸燕質子嬴封曽畀宋孤兒愁邊返照窺檣榻夣裡驚塵喪韘觿莫䜟白翎終曲語蛟龍雲雨發無時㡬年薪膽泣孤嬰一夕南風馬角生似見流星離斗分謬傳靈武直咸亰九苞雛鳯冲霄翼三匝慈烏落月情縦少當時趙雲將卧龍終始漢臣名懐馬文郁御史靳惟正同知兼簡陸公敘薛孟式山茶雪蕊渥丹唇轉老東風倚杖身彗尾封狐營窟夜朝行髙雁海天春磬襄鼗武知何往瘦島寒郊不去貧竊喜孤輝上弦月一杯聊勸若為親孤一作弧寄旺扎勒清卿參政其壻某近卒大叅久别况如何蕚緑花開雁又過賣劍買牛時可得據鞍上馬老無多魚隨春信登先豆鷙匿寒形在舊羅孰料周郎美甥館一床鴛繡拆孀娥懐故園時寓隠烏涇十有七年􅅔花空復故園情梧樹猶懐里􅃕名山抱墓田巡獸白天流江涌一作浦去鷗清缾罍滿載憐洪嶠弩矢前驅隘馬卿他日茍歸何藉口一門無恙讀書聲題涉難録有序己酉四月洪武二年松江里長以今元年戊申沒官秋粮坐流移一作移易罪者百九十二户徙潁上予友生劉冠時在徙中凡遇道途之艱山川之險與夫先代遺跡輒形歌詠得若干首題曰涉難録及事白釋還也謁示予寓隠其留關山堠云闗山髙兮磅礴上靡極岩千􅊤萬天咫尺朝嵐夕霏􅀈轕陰絶磴聲耳石攅㦸嶺半塔邊忠武巴延丞相泉不盈不縮通海脉仰頭試望椔棘中羊坡鳥道﨑且窄傍有餓饉屍前有猛虎跡上嶺如上青天難下嶺如下萬丈澤昔聞劍閣險若此我毋胡為此行役母兮母兮回顧兒欲語復􅍋愁䨇眉兒兮兒兮母手㩦欲上却下展轉悲撫心飲恨言向誰鷄樹萬一東風吹才行㮣可見矣為題八句百室餘千口遷淮共惨悽闗山中道惡母子萬行啼月黑相隣鹿天青忽聴鵜裒成涉難録田里慶安栖寄信道原長老舊隠過缾錫相違已十年慚非習四海為友釋彌天鷲嶺岩花白鵞池水石圎何當地密邇瀟洒論詩禪遊查山登僧雲石閣扁曰虚翠留詩閣中仙跡遺丹穴僧坊倚石林中宵龍甲雨三日虎歸一作蹄涔青薜崖容立黄茅海色侵為尋霞上句鉄杖落清音芮庠卿邀費孟霦同知陪酌背郭堂既同晚步口號罷酒出前楹霜寒着面輕林腰烟帛束天角火鋒生卧木橋通野踈罾水隔城寛袍曵卭竹俱老愧宵征挽范徳原有後序鶚薦書長却臯比坐始専春風來學地寒雨送喪天范式車何往黔康被不偏樓居敞晴雪憶說賀翁賢徳原諱致大崇徳人修行博學主無錫鉅家㑹淮張入吴辟儒教授不赴既陪臣於張者禮置焉徳原曰道固在耳至則衿誦雲翕雨應不幸以疾卒賀丞相惟一嘗延慶元俞一作余紹芳訓其子子不受教朴誤著其靣㣲血子奔愬太夫人太夫人怒適賀公退省夫人曰而祖留守建馬上功無膚髪挫撓今吾孫奚過師撻之甚耶賀侍久出命蒸羔具醴宴紹芳至執醆再偹金繡䨇叚徐謂曰豚犬愚下姑答鞭策勞耳紹芳繼有薦除臨海翁仁徳元由第進士録事温州妻早殁二子知承家有汴宋趙宗室必欲以女配仁力辭媒因告方氏師昏之濫乃佯諾䖏之别室半載方氏定仍歸之嗚呼徳原已矣當時客樓霽雪西望九龍山清寒洒靣而席上所言猶在耳也予併録詩後俾叔世曉賢者禮義所自出二公其賢矣乎庚申七月一日一作首時謝病松江洪武十三年金火蒼龍角門庭野雀羅衰才歌鹿逺清枕夢魚多隣有通財好官曾勸駕過尚平償債畢晞髪石林阿過翟雲莊觀唐功臣杜正倫下凡五十三人圗像風氣開龍馬天機貌鳳麟衣冠中古制經緯一朝臣河水移源久雲莊盥露新相觀背揺落益自重遺身寄題胡安州鼎文萬山草堂孤舟西蜀角一室萬山分地雜刀畊户天埀井絡文獸蹄交雨雪龍氣變朝曛倅駕何為政蛾眉秀不羣哭楊生士中門友南遷殁初聞實慟予有天知孝友無日見樞趨壘䕶懐春燕巢安怨夜烏埋光在别業吟思滿烟蕪過沈橧居炙艾風濕相仍衰謝牽小樓肱曲艾吹烟盤蔬喜進先生飯瓮酒羞為吏部眠泥巷蟈歡梅子雨雲衢虹飲橘隂泉華陀弗視曺瞞疾何愧龎公采藥仙題泖墖時主僧賢如愚不在夏生鼒従逰何年窣堵􅋍竒觀勢若蛟龍上紏盤秦縣赭衣淪鬼國泖係先秦囚倦縣梵家寳蔵壓驚湍野瞻雨黑重燈夜天卧空青一鏡寒欲買扁舟占漁户老縁無力候衡官謁梁黄門侍郎顧公諱野王祠世仰希馮一偉才亭林猶巋讀書䑓呼鷹日落荆州歎遊鹿春深茂苑哀輿地河山曽版入招提風氣再天開鐘聲澹月香雲裏旌騎疑従野色來贈嘉定楊一溪道士有序丁未三月晦松之上海大姓錢以憤變㩀松城其黨入嘉定執新守張率在龍江道中道士楊仁實素負氣誼蓐食草屨毅然奔救得止既錢敗邑以率在民不知兵而士儒咸徳楊多形諸傳賛予與楊又素交好為之詩云先是徐達等由湖州錢塘取松江太倉崑山獨吴城未下疁城外史七尺身力全新守出兵塵救燕曾聞齊義士叛周自是殷頑民三江月黯血波夜千室烟回隂谷春試問𤣥都看花客㡬多芳草不歸人題宋侍郎衛敷敏諫議藁後有序藁中乞褒顯死節劄二韓䧺巡檢涇州金人南侵守將請降䧺乃力戰敗擒不屈死霍安國守懐州列城皆破懐賴安國以全敵衆再至城小不能禦遂自刎悉被害林良器戰死河東陳惇河北遇殺李振陷沒於燕王雲聶昌陳過庭出使或殺或留汴陷左右班直蔣宣李福欲率禁旅衛駕突圍以遁閣門祗候吴格謀與衛士斬闗出刼兩宫於敵營並機泄殺之他若二聖可還之策東南戰守之䟽辭義忠激猶嚴霜皎日至如卓節偉蹟見諸汪藻誌噫後昆尚思光大所先乎哉詩云奉使旃除建節旄歸來獻納殿螭㘭東南戰守材誰偹河岳英靈夢或交城下盟渝龍馭失日西戈􅃦虎皮包斯文三復精忠在謖謖松風過鳳匏寄内兄李彦梁姊夫愈仲延二長者小山大石網船春江鱭河魨柳貫新去亂漫嬴千首作思歸惟有兩人親梨花酒洒清明淚麟趾金銷第㡬塵割膬啖孫經訓子白頭相夢到朱陳春雪園偶題菜簇春盤春又還椰榆何物老相攀氷生前筯瓊林案雲覆長衾石壁山魴信徒勞餘尾赤豹能真隠備圎斑雪消十二街頭徧靜得袁安髙卧閒攣跛中雜興二首後承林凖叔平枉問經時蘿磴絶攀躋注目傷懐夕照西古道千金求駿骨世情壺酒賽豚蹄黄沙白水光相亂青壁丹厓秀宛齊果熟望中風自落固應郷㓜迓扶藜風物踈清塵事稠才難殊嘆古時流草𤣥不效龍蛇日撾鼓空催鼠雀秋病有過家期已晚官無搶地拜應休星軺度驛嵐州使謂林喜説儒衣仗節逰甲子冬偶書洪武十七年雲東亂定少新知江左書來有跛兒才盡罷為文自祭醒狂寜要鍤相隨天家靑女催衣急漏水金人上箭遲却喜故妻原上樹十年覊羽托深枝東霞東霞有郁頃雨于榖旱魃方酷曾不及霂吁嗟乎郁兮匪霞伊旭東霞有雯頃雨于枌曾不及雰化為火雲吁嗟乎雯兮匪霞伊昕維昕維霞孰得指兮維霜維氷我躬履兮丘樊虛凉豈無枸杞采不盈襜聊永暮齒聊永暮齒亦曰隠死春雪封條春雪封條載霰載雹羣隂滛威陽邈應角予適有酒言崇于巵匪庸觧寒庸以觧悲喪不知其㡬周兮曰心曰柳亂不克忖其滅兮曰狼曰狗於昔屈虞成騷成書一時行獨曠世道俱大江㐬㐬源始濫觴泰山奕奕霤至穿石彼桃彼李天穠其華松栢貞固受命孔遐雪聿除矣青園㣲和君子焉同式燕以歌題崑山顧氏畊讀所彼􅇤兮甌寠畊弗力兮薄吾收於皇兮墳典不讀無學兮沒齒有愐蟬有緌兮蟹匡豹霧隠兮蔚章畊為春一作養兮學為已猶干禄者皇皇婁之濫濫作瀊兮崐瓉瓉卑茅榱兮深蓬闗身忍潔兮沮溺道邈師兮稷顔脉望仙兮芸黄其槁枯雁鳴兮白雨增潦顧天窮兮並臻矢素志兮終抱尊有酒兮思與傾倒風條藂鳴風條藂鳴遵野㣲行十室其五父夫徂征問此何時維春發生風鳴且止雨淖泥泥父夫退一作遐鄙妻子従徙維時長育人莫豈弟露始㓖㓖霜既凓凓幸焉冬暄虵虺迭出遺黎㡬何憂與嵗畢月之盈矣虧餘一郭日之蝕矣陽氣回薄於仁后皇曷威曷虐象犀無尤齒角其尤鳳音悠悠麟趾脩脩聖不復起嗟誰心東周即事五首寄桃浦諸故知後附䟦素癡得名侯君房自享大案焦征羗莫嫌衛旌不舉筯口簡授使多嚴光世間堪鄙是何物糞上之蝇褲中虱後園石壁倚秋林醉有髫孫旁執筆山床折足琴暗徽種菊不種西山􅅔願従漢士碑有道夣逺秦児歌無衣閒園不入烟火境巨浸盡漂桃土梗老伴惟餘卧隴雲抱晦含光體常静鬼一作鬼有章擲還太尉閽有版不受丞相垣南朝天子許謝病竊長木石儀鸞園平生氣節詩千首才非元亞元遺山甘劉後劉静修素聞魯廟鑄金人晚學程門坐泥偶䨇平原𠂻新原名庶全歸他日壙銘辭大手貴不難得富可嗟二事亦到園丁家雷王藥吏錦襠袴野藤絡樹金銀花園丁横節坐梧下竊愧長年釋畊者身膏草野身土苴語孫耰耡莫輕把東坡楚頌存虚名止烏作亭烏涇新作殊有情枇杷换葉何青靑雪中開花來逺馨多仁多核知爾少栢樹根添鄭𤣥草彗海禪師識侯景華容女兒哭劉表如何太白謫仙人竟坐夜郎唐絶徼裁詩寄與多才郎塵間寵辱要相忘㶚橋吟興驢背上月盎氷壺虀味長是詩五首先君子即事冩懐向嘗寄桃浦諸舊友者也先君辱諸友見知之深每一往游追従欵迎惟恐後及以殁告孫𢎞叔逺歸厚謹先王庭與立具禮來奠而李韶九成侯性自誠洎雪城㠯聞二上人亦踵至焉明年冬掖走謁以謝叔逺懇懇勞問因語詩巻刋未完畢叔逺慨然倡捐重貲㠯聞并率諸友助之亟召鐫工俾終卷帙附識詩後不敢冺其實也不肖孤掖謹識文翬洲倡詠有序予自至正丙午僑寓最閒園舘時黄浦中洲坐僅尋丈許今自延廣三十餘畝嵗賦官入諺曰浦夾輔洲如崗如丘實安衮衮流洪武癸亥始携里叟門生共登臨焉適羣雉翬映鷗左右衆請名是洲因名文翬而倡詩曰盧涇初避地黄浦漸生洲里諺歸材傑天工障濁流望疑堅壁守醉覺小山浮仙躡金鼇背神迴白馬頭根盤連厚軸形勢壯遐陬漁倚盲風釣商蔵疾雨舟篠鞭伸玉節荻筍屈紅鈎烟火鮫人市雲霞蜃壻樓沙津魚鼓急水柵蟹燈幽艮震方先曙呉淞木始秋老懐龎徳隴隠覔謝琨丘僮御争先導吾儕試一逰􅆳歌清氣合樂志古人侔可信文翬雉能盟懶性鷗省先隴還舟望九龍山蛟山遊鯉山懐江城親舊兼寄示内姪李用外甥俞堇二首兵甲氣全消心旌北向揺鯉昻雲際額蛟斷草間腰習隐由中嵗辭徴渉兩朝莫期歸衣錦曾鄙去題橋秀挹九龍山還鄉未是還水風秋意爽霞日曙光殷隴畝諸甥托詩名内姪攀城中盛親故天與㡬多閒題朱廷佐聴竹軒閒軒能聴竹古意木蕭蕭先代多充耳伶倫得奏韶寒兼雲嶠雪秋殷海門潮過客詩凡㡬天光酒靣揺哭夏生㓜文秀色三花粲才華五鳯能星娥銀漢㑹天帝玉樓徴衣静庭闈綵窗虚雨雪燈重過槁容客猶覺映壺氷乙丑秋書腰痛非干米眵昏漸廢書静知天運密老與堠程踈緑稚黄甘外紅鮮白小初兒歸共貧樂容易嵗云除丙寅清明日書二首清明二月晦重潔祭餘觴旁􅃕火新活兩孫衣漸長膝前簾幕雨夢裡隴園霜何意辛夷發花叢紫筆房破屋遶王田人生狎狗鞭知章歸入道元亮醉逃禪水蔓縈風亂山花影日圎黄龍浦東直堪隠戴家船園舘雜書四首竹樹藏山石作門魚矼水帶洗花痕鶯聲又在鷄聲外老不勝官只住村石拂蒼雲坐若枯強名何物静相扵薫風似識閒邊事椒葉芹花水一盂青春白日去無還天假溪園小有山林下軟莎遮坐石何人來對片時閒殊鄉春色不曾一作睡邊濃才力新兼病思慵一枕清風聞格磔半缾香雪浸蓯蓉香雪酒名輓髙僧炬照菴有後序石壁雲無礙曇花水絶清莫為房琯將四萬可憐生予自龍江拏舟逰湖山時照主香林嘗延入懴室一作堂躬喚寉舞作香茗供陪觀蘇文忠題名且示學士黄文獻文一什留繼其宿山故事不果瀕别贈照二首云學士愛山栖一年韓衣蘇帶迥同縁書䑓未築老僧在金粟滿林香大千路入飛來急雨晴水懸風磴助秋聲人家大樹都黄落白足山人自在行遂還松曾不踰月隣敵大至照碧瞳長眉烟霞標表義然獨不去兵有樂為役㸑汲者香林既宴然照乃往脩北寳塔善行益彰壬子嵗赴今髙僧選居無何沭而趺坐卒文獻字溍卿與照為方外交及黄殁擬築黄公讀書䑓傳不壊云梧溪集巻六
