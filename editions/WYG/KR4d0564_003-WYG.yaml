body:
  text: 梧溪集巻三元王逢撰菜亭四詠有引菜亭者先君庫使之所作也賜進士及第内御史圗烈圖敬夫書扁江隂儒學教授閬中邢泰亨翁為記先君年六十輒不仕日課童治圃為徑必直蓺蔬必方嘗指謂逢曰小子識之此類吾性也先君没之二年逢忝部使者薦又明年江南務殷由是無仕進意而以先志是守并賦四詩揭亭間或尋聲于琴或倚歌于缶退然自樂殆相遺于人世也其黄獨曰猗歟黄獨質土徳玉惟徳惟質是以有葉有實凱風至矣青青始蔓雨雪既雱爛其几案富貴無常人或汝忘予敢食言長鑱在傍長鑱在傍貧賤之光匪貧賤之光隠淪之慶其蕨曰彼美者蕨歧蹄而茁齊魯之人謂菜之鼈雷風發春競擷于山久獨不食神往來于山間慨昔君子夷齊園綺夀考以終猶愈饑死饑弗忍師考終是期衣薜帶蘿聊從而嬉兮其黄精曰葉之菁菁如竹葉之青厥根孔美食之可以長生朝陽之燠時雨之沃君子有之以備㫖蓄呉之野土力貧培隠徳樂彌臻孰謂芝也不如薇也其蓴曰蓴之潔貞蕰藻其朋蓴之芳烈蘋蘩其列曰絲曰闕可羮可菹君子素貧念不到鱸五侯之鯖大官之羊鼎折餗覆溪毛無傷登我籩矣薦我先矣載被我弦永弗諼矣黄河一首贈胡璉師貢黄河濁流其源自天四方交亂莫知誰愆靡亂弗寧靡濁弗清小人之亨君子之貞君子之貞惟道是友小人之亨乃罪之首雖曰無家有琴有書朝誦暮絃何樂之如鸝黄其羽集于嘉林願言似之永懷徳音小山招隠辭有引小山招隠者雲間孫稷長慶别業之名義則左太冲反招隠也長慶言行謹飭嘗為文學官兵興遂不復仕讀書賣藥于横雲山之支隴有壁峭立泉涓然出壁下有石空中擊之有聲日歌樂于是葢期與明哲士終老焉辭曰横雲分兮一股壁鐵立兮石奏鼓桂樛枝兮荃有芳吟𤣥狖兮白鶴舞君胡為兮塵土弦我琴兮歌我招泉冽寒兮天泬寥月髙露瀼兮車音逺迢心悵惘兮不成消揺君之盟兮孔昭言採兮可菹言釣兮維鱸渭濱商顔兮其道匪殊治亂使然兮出處異趨載絃載歌兮兹山之砠君之來兮毋遲其驅故内御史尼格氏圗公挽詞有序公尼格氏名圗烈圖字敬夫燕山人國初大父長信州永豐縣因家焉父布哩葉圗薩從文皇帝潛邸官至靖江路總管素無子至是媵産公有異年甫冠及第上親覽策曰必世臣佳子弟也何以知吾家事若是其詳耶授集賢脩撰中丞馬公伯庸妻以妹累遷南臺御史按治湖廣江浙咸有聲威順王素不法漁奪山澤之利尤甚民苦之出數百里告漁奪狀公一無所貸還之民論奏王罪乃降爵土王憂悸不知所為會赦免福建亷訪司凡御史至堂幄地衣盛設金繡公命撤去及視事莫不震懾曰慎毋犯狀元御史比還内御史某挾私劾某官公以失糾察去職尋三臺辨明除湖廣省副理問不赴遷生母潘氏縣君塟北上拜内御史以疽卒壽三十七公短小凝重眉目秀朗官居巷處言行一致愛豫章山水留寓頗久嵗一至豐為女兄壽女兄誓不嫁悉以已租贍之異母弟早孤長以廕讓族弟特格爾依公學登乙酉進士第朔州同知子某篤公産南州胞有紫白異襁襁未勝觿生母痛先逝操危慮也深十九面廷試詞㫖極懇切奏讀驚侍衞文皇至親覽天眷邁恩例瓊林宴狀元銀屏會佳婿花交歸香署草偃迂絲轡要職尋屢遷中朝適無事南臺按三省文物紀綱地御史象執法獨見公不愧先時威順王畋漁盡民利昔縱魚鳥樂復奪士馬氣閩部俯交廣蠙犀䕃榕荔從容撤堂幄蜑海肅秋霽譽重謗由興才大衆所忌繙然遂孝思遷葬返北冀女兄老閨閣誓不通采幣嵗展骨肉歡均財及諸季最幼陟龍闕家學益名世顧予駑鈍姿激越千里志還鄉理書劍承拜内驄使將依東道光竟灑西州淚脩文得顔回前席失賈誼山房懸蘿月公嘗為予書蘿月山房扁神采形夢寐盛蹟在董狐兹焉述交義故東流尹陳公挽詞有序公諱文杰字漢卿號黙齋毘陵人也父業醫母張氏憐其好學每質簪珥奉師㑹宜興鉅室蔣竹徑病公侍父往就留其塾卒業久之客有寓公過蔣一見納為友寓公赴浙憲使遂薦授慶元儒學正至則浙東帥重之俾二子從二子挾貴胄無弟子禮又羣蒼頭臂鷹鷂日躪躤無度公麾蒼頭去弗聴乃朴教二子曰吾授堂帖一通班官耳義猶受天子命天子有聖㫖諸王駙馬不得擾學校汝敢是乎因奪一大鷹縱之蒼頭走白其帥帥怒喚公衆為公懼止之公曰吾有聖㫖在竟往帥詰曰縱鷹有之乎公曰鷹不縱帥有罪具言云云帥竦立曰是愛我也遣蒼頭出謝竟護公歸既辟為其掾一郡大驚滿考除本學教授再辟掾淮東陞兩浙運司知事丁母艱服闋改江隂知事三載擢東流尹推贈父宜興判官母宜人即謝病歸逾年卒壽六十九先是公長郡幕里人殷數請託先君拒絶之殷銜恨誣行賂告分憲屬公逮繫公復憲官曰典史王某者清謹人也杰交其子逢亦未始識一面萬萬無是事惟體察之憲官韙公言獨不問後逢見公于家無一言及之其平生行義率類此公負詩名監丞陳公旅以兄弟禮最親善嘗誌其母宜人墓子在有文學遭亂憂悸死孫一東流家本醫少貧困閭伍賣藥粗給身力學忍刺股祖瑩良苦志黄憲早稱許參术收狄籠芝蘭羞謝墅繡衣驄馬郎遂有茂才舉尋典四明教絃誦喧兩廡元帥勛舊臣遣兒授訓詁其奴臂鷹鷂躪躤聖宫宇毅然掣錦絛麾去莫敢侮同舍為公懼公且白大府帥歎禮遇加擢掾器三語再遷東淮閫參贊妙材諝郗超幙兩登單父琴一鼓先塋罷焚黄長嘯即解組桑榆晚留景奄忽悴風雨送喪阻范式能詩失阮瑀憶昔忘年交瓦缶視鍾吕虞掲歐黄輩恨不與披覩間話良天時盆繰罄餘緒况于魯連義歴歴在肺腑遺孤喪亂中揆分合予撫嗚呼同漂零清秋益愁佇故空谷俞先生挽詞有序先生諱逺字之近號空谷江隂鳳歌鄉人也其先儒起家至先生貧隠居教授能行古道毘陵孫岵以先世舊依先生待如新知卒殯焉頃年疫傭奴病乞歸先生曰慎毋疑疫氣相染其善調護踰旬死時兵興山林盡赭人死多委之壑或以是請先生曰生盡其力死棄之溝中不義也單出為棺窆嵗暮春里氓舁木偶神遨井落間至先生門適所舁重而止舁夫告家姥曰神靈報施影響捷宜急祭燎旗下否則殃及矣姥笑曰木偶何能為主人歸吾家爨下物耳衆􅌓眙去族姪裕親歿有佛者以佛事為解裕毅然曰吾諸父嘗謂形神既離地獄何有今乃自誣親有罪不孝孰甚佛者慚而退其善行及人率類此先生骨貌清卓類有道者長于古文尤嗜詩亂中吟詠不輟嘗自叙詩曰蟲之􅖇􅖇鳥之嚶嚶機動籟鳴豈得已而不已乎不得已乎耳于以見其出乎性也壽七十二子樵孫庠序空谷俞先生言行慥慥爾襄陽一耆舊東魯古君子奕葉蘭桂芳晚見長松倚野鶴夕警露天雞晴影水神清凝髙寒眼碧照烏儿州閭董善良工俗變淳美削跡門徒僧罷迎藂祠鬼貧交有孫岵推食養没齒義聲及畊奴亦免溝壑委遭亂接淅行帶索並萑葦兒樵性至孝承順若居里先生但微吟落句益竒詭𤣥洲摘芝秀翠嶽決石髓咸瞻星應庚忽夢嵗在已栝羽鏃礪道蠠勿甚提耳忘年感孔融赴弔愧徐穉霜晨髙鴻邁獨櫂五湖涘為歌雙梧歌先生作此嘗挽先君後附林哀朔風起客行天下半波流日滔滔卓然王幙長獨詣見所操西風吹黄鵠瞥眼雲中翺無彼升天翼欲飛詎能髙讀律三十年弗離州縣勞歸休青山郭縁溪置屋牢種𤓰以為業不復求其曹饌甘盤有魚飲㫖尊有醪兒賢曲奉養末暮樂陶陶奈何百年期懽忻變號咷望見雙梧樹我每涕沾袍梧樹奚足悲迥躅于焉韜故贈江西省左丞諡文節汪公挽詞有序公諱澤民字叔志號堪老真逸以春秋登戊午進士第累官致仕禮部尚書歸宣城淮人闖境公倡鄉子弟保里閈㑹城陷遂遇害越七年詔贈江西省左丞諡文節逢見大夫士每稱公性亷學尤慎許可嘗推官平江任法恕允獄多平反埀代題春帖云及𤓰當此日行李似來時迨今為實録再推信州太夫人道病公屝屨扶箯輿以行比至總管秦從龍謁謂曰今晚可就職脱太夫人不諱吾能率僚屬賻襚之不然喪誰與舉公曰匿親病而上官是遺親也遺親不孝覬官斂而私親是貨官也貨官不忠不敢惟命太守茍推仁湯藥是饋則母氏更生是望某拜徳侈矣秦靦而退太夫人卒服闋起知兖州文教大行僦廬問學者數十百人流民過其治勸義賑之能聞召待制翰林與脩國史當時大臣有傳㫖奉金幣鞍馬求撰其勛功之碑者卒辭既大臣罪謫傾朝服公先知陞國子司業集賢直學士尋告老云逢于公無半面雅荷不鄙夷嘗賜詩序竊愧蔑以報稱也姑述其槩系以挽詞􅄞康貴神交梁鴻重懷賢古來知已遇詎在相摩肩仰惟文節公清白忠孝全天禧光禄後五世衣冠綿讀書敬亭裏射䇿香案前半刺久鳳栖一麾遂鵬鶱宫壺酒賜縹太乙杖吹烟鬼泣脩史筆門泊問字船疏廣忽引去傾都望如仙浼浼宛溪水畇畇溪上田鰕菜薦嘉豆鸎花照堂筵至正乙未間星狗光孛然首倡捍鄉井淮人竟扼咽侯伯竄草間丁壯死墓邊執公義不屈子姪尚控拳詈言今顔杲勁氣昔鄭畋臣素奏我皇褒贈著史編憶昔太平日髙名南斗懸忘我襪線才贈我瓊琚篇陋鼎飾金鉉爨桐被朱絃䑕朴免售鄭駿骨期市燕空谷一蛾睂衣袖馥蘭荃思君限楚水日夕魚風顛青燈耿漆室裋褐望杞天老成嗟已矣客淚雙迸泉再歌宋玉些黄鵠髙迴旋寄丘都事曩僑西湖西遂識東家丘平生五經笥聲價千金裘借地營茅堂湫隘不容輈文犀水蒼珮無時顧岩幽畦蔬何青青一飯常苦留推論當世事過許倜儻儔别經喪亂年廬墓兼百憂上馬即擊賊恐貽孝子羞伏承從大軍烽火空三州生還總􅙃面望拜多白頭荒原露草根舉鞭枯骨收捷聞詔東討朱夏行清秋黄池正觀兵移戍浙上流觸輪避螳螂撼樹憐蜉蝣祭遵日雅歌道濟夜唱籌所在成相業正自出軍謀月落紅蒼莽熒惑光射牛白蛇橋長淮睥睨龍驤舟君懷靖四海且復掛呉鈎機務信有暇緘詩寄滄洲寄李守道有後引西湖有竒士少負不羈才酒外嗜八分席地畫青苔妻憂缾儲罄虀甕闕開煮雪白石窩捫腹視三台乆安素貧賤惟恐富貴來風塵澒東南衣冠就衰隤慟哭岳王墓北走燕昭臺平章造次見符檄隨所裁徵兵復三州疾如破山雷無辜起塗炭寸管萬牛回釋褐慕董生玉帛讓輿擡丈夫誓闕良可哀時予客左丞逺愧鄒與枚禦冦書闕翩然返蒿萊籋雲仰驊騮失道甘駑駘天風蕣花落離思浩江淮願言輟予想曠野多賢材守道諱介石性爽邁闕以書見省臣命草符檄遂器重之授松江府提控案牘從守鎮江後鎮江失守以不屈辱而死煮雪虀甕白石窩皆其齋居室名三貞篇寄納琳哈喇㕘政幕下僚友梧西女陳氏顔色絶勝玉阿耶燈牕下古傳常暗讀義須嫁宦作官人麻枲心所足兵麾忽東指烽火蔓平陸魚鼈遭顛連雞狗同迫迎作逐猰㺄哆其口反噬机上肉母子泣相誓寧死不汝辱春輝黯門􅎝寒日照鬼録皇天實鑒臨家廟為慘肅陳氏母曾宋直講確之七世孫女髽婦惠婦呉俱縣人一作里人亦在難自判受命獨臂血濺賊袵賊歎為斂縮差差白刃間偉節驚耳目荒野雲雪暮緬想會深竹水流風悲鳴星迸萬羽鏃回首陷沒地何限委溝瀆大㕘行當來卹典具簡牘前湖百世祀謂五代時烈女何氏明妝儼車服從以雙素鸞配享疇敢黷孤蓬任漂轉餘齒寄草木倡兹三貞篇庶用矯浮俗奉闕左丞觀射石幢門外前徒驅干旄後乗咽短簫君侯美裘帶白馬金轡揺道出石幢門春始轉柳條公堂俯平曠武士集英翹離立控角弓百步建錦標眼空熊渠虎臂落李廣鵰登降禮數新賞罰號令饒忘歸迸寒星決拾迎鮮飈失鵠固自恥破的奚庸驕先王用觀徳今此樂賓僚龍勺暎彞尊玉帳闕客卿忝末至屬賦軍中謡川澤魚上氷野烟尚蕭闕詢幽隠聊以示逍遥民情自兹得無復慮三苗送楊子明知事從觀孫元帥分制沿江州郡寒日動大江鞍馬散滄洲漚光滅沒外迥見氷梁浮壯士無人色旗羽風飂飂楊君志弧矢笑被黑貂裘祭軷千仞岡掉鞅萬斛舟先聲掠淮甸遥制三邊州元帥統將權言責在軍謀一言闗興喪跬步分陽秋天地屬閉塞波伏蛟龍湫孤烟起天際薄暮青轉幽百里静雞犬豈但窮兵由雪貿薺麥生猶聞鑄戈矛頻年竭土壤經時委川溝行其所無事凋瘵或少瘳耀徳不觀兵當今第一籌君昔甚惻隠曲宥千俘囚歸裝輕于葉亷價重琳球敝邑蒙薦臨多暇獲讌游鳳凰巢阿閣黄鵠直逺投菉竹霜實繁知止疇與侔蘆根短刺水鸒斯空啾啾顧予麋鹿姿蓬藋翳林丘行藏任本性道義期加脩雨坐梧溪精舍青梧隂四合長夏含秋清及兹積雨晦闕水衣生别巷鶯聲歇香烟鵲尾横闕溪上思千載一時并夜坐落日秋氣昏回溪夜噴薄幽花欹露榭孤螢隕風閣冲襟謝煩歊廣簟生離索躧履望明河南天正飛鵲繆孝子有引孝子名倫字叔彞年甫冠博識能文本東平人侍父宦游于杭至正十六年淮兵執其父將殺之倫哀號乞免弗聴傾家貲贖父命又弗聴乃自縛請以身代于是父見釋而殺倫前鄉貢進士樊浚言之予悲倫之志行不大顯也為作琴操一首期聲傳無窮焉父存兒死兮兒可再得父死兒存兮兒其天殛聴代父死全兒職於乎人心不泯兮亂有底極葵蘭贈孫孝子彬有引彬值揚州兵變負母而逃兒女散失頌者美其有慈烏之義而未及䑛犢之愛焉故予賦葵蘭一章葵衞其根日月燭之蘭茁其芽雨露沃之兵變倉卒兮負親而逃山川險阻兮無乃親勞上天孔仁兮命也兒遭義僧行世降道淪喪盛事罕見之我歌義僧行蘄取國士知僧臻生夏浦俗號徐大師勇敢重意氣赤手可獵麋張忠郭解流任俠不計貲臻願出門下致一作效死誓不移盜尋冦馬洲魚肉乎蒸黎元戎堅營壁大姓深溝池壯哉張父子分率脱項兒父擒子死難家不得斂屍臻聞切齒恨恨死不同時夜即操斧刀奮身斫籓籬徑入牛宫内斧斷張縶維手殺盜六人力挽間道歸妻孥拜堂下金幣謝所私上公賜巾裳欲以好爵縻幡然掉臂辭還山弄摩尼方今國步艱中外罹瘡痍銅虎盡懸綬鐵馬誰搴旗嗟爾匹夫臻足張三軍威何不食君禄為君靖淮夷收名魯仲連千載為等期天秋黄葉脱日暮𤣥雲馳歌詩節鼓吹用壯吾熊羆壯士歌明月皎皎白玉盤大星煌煌黄金丸壯士解甲投馬鞍蒺藜草深衣夜寒劍頭飲血何時乾義兵謡春虹白冬草碧八月黄河火雲赤將衣我衣更食我食望塵走馬當殺賊寒機女辭鴛鴦機滿東西舍雪繭繰來日相射世俗競染紅藍花妾心鍾愛金絲柘君王錦繡焚殿前天孫鳳梭蛛網懸織成雲霧製龍衮萬一薰香分御筵朱夫人有序夫人諱元琇江隂知事朱道存之妻都漕萬户費雄之女也至正十六年江隂亂夫人依其父居松江之上海未幾上海縣陷苗軍復縣大掠夫人驚遽出卧内時苗手刃以入將犯之夫人怒叱曰吾貴家女貴家婦夫君見勤王汝本官兵奚為犯我投釵珥于地苗攫之去既苗沓至索貲無有遂驅迫就道夫人揆不免乃攀堂楹厲聲曰吾義不辱苗狗忍辱我耶比遇害爪入楹木血沁于指哀哉始先君庫使解官歸里逢適主于其家毎與盛宴輒缺然若不甘者知事言其故于夫人他日復宴夫人親為别具饌命子文博文禮舁示逢曰此奉尊翁自是以為常明年逢過其地嗟夫人之生也柔惠足以徳于人歿也貞烈足以表于世謹為辭以弔之辭曰青薲花白浦水黄雲日黤慘風悲凉停轤西向三酹觴旂旌葆幢來混茫若有人兮凜如霜星流電馳惟一作誰可望微言夙習大洞章功成拔宅居帝鄉鵲河蟾竁肆翺翔笑援北斗挹酒漿帝曰欽哉無太康下為叔世扶綱常進規退矩禮自防釵荆裙布今孟光尊姑養之植徳堂朱氏堂名堂階珠樹聯瑶芳明璫蒼珮森琳瑯撾鐘考鼓樂未央楚氛遮天耀天狼飄然歸寧父母傍正坐漆室憂葵傷官兵冦我加劍鋩昊天倚杵忽變桑身有濺血無迴腸稽首再拜淚兩滂囅焉直上驂鸞凰以下原闕殺君之餘春風紫燕停紫衢錦纒繡絡舞鷓鴣胡琴秦箏間呉歈酒面花影紅扶疎君樂滿座容顔舒再拜壽君明月珠願君世世金虎符縣籍無我甘樵漁君家柳君家柳萬株一色鵞黄酒龍鱗波暖裊翠烟飛花直渡江南天倉庚立曉燕穿午薄暮啄木聲丁然腹中螙蝕皮齧馬舊隂半減金城下長條短條屬行人猶有持斤睨之者秋來大地落葉鳴心憶陽春泪如瀉趙氏雙珠辭遊鯉山石髙孱顔遊鯉溪水清洄灣中有峩峩青結鬟望如春雲不可攀壬辰仲冬冦蜂起乳臭將軍先披靡民人顛連社稷圯我固當為貞白鬼後來乙未年小妹復被驅亦葬魚腹全其軀山髙水清幾千載虹月夜貫雙驪珠夜深鮫宫屏機杼風吹草寒髑髏語何由生長江沱間及見王雎鼓衣羽願回堯天行化日女子有家男有室地下甘心燈似漆夜何長三疊寄周㕘政伯温鄔僉院本初夜何長日苦短夜長復寒日不暖深林大薄鶡鴠滿尾頳魴魚遊纂纂千年古鉄紫氣纒赤帝當之白虵斷中朝老臣雙珮蒼憂心鬱紆寢息忘鳳凰在笯驥服箱雪埋石棧氷河梁夜何長六龍回轡東扶桑夜何長日苦短夜長復寒日不暖蒼梧九疑雲思逺驚鴻亂落夫差苑漢家騎尉雙龍蒼酒酣起舞隘八荒疾風吹沙百草霜玉缸朱火青凝光夜何長帝車髙轉天中央夜何長日苦短夜長復寒日不暖欃槍㕘旗燭雲䍐樹樹梅花落羌管江南布衣雙髩蒼嵗闌獨立氣慨慷衣冠禮樂制孔良路迢無由貢明堂夜何長啟明耿耿天東方梁溪行贈嚴子魯㕘政梁溪之隂太湖陽錫麓西下盤羊腸土俗鷙悍民鴟張負固不貢亂典常明公是時騎飛黄三尺白練揮氷霜西定汝穎南保杭復來觀兵周處鄉方將增陴深浚隍楚氛一夜掩斗芒奉頭鼠竄道相望獨有殉節臣姓楊謂文載員外明公退此招散亡昔我仇冦今顔行千百之衆尺寸畺日食蒲螺草塞創戰十六月莫禦當誓欲手舉東南綱赤葉楓落鴻雁翔淮閫共戴呉天蒼金戈煌煌斾央央旋師城闕從鼓簧父老羅拜勸酒漿武惠厚徳宜爾昌龍衣封錦來尚方璽書錫命登岩廊吾君論功邁漢皇屬國肯負蘇中郎事業益大身益强不忝異姓汾淮王奉陪神保大王宴朱將軍第聞彈白翎雀引有序白翎雀燕漠間鳥也初世皇命伶官石徳閭製白翎雀曲及進曰何其末有孤嫠怨悲之音石徳閭未之改而已傳焉戊戌冬淮藩朱將軍宴大王于私第逢忝座末時夜雹霰交下衆賓相次執盞起為王壽逢亦起王命左右鼓是曲且語製曲之始俾歌詠之逢謂纘事本實左氏所先故鋪陳興龍大略而不暇他及也𤣥隂亘天雪欲作將軍西第夜張幕銅盤蠟光紅照灼四座傾聴白翎雀雀生烏桓朔部落大樸之氣元磅礴地椒野穄極廣莫穹廬離離散駝駱黄羊蘆酒雜湩酪鷹狗畋獵代耕穫太王肇基不城郭青春建􅐤宵罷柝聖澤滂沛蔓綿絡風淳俗龎法度約乾端坤倪露冲漠羽毛鱗介並飛躍庭祠嵗響咽管籥雄雌和鳴莫我樂帝皇赫然太陽若八表晃蕩氛盡却前驅屈盧從緐弱睢盱嗢咿萬狀錯遂朝玉帛解組縛大明宫開夾花萼文監武衞盛材略葱珩穀璧暎霜鍔五雲䕫龍奏韶濩九苞鳳凰降寥廊徳音威儀匪予度萬姓拭目瞻阿閣軒轅伶倫兩冥寞八十年來事非昨優麀雜亂人道削咬哇哀淫頌聲鑠皇孫讓賢執鼓鐸巾羃鵲尾黄金杓殽烝體薦嚼復嚼巴渝舞隊驩回薄供奉革鞜衣狐狢銀箏載前酒載酌延秋門深魚守鑰緱山逺度吹笙鶴淮南昔者鷄䑛藥千乗之國棄弊蹻方今羣雄自開拓拔刀把矟爭刺斫為臣義同葵與藿將軍固合鞭先着蓮壺漏沈薇露涸枯梢號寒風隕籜百禽啁噍雹霰靃氷花亂㸃真珠箔箔中呱呱情陡惡供奉砉爾停絃索吁嗟白翎將焉託有客淚下甘丘壑奉陪杭右丞程禮部以文字文憲僉子貞魯縣丞道原宴周左丞伯温館舍時聞河南李平章恢復中原西湖館舍開新秋三峰倒影紫翠流白馬彫戈駐逵道金魚玉佩羅林丘二孤五老獨神往八公六逸同天遊時維小康况大比萬乗少紓東南憂如澠之酒官寺送風生酒波鱗甲動荔子漿凝赤露香鵞肪炙作黄氷凍歌袖頻熏婆律膏渇羌解奏㕘差鳳右丞閥閲霄漢逼諸叟文章臺閣重罘罳駸駸落日涼菱花蕸葉掩冉光驚飛先自有鳥鵲寡宿未必無鴛鴦堯封禹跡烟莽蒼宣髪固短憂心長側聞汴破濟欲下百姓亦望臨淮王山人厭亂喜莫量笑整冠帶為舉觴醉後不登嚴武牀惠孝子行有序惠孝子名連字子及曾大父疇累遷寶章閣待制常徳知府致仕司農少卿卒翰林池聖夫銘其墓曰金玉其相表裏無偽槩可見矣子及受學于陸子方先生嘗述江革郗鑒二贊其贊江有曰兒力甚武母安勿怖兒身既豫養不可窶前行弗獲後顧則逼我心欽欽卒與盜即母兒一身安能異塗兒亡母亡將焉用俘其贊郗有曰民儉于食累累為瘠推活君子職敬惟徳君不茍活念我二兒骨肉之恩生死共之弗䘏爾生胡後而死氏志弗獲全是口體士矜誦之後江隂亂挈母俞及諸甥姓間闗百罹避地呉下逢嘉其言行贈之以詩吾邦有龍虎村中有宋朝司農惠公之曾孫司農三登巍科蚤選衞王婿兩作茂宰一出漢朱轓百年雲散金碧氣衣冠禮樂八九存曾孫自號轣轆生又號蹇連子負材弗施甘與世相忤未嘗入城見州尊或逢夸毗徒掉臂決去如林􅆐日但讀書蓬蓽門講畫授弟子愉婉問清温堂前植橘堂後樹萱百畝之田五畝園征夫道暍馬汗赤抱膝方看髙鳶騫優哉游哉樂難諼柔兆涒灘嵗天狗闞丘樊達官大家驚潰奔水鮞陸䴠盡啗吞是時轣轆生悒僾膺屢捫非不能持梃刃佩猳肫靖鄉國清札昏母年八袠罔極恩外甥在侍傍無援誓全古孝義坐使薄俗敦攜扶于野褰涉于亹􅃤冐霧露饑採􅀈虋妻孥臬兀兵火際亦解委曲奉壺飱天道昭著神佑䕶卒得命脱蟻聚并蜂屯蹇連子葢嘗口撰江革郗鑒二贊累百言文焰炳若星斗繁聞諸人梟者褫魄示諸人獍者喪魂江郗名與埀乾坤乾坤蕩蕩敞帝閽我歌三反烏滿原春風一夜回孤根題三馬圖巻開三馬風雲起誰其畫者趙學士渥洼舊感驪龍精禹門曾浴桃花水並馳定是不契需合與周王八駿俱烏騅赤售非主千金之骨成泥土丈夫懷材莫愁佇鶴招有序予友曹炳氏畜雙鶴于皆春園露昕月夕巾烏紗被氅衣與之弄影接武林壑間若超出世􅅽物我相忘者數年辛丑秋一日雄嗒然悲鳴驚視之雌折足斃石﨑下心甚悼焉為援華陽故事用𤣥黄幣瘞所居貞溪傍既封其土屬逢賦鶴招誌諸石馬之死也埋敝帷鶴之化也招予辭啄青田芝飲瑶池冠朱衣縞𤣥裳埀神仙中人受以羈日遨寥天􅆖鳳螭良苦未若歸來兮風塵軒囂波浪瀰鶀鴈羅鸗弓繳悲主家天開林壑姿石矼魚影布㕘差露昕月夕苔莎滋引吭和嗚舞僛僛闗雎之樂不可支胡然孤雄怨仳離主亦為爾意凄其􅈍帳燈灺香倭遲臨臯道士夢經時不信視此冡纍纍歎病駝狂夫東遊乗白騾道路適遇病槖駝紫毛無復好容色肉鞍尚聳雙坡陀南人從來不夢此私怪目擊臨干戈泉渠元自控蕃落天苑畢竟連銀河呉郊楚甸水草淺任重却欲千斤過青袍朝士為起立茜㡌畨僧時撫摩熱風吹塵鼻出火積雨成潦瘡生窠牛䖟狗蝨苦嘬血末由驅除知奈何頻年出師數百萬熊羆獅豹相奔波豈期獨後死溝壑餘光所及良已多老矣首帕短袴靴手持鞭䇿涕泗沱憶昔灤京避暑日氣骨礧峞從鑾和沈沈金甕夾銅馬裊裊錦帶懸靈鼉服勞輦下藉鬋刷屈跡澤畔甘蹉跎疇能推廣愛烏義沒齒仰飼公田禾悼炎洲翠炎洲翠美羽衣穿花掠藻鳴春暉