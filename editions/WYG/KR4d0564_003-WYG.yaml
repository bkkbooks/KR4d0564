嵗星輔日照八極還種祭田汾水陽喜聞整飭臺綱詔至是日雷雨因感時事寄何憲幕幾年十月百蟄驚今年二月雷發聲陽和一氣轉大地忽忽草木回勾萌白頭傴僂賀新雨惟恐天威咫尺收砯訇綱常錯亂雅道壞誰本王度加脩明何物梟獍徒遂害烏鳥情謂盜殺越守實臣格埒克固烏鳥昔日辭桂枝集枳荆超遷柏樹朝陽鳴啾啾衆黄口寒喣饑飫賴生成􅄓風翻橧巢銜枯復經營其雛寖長大不但反哺報所誠梟刳腦獍磔腹嗚呼烏鳥卒存孝令名我有三尺蒼龍精亦欲為帝擊不義除不平况君揚翹舒英如鳳翔九仞如玉價連城君奚不進臺中評令人思之涕泗横蘇堤柳青驄轡輕暖紅花霧撲野鸎黄縢官酒瀉山緑而乃醉踏湖上晴碧雲裔裔東南征題紅女二圖春閨寂寂春漏長美人梭度金鴛鴦緑雲蔽地柳隂合紅露撲簾花氣香遊蜂釀蜜燕將乳準儗郎來裁白苧衣成稱體復稱心不惜尊前為歌舞疎星不流孤月耿銀河散落霜花影翡翠巢虚小閣寒蝦蟇更斷重門靜沈水微烟戀舊熏停針欲繡錦回文郎作長安一輪日妾化巫山一朶雲㝠鴻亭詩有引逢早遊金陵臺臣有以茂才異等薦以病辭浙西分憲繼以晦跡丘園薦不報兵興大府辟佐戎行又以材不勝任辭客公侯間俟回鄉里而又不可得避地青龍江上扁亭曰㝠鴻非敢自廣姑志所存詩曰冥冥飛鴻八荒一宇三光並明周視下土下土之人徒敝罔罟鴻飛㝠㝠萬里一息與造物遊邈見其跡䝉莊大鵬闕掩溟北彼啄者烏彼唼者鳬彼甘區區梁藻是圖鳳凰來儀斯徳之符山有灌木木有深枝無枝無巢鴻生連蹄鴻生連蹄天其汝為天其汝為而我無造作亭名鴻是則是傚惟傚伊何髙舉逺蹈小草軒詩有引或者病予𡨕鴻亭因别闢一室名曰小草復賦四言一首茁彼小草于山之岑溉以流泉䕃以嘉林雪霜相尋雨露亦深根癈既固緑葉靡歇沅芷灃蘭同是芳烈伊人王孫斯曾傷别不曰逺志奚小名之在山莫尊出山莫卑卑以自牧君子謙為天地沍寒朔風孔棘衆就枯落蒼蒼其色色焉蒼蒼不回厥徳春陽潛復勾萌蹶張長養泰和衣被景光子忍佩之爰樹之堂爰樹之堂爰獻之國忠君敬親匪頌維則則之維何小心翼翼送貢泰父尚書整治福建鹽法雷雨從天起涸鱗呉刀光彩照南閩不惟鹽議張林得况乃邊籌杜預親穴渡尾閭偏少瘴星分喉舌早移春青烟亭竈鄰蛟室赤汗丁夫類鬼薪寛減一分存草奏貢聯諸物上楓宸乗驄使者交游數豺虎何由感化馴寄柏希顔憲僉春申山上駐旌旗千騎中間識漢儀公嘗以常州同知總兵江隂嚴警正當傳箭日清談曾到結繩時車前軾畫熊羆象柱後冠存獬廌姿枤杜葉青陳燕饗甘棠隂合被歌詩法星一夜臨丹極爽氣崇朝轉赤墀遂奉綸音司奏劾再持使節寄安危霜飛五月無朱夏天入三呉有釣絲蒼莽城池餘燕麥淼茫烟水接鳬茈民生轉徙家何在道殣相望命若遺河内便宜須汲黯宫中直諫憶辛毗邇聞行部收殊蹟不忘斯文忝故知七載兵興無限事願趨鈴閣共論思趙仲穆待制闕故王孫暇日湖山接討論萬雉金城猶遶汴六龍雲氣總歸元士林冠葢交中國黄閣絲綸萃一門緒業逺宗虞祕監風流曾似馬文園歌殘白紵花圍席書罷烏絲月滿軒回首風塵重懷想爾家餘澤在乾坤題息齋李公墨竹有引公為婺州路同知時先君獲會于杭深䝉友重嘗作風晴雨嫩四竹以贈其嫩竹中一古樹尤蒼潤秀特因指謂曰此類若英妙中氣榦耳先君每感其言倐已四十餘年矣兵後展玩為之惘然敬述四韻東南文物萃時康先子曾瞻太白光湖上薰風歌緑水袖中霖雨作篬筤零陵自冷湘君淚淇澳詩存衞武章猶有佳人在空谷天寒愁思碧雲長寄買靜安靳利安二樞幕宥府分兵建羽林芙蓉帷幄靜沈沈風塵地迥隂靈泣霜月城髙紫氣臨一飯不忘當世事百年誰識逺臣心别來豈但懷思切卧聴闗河過鴈音送省架閣張彦升使淮府慶宴還省兼簡張夢祥樞椽江南江北地全歸弧矢星明燧火稀丞相天寒青建幕使臣春日繡為衣殽烝體薦殊恩禮金券丹書煥徳輝好約鄒陽同倚馬梁園醉賦雪花飛陪宴周伯温左丞劉君楚侍郎是日席上出汝瓷鴨爐焚香因賦以簡二公堂啓芸暉宴相君鷓斑鸚緑鬬清芬一絲欲染花間露五色微生日下雲袖惹氤氲思漢閣詔頒綸綍儗皇墳時劉開詔呉中東呉二月無塵事看劍攤書任酒醺簡鄔同僉南粤稱臣陸賈勞漢廷何愛璽書褒恩波遂與三呉濶爽氣真連北斗髙鸎囀羽林交杕杜馬閑沙苑暗葡萄天心厭亂民懷徳未説闗河恃虎牢送觀河道員外祠南鎮使淮府還京二首親奉天香祀會稽黄封玉檢爛金泥地同南嶽臨朱鳥祠俯名藩異碧雞三秀乗春沾雨露五雲披曉見端倪好祈神化資神武縹緲前旌舉白霓南鎮春回草木青溪毛猶帶舊時馨黄塵荏苒民誰賴黑海滄茫使有星為愛寶書探禹穴豈揮清淚向秦庭萬艘轉餉成山道想見風雲護百靈送王季徳主事祠南鎮還京干羽春明玉扆閒皇華躬遣祀稽山蓬萊雲霧隨封檢敷落仙曹降珮環宣室舊承前席問樓船今駕海濤還東南父老憂時切落日扶藜得重攀送曹徳基尚書督海運還京公府頻年集大勲使傳天語勞憂勤大官酒注芙蓉露上使衣開錦繡雲舶趠風清通瀚海招揺光澹靜妖氛還朝闕道扶王室首奏何人䇿冠軍呉江第四橋阻風虹梁雪灘光滅明風著岸脇氷鱗生空郵天晚亂木葉太湖日寒多雁聲馬周斗酒足自慰龜䝉扁舟有餘清囊中青錢不滿百聊買小鮮來就烹風雨獨坐先生閉户坐連朝春雨破塊風鳴條九峰三泖野隂合五城十樓雲思遥蝸牛戴角上金井蝦虎成羣迎白潮桃花底事苦爛漫幸有尊酒慰無聊秋感六首呉門葉落季鷹船朔野霜横白雁天三楚樓臺餘夢澤兩京形勢自甘泉采雲帳幄冷風滿瓊樹花枝璧月圓本是宣光中興日腐儒長夜泣遺編紛紛攘攘厭黄巾妖血徒膏草野塵馬化一龍猶王晉楚存三户未亡秦颶風天靜浮青海朔漠山髙直紫宸莫為鬼方勞外伐檿弧箕服最愁人豆苗𤓰蔓未應稀菰米蓴絲積漸肥南極有星天半隠東維無地海全歸連城不換相如璧百結何妨子夏衣回首故山荆棘外幾年空翠鎖烟霏苕花薲葉繞林扉獨立蒼寒見紫微夜久長庚隨月上天清髙烏帶霜飛東南呉會三江入百二秦封六國歸烈士暮年心未巳無言思解白登圍南越東呉帶楚臯頻年醉眼送飛毛滄洲露白蒹葭滿甲第秋聲蟋蟀髙九日天涯桑落酒三軍城上柘黄袍試觀漢後詩人作獨覺遺風屬阮陶鯪魚風息淨江波軋軋機絲響薜蘿華髮道途秋日短曠懷樓閣暮隂多浮查受宿炎洲翠細草從眠墨沼鵝心自隠憂身自逸幾時天馬渡滹沱聞鐘苜蓿胡桃霜露濃衣冠文物歎塵容皇天老去非無姓衆水東朝自有宗荆楚舊煩殷后代越陀新拜漢官封狂夫待旦心良苦喜聴寒山半夜鐘奉謝嚴子魯左丞枉顧畫省春閒退自公草堂枉駕走鄰童兩川使節瞻嚴武五郡民心憶竇融其祖武惠公以山東五十四州歸附簪履百年門客盛詩書今日野人同髙秋儗踐論邊約絳蠟光揺虎帳風寄倪元鎮笠澤雨晴烟霧除放船適逢倪隠居黄河泰華意氣若金薤琳琅書畫如露浮箬葉熟春酒水落桃花炊鱖魚莫嫌忘形禮法外難得合并憂患餘題包旂彦招管溪别業夷吾溪上草堂成江月浦風相與清蒼苔白石琅玕長積水疎簾翡翠鳴鮫女賣綃新識主家人舉案笑呼卿膝前况有兒如玉收拾餘金鑄短檠送葛𤣥素住持普福宫海虞山色秀屛開紫氣丹光湧玉臺父老舊瞻雙鳳下神仙今跨五羊來緑林烽火沈虚壁蔓草春風轉上台聞有子規栖未穏長松闕簡林叔大都事省闈無事日盤桓猶是中朝供奉官半臂縹綾披月下三神琬一作珠闕望雲端茳蘺草變鯨波落苜蓿花開鴈塞寒因話朔南聲教在一回相對客懷寛贈吕醫師有後序橘花開處杏隂青百草吹香覺地靈貧士願留賖藥券故人思續衞生經𤣥霜玉臼晴猶濕華月丹房夜不扃張叙苦吟仍病肺好和熊膽䕶修齡叙字彦倫吾鄉黄田人也家甚貧日往返十里從予讀尚書鄉之大夫士咸愛其才志篤敏將進乎學予獨懼其神氣不充久而殆病也未幾果病予深憂之遂用宋清故事具券即醫師吕如心氏如心曰吾道本乎施濟竊計清所獲特市道之雄耳奚券為哉且夫人之常情孰不願賢而利達富而壽考幸生而賢賢而苦貧貧而苦病病而不能藥我是何心哉遂反其券命日服藥一褁至數十褁而愈愈之日予詩之而復序之葢所以旌如心之徳而為彦倫慶也酬夏仲寶府判包徳文提學徳闕縣尹春日頻承鄉里書鴻山别業闕不異王官谷馬幣曾過闕難數移居使還為報諸先闕尺餘簡趙茂叔山長木槿花開落日邊感時興歎撫遺編何蕃仁勇真難及江總才名不大傳闕舊通秦道路柴桑猶屬晉山川嗟予鞅掌風塵世頭白終師魯仲連簡張光弼員外瘦馬羸童退食遲倒衣相見即相知風流不減張京兆心跡無慚柳士師枕上燕鸎鳴曙日道傍花絮􅇢游絲天機人事觀都遍笑約西山賸采芝簡陳韋羌員外幕府深嚴午漏遲簟文簾影碧㕘差總傳白馬陳從事毎念青袍杜拾遺大地風塵憂未解扁舟江海去無期凉天鴈叫芙蓉發許奏軍中鼓吹辭陪淮南僚友汎舟呉江城下波伏魚龍夜不驚菱花千頃湛虚明呉儂似怪青絲馬漢月重臨白帝城世説竇融功第一獨憐阮籍醉平生樓船簫鼓中流發喜及東南早罷兵送何憲幕北上千里妖氛百戰空送君先謁建章宫呉牛漫喘雲閒月天馬終依冀北風仙掌向秋清露滿銀潢流派大河通至尊宵旰仍多闕臺諫何由得數公送毛𢎞道赴内闕兼簡任子羽憲幕越王臺端驄馬青憲郎一鶚上青𡨕二儀開闔車書正中夏清寧草木醒都邑載瞻春有象東南私喜客無星鄉人邂逅詢消息十載鵑啼少脊令憶程禮部宇文憲僉二先輩憶陪清宴嫩凉天南北雙峰几杖前文行並優耆舊傳笑談曾及汶陽田髙風鴻鵠歸三島明月蘭苕在一川私歎衣冠就淪落東南誰闕年送薛鶴齋真人代祀天妃還京蓬萊宫裏上卿班代祀天妃隔嵗還日遶五文皆御氣海浮一髮是成山風霆夜䕶龍鸞節雲霧朝披玉雪顔聖渥既隆𤣥化盛轉輸應盡入秦闗龍江齋居簡許怡軒江城南王至訥瞿間野王晚翠投閒田野罷從軍孟夏齋居樂可云銅滴水寒蘭葉露緗簾風颺柳花雲門生載酒還多酌道士籠鵝或一羣近種黄精三百本秋髙分寄許徵君鸎粟花開蠶豆肥梓梧隂合乳禽飛一庭生意何曾歇四月青春不見歸只為身閒家有此尚論心壯事多違鄰翁也道山人樂顛倒烏巾鶴氅衣題松隠菴闕名泉瀉玉虹九龍分遶梵王宫雨餘清氣來天上風闕鳴聲落座中松葉晝昬山欲合藤花雪白徑微通老僧闕我君親念一巻琅函答太空留别陸芳潤張孟膚田仲耘王孟翼楓葉殷紅枳實肥蘋風蕭颯芰荷衣自甘許汜求田去不儗劉蕡下第歸日落大荒猿夜哭天含積水鶴雲飛諸君有待乗槎使直犯星河織女機故湖口縣主簿蔡君挽詞有序君名徳榮字景華揚州人也至正十五年從淮南省臣出征累勞授將仕佐郎湖口縣主簿明年春三月揚失守將扈鎮南王北奔闕執之闕將命以官力辭闕羈縻于呉卒君之子平江録闕徹友于予一日泣拜曰徹先君家素饒好濟賢士之貧者卒不望報好飲酒客或沈湎廢禮亦不之退鄉里用是稱長者然不幸遭亂死尚幸節不失徹闕忝斗闕禄為老母養實先君遺靈是祐闕地下惟先生埀一言而顯白于世則幽潛之闕徹之至願也予嘉徹孝乃叙而詩之詩曰不識中郎裔咸稱長者風渌尊容潦倒金帑濟途窮楊柳平山外瓊花后土中亂離霑一命慷慨抱孤忠驥子飄零隔荆釵患難同劍虹衝夜斗書帛斷春鴻命也貧甘節天其夢吉終山人追作誄應感九泉通題僧教求傳先世姚氏遺事有序嘉定姚舜元字景瑞少拳勇以武功授宋保義郎平江府東南副將守呉淞徳祐改元為元至元十二年其冬王師下平江君邑大族民樂肺腑有弟舜賓子應龍興龍應龍登咸淳間第太學上舍相感舊曰國家厚澤在人大本未去收合散亡應内援外事可濟也未幾王師偏將東狥莫敢犯境十二月十六日會闕塞襲兵卒至咸死之上舍子復明易侍讀學士北庭闕公最友善嘗叙其詩集今靈隠書記僧祖教復之中子于闕為曾孫謁予以遺烈告予謂其先為臣能忠死為弟能義死為子能孝死忠義孝萃于一門而可使之無傳乎教泣載拜曰願有傳也乃述其槩繫以詩詩曰賈勇收餘燼驚心壓大兵蚍蜉曾少援葵藿本同誠尺伍開符籍孤虛識陣營青烽闕入望銅斗夜傳聲朔吹刀如闕南闕葢未傾小臣甘效死間氣忍偷生江洶濤沙合星流霧瘴横一門忠孝行闕尚含情題邵氏家譜有引邵自康公至東陵侯平凡五十世又八世至東漢左中郎馴召始加邑又闕十世至唐名旺者為濛源府君從睦州遷居淳安之諌村支派闕蕃衍宋有呉越邵子孫以先世唐尚書左僕射闕直刺史若䖍州思括滑州行封歙州裕期湖州叶丹徒尉符并州刺史强右武衞兵曹肅㑹稽令顒濮州刺史儒官誥詣有司帖授衣冠户時開寶八年又十三世名桂子為宋處州教授有别業在華亭處州孫亨貞出示族譜逢敬題是詩宋日衣冠户唐朝徳澤門變遷支派異貧賤典刑存𤓰盛青雲合棠髙玉露繁蜜房蜂祝子香壘燕生孫誥護先王勅車留太守轓一家天與貴百世海涵恩嵗有團樂春多語笑温齒非論犬馬祭每課羔豚服任緦麻盡心期禮義敦國風詩在魯山脈氣朝崑伊吕曾為匹朱陳近結昏公侯必復始尚憶諫名村和宋理問見貽韻風雨懷賢夕東南厭亂時湖翻波自洶天聳聴還卑倦塌鷹鸇翼紛張蜃鱷頤終童繻早棄直使斧先持晁錯兵三䇿陳平計六竒金銜龍口劍清絡馬頭絲草接春程濶花穿午漏遲明珠還甓社白獲符離方物通諸貢民生免百罹偶存丘壑想遂保棟梁姿寵利從爭敚才名任詆嗤由來闕後兩闕跡異商歌綺功收蜀將維武經閒虎闕卧犀毗闕日猗玗洞明年赤玉墀五雲瞻繚繞湛露挹華滋車笠盟誰望烟霞疾我私紫垣星北極茅屋地西枝嗜闕元闕退子綦鄉山瞰蓬海黄髮候安期謝闕院使枉顧漢節驅前隊呉闕夾闕肯來闕白屋迥異過髙軒葛亮煩三顧鬷明契一言君王憂社稷臣子瘁藩垣碣石深淪海黄河不改源日知陳俎豆夜想屬櫜鞬客忝游從數家承禮義敦風流賢謝傅闕大鄙公孫鈴響花連閣舟横柳暎門春來足清暇誰與㸔雲騫送兵部使賈彦彬北還二首有引彦彬名文質晉寧人嘗以都水監奏差押兵部馬赴安豐還次全椒遇亂幸不死側身草野凡數年始獲奔浙省省臣嘉其鋪馬聖㫖在上之中書逢勞以詩云天上小行人全椒犯敵塵九年君入望萬死鬼為鄰星轉蒼龍近船歸綵鷁新殊恩酬苦節悲喜集兹辰使臣全璧返行色澹婁臯毛落蘇卿節綈寒范叔袍柴桑空月冷桐柏尚烽髙有問征東策天兵勿自鏖哭沈先生有序先生諱䝉字伯亨西秦人從子方陸公學既侍父官於潛因遊天目山作記累千言復唱古詩百韻一時坐客咸斂衽謂才足追配海粟馮公之賦時年十九耳平生明春秋尚書淹貫子史百氏學氣節踔厲累應試不中拓落江淮間二十年日寄傲于酒貴富人莫能下後江隂亂偕友趙乾宗往依馬洲鉅室未幾亂兵執先生索鉅室主卒不言遂與趙遇害哀哉逢避地遐命兒掖録先君庫使行狀妣李氏傳感先生大手筆足以發揮潛徳嗟先生不幸死而言行之懿則非逢所能述也姑哭以詩三楚皆兵祲中洲自樂郊不虞烏啄屋竟作燕焚巢氣節摧强敵文章哭故交家山限天塹瞻拜奠蘭肴寄汪用敬劉彦肅二憲郎太尉新開府諸曹舊直臺節毛通萬乗旗羽拂三台路遶青州出烽從赤壁來英雄滿麾下㕘贊屬竒才題堅上人石林圖石林禪隠地萬木擁巖磝風露蒼寒濶雲霞玉氣髙採花猿放供銜果鹿忘勞亦有清吟客時同步紫鼇何禮部國器留晚酌得飛字晚酌尚書第杯光照客衣錦箋魚並躍銀燭鳳交飛疎樹風凉進幽蘭露氣微喜聞謙退語不減在郊扉贈多阿克進士分攜十六載兵後見殊鄉道在衣從短時來面覺方苑花鶯囀日邊草鴈啼霜出處闗文運燈前且盡觴贈王菊隣白露秋香外君家若箇邊神交陶靖節地主傅延年採對蒲城酒餐同橘井泉宗人有王翰行咏卜鄰篇寄邁善卿憲幕時總戎越中憶同沙進士訪我大江濆座酌烏程酒篇連賈董文瓊林依日月禹穴會風雲極目窮南紀書生將一軍貢玩齋尚書邀往西山觀程以文員外葬地值雨作旌棨澹秋色衣沾疎雨凉身忘侍從貴義急故人喪地隠牛眠穴山回鳳舞岡河干先墓表百世耿相望哭信州總管靳公二首有引公諱仁字利安弟二人義字闕宜太平路總管守節死贈河南省左丞智字士達浙憲知事卒並有材徳世重憐才義人趨讓􅄻風鯉庭承孝友鶴髮佩公忠日月迂花萼嵩邙隔桂藂一門三采鳳無愧薛河東令弟皆知己巖廊兩薦名乾坤離亂日金石死生情牛渚孤忠耿烏臺爽氣平髙天鴻雁合好在洛陽城題虎樹亭有引趙宋聰禪師住華亭闕時有二虎噬人師降伏之命名曰大青小青師卒虎亦死弟子瘞之塔傍踰年生銀杏樹二今尚存主僧隠公闢亭樹間扁曰虎樹徵逢題是詩舟泊東西客詩招大小青山髙白月墮草偃黑風腥植物鍾英爽精藍被寵靈涼隂慎翦伐留䕶石函經澱湖舟中懷謝府倅履菴月破山河影天埀霧露隂西風寒不競東井夜空臨獨櫂滄波濶疎燈落木深無官䘏民隠思爾細論心寄衡良佐御史昔忝左丞客屢陪賢佐遊論兵雪驛夜觀稼石門秋大器已驄馬不才還敝裘天風動書劍思載剡溪舟寄南臺經歴察士安傾葢庾氷宅􅆳歌黄歇山鹿麋任野性鵷鷺老朝班窆石亂雲裏研池脩竹間遥知草奏暇游馬夜深還登呉山三茅觀訪貢尚書留宿口號湖光湧殿壁石黛長岩根闕誰騎虎披衣客聴猿天經南海濶斗輔北辰尊竟夕闕座漙漙竹露繁同楊鉄厓雨坐野濶大溪横苔梁翠碧闕終日坐微雨四簷聲爐裛庭花氣衣含水木清何常闕同上錦官城謝王季野馬東臯闕枉顧白馬揺雙轡青童扣獨闕雲火日心在薜蘿衣本為吹笙過無因待鶴歸秋齋帶闕清坐莫相違寄烏延子忠亷使詔開神策府星麗闕微垣闕深秋正湖波舊日翻鷹蒼拳玉立驥伏志雲騫亦有闕三年望帝閽贈章彰徳吉父致仕章彰徳雲間負重名義田春雉雊書閣夜燈明諸舊依妻子孤臣謂楊乗員外寄死生黄金日圍帶躬導板輿行寄魯道源提學謝病儒臺客從來結友闕官辭板授弟子賴經明孔座尊常緑雷津劍合鳴嘉魚厭客邸只少各歸畊簡黄心之同知夜宿松陵館湖開一鏡星蛟潭積水黑蟹屋亂燈青漂泊身埀老疎慵酒復醒慙君在官守憑軾慰零丁題謝疊山先生所撰髙士薛君墓誌銘後有序君名伯英字俊夫號秋潭青溪儒家子也學老子于龍虎山理宗朝以術排潮復驅旱魃咸有徵召見復古殿甚異之事父母孝友于兄弟上清宫有古琴善琴者以為東南竒寶流落塵人家四十年君見曰此山中舊物人所共珍何忍使同俗物乎謀厥弟空囊中得錢千緡贖歸與其徒共之有弟為游士累貪吏因羅織之勢窮矣君盡力以救不足則率兄弟為士農者傾常産以脱急難謝先生曰以君志誼措為天下用豈肯聴祖宗神州赤縣淪沒百三十年而不歸乎豈肯視生靈怨愁國步顛危而不出一策拯救乎韓退之見當世無偉才朝廷無忠臣義士遂疑忠信材徳之民迷溺于佛老之教而不出一得廖道士驚喜如見異人吾嘗恨不見廖道士者矣惜吾生同郡而不及與之言也其推重若此君咸淳六年卒族曾孫毅夫以詩請敬題四韻野服辭天子山居味道真力能歸舊物義不外彞倫雨恊雲霓望潮回白馬神仙風髙百世讜論感孤臣寄黄仲瑱山長三度貢春官中年樂考槃韋編百氏易緇布古時冠雲漢星疎曉江淮月落寒髙堂枕泖曲獨遺子孫安題張明叙安然堂嘉遁張君子安然扁野堂一身離寵辱六鑿罷搶攘對酒鶯來下看書筍過長青山忘賓主白髮任行藏避地養疾寄謝呉桂隠張清逺黄璟和張柳庄落日愁無那徂冬病不斟杖藜疎木下藥火閉門深琴歇陽春曲書親夜氣箴朋游數餽問益見子輿心題謝縣丞季初玩竹軒明府深居竹淇川不啻過虚心待物久素節守官多雪影魚竿瘦春聲鳳律和更栽花滿縣相暎澱湖波題余寅景晨雨繻亭孝子亭何處簳山蒼翠隂簷花中夜滴墓木百年心􅆄蠁通𡨕逺神龍澤物深焚香肅冠珮謦欬有遺音過姚孟麟元鱧佘山溪堂堂依佘北澗泥滓淨毫纖空翠潤侵幌水衣光動簾燕毛情每洽薦鮪味時兼一酌佳兄弟家興讓與亷過馬天章水村居嘉興馬録判歸築水村居土銼長腰米􅐜羮巨口魚青衫沾露薄華髮向秋疎尚爾丹心壯無時去玉除題謝頤素一勺軒一勺源頭水當軒晝夜渟鑒心塵弗昧育徳藻同馨玉匣開天象氷壺泄地靈山人研池渇分得小龍腥題唐子雄照磨博雅堂秦景容郎中為序博雅堂髙闢君應慕古初交龍座右鼎科斗架頭書性樸時多忤居深跡自疎少游大手筆不啻重瓊琚登朱聴孟律海月樓樓居延海月入訝小氷壺平地流銀漢中天倒白榆蟾秋並浴蚌鮚夜相濡只尺驪龍睡無心摘頷珠哭成元章諱廷珪與丁仲容先後日生李坦之張仲舉咸至交好有詩倡和淮海成遺逸詩吟字字精每稱盧八米堪敵李長城虹日銜雲赤霜風落木清訃聞張祭酒涕淚想沾纓名後登龍李生同化鶴丁㸔花頻后土褁茗或中􅍽世事餘黄石朋游半列星何人諡貞曜永為賁泉扃近故二首近故儒林老於予起嘆嗟清秋書柿葉落日賦桃花碑碣留呉滿雲山向越賒多情楚宫月來照未栖鴉近故維揚老威儀本漢官才髙三禮賦心折一泥丸露氣金盤濕簫聲碧落寒空餘茂苑樹鵑血幾時乾鄰飲蠟炬遶紅鸞盆花玉露漙無家憎月色多難薄春寒毛穎時旌鬼黄金少鑄官西鄰濁酒熟得罄一回歡趙待制木石為張怡雲題湖舫雪飛鷗湖堂山闕木石寫髙秋對酒忘新樂闕武林道中風雨孤舟客乾坤一葉身久憂龍戰野翻作鳥依人山赭嵐光薄田萊水色新忍言疇昔夢歌舞送鸎辰舟中值雨寄亷清忠許澄江二山長野艇入淹泊湖天雨往來草牽春緒亂花倚暮寒開積水鮫鳴杼長堤蟻潰臺襄王限楚澤宋玉漫多才題鍾氏亭子愛爾亭如舫繁隂滿四楹月髙聞露滴春逺惜鸎聲烟直香逾細杯深酒益清翻嫌衆緑暗爭賞一花明寄傅文博御史兼簡丁彦誠知事微疾感霜露客居驚嵗寒遥紆長者轍還戴惠文冠世亂窮途早家貧一飯難春來幸勿藥思與奏猗蘭寄蘇上海彦祥兼簡李教諭楓盡荻花乾蒼茫海國蟠莫窮三尺法須貸一分寛集吏朝鳴鼓憂時夜整冠髙情繼蘇頲應念廣文寒懷楊彦常編修落月夢千里故人天一隅名髙藝文傳才大廟堂謨申白舊賓楚鄒枚終去呉河氷泮新緑應已賦三都寄闕鼇海椽郎兼簡宗燈二上人省郎前進士裔出素封家畎畆寸心赤風塵雙髩華玉衡低虎觀金柳亘龍沙寺壁詩千首煩僧覆碧紗簡林仲寔主簿休官林主簿數數問幽居野飯狼牙菜山醪鹿角魚刀圭知有術光範喜無書想見徴龎統花迎别駕車簡陳野航主簿畫舫古琴書青袍雙珮琚詩題梁紇廟恩注白公渠訪舊論心密傷時任法疎人傳飲淞水不食四腮魚聞畿甸消息白草生畿甸黄沙走塞庭直憂星入斗兼畏雨霖鈴殿閣餘龍氣衣冠自鵠形呉粳斷供餉隴麥向人青辛丑四月朔西日下黑氣相盪久之口號八句躍馬羣雄日歸鴉薄暮時正傷雙目短又見太陽虧野老相扶拜天王豈宴私金戈望南國應似魯陽麾春寒天水新歸蜀齊城舊入燕可憐羈旅士重越亂離年日晏還晞髮春寒懶著綿無情野桃李風雨亦成妍題嵗寒橋有引至正壬辰七月十日徽冦犯杭時樊時中執敬為浙省㕘政亟禦于橋遂死之大㕘身死嵗寒橋忠血長流憤未消一片王孫烟草色岳墳松柏共蕭蕭奉題清碧杜隠君為先子隷古西銘太極圖説後武夷仙櫂泊溪雲曾寫西銘太極文㕘政謂周公伯温留題猶六載草堂新對一爐熏奉題文丞相小像贊附中齋鄧公光薦贊曰目煌煌兮疎星曉寒氣英英兮晴雷殷山頭碎柱兮璧完血化碧兮心丹嗚呼孰謂斯人不在世間虚谷方公回系贊曰始見可畏再見可愧三見出涕噫千萬世何代忠臣事二君先生一死重斯文後來故國多登相傳説孤星燭暮雲奉題曹先生柏牕巻有序先生諱思順字彦信柏牕其號也厥先自昇徙梅李宋初復徙江隂五世至文雅生碩咸隠居教授碩以子璉湖南提刑貴贈金紫後有三昆弟聯登進士者故所居坊名藂桂先生葢金紫十四世孫嶷重謹言明易浙憲吕公思誠薦授儒學官再除以大母酈春秋髙遂弗仕至正乙未遭亂病卒有遺藁十巻子博美文行女淑靖蚤寡守節淑清淑寧並不辱死逢僭嘗銘墓曰呉季子邑大江隅曰大姓族曹莫踰歴二十世家守儒公兩典教光前模桂百斯葉一葉敷中復瘁只吾何吁天其好還昌爾孥至是復題是巻云詩曰藂桂坊西古柏青韻含風露雜琴經先生久作芙蓉主喜有餘隂覆鯉庭春霜天家青女試春霜細藻微波凍野塘茅屋布衾誰道薄隗囂宫合瓦鴛鴦和惠子及雨中五首草閣寒多帶水隂雨餘江鳥自浮沈髩毛漸比呉絲白春色都隨社酒深桃花昨夜愁盡發燕子今春疑不來雪衣鸚鵡亦可怪錯喚主人非一回今春又值甲子雨十年之前人日晴東風誰家作花信白水滿堦如雪明鵓鴣喚雲雲不開紫菌生榻蝸行苔五花誥身酒市賣一葉野舟天際回小范宅前花霧開正要惠子白驢來春波鴨緑酒一色飲酒對花須百杯和趙女謝世韻有序南臺掾趙晉女生而秀慧自幼愛讀列仙傳母怪問曰列仙傳何如列女傳女笑答曰某有夙習乃爾或聞人請婚輒謂母曰凡求婦為養舅姑承祭續後也不以實辭而聴其納采脱物故其失三者之望必母氏是尤遂辭之年廿六一夕命婢使具紙筆題詩曰九重縹緲黄金闕十二玲瓏白玉樓明朝了却人間夢獨跨青鸞自在遊端坐至曙而逝文學書院山長樊君浚傳其事屬予與許椋各和一首椋曰遍地風塵連水國九天月露滿瓊樓青鸞背穏星河近先從西池阿母遊浚字文淵廣信人椋字友常吾鄉佳子弟也予曰闕闕開福地采雲五鳳敞紅樓無情莫伴天孫織有樂還同婺女遊題趙文敏馬蕭蕭苜蓿起秋風隠隠黄雲沒塞鴻可愛南朝趙公子尚留先世玉花驄題陳希夷睡圖華山松樹倚雲臺五季龍爭眼倦開未必先天㕘妙理墜驢一闕來題李唐江山烟雨圖烟雨樓臺晻靄間畫圖渾是浙江山中原板蕩誰回首只有春隨北鴈還齋居四首野堂人逺晝深沈鳳裊爐香度玉琴黄耳卧當蕉葉下畫睂啼傍石榴隂坡石幽花駐夕曛研池飛絮弄春雲故人書拆南牕下多是稱呼作隠君有酒不煩人問字無金仍望子收書如何話得幽居好一箇鸎啼春雨餘花嶼生寒雙柚露酒波動影滿天星女兄强健身閒樂稚子時時過草庭邵景誼席上醉題五茸三泖水雲寛幾處春移草亦寒惟有種𤓰門業盛牡丹花到子孫看夜宿岳氏醉題霧重魚生翼山昏虎變文列星如品字知是羽林軍題瞿睿夫鈎勒行我嘗宴龍君醉躡白鳳尾都將蒼梧雲零亂瀟湘水題猿圖霜清月白時冷掛長松枝想愛玉澗水弄影照鬚睂趙待制畫為邵臺掾題有序丁酉仲夏予自梁鴻山復辟地青龍鎮遇風恬月霽或木脱水落輒命童挐小舟延縁黄浦淞泖間無以形容身閒心樂也嘗儗櫂歌曰月明濯足龍江口木落題名鳳山首三泖天低一幅巾五茸露瀉雙缾酒道逢船子歌載過季鷹拍手龜䝉和澱湖􅃤澹神姑迎魚波鱗鱗鏡光破又曰靈胥潮落龍華步少女風生蝦子渡蒼葭兩岸船獨揺紅葉千村塔微露前峰四五先我揖龜魚踴躍蛟起立銀河滄海氣同流頭戴青天如篛笠及己亥秋遊杭户部貢公泰甫以予久屏城府之跡夙狃泉石之好乃一日邀集賢趙公仲穆宴予湖山真館于時境延虚清座挹勝賞偶舉是歌趙曰斯氣象殆非有聲畫而已然畫當屬之我也衆相顧大笑未幾圖成予詩謝曰魏國佳公子烟波小釣徒偶同觴詠樂得寫櫂歌圖林木巢春燕藂祠嘯火狐終焉隨蹈海不敢嘆乗桴自後有以蕭山令薦予者予還寓隠既邊報急聞趙亦歸霅上以卒今年甲辰彦文邂逅呉江示趙所畫綽有櫂歌景予語以此彦文俾歴叙詩左云天目凝神外由拳望眼中霜清下木葉得與醉埀虹書宣妙春雨田上人佘山禪房二首鐘鳴林采曙衣冷山氣夕時復煮茶香烟籠半簷白松風琴虛絃雲磴屐落齒坐來木榻穿爐香一盂水呉中步雲洲道士事老寡女兄甚至為贈絶句看經得錢幣置酒奉女兄儗衣紫霞帔同上青雲城題珉西崑開士冬筍軒雪中筍斑斑如兒在襁抱兒㕘玉版師親年如竹老馬頭曲有引馬頭者大都名姬也始為黄禪太子寵黄禪伏誅沒入以賜太平王王薨子騰吉斯留之騰吉斯被巴延太師殺復沒賜伯竒伯竒國語力士也柯鑒書九思嘗賦曲淮東憲史張彞言之予儗小詩六章適外甥俞堇至因命堇與兒掖攝足其意亦止乎禮義云爾衞風紊無倫春秋濫不止鄙哉金谷園緑珠乃肯死和戎漢明妃亡呉越西子鬼妾賜元臣孰受盧弓矢前時楚襄夢今夕伶𤣥妾瓊斷藍橋漿紅流御溝葉香熏舊繡衣鏡改新妝面只有闕情不解湘妃怨珊瑚近沒官鸚鵡亦更主一闕年年自江浦君仁邁曹瞞妾賤慚蔡琰築臺有嬴金蘆笳不長掩春星復在隅秋水仍含盻本非東家蝶失奠西階雁堇花飛漢宫燕天逺秦臺鳳載闕駢脇郎願同山頭夢鑾刀刲燔羊官甕瀉闕掖王門激楚曲相府西涼調愁中換宫商郎母㸔妾笑蜥蜴飼丹砂鴛鴦置金鎖東風獨何情楊花起還墮攝妾身汩泥塗妾心暴天日後來未亡人願似孤兒恤萱圖為李恒題于茂清軒中暄風宜男花凉日忘憂草一種兩含情親容夢中老梧溪集巻三
