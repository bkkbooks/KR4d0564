body:
  text: 梧溪集别集類四元提要臣等謹案梧溪集七巻元王逢撰逢字原吉自號席帽山人江陰人當至正間被薦不就避地吳淞江築室上海之烏泥涇適張氏據吳東南之士咸為之用逢獨髙蹈逺引及洪武初徵召甚迫又以老疾辭逢少學詩于陳漢卿得虞集之傳才氣宏敞而不失謹嚴集中載宋元之際忠孝節義之事甚備每於詩首作小序以標其崖略足補史傳所未及葢其微意所寓也是書傳本差稀王士禎屬其鄉人楊名時訪得明末江陰老儒周榮起手録本乃盛傳于世榮起號硯農究心六書毛晉汲古閣刋板多其所校定云乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:49b75858f0f964ccbdf30de649d0c0e18ef2e09bdc21d09f899958ab0d1bf05c
