夫路難不復顧大江潮兩程想到石頭城團圓便足樂貧賤莫闗情汝嫂目新暗汝兄病猶嬰鄉村文史二村名間菟裘庶其營為妹向夫道歸農小山好班超萬里封燕頷非草草喜長女孟芸至女兄相繼亡女弟復異鄉長女忽歸寧庶寛離思腸去年中呉圍錫城屹孤望大勢臨叵測薄命全彼蒼二雛抱且攜嫁餘素裙裳淚添新啼㾗瘦減舊容光為父致桃茢為母具蘭湯湯以沐香澤茢以祓不祥五暑風送音一朝春滿堂彼美緑牕芸蔓葉萃嚴霜詎不欲終䕶物性託東陽良人固貧窶老姑尚康强桑青麥雲黄燕燕雙回翔讀郭孝子傳傳附堂構一作髙堂務崇基士瞻一作俗士務峩冠文辭外風教市娼衒春妍有宋郭孝子負母亂兵間白刃加害母懇拜淚漣漣天地鑒素𠂻閭里慶生還相望喬梓䕃各終樗櫟年守臣上厥事䘏典遑所敦章公老太史心惻嘗筆一作筆偶援迄今歴兩朝讀之竦如存浩浩元化流忽忽世俗遷慈雀巧織巢安知鳳孤騫興歌非為郭期共作者言郭孝子名汴字失其傳臨江軍新淦縣人也建炎間敵人深入盜煽起汴居縣東南五十里盜猝至劫汴母責窖藏物既脇以火加􅃤酷焉汴泣告願以身代盜義而釋之郡以聞㑹行在務殷䘏典未遑也汴沒始有表其墓者凡郊赦縣令奉詔祀焉慶元中南郡章穎撰讀吕節婦傳傳附徳人言足徵文人言多靡緋桃艷陽花冬青嵗寒抵孤藤萬嵗名所以松上倚於乎吕節婦喪亂全幼稚馬不被二鞍中心猶止水長終復何言見録顔樂士胡齋名顔樂士貞婦潔並金婺光有煒荒園雪久濕敗竈烟稍起呼兒讀遺傳清風生頰齒晚來興彌髙聊歌續貂尾節婦吕氏婺州永康何頎季長妻也何為郡著姓吕氏名清年二十九季長逝去有一子二女子述生甫三月時江南冦盜充斥人死兵戈者十七八吕氏能保有其子若女且全其家人勸之再適氏白誓曰馬不被二鞍况人乎有死而已聞者疑笑後卒遂其初志郡邑長史文學博士奉㫖備醪餼禮幣表其門同里胡長孺撰讀貞燕記有懷魯道原提學記附天涯老孤臣想像賦貞燕空梁泥屢落故渚氷自泮影托明鏡鸞夢接長門雁飛雲軒不歸自語清商怨元貞二年雙燕巢于燕人柳湯佐之家一夕家人以燈照蠍其雄驚墜猫食之雌徬徨悲鳴不已朝夕守巢哺諸雛成翼而去明年雌獨來復巢其處人視巢生二卵疑其更偶徐伺之則抱獨之殻爾自是春來秋去凡六稔觀者譁然目為貞燕云長沙馮子振記義鄧吾鄉有鄧添千里負主骨晨夜竄草間宛轉皆盜窟胼胝苦何辭性命間一髮日車昏盪祲虹暈或抱月魂氣相衝搪鳥獸亦獝狘經過百戰地青春暗消歇深幸主有靈全生及城闕主母悲喜集流淚心激越主妾事他人空庭自花發主昔為龍蛇公論不可沒但感衣食恩疎戚均賞罰在家為義奴在軍為義卒庶幾銜土烏尚愧擊蛇鶻凄凄薦霜露晳晳上參伐不見秦舞陽悲風動天鉞贈黄將軍中奉其故主將穆爾古蘇判樞母夫人歸呉分韵得烟字丈夫重知己富貴浮雲然壯君仗公義歌詠儗古先報仇韓張良却敵齊魯連昨者邁院判樹羽塗山巔三苗喪精魄萬民歸陶甄斬馬柳鄂州餉客郭通泉外蕃久側目臺諫實搤咽長城乃自壞白氣貫南天君輒討有罪鴟鴉厭腐肉賊圍亦潰散畏君親披堅黄金雙佩刀福禍劃回旋掛之祖道左泣挽士五千梅花映素衣獨上東呉船念彼鶴􅄠母哭兒螢案前萱艸暮晷迫薤葉春露懸豈無一犁牛躬畊石湖田日惟勸加餐樂以卒嵗年今兹喪亂際俗壞教益朘式瞻偉事業前後何其賢大澤氷已泮舟鮫并珠蠙我幸攬餘光校讐圯上編贈君當載馳為國靖烽烟上黨有寡婦後至元二年上黨有寡婦秉心義且貞誓不暴夫惡甘受殺夫名頻年用縲絏五府來公卿惟中李柱史哀矜得𠂻情剖棺重驗屍胸骨金珥横故主認失物茂宰崇門旌太行眷中原黄河流元精仁風慶雲被麟萃芝羅生地秀鍾壼儀四方揚頌聲遒人儻鳴鐸好自姚都城排難行贈王子中相如全趙璧子敬存家氊臣子奉君父由來義當然我為排難行期播今後賢至正十六年一作載楚氛蔽呉天南臺塔御史盡室方顛連風波萍浮寄墟落匏孤懸内無蚍蜉援外絶鴻鴈傳縮地漫勞想拔宅欲假仙形勢轉倉皇一日猶三年君聞急友義側身入烽烟得子猛虎穴摘珠驪龍淵菱花奩影合桂樹月魄圓青青驄馬駒環珥映後先相㸔喜至骨欲語翻淚漣報之錦繡叚長謝賦歸田遂令雞鳴客逺愧齊魯連我時載茶具蕩漾五湖船蕭蕭春隂暮載歌伐木篇弟子篇贈張天椿伯陽俯仰天地間莫重君親師民生事如一世亂多乖離近托采藥遊聊以觀俗嬉張也吾愛友盛事形歌詩儒先金昌伯受業羈貫時相違三十年再見忘老衰下榻橘隠堂開校蓮渚􅎠青燈續舊夢緑醴㓗新卮絶筆俄物化啟牖為輿尸桐棺斂士服丹旌表靈輀鄉隔烟樹逺帆上寒潮遲長路衆執紼悉借東風吹其嫠泣􅈱􅈱痛極感亦隨紛紜馬上郎結納帳下兒卒死豺虎間弗免蠅蚋悲師道茍斯立家國反掌治緝成弟子篇忠孝同少禆送中政院判敏珠爾昂霄使淮浙二藩還京採珠極桂海採玉窮氷天志士取功名盍走萬乗燕偘偘玉節郎匹馬雙龍泉恩光赫徼外徳音承日邊二府饟事畢再拂珊瑚鞭别我㝠鴻亭却話三年前煌煌金虎符婉婉緑綺弦當時茍顧戀安得登祁連汴河氣渾融嵩華青眇綿心馳隴頭月目斷潮陽烟非比漢中興尚論周東遷上無勞土木下無媚胡祅六宫親蠶桑鈞軸秉化權本齊源亦澂四方自蕃宣持為使歸獻庶慰心悁悁緑竹吹粉香野櫻紅露懸翻翻黄鸝羽影落碧梧牋醉歌北上行宿隂適髙褰壯遊豈不美親老晝錦旋山林訪故舊我種呉淞田贈髙彦木木一作木有官貴全城無官貴全身賢哉愚全子讀書宛溪濱花開迎燕社花落送春鶯何心同谷叟甘分葛天民憶昨甲午秋長鎗澒烽塵鬼哭竄中夜雞鳴度蕭疑宵一本缺文晨未少農馬智實多造化仁向來佻巧徒各已腐荆榛依依越南鳥采采呉下蓴丘嫂禮遇至難兄衣食均端居淑諸生長揖辭憲臣誓為特立士白首佩瓀玟與我林泉友視我肺腑親寒郊隂風迥日落雙醉巾浩歌遂走筆世亂毋憂貧贈魯道原縣尹時客授璜溪吕氏大兒振從讀春秋河決多横流世亂無完家由來鄜州月照人生戚嗟郎官有故鄉宛在桐江涯兩邊久荆棘孤村自桑麻慨想回文機永夜燈垂花殷勤王母使時復降紫霞佳兒侍元方弟子進侯芭鞶帶寒執經綵衣日將車並期登龍虎殊鄙註蟲蝦諸侯不能臣忠義聊一作抑爾嘉北風健駟馬南斗通靈查再陳喻蜀檄閭里被光華贈南臺掾布爾罕仲淵兼簡浙憲副察伋士安騶虞謹踐履鳳凰慎栖息丈夫出處間身名寶金石維時戊戌秋念君苦行役體被􅀈縷衣面帶嵐瘴色義不事二姓葢是稽古力白頭一心人亂世成棄擲空凉閶門邸置酒寛愁臆女牛限明河年年會良夕龍津雌雄劍終焉如合璧南垣愧一作視兒子願言加飡食出糟鵝掌紅登市茭笋白長吟寄忠憤短策探勝迹部使問山人因之道深憶贈張俊徳教諭彦中録事王陵一代英徐庶百世士功名繫遭逢孝誠本天理吾友兩孝張其先西夏氏衆方冐國姓而獨變厥禮兄猶困雞口弟嘗躡龍尾出處矢弗違安危視同體前年甌人横猰㺄越南鄙仰事惟君親徬徨曷能已掛帆藉風姨扶輿拱山鬼艱勞千百狀息心飲谷水登堂拜大賓列帳坐弟子鸛雀三銜鱣春氷雙躍鯉雖加晉楚富未忍彼易此緑林氣凋傷玉雪一作璧見穠李殷勤報二難安排書五始穠李謂李忠襄贈窮獨叟窮隂結長寒木介河生澌曠野獨獸號異鄉孤臣悲薜衣帶胡繩三年限朝儀豈徒無炊火顧有麻斬齊身幸免汚辱言之淚交頥脱急藉朱家弔古懷要離遡風酒三酹老氣吞郅支誓郀梟獍肉用塞烏鳥饑漢酬張良志呉乞伍員師行歌獨漉篇以繼從軍詩嵗旦未起宋安道税使袖至倪元鎮書因述懷答倪不食妾婦魚寧飲亷讓水善學柳下惠魯有一男子兹辰屬新正髙枕辭賀禮忽得隠淪書矍然攬衣起隠淪盡散金賤跡痛掃軌薪吹竹根葉盤具園中薺貧病無一錢老幼逾百指寒雲下微雨聊閲晉唐史閔一作陶顔何如人所慊饑乞米寄言物外交仙山嘰瓊蕋常州軍幕中偶白免郡儒築城頓兵之擾凡百十户及闕多予義請留不果因謝别一首野青氣蕭條花落被廣路長河血流水祲接淮楚暮金鍾古名邦强者今得據重城萬工役寸晷百洶懼吾黨章句儒奚堪畚鍤具甔空四壁在幸復罷兵戍論交義咸敦取别情獨遽栖栖馬韀破戚戚虎穴度班彪西河間本為生民故一言悟竇融中心實歆慕遊崑山懷舊傷今一首丈夫貴善後事或失謀始桓桓張楚國挺生海陵鄙一門蓄大志羣雄適蜂起𤣥珠探甓社白馬飲浙水三年車轍南北面復同軌量容甘公説情厚穆生醴誓擊祖逖楫竟折孫策箠天王詔褒贈守將躬嵗祀翼然東昆丘蘭橑映疏綺青蘩春薦豆翠柏寒動棨乾坤宥孤臣風雨猖五鬼銅駝使有覺存作荐懼卧荆杞登崑山寺謁劉龍洲墓隂厓鼈裙披蕭寺壓其左前無容馬地而公靈永妥綽有髙世風荷鍤誓埋我懇懇中興論汎汎岳陽舸竹西旌佩間為士非瑣瑣我來行吟久顧影歎復坐下上百年餘同遇時坎坷疎嵐冐川暝歸鳶跕跕堕惄焉上孤舟星流亂漁火遊小一作卜將軍墓祠將軍名珍字文超唐西河人有功業在崑山民至今祀焉時危曳短裾薄游東崑野有唐將軍塋肅肅風露下木葉金甲動土花碧血洒居然神兵栖夜嘶石驎馬二蛇顧首尾勢若無禦者當時陣或然威福巫暫假靈烏拂人首疎火散村社湠湠婁江波壯懷託申寫讀僧惇樸菴松石稿為其徒智升題有序惇黄岩人趙宋宗室裔先輩胡石堂門生也性介㓗不樂茹腥血因祝髮為沙門壯遊金陵與五峰李孝先並受知梁王一日公引柯九思見柯以寫竹遂親幸王即位獨召用柯李後送公詩云月行天中央天髙如屋極中有雪色下土人不識我曾摩其鬚仙吏睨我側世人乞毫光密如霧雨塞蹴踏河漢揺洶湧若秋汐是誰知此竒南有彌天釋去去不復念令人淚横臆若不能無慨者而公兩主名刹退老雲間心易筆史有山林宿儒氣習佛業師行稱于名緇以壽歿今其徒升謁示公松石藁凡如干篇于金陵時事無一及者榮念葢灰如也升予鄉子弟也請為公述大畧兼和李一首世殊老復至懷賢思彌極靜觀惇公詩岩姿恍曾識葢茅白雲奥結軫彤邸側酥酪味殊作諒珍葑茆饑可塞翛翛隻履邁古渡幾潮汐松偃石泐泉對月巻忍釋大鵬才亦無山雞衒文臆題巴延守仁教授竹石有序守仁䝉古氏至正甲申以禮經領江浙鄉薦中書下第例釋褐出身由是任宗晦書院山長繼長二戴書院後一作復豪右一本無右字占田二頃有竒代流滯十年再中壬寅鄉貢第艱于北上丞相達實公權授安定院長平章張士信尋改為烏程教諭累幣請不赴明年有大臣言之朝始勅除平江教授時士信柄政守仁遂放遊九峯三泖間託寫竹石以自見志節在寒苦内士咸髙之予聲之詩云廣文窮益堅竹石硯池出勢却虞人旌籟隠伶倫律渭川春暗雨淇園寒落日鳳深蒼梧雲茅簷花復實呉城破後門生羅育自睦走無錫遷母胡氏葬還書至海上寄唁一首育字得英亭長屏前殳州尊停羸馬子負後母函相送東門下十年地𤓰裂飛翼恨難假雌雄決甫聞匍匐遑一舍日新照歸旐山舊餘老檟幽闥永妥靈明昊將錫嘏葭長連霜海草白􅃤風野披書為起立亂久孝彌寡予病莫致芻西望醑三瀉岳鄂王墓木皆南向平江張師正知事命工圖之為題一首昔僑嘉會門嘗謁鄂王墓二樸儼喬梓十八松夾䕶一壁青天豁半嶺靈籟度席然巻旄頭槊若列武庫勢回退飛鷁神怳獨屏樹適來卉衣巫載陟苔花阼遺像雖土木快覩猶披霧還鄉驚艸昧臨衝乏材具思得背蒐一作嵬軍少展常山步憂長家從隠髮短嵗復暮溪園黄落深多爾特我顧粲粲岳林圖依依栖霞路物性本莫齊英氣實攸聚月中劍精起想像罷虎踞以袖敬拂拭老淚忽雨澍成固謝妙工壞或恐内樹龍雲與魚水艱哉君臣遇益使澹蕩人終身樂韋布過余山聰禪師道場同曦南仲送昭晦岩上人遊五臺踶齧神駿姿一日千里馳道林愛成癖葢抱才不羈惟昭東余土十載蠅鑽紙夜形駱駞夢欲飲流沙水兹為五臺别其山絶惱熱鷲來照春氷羊角摶夏雪塞向鵙歇鳴啟户緑暗樾空中青猊駕雲端寶花闕地昔安坐具石壁光素發質多阿􅁱羅回回不敢侮凡所相屬妄自見性乃悟聰老望歸來金精立雙樹留曦上人會海禪林送體用庵上座遊南嶽祝融峯名緇五臺英將釡祝融峰杯俯洞庭小一螺􅆺山容雲衲洒飛瀑霜磬度疎松扶桑既入望老對夕陽舂慈報寺長老南岳雲畫山雲圖松圖各有詩予次韻空山不知春白雲莽昏曙幽磬迥已沈詩禪淡自悟溪影流一花月明在雙樹石間孤生松天涯特立士相看雨滴翠似聞風落子駕言歸去來白雲滿蒼苔闕以制所撰並志剛夫婦誌後有後序亂石生畏途濁浪無清潯匹夫與匹婦終始良苦心夫比一寸膠婦比一寸針物性禀自天用去作指南莽莽陳鄭郊切切桑濮音麋瓠瓦􅇲間復見古瑟琴霜飈颯短褐寒雲閟窮隂節母頥相望老矣梁父吟孟志剛者絳人也當忠襄王駐陜剛客授澠池既闕汴平圖東歸計又授徒汴西門無何以疾卒學徒殮未殯妻衣氏囑匠斧大棺學徒舉疑之曉夜更守衣氏乃盡殺雞彘祭畢慟哭以割牲刀自刎死隣友薛方合諸徒葬之西門外初剛挈衣氏自陳避兵來汴病饑行販彰徳而汴彰相繼陷不相聞二年遂間闗至洛將趨汴訪求之俄稠人中有呼剛者剛顧則衣氏也泣謂曰妾曠違夫子市丐廟舍得不戮辱而復聚此天也剛亦泣偕依鄉人河南判樞麻李公居焉公嘗物色一妾勸剛納之曰平時吾州南孟氏二百口今惟剛在且無子若不聴我宗祀責誰歸剛辭曰有子無子命也匹夫匹婦義也守義俟命尚他慕哉逾年沒所性直方每面折人人不之怨尚先生元素葢其師云以制名衡江西人今隠居淇上笋無頭有引記夢也己亥嵗予遊杭丞相達識公用薦者言儗擢為蕭山尹尋病還而蕭山洊罹兵革始悟笋無頭葢尹字也因補是辭夜夢竹笋兮無頭精神怳惚兮莫測其由山川􅃤容兮風露為愁若有人兮告予不可留茍貪禄兮曷免悔尤書儉徳堂左斷石使為砧兮孰配以杵使為砥兮孰承以柱使為磬兮孰編以虡厓斷壁絶兮志士獨與饑渇可療兮薇蕨同煮最閒園東復闢荒地蓺以菜麥名曰青圃作青園辭園始荒兮草棘園既闢兮菜麥食新可望兮饉也云除田弗澇兮甔亦有儲賢者過兮蔬飯于舍我無嗟兮無謝西霞一首書簳山石壁上西霞在岑慨曰則沈言息予心薄燠我襟西霞在麓睠鳥則宿言駐予足薄暖我目維聖學易維賢知非將泳道涯卒依徳輝載引之領載翹之首願焉斯霞以化春酒題商皓圖紫芝膴膴白石楚楚風泉嵐霏交寫互吐於四老父以延以佇以歌以舞爰宅幽阻匪幽阻是宅有誅偶語青松渠渠瑶草塗塗簡出深居㕙麋鶴狙於列仙癯以讌以娯以嘯以呼爰友樵漁匪樵漁是友有適左閭篤生于周考終于劉商不嬴赭斯豈人謀匪人伊天其徳之酬嵗逾邁矣霜雪孔稠我心雲鴻曷日云休我田夏澇也予有田在横泖辰字圖雨甚憂形于辭焉綿上無聞兮汶陽不治我田孔卑兮霖澇載罹蛟鱓王兮陸為宫天戴地履兮曾饘飽弗充噫假使嵗稔兮孰愈道豐擷于晡擷于晡維蓼及荼倚于旭匪栢則竹風撓林兮露零坂攻苦勵節兮愁獨往返天道不逺兮汔嵗之晚響石二曰豐鐘曰泗磬各刻之辭分置林泉豐鐘曰徳瑀璜音琳琅應素商天迨霜歌豳章慶金穰泗磬曰山儲英水凝晶戛球鳴激以清文運明諧大成炎風辛亥五月作是年四月十三日得男孫炎風兮赤日載花兮木筆榴一蒂兮三實文翰兮是膺簠簋兮是承尚期兮來仍木客圖為董竹林山長題有柯者斧有力者膂孑孑荒寒胡不歸處阿房方作鳥迴飛翰大索工師山木是刋星奔電一作霆驅血指背汗從此逝兮猶馬釋絆其食杞桋其衣蘿葛甚雨疾風匪岩伊穴凉宵佳時滿引流霞􅛝一作􅛝笑仰天猩舞戴花予意招之頭若為掉程石載秦雖倕罔效藥使入海吏隠彍塵風嚮景從子非凡倫非凡葢仙有道不死式瞻遺容庸敢追誄尚弔爾坑鬼登鍾賈山淨行寺靜初上人栖雲樓為題辭一首仰山兮棲間秀吾飡兮雲吾攀俯樓兮山上雲層匝兮天樂殷響繄髙閒兮憺心迹伊雲山兮自主客羃蔦葛兮潤簜柏寒清凝兮輝顥白一氣籋兮上浮八紘儵兮周流邈與鶴歸兮弗應龍求濁世翩翩兮富貴可羞將棄違兮筆研杖往來兮蒼翠之幽莆溪蔣蕃李碩壽萱堂詩有堂維茅于莆之原有棁弗藻北維樹萱厥義何居味性滑温母氏飡之百憂用諼子祝福母由天賦善我作歌詩匪頌伊勉維萱黄榮維萱緑荑孑孑芳蕤日清風夷柔嘉孔儀實子之婉悟維萱緑荑維萱黄榮中心􅑱惸風夷日清靜間孔貞實子之孝誠莆流云長葢後作浚于澤堂基云崇葢上作土于積學猶殖也萱兮培徳萱兮培徳后葉之昌奕奕一本無之字華西一曲辭題楊一本有生字士中别業中翛翛兮髩秋步泠風兮歌游睠華水兮洄脈涇鳥浦黄兮獨湛湜田穜穋兮壠桑苧喪賻畊助兮由義之府返窮猿兮故林脱孤鼈兮數罟鑣聯軌方兮狹邪仆壞子不徑竇兮有蕙其帶野凄露兮天肇霜誦且絃兮中堂春載陽兮相攜河陽有竹有序有竹美雲間沈徳輝煥卿也徳輝嘗從先人游既吏禄于邑多所平反而退隠竹庭之下以樂子易之孝養焉有竹青青匪郊匪坰君子之庭庭不容馬杖屨其下風露清洒于享壽嘏有竹離離匪巔匪􅎠君子之墀墀不容輈簟枕其幽炎歊邈悠于樂燕休欲穡之食必嵗其力欲徳之植嵗必其百藐軀兩間好生則均嗟彼厚禄遑保厥身維竹有穉維君子有嗣尚歌衞詩庸濟世美鵲狐答一村張子政窮寒答天變之作有靈曰鵲營巢占風曾謂吾人靡鵲之同有知曰狐涉渡聴氷曾謂吾人靡狐之徵吾人滔滔乗馬丹轂弗範而馳致顛汔覆嘉林之下黝然寒泉被褐于隠時邁世遷霜露霰雪天其教也貧賤憂愓士胥傚也士胥傚也鵲狐是蹈也味易杯有序易惟四卦言酒而皆當險難之時予備嘗焉幸老至矣名杯曰味易仍刻詩杯之槃曰憶昔月初生踰闗衆欲兵黑風攖市虎白浪掣湖鯨石筏宵孤露梁山暑病行天其秩作佚吾老味易遲時清識其略耳葢未足歌樂之乃載歌曰拘羑兮易演厄陳兮道闡聖迹悠兮莫踐未濟與坎兮困需姑味酒兮吾生之餘海月其亮兮天風其徐貪山歌聞門生薛復田廬其下懷歸感昔賦以寄之鄉山東遮兮犬牙銜屹神秀兮奚名為貪我嘗徑度兮加策鈍􅆖義不留兮士之攸嫌聖過盗泉兮忍渇弗取墨舍朝歌兮孝去勝母處獨絶嫠兮殉節死歐飲犢上流兮尚推㓗犢口彼皆然兮徳維其有夫圭玷兮貴鏟衣垢兮用澣愚莫愚兮怙惡賢莫賢兮遷善於兹山兮有隅尤介若兮不汙顧依本兮美物更曰亷兮匪踰羣分兮彚聚綺黄二山名賓迎一作逆兮君山名望江滸鯉山名游龍兮前騛䨲殿跑兮鹿旁乳事見郡志嵐䁙睨兮含丹昕峰髙寒兮洒翠氛乃儲雲兮蓄雨不屑澤下國兮闕氣饙如兮孚尹草豐縟兮水潤液猿鶴胥來兮豕蛇遑息嗟神往兮夢歸疇縲予兮藥石紫芝􅈌兮商顔煒客星兮富春美璞玉剖兮荆岡慚蕙帳虛兮鍾阜恥誓將岩栖谷墾以彷彿夷展之趍一作䞨蹐兮二三子兮操杖几尚闕箋兮飛亷謝山靈兮躧履林泉民歌贈無錫張相夢辰樞明經脩行累辟病辭若有人兮西神顔薜蘿屋兮松桂闗佩詩書兮服仁義擘一作馨斯揫兮采是閟穿虎穴兮攀鳶巢洞扉呀兮泉響交山鬼嘯兮木客跂光矘䁳兮來雲旓琴白石兮自絃𠂻抑鬱兮誰一作子宣楚狂去兮蒼姬衰商綺隠兮嬴炎烟文與道兮就隕孰千鈞兮一髮引睠枯落兮弗䀌加斧斤兮曷忍百實秋兮三秀春老益學兮亂能貧信禮樂兮在野天將啟兮遺民石林一首贈琴友劉仲禮何山無石何石無林石崇林深有我有琴三代禮􅈥遺音則雅烏有一作烏百斯騫樂莫知者石氣上齊林沐時雨流液蔦蘿被澤蘭一作蘅杜白露既滋蒼峭黄萎龍蛇伏坁嵗聿暮而玉攻材蒐我卒懷矣無愠無悶庶幾君子題戴崧先府君良才諱善行號蒼山處士小像有序嵗己亥兵薄括處士命子崧挈母先入山及返迎處士兵大至熸城崧冐燹觸刃瀕死者屢且哀告軍物色父所在害獲免時弟洺將處士竄溪南山處士謂同難者曰吾一褐以老未嘗垢與其蔓艸同穢不如滄浪清之獨也徑投于溪洺救不克亦死崧匍伏與母葬之武溪原以洺祔躬廬墓餘十年而􅃤怛之痛思慕之切猶一日也復繪處士小像託前進士顔守仁徵挽章永嘉曹新民教授有曰菊帶晉愁香不改松輕秦爵老猶青予曰兵貴戢兮不戢何為父蹈水兮聲一本有餘字嗚悲由也盡思兮裒也廢詩惓惓于圖兮孝亦庶而霧雨除兮神魚揚鬐魂騎上天兮涅無淄紫岡贈華亭徐克振書其邑丞魯淵道源序後有序克振名振少孤哀大父母保育誨字底成立振克敬克事大父母沒苫寢蔬食廬墓六寒暑猶一朝夕逢謂盡禮盡思之道振以孫行之大父母孝矣詩曰眷眷海濆匪澤斯鹵巋岡紫土孝徐振所伊孝云何蚤背恃怙維大父子撫維大母子卵襄而抱觿而膝髫塾冠室愛猶一日乃絅乃文乃玉乃質侍靡須失大父母胥喪毁瘠痛呻蔬麻凷苫義弗間親閫閥㒺踰禮經是循百六十旬綿􅚩有𤓰孫枝有桐霜寒雨春油油于𠂻爰主維户一作尸爰亢維宗手口澤存亦目觸涕汶一作從山始崑江源岷鷹豺仁人曷不人於昭者天相在爾振尚禄爾後雲懷歸石林兮晝緑野月兮夕縞將捫蘿兮采之藻我心兮懷歸人謂我兮娯老最閒園辭園有木石予從而景息匪息也景彼其予識園有禽魚予從而心娯匪娯也心彼其交一作友予豈曰車無脂不良驅馳豈曰馬無羈及此阽危尚慎之哉草露之滋𤣥芝辭有引逢寓隠烏涇之三年七月望命兒拊薙後園灌莽報有異艸在椒之下即而觀焉葢𤣥芝也作𤣥芝辭有芝英英在園之東輪囷雲章白郭𤣥相吾不知為妖為祥於乎猗蘭之芳聖人之傷聖人之傷小子之藏題留侯小像漢髙三尺劍子房三寸舌剛柔兩相濟秦降楚復滅君不見乾坤狡飛鳥秋脱使子房無世仇箕栖潁飲老則休埀釣圖為窮獨叟題麾扇渡頭芳草多投金瀨口水無波非此水不投釣非此草不製簔人心其如忠義何史騾兒有引騾燕人善琵琶至治間䝉上幸上使酒縱威福無敢諫者一日御紫檀殿飲命騾弦而歌之騾以殿前歡曲應制有酒神仙之句怒叱左右殺之後問騾不在悔曰騾以酒諷我也前和州同知李澄言于逢欲傳其事逢為賦一辭澄字中深開州人翰林承㫖惟中先生從子也虎帖耳豹俛首青天白日雷電走尚食黄羊光禄酒史騾曲曲春風手蕭王馬蹴滹沱氷亞父玉碎鴻門斗鳳凰鎩翮蚌珠剖趙女舍瑟秦娥罷􅇲飲中八仙方下來御溝濺赤花飛柳君不見龍生逆鱗海嶽寒嗚呼史騾乃敢干和州孤臣説舊語梨園弟子更新譜送日本僧得中遊廬山嘗歌廬山謡既誦廬山髙謫仙歐九氣兩鏖後世邈見詩人豪上人毛吞鯨海濤崑蓬嵩華窺秋毫香爐瀑布試一遨五老離立同兒曹三百六十龍象遭天燈絡繹長林臯我聞層巔聳峭壁字畫􅃤淡古鳥跡禹平水土紀功徳廬君以來人靡識盍捫雲蘿梯磴石摩娑模索為我惜聖神闕酒三􅄋亂餘赤子甚饑溺安得再賴乗橇力盡九州内為化國回首扶桑長只尺張節婦呉氏辭有引呉諱妙寧松之上海人年二十一贅同里張氏子越四載邑大姓以事連坐其父寧泣曰吾父茍無地為解族其赤矣吾不遄死禍延良人悔孰甚一日遂雉經死未克葬徵繫吏果至聞寧死唶異而去時友生顧彧教授其里乃攜寧幼子浩來拜逢請文逢因書此以歸之辭曰紅羊年黑䑕月張婦呉儼遺烈九山風酸泖波血二氣舛錯愁雲結百里泥塗昏墊中梅花一樹驚飄雪我招數十節義魂扁舟今過西新村嵗時堂上虛鳴佩烟雨牆角餘繰盆篇詩為付孝子浩四海薄俗何當敦題姚外史草樓黄鶴鎚碎江水聲燕子空鏁苔衣生齊雲一炬亦焦土草樓寵辱何曾驚草樓岑然玉局湧月流大丹海流汞九天浩氣神與游大地八風吹不動琅璈迥度鐘磬閒鶴翠洒洒常清寒青精分食野人飯琪花獨樹雷師壇己公之屋杜陵賦南陽之廬帝三顧君之草樓百靈䕶萬象森羅畢呈露昨者邀醉中山醪羨我脱略元龍豪不知誰主復誰客髙枕東來午夜濤醉贈相子先有引子先名禮素精奕比學黄大癡畫輒逼真近登鳳山睹予舊所題名因作圖見寄既邂逅旅次乃飲之酒贈之歌云老生不能臣諸侯却來題名鳳山頭霜晴木脱壁峭立鴉兒大字淋漓秋于時陳肅邵維翰隠余薛遥睇中原心耳熱兩人既仕李河南鴈斷鵑啼榮夢歇邇承奕相遊兹山三復舊記松蘿間野僧有待碧紗䕶畫圖已自傳人寰君本家西河鍾秀西湖曲龍城倚髙寒雁蕩濯深渌華亭道阻汎雪船四一作乗鰓鱸買梅花前青衣童保進斗酒邂逅意氣凌呉天好將金城圖略上天子回首共訪巴園仙三月十二屬予初度時客舍承朱僉樞攜僚佐見過我生三月之仲丁長庚輔日當奎星命居旄頭身驛馬薄有抱負多飄零鷫鸘嘗典金陵酒蛟龍幸䕶錢塘􅬉乙酉十二月予䕶母櫬泊錢塘鄰舟多為風潮所覆魯連海上隠行歌呉王臺前辭下走清齊庾杲廿七種短䟽劉蕡四三首才名從知造物惡心臟空夢神人剖乙亥曾感異夢見心臟皆五色兹辰客舍風雨俱湯餅尚少􅇸中蚨正冠試誦蓼莪什衝泥適來櫻笋厨帳士彈箏玉連鎖廬兒執炙貂襜褕落花䔩䔩香埽途闔座氣作思馳驅箕不以簸斗不􅆽仰面大笑真吾徒辭帥幕後王左丞復以淮省都事過舉且送馬至以詩辭還梁欐難衝城干將難補履歴塊過都百戰材枉送懷鉛提槧士左手控紫游韁右手執青絲鞭􅑷身試上文錦韀呉臺越苑山浪湧連城花暗揺紅烟由來得意虞失脚帥府元僚早辭却方圖安步傍林泉敢許横行向沙漠野庭憩馬荒雞鳴馬思故櫪雄風生殷勤目送便上道駕牛萬一至南平登君堂闕奉陪秦景容郎中太夫人唐氏八十壽席登君堂拜君母坐君右酌君酒君冠切雲藻火綬刲腴割鮮會昆友霞觴載稱載獻壽兩行蛾睂小埀手鼓吏蹀躞進軒牖清歌裊裊絲縈藕鳳蠟龍香上􅆼糾極南老人星在斗老人郡封福如阜飲寒食生異白兮孤孽疏逺及奔走隂煦春育同親厚聖經賢傳萃淵藪座間雍容不去口妙年胎教君腹受所以巍科談笑取君言世運厄陽九甲第紛紛沒蒿莠湖田二頃宫一畝謝超宗兒孟光婦賣金養志恐少後孝行既至仍引咎嗟予遭亂墓失守貧賤鬱鬱此居久伯符公瑾骨已朽丈夫意氣誰不有願堅道義莫背負公沙昔得交杵臼夜闌青烏巢堦柳微步淩波動魚笱我歌跌宕君聴否出門大笑霜鐘吼贈醉墨生徐貽君不見王勃醉墨腹稿成張旭醉墨草聖鳴生也醉墨心醉畫落筆迥奪天人精首法米南宫繼習北苑董試臨老閻職貢圖頭飛鼻飲欲活動去年傳馬大夫黄冠野服賀監湖今年寫鍾進士絶行髙名魯男子不圖木落黄龍灣寫我弄月扁舟間醉墨生復何有胸中魚鳥在沼囿所願淳風化日回上為至尊千萬壽千萬壽良有時殷髙舊貌版築相漢顯曾草雲臺姿匪生是望將誰期生再拜生再舞一尊來㸔最閒園三花且對江珧柱秦筆妻有序筆予里人也乙未亂挈妻依同郡朱判官璚居呉中筆病卒貧無以斂朱為具棺衾且思所以䘏飬其妻妻覺泣謝曰良人筆生以藝游搢紳間詩書禮義之教妾亦與聞之矣妾以未亡洊有累於鄉長者在長者義妾其于義何朱加慰之夜漏半哭益哀遂自經筆死所朱為合葬焉良人賣筆芙蓉市交接無非大夫士詩書禮義言熟聞氷霜松柏操奚云亂餘良人死君託恤寡見君尤不惡願君葬妾良人邊夢中雙報筆如椽題楊􅼞孫仲桓芝泉亭仲桓年友今儒者雙親父約山先生平陽人母華亭陸氏遷葬神山下厥土騂剛位巽乾佳氣絪緼騰紫烟紫烟經宿未曾散周産瑞芝旁涌泉芝泉亭開但讀禮地匝紅雲石流髓中心一念十五霜孝格上天方有此君不見道傍骼胔厭鳶螘聞風或掩虆梩取奉贈崔節軒同僉崔侯昨者神與籌黑書脱雙溪樓手持使即肘佩印歸擁萬衆雄貔貅丞相飛奏天動色詔僉僧臺安禄食思家逺在嵩少山拂衣却過機雲宅機雲宅繞蓴菜碧故吏門生候朝夕珠樹三花一萼紅華髮千莖寸心赤寒波木落雁呌霜山人鼓柂牛斗傍好峰四五青在眼獲共尊俎談興亡世皇混一埀百載遼金風習至今在會須禮樂本三王庶得兵戈清四海今春三月黄河清草澤正爾龍蛇横袖中有頌未敢獻且浮大白陶餘生陶餘生浮大白醉裏狂言俟不責杜陵晚遇張鎬知謝安元是桓温客朝廷念亂徴老臣早濟斯世康斯民慎勿便薦一作江湖自適王山人簡完杭州時久雨三邊有警呉山十日雲晦㝠雨聲長驅如建瓴慎郎闖市蚌鮚生羅刹錢塘江舊名洶浪魠鱓腥枯株産蘖詫芝菌總為爕理乖常經黄童白叟病塗炭仰首願見台階星朝廷分寄屬邦牧况君牛刀新發硎曩年步取雙珠虎兹辰坐享五侯鯖疎紅小翠集燕寢長楊髙槐連馬坰南來獠氣一洒豁萬室半起炊烟青夫差茂苑已入楚㑹稽孤鎮餘岧亭烏龍山名陸沈婺隕石舍葢堂奥栖流螢重闗借問竟誰守幾夜急度軍中鈴左車未少井陸作陘計孟堅不惜燕然銘我居漏屋漫憂搗天末殷殷收奔霆聞君多在達相側必也有道安生靈嗚呼亦必有道防邊庭奉贈秦郎中時卜鄰横泖我乗太乙舟偶過袁崧宅平生兩青眼喜見有此客客從胄監登桂籍日下名齊雲五色躡鳬峩豸十年間附鳳攀龍萬方赫八閩郡縣苦兵革老弱轉為溝壑瘠草中冦竊偵天險閫外元勛勞石畫斗南使星夜流白獻可替否承帝責花門卒就鈇鉞誅木灣薦貢珠琛舶流亡復業軍給食萱樹堂思茘枝陌陳表情同李令伯還家事異徐元直江妃鑿氷躍鯉魚橘包筍脯羅前除雁行衣綵互勸酒鶴髮埀珥猶觀書奴躬畊稼婢織絍座右章甫無時虚王珪房杜早交結愧我孤陋才空疎丈夫生晚世曷補墳墓亦已成榛墟行歌考槃賦遂初山妻操臼兒駕車卜鄰老傍曾參壚題華亭趙氏雙慶堂雙慶大字三尺餘書學博士米老書銀鈎鉄畫煥華扁野鶩家雞隨墨猪南垣從事寶藏久題封逺寄趙隠居隠居夫婦百有七十嵗慈顔童若道氣神仙如雨燈的的夜猶績霜髮蕭蕭晨自梳平生種徳還種樹坐見葢擁于公閭大郎賣藥隠城市小郎謝吏歸村墟小郎奉觴跽進酒大郎帣鞲躬膾魚今日何日席不虚水蒼珮映青霞裾鵝羣池散晴雪滿燕子簾巻薰風初膝前玉語蘭解笑柳拂九秋花圍輿一門四世咸在侍衆賓屬我留瓊琚我從去國至避地目治多難常欷歔乃翁全獲福善報伯氏仲氏尚慎終名譽伯仲載拜答頌禱已聞帝夢遊華胥二胡節士有後序列仙之癯山澤儒連璧迴映清氷壺一寒太髙黄道士一貧不謟羅司徒古來夷齊礪風節元方季方方軌轍祥麟威鳳不可招斷霞落日鴉明滅二胡節士婺之永康人長穆仲次汲仲前後並寓杭穆嘗風雪髙卧午未啟户道士黄松瀑至扣之曰得毋饑乎穆曰不饑得毋寒乎穆曰不寒黄别去見宗陽宫真人杜南谷言其狀急饋米酒綿炭復慮不受不敢過多及饋臨穆曰此必松瀑與南谷言濟吾饑寒吾固不饑不寒也卒不受汲一日文敏趙公來求撰羅司徒父墓銘楮鏹百定他物稱是汲曰吾豈為宦官父作墓銘辭之時絶糧一日矣後趙文敏挽詩有云淚濕黔婁被心傷郭㤗巾槩可徵矣黄台人杜當塗人咸有髙行兼儒雅前鄉貢進士錢唐錢惟善云目畊軒有後序身畊勞百骸目畊勞兩瞳身畊口體常不充目畊奚止穀在中所以金肅氏目畊俞塘東滿牀破書一畝宫傍若萬頃秋雲空菑畬經訓信有穫鹵莽心地知無功生徒下淑親上侍束脩自足菽水供邇來種學道且熟蝦荒蠏兵嵗洊逢禆官旁午稊説横牕鬼出掌燈揺風卓哉金肅心不動却訪謝病還山翁翁嘗舌耨苦少助忽驚岩電超吾戎于時野淨啼饑鴻江月賸照梅花篷畊耶耨耶姑兩置暖腹試强新舂紅贈言緯象不久聚奎分當與李公平章前後相輝隆李公諱好文字惟中開州東明人幼力學家苦貧夜就隣之磨坊燈讀書凡十餘年靡少懈一日值雪抵村舍媪貸斗麥一作黑菽媪却曰子奚拙畊公曰吾目畊耳其意氣自若也既諺曰目畊夜分李好文後以明經登進士第累遷太常博士會至順皇帝祭太廟乗馬至裏橋無敢諫止者公膝行阻橋曰請皇帝下馬上如之百官咸悚懼上入問左右特授禮儀使明年丁母王夫人憂至正間權國子祭酒從容語上宜躬祀孔子上敬納之丞相奏重臣代由是命丞相代祀一本有太牢仍以羊千角他物稱是用勉勵弟子員句未幾上丁夜臺中丞耿屏騶從入與觀禮弟子員誤遏之翌旦耿督刑部問所遏者一監騷然公曰中丞弗原其誤乃欲施鞭刑耶遂解印丞相以聞耿詣謝乃已下有其拜御史平反上黨義婦獄在諭徳太子議拜如禮始與之見位省臺輔賛以道中外師重句嘗進所撰禮書若干巻官至翰林承㫖致仕河南平章卒從子澄為予言之故予録以為肅勸肅尚勉之哉奉寄烏延子忠亷使君侯昔守常郡時九箭河頭喜相見眼驚烽急未深語城郭一夜寒暄變壯哉陽山土著民能為君侯獨酣戰春頒王正在田野坐卧長對天北面闗梁既撤元氣回赤日焜耀浮雲開五花儀從紫色馬掲羅葢擁呉門來中朝大夫録殊績南省丞相收遺材方瞻福星照苕水又報清霜飛柏臺柏臺有詔新整飭十道司存咸率職似聞青宫急中興尚恐岩廊事姑息頻年淆亂甚隋季在在諫官當任責君侯素是骨鯁臣麟角鳳毛為世珍國家湀闢舊言路白簡實封宜上陳西湖二月鶯花辰畫船不移空緑蘋幾時重逢下車揖乞我湖隂埀釣緡烏涇書所聞炫晝桃花縞夜李陽和薰蒸露華洗托根上苑八十春汎艷御溝三百里香深影密覺漏遲舞隊暗消雲氣紫驚霜忽薄萬年樹花神争隨北遊豫細草青粘南馬足長楊雪睞征夫目聞者不為此歎吁月姊赤脚驅長途行丐尚有天黄姑范氏義夫賢婦辭有序范琦字子善父竹坡居士世杭人妻瞿諱慧貞嘗粥首飾奉師教子毅宜立及歿琦年四十或勸再娶曰娶為宗祀計也吾有宗祀矣既子森嶷儒儕間丁時棘艱毅恬守鄉隴宜登至正已亥江浙省備榜進士授華亭學諭立隠居教授數薦辟疾辭宜立迎父養以卒士至今多瞿之賢而重琦果于行也推為義夫賢婦云竹坡范氏家湖曲有子温良婦賢淑春風于飛堂上燕秋霜連理庭前木三兒珠聯業章句甫缺文一作具釵環溘朝露有琴永絶鸞膠弦無衣更着蘆花絮古不再娶華與曾何幸到爾遺風興始諧雎鳩卒孤雁及見闕孫闕巨筆誌墓其音徵楊女貞為鐵厓提學作有後序一夕百年盟鋭然東海寡婦清髙堂欲奪柏舟志坏土爭觀貞木榮耿耿血書岌岌孝塋比境相望異代齊名旴江天涵白玉京剡峯壁立青雲城萬松仗夾千花迎仙遊微落綷䌨聲並樂不苦神如生君不見西施傾國辱越産故妻求去羞漢卿草𤣥閣上琴尊暇授簡叨為女史評女貞者鐵厓公之從父女弟也諱宜既筓許陸氏子某一作娶一夕卒後達官聘之宜誓不嫁母逼之閉重户自盡公嘗植女貞木以表其墓曹娥塋天台王氏青風一作峰廟並比