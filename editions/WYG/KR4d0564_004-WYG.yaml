body:
  text: 梧溪集巻四元王逢撰雲山萬重辭有引雲山萬重者廣平張民思親之所也民侍父懋夫為福寧時承命還省祖壠兵興道梗莫克迎養因扁是名于千山别業以寓陟岵之懷及福寧君歸數年來而不忍易是扁且徵福建省郎中魏郡秦景容氏補一作鋪繹其事秦復為民致書席㡌山人王逢以歌詩請逢辭曰雲山兮萬重山無雲兮不期而同膠盭軋芴兮夢寐或通陟彼岵兮焉從親奚在兮在閩王之故封雲山兮千里山與雲兮紆譎茈虒干戈日尋兮日逺滫瀡瞻彼旻兮曷已親奚在兮在須女之遐鄙始雲山兮越秦兹雲山兮主賓幸安全兮來歸感孝念兮精純鼎有臠兮盤有鮓松之隂兮山之下嵐霏􅣲兮空翠晴流素輝兮堪攬把庶頥神兮葆年寄丹𠂻兮騷雅白雲一塢辭有引白雲一塢者西域馬公文郁隨所寓之名也公頎然蒼儼秀潤嘗為潁州著亷斷聲拜南御史㑹亂遂變名雲林子黄冠野服超然物外葢十餘年矣一日遇海上逢心知其賢敬美其辭辭曰白雲兮一塢山之間兮林之下氣鬱積兮常素寒黯流泉兮憺終古塢之人兮土苴紱組顧潛有鱗兮瞻戢有羽彼䝉塵兮顛隮兹含光兮延佇諒觸石兮有心龍之不來兮曷滂其雨山舟辭有引山舟者華亭干山周氏子鏞鎬藏脩之所也鄉貢進士陸君宅之首為序江浙提學魯道源次焉時規美至矣延平總管秦景容氏乃為山舟之言曰人知兮山不可為舟曾不思水載地游又曰山有舟兮不可以濟龍在野兮孰與治世逢讀而感焉疑焉因矯其意更補一章詞曰天有船兮在河潢􅧃析木兮柁扶桑乗剛風兮死氣象大地兮川梁君之舟兮虚器川弗沙兮山是懋林空人兮積水白龍森寒兮來下戲自非聖哲兮莫濟亂危維徳載義兮姑傒其時髙宗傅説兮逺而精誠感格兮夢或見之玉芝兮石髮瀾駢生兮明月君採以遺兮慰我心渇將送君析木之津兮扶桑之側漪南草堂辭有引漪南草堂者予友葉生杞釣游之所也闕京口宦族有别業淞之呉闕大父鍈闕隠居好義杞讀書負材諝前太史楊瑀守建徳辟掾闕興㑹進士及第李國鳳經略南土杞密陳時事十闕李嘉闕所言遥授闕義副尉鎮江路丹徒縣主簿將别任之而兩移藩鎮矣杞築草堂魚鱗江上扁曰漪南秘書卿闕泰為序江西提學楊維楨江浙副提學魯淵為詩予儗楚音二章辭曰苔碕兮蓬屋魚鱗之漪兮一曲渦盤兮秋谷風舒徐兮水波縠中青天兮琴滄浪恊白鷗兮迭黄鵠匪濯吾纓兮匪濯吾足懷賢其渇兮誓將心沃紃屨兮布服蓮葉其舟兮魚鱗其屋雲淨兮天開蘋白花兮草豐緑何曲曲兮鈎鈎當作釣鈎將恢恢兮綱目仁義是漁兮憺口腹腹不人累兮人誰吾辱秋風露琴辭有引至正己亥得是琴於杭名以表徳辭以寫志云爾辭曰月明兮庭空援琴兮堂中耳濯濯兮泠風風行兮凉度月來兮堂阼心湛湛兮零露草緑歇兮鵙鳴木黄落兮潦清兒築場兮婦葺茍庶有享兮粢盛汎宅辭滄浪兮獨客自名其舟兮汎宅身大地兮同浮心靈源兮靡極天髙虛兮氣清洒挹星月兮光上下本不狎兮海鷗素相違兮野馬春一度兮桃花醵漁蠻兮魚社將歸三首梧桐生朝陽鳳凰鳴髙岡嗟哉羈旅人彌年獨徬徨非不善趨走玉珮垂雙璜君侯多車從瞻者亦輝光如何日同游忽忽我鬢蒼衡茅龍江上兒耕妻蠶桑夜來得家書云當奉烝嘗去去甘貧賤露沾衣裳盡歡非全交去國難㓗名中心黙揆量惟有歸為榮張翰不知幾直待秋風生陶潛懶束帶千世莫與京故邑變大荒墳隧走狐麖徘徊乆幕下荷殳得無情天未厭亂離且復寄傭畊安得周處將從之斬蛟鯨金洗必以鹽錦濯必以魚越石無晏嬰寧免厄道途我生千載下乃讀先秦書既非今所貴盍不賦遂初海鳥集魯門風鷁退宋都麻衣白皜皜青山繞吾廬醉從接輿歌醒學寗武愚尚愛湖水清臨别更躊蹰馬大沙舘舍病後留别陳氏昆季三首日脚浸深江暮色先著樹回風戀叢薄山一作幽響不蹔駐羈人卧齋舘邑鬱秋已度十口江之南一飯屢外一作回顧㝠㝠烏領白眇眇鶴髮素夜久蛟龍移沙洲莽烟霧開門風欲來衆木斂寒色蔓草縁岐路零露向秋白千金生焦勞斗禄疲形役儵同草木腐何有名教益參旗掛簷間絡緯秋四壁兀坐燈復親孤光委今夕天空無纖雲銀漢鏡面瀉芒星煜煜動霜氣横萬瓦尋常恨伊威蟋蟀北牖下青熒樵爨火黄落壙垠野絺綌淒以風刀尺念當把家山限一水杭葦不待假薄田庶有秋雞酒會隣社避亂綺山謁子方陸先生墓山舊名啟我經冷水灣缺月照微服景非度秦􅊐事類避同谷松林深無烟狐紛竄伏隆然四尺土巻巻在東麓問是先生墳感慨逾慟哭洵書失歐陽蕡對多馮宿許韓兩耆舊許益之韓明善二公時論推鼎足憶過先人廬白駒駐脩竹周情與孔思小子幸私淑天回晨星稀世亂烽火屬心言采芳藻中宵不盈掬太𤣥屬桓譚九歌繼宋玉抱膝獨長眠披榛忍南逐遊鯉山舊名由里山鄉山三十三遊鯉奠郊南嶻然獨髙大秀揜東諸嵐土剛蓄炎精厓仄削劍鐔我嘗挹飛翠逺在滄江潭波濤與伏興雲霧相吐含恍然穆王駕八駿左右􅆖又如琴髙仙脚踏朝蔚藍久思更徽號新喜遂幽探太白賦九華後來成美談狂歌繼其武林澗免愧慚春風緑瑶草秋霜紅石楠行將脩月斤為鑿避世龕蛟龍正格鬭鯤化誰其堪次蝦妾岸朝辭鳳巢村晚次蝦妾岸起望大角間太白光有爛方罹杜陵苦未巳崔旴亂髩毛掠蝙蝠竹裏鳴鶡鴠同曹迫憂悸相視名錯喚前途非樂土殊昧賢達算誰家繚崇垣轆轤卧井榦餘歌乆悽惋酣宴同清晏寧知楚幙烏不寤呉宫燕蕭晨理舟楫回首重悲歎遊梁鴻山簡孟伯茂巡檢及其子爚求田泰伯里卜室梁鴻山山雨微洒塵清風滿柴闗竟夕上山氣破曉開蒼烟樹合隂䝉茸磑縁石巑岏桃花照春空渌酒生紅瀾鶴去瑶池苑來遶青琅玕本非神仙流得盡霞外觀故鄉久蕪穢何時得生還當時歌五噫聞者心鼻酸晤言同遊士伯鸞在人間望大小貢二山大貢如大人小貢如小臣大人方正笏小臣亦埀紳太湖七十山而此我所珍清淑萃間氣端厚凝風神嶽露蓮一朶海偃月半輪遥分馬脊秀近奪蛾睂真岫幌敞素夕雲葢擁髙晨深容虎豹隠幽絶狐隣將軍山名雖相望邈若越與秦我行柯村外紫翠忽鮮新不無靈異栖飛渡招隠淪洶洶白水波杳杳清路塵芳蓴被中沚采之淚盈巾父老昧鑒識謂我諸侯賓我豈諸侯賓均是天王民同鄭本初基訪呉庠鄭明徳教授元祐俞叔鉉學正鼎教授留飲齋中是夕雪因相與聯句以紀一時會盍中呉泮宫古廣文官舍敞佩衿方休誦逢冠帶駢憩鞅嵗晏雲四合祐雪暮霰交響飛簾勢簸揚基滕六影下上汙邪畢潔淨鼎坱軋周滌蕩若將混端倪逢無復别封壤颯沓竹末俯祐碎兀木本强漏壺咽銅龍基城柝卧素蟒氷澌靜膠研鼎顥氣深刺幌香乾芸散帙逢味永虀凍盎擁褐肩獨聳祐擊鉢技自癢詩盟得寒郊基茗飲失粗党路迷梁園邈鼎地失程門丈殊憐跼驢背逢頗快衣鶴氅沈廖度郢曲祐浩溔泛剡槳流風注存心基叔世入紆想戍遥皸瘃苦鼎野曠𤓰牙攘好音懷鴟梟逢怪物絶魍魎願追文正躅祐不辭慶厯黨層甍庋諸經基直道擴羣枉新知春蘭藹鼎舊游曙星朗謙虚側臯比逢欲寡賤熊掌張燈初筵秩祐舉爵朋酒饗黄羞登俎柑基白薦作羮鮝叙齒先一飯鼎探錢罄餘帑清宜禪僧分逢瑞許賢守賞螟蝝殄無類祐來牟熟有象隂褰天光發基陽復履道長髙視吞八九鼎獨立配㕘兩幸敦君子交再極尼丘仰逢青青孤生麻青青孤生麻不假䕃松柏貞莖瘁蓬藿物性還自直汝州曹彦可大字擅鄉國蛟龍出笑談雲烟濕牆壁强逼書旗號怡然别親識心正筆不回骨冷血化碧日落河岱迥野史實我職事傳奏太常四座為變色瓦全一時幸玉碎千古惜端人何地無安得環轍跡葛虛中丹房雨一本有坐字遲劉𠂻道士仙都十日雨濕蒸致微疾憑几問金丹掃地焚蒼术蝸行亂艸上鶯隠嘉樹密不見劉崇虚蕭齋坐捫虱一作膝故禮部侍郎古括范公挽辭公諱闕字君澤辛酉卒年七十有四鳳凰無凡雛麒麟無凡駒鳴岡一作岐與産渥必待天人孚侍郎唐相履氷後括譜逺通蘇與文正公同系父一作甫晬服斬衰母孫訓以儒長授父祕易律厯百氏俱宋亡邑弗靖徒步謁索多元帥名計聴魁就戮田里釋千俘世皇既召見神采動玉壺賈晁不世遇京管並駕驅嘗謂國修短乃繫帝賢愚暴虐亡嬴秦仁義治有虞衆貂製裘㡌八珍繼醍醐一作酥宫炬金鑄蓮禁地青為蒲恩光去天一作裁咫所器嘉言謨一薦十七人乗遽將臨呉夢母報已烈戴星戒歸途抵閭如其夢孝感驚妻孥江南范秀才名自九重呼大用本天意小史應時需謂除編修鑿鑿正統論歴歴編年圖時相欲以本朝繼金為正統公言金興宋中而前亡不可繼也倡一作媢者雖得沮士儗古董狐成宗御六龍萬象新洪爐超遷五品貴兩省埀範模除浙江江西提學屣倒張中丞珪手握徹大夫理儀曹試經濟政府匿瑾瑜逺引卧雲壑獨潔辭潢汙繭室客暮醉鯉庭子朝趨謂公幼子成笑命説三禮翛然竟長徂北風曰云凉繞樹莫匪烏屏營獸居野盛徳仰在予族貧均家財兵亂全姊軀何幸覽遺稿追招一作挽為操觚故南臺治書侍御史劉公挽辭公名貞字庭榦晚號知止翁辛丑年卒壽七十三鄙夫昔避兵船居虎丘畔注懷臯伯通受知劉公榦賓禮甚倒屣自享非大案顧惟陋白茅期以藉玉瓚于時屬州陷常熟守將病無算袂分裁信宿城破及黎旦承佩都漕章躬先於越竄卻缺義救鄭張耳尋降漢載紆東浙籌不忝宗臣晏朝廷簡勛舊省憲望改觀始懲蝮螫手終如馵脱絆公嘗任浙東南臺侍御史以剛直自見因劾奏大臣為朝廷所譴故云八閩假遊遨花明天機段幔峰露浸浥鏡水雨徐渙決老歸善里翛逝神不亂惟公家益都先世彭城貫氷槩操清苦厓壁氣魁㟁故吏記石畫列郡服山判駸駸蕭曹業咄咄顔柳翰􅆒歴四十年進退符易彖幾多固名位桎梏死獄犴少挹賢達風足免赧恧汗青徐隴尚隔霜霰物屢換蓬深仲蔚居地冷中散鍛安貧庶全生酹酒重三歎故秘書卿宣城貢公挽辭公名師泰字泰甫號玩齋公為天使時弭節大江北上以祝帝釐下以訪幽側邦侯首予薦遂命屏棨㦸身先萬人禮縁重三生石君山視吹臺酣遊小八極詩厠李杜間文入班揚列家貧及親老臨别深惋惜既自持節還奔波殆如織退然不求進牛衣方偃息熒惑犯嵗星蝦蟆瞰眀月折箭河水清揮戈烽火隔震澤定逾年中原平一日帝曰嘉汝勲公辭不堪役詩書化斥鹵清慎奉王國賤跡何足稱常恐瘝厥職阮籍任放曠邴原病剛直蠅驥信可依鵬鷃各有適豐城張華劍柯亭蔡邕笛此物甘棄材志士感精識青宫念師傅宣室思討益不意狂風加圖書寂東壁南湖墓木拱鹽海甥舘闢雲車從空来鶴語聲惻惻安得公降庭為碑表先徳公嘗許撰先庫使墓故遂昌先生鄭提學挽詞處士星夜明先生生嚴州闕伯氏目漁蒐筆繡絲五色花様從驦求器大晚始成兩壁東諸侯謂太尉張公蹇予謝通顯客隠琳宫闕偃儀杖履聲闕過話舊遊幼遷西湖學淳祐餘前脩闕間絃歌繼觥簫甲科趙期頥闕衣躬摳隅覽姑蘇臺遂成賈胡留克莊亷使榦幣逺至兼闕禮逾優家立四壁寒身視二頃秋健兒俗闕儒時贅瘤而父我所銘儻死思我酬凉日照銀杏風鶴層雲頭罷酒一笑别仰俯嵗忽周超超鄭𤣥邁闕浩休緬憶分教日示藁雪燈篝聯軒孝義什磊落數名流闕行世未能詩挽淚莫收鬱鬱石門山故隴阻且悠曾祖克宗西川經畧使祖開先知道州永明縣橘霜淨屋洞劍虹光虎闕好􅆖于闕柳待制柳公貫轡逺拉虞文清虞公集黄文獻黄公溍輈超然地下樂邈矣塵中憂故江淮一本有財賦府三字副總管致仕彰