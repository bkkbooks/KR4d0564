金城霸業非似聞寒壑底虎子尚號饑哀公顯道憲史有引顯道諱天有歸徳之寧陵人至正辛巳以書經中河南鄉試校靈一作廬州儒學正甲午辟淮西憲史明年從分憲按蘄黄紅巾陷廬母妻女姪舉莫知所向乃客授呉中既病學者於朱子四書有所未通著思問録四巻學者便焉張太尉凡兩聘擢並辭甲辰春有自廬以母喪來告者顯道北望長號日夜痛心遂致疾卒葬呉縣筆鎗橋一作塢子某甫六月於乎可哀也已詩曰壯日鄉書薦中年憲幕趨親容千里隔世亂一朝俱醴酒醲辭楚蓴羮美厭呉私憐鵬臆對誰䘏鳳毛殊日本進上人將還鄉國為録予所註杜詩本義留旬日贈以八句首二句一作異域頻來往隨縁獨爾能重譯歸㸔母僧中獨爾能上方雲一鉢滄海月千燈雀舳蒙衝艦龍函最上乗杜詩書法隠毋惜授諸藤藤其國中著姓寓隠鴻山承無錫張倅罷一境搜粟之擾既李司徒命僚佐物色戰艦鄉鄰徐氏船在拘籍中予以家船代之口號謝張及司徒僚佐舊亂經重坎新僑感二天境無搜粟尉鄰有載家船勸趙嗟夷甫宗周仰仲連鴻山爛白石容卧紫蘿烟中呉採蓮巷重㑹前州牧有引州牧西域人江隂達嚕噶齊也比任屬城破聴調無錫軍中無錫亦破被繫九月予偶聞言于今左丞王晟得釋焉且自具人船餼飲送其還牧徳予以奴奴于予為謝予辭不受至是重㑹徵詩詩曰故侯囚楚日予客亂兵間片舌非圖報長鬚遂却還荒烟深井臼大雪幾闗山偶㑹愁長别吟鞍荷再攀題余忠愍公所撰兩伍張氏阡表有引張昆弟二人景星諱共辰景山諱竑並以儒學官累遷景星霍丘主簿景山滁州判官天永仕淮省員外郎謝病隠居教授闕止景山孫也東淮海王國兩伍世儒家鸑鷟春聯瑞龍蛇嵗起嗟天文新日月阡表古烟霞賢後承餘慶辭官喜髩華懷唐伯剛有引伯剛名志大如臯人嘗為淮藩統兵無錫禆將擄巨室甥女以予言徵還之最憶呉興守當時義莫湮軍中歸擄婦堂上舍詩人野飯彫胡滑山齋寶晉新文蘇美風韻想見霅苕賓一作濱聞中書平章丁公死節其子伯堅嘗從予游明公冠豸日獨客病蛇秋幸得為儒老承聞殉國休青城無化鶴函谷斷歸牛惟有南俘鬼隂風西北羞西一作面哀故淮省郎中海陵俞忠夫有引忠夫諱齊賢本隂陽家者流張太尉開藩忠夫與有功達實丞相奏除前職及太尉稱呉王累犯顔諫止不聴且攀援淮省㕘政遂杜門謝病以卒太尉稱王號郎中謝病軀孤猿霜月淚羣雁稻粱圖初志宗周鼎餘生待蜀鏤全歸至正末足愧楚鉗徒題余廷心㕘政為霍丘博古山尊師撰遇仙觀記蓼西琳舘闢淮省大㕘銘地泄烟霞氣山潛木石靈荒茅無盡白汗簡有餘青黄髮呉陵叟癯然鶴姓丁邵彦文臺掾使呉藩承過旅次問所儗河清頌稿欲歸呈大夫晉一作普公時予病不果録姑詩以謝一騎南臺使知予頌陸沈欲塵天子目少露野人心茅屋秋從破雲山日向深裁詩謝髙義所願紫團參彦文善醫謝周侍御伯温書跋二十三年所擬河清頌近者山人作新承侍御書分甘終草野辭敢達椒除晉帖唐臨盡秦碑漢校餘時應對朝日光動壁中魚題長春道院許𤣥逸所藏桂風子與朱貞一真人詩後仙人桂風子勇别上清君晞髮三神日巢松五老雲桃椎今問訊奎閣舊論文謂虞文靖遊幔峰青疊蓬頭並鶴羣謂金尊師題朱翬逺鳳山丹房圖相子先所畫子先中國士棋罷畫雲間一作白雲間黑榦蜿蜒水青分鸑鷟山客捫蘿蔦入童採术芝還覽巻神為往鮮飈洒珮環送崔則明同僉之紹興總管風氣通藩郡朝儀聳柏臺溪山當鏡入鼓角自天來凋弊嗟多故承宣屬大才春明貴早省先雪剡梅開題南翔寺僧璝宗璞西房重過梁朝寺詩僧失瘦權閉門雙樹月煮藥半牆烟流落驚人語消揺出世縁自今可無憾名賴老夫傳柯博士臨文湖州墨竹為頓悟寺堅席石上人題官罷奎章閣竹臨文使君似將湘女淚痛洒鼎湖雲雉扇梢堪把鸞笙葉忍聞山僧置岩塢佳氣若絪緼贈董仲仁府判府判身强健銀魚映故貂低頭居矮屋扶杖説中朝夜鵲南枝冷春鴻北路遥好同商皓隠莫赴子房招至正丙午三月廿八日自横泖遷居烏涇宋張驥院故居有林塘竹石因扁堂曰儉徳園曰最閒得詩凡六首卜宅賓賢里生涯始有涯憂縁常念亂貧為數移家徑合交枝果簾當獨樹花池臺幾峰石相友卧烟霞平生一丘壑今住小林泉樹古走藤蔓沙虚行竹鞭紅蛛網石罅白燕下琴邊不有故山憶溪南買祭田鄰曲敦新好園林恍昔遊衣冠時徑入棋槊夜忘收已遂蓴羮興何煩杞國憂人生貴行樂兩髩颯先秋池深雛鳳穴地浸小龍泓白石埀綸影蒼苔拄杖聲人心常淡泊風物自虚清多却詩千首無由避隠名丘園宜養病薄暮一徘徊倦蝶投烟草潛魚樂水苔尊中天影落階上月明來家政傳兒子惟須藥籠材無才甘在野多懶愜行園石露漙雲氣池風損水㾗艸深眠雉子林静習鴉孫儗著幽居録漁樵共討論過廣浦林洪聰上人承示湖廣郎中余闕書撰舊主濴河化城禪寺碑記淮西憲僉王士㸃篆額為題左方舒州余柱國百戰死酬君天地留元氣山林被慶雲世無哀九辨吾及頌斯文僉憲俱陳跡爐香為一焚奉題車玉峰先生世運録後有序車氏世居永嘉由唐末徙黄巖始盛大一家師友一作學淵源實肇敬齋先生敬齋曾孫隘軒有五經論平居録隘軒孫是為玉峰諱若水字清臣賈似道再一作三聘入史舘辭不受夙承父某春秋學復師杜清獻公範清獻學于從父南湖公諱􅈌字良仲南湖學于朱子玉峯嶷然諸先輩後所著述曰宇宙略紀曰世運録清獻嘗序之曰重證大學章句則魯齋王先生為沿華論以實之曰得車君書言致知格物傳未嘗亡也自知止而後有定以下合聴訟一章儼然為格物一傳使朱子聞之當莞爾一笑云玉峰孫浚浚之子程咸與予交因示世運録讀之大有禆于通鑒綱目然未板行于時慨嘆不足姑叙世系大略于在并頌以詩曰有宋車先徳生成道學資義辭丞相聘經證大賢遺泮水涵魚藻髙岡老鳳枝再觀世運録仰企不勝思游漕湖遂過鵝蕩登梁鴻山北望感時懷歸二首家寄寛閒野身逢大有年羣龍西北極斗酒水雲天二老歸來晚狂奴故態賢殊悲鸚鵡賦重讀馬蹄篇捨櫂舒髙目鄉山落彀中因聞呉賜劍懶問楚亡弓殘日羣鴉路危城一鶴籠何時復舊業牛女對疎桐陳子章出示呉藩馬㕘政誄文因哭以詩諱玉麟海陵人道義雙金重風神片璧輝榮親華皖簀迎客倒顛衣百戰城頭破全軀地下歸論詩憶傾耳香閣漏聲微掖還鄉冢子還鄉籍予心獲少安亂離為客倦衰病過家難霜月闕苦河氷獺影寒發春忻在望薦祖五辛盤夢靳公信州利安有後序諱仁昨夢過朱輪衣冠儼主賓清齋三月守厚徳八鄉民山鎮一作鎖薔薇洞天低杜宇津論心復道舊分首怳超塵公由中書通事出長道州幕陞江西省檢校遷知諸暨考最代浙相版授江隂尹三月復授理問其年徽人迫江隂境舉家合仲季弟百餘口倉皇無依予為覔舟挈避蘇既浙東帥觀孫復州城而公奉相檄撫綏軍庶時東八鄉巨室細民多脇從者帥請加兵公從子師于予又感予義因問八鄉故予曰民非樂亂以失父母耳父母寄舊在公今公來不其子乎帥惟公命其有不矜宥乎遂具語帥止之轉同知常州道憫骼胔亟移文掩焉及任左丞和和奬公諳大體公曰草文則布衣王某也逢因受左丞知尋辭歸公亦退隠杭致仕信州總管卒平生清儉詳恕所至布善政云題宋丞相董公致仕誥後有後序兵籌閒葛亮經術老韋賢正氣風霆恊清名斗嶽懸墓無金下殉家有誥今傳載拜書遺蹟英靈儼在前公嘗帥潭凡民居火例以軍救已則有賞軍往往俟火烈覬徼厚賞一夕火公至立皂纛下令曰火到聚星門先斬蘇統制軍遂力救以息壽七十九薨諡文清葬當塗石城山元僧總統嘉木揚喇勒智發公墓一無所殉嘉歎掩如初公配張累贈衞國夫人生叔度知婺州生雋壽古田縣丞生祥發廕承務郎徙居松省憲交薦辭或問故曰世禄宋忍他食耶生天麒天麒生士方咸隠居教授士方會予朱生弦家既示誥且語公逸事及家乗願有述予以公勛業筆諸史矣而誥有云伊洛之書盛行獨以身而體蹈莘渭之事雖逺常望古而慨慷孔明如秤之心居然服衆儀休拔葵之操端可矯貧併摭附云得兒掖書時戊申嵗是年為洪武元年客夢躬畊隴兒書報過家月明山怨鶴天黑道横蛇寶氣空遺水春程不見花衰容愧耆舊猶語玉人車李東陽謂此詩幾于悖謬亦各行其志也視迎降恐後者畢竟何如饒士程式以謙山長卒其友趙謨捐地葬之予哭以詩憶過桃花塢言隨伯雅深欲披𢎞演腹為納比干心世守祠先禮時傾待客金龍江墓草碧還倚望鄉襟憶朱芹湖有序公諱顯忠字彦良如臯之芹湖人昆弟五同居協雍公身長七尺負氣謹行太尉開藩掄公分帥曹涇三考義兵長多素封家罔敢餌以利有孝女盜樵鹵毛兵執獻既知為母病用市藥即慰釋之陳徐二偷作憸人潛掠商貨杖而徙其鄉前進士楊維楨窶且老嵗周禄米他物稱是予嘗客隠呉下每過聴言論無倦色及戍曹遣千户史岳邏徼就饋問予再躬往餉焉席上徐謂曰竊審子製作率節義事私錢四萬敬為壽梓助予辭文不稱事公曰事非文不傳幸毋讓今節義事盛行公之力半焉公今歿矣姑憶八句非簡公也示不以恩于已而繫于辭云樓櫓海天埀彫弓韔虎皮錦鮮清暑宴白馬上春旗人感官刑弛塗歌盜跡移壽文錢四萬時往致予思寄任子良府判兼簡元樸鎮撫伯温都事伯璋縣丞龍江羣玉樹曾不外葭莩抱病去年獨全生兩地俱巢頻移社燕味弗改秋鱸擬過還鄉楫童孫從紫􅃭夢左丞吕公仲實乙亥嵗以浙憲僉按江隂予拜識焉漢盛登安國唐衰擯九齡人間猶望雨天上忽騎星故郡曕風采端居接爽靈孤松倚喬嶽想像比柯青贈瑪嚕教授有序瑪嚕字兼善西域人元初祖哈扎爾仕江南遂家上虞父額布勒津力資兼善學以禮經領至正壬寅鄉貢浙省臣以北向道梗權授尹和靖書院山長既航海赴會試後期不果禮部尚書李公尚絅特言之朝勅授嘉興儒學教授及還㑹政屬淮閫屏居幽遐且十餘年曲奉二親甚至今春訪予最閒園風雨花落離索滿目觀其志尚孤卓殆忘世之洊變身之益貧也乃酌之酒贈之詩云顒昻西域士鄉薦十年前隴畆心中越山河枕上燕尊同漂梗地門掃落花天慕殺柴桑老詩題甲子編哭門生朱文禮有序文禮字彦則徽州目齋公之曾孫也父道存長江隂幕首延予西第禮於兄弟間風裁清邁言往往如老成會紅巾亂舉家還上海居無何上海陷既苗帥復地大掠祖妣縣君與母氏諸父季弟相枕兵死禮同兄被擄得不葅醢以逃重見父于中呉而父復旅死兄弟相弔人多念者不幸禮又短命死哀哉前是上海巨姓有女許倩其弟弟歿欲遂倩禮重賂媒善説之且遣家僮盛致儀物器玩禮一無動心並謝曰昔者孔圉以姞繼妻太叔疾之弟唐太宗𤣥宗率納弟妃斁倫遺臭莫甚焉禮奉教于君子稔矣奚忍為此議乃寢嗚呼使禮生唐初時膺爵位建法令則凡在覆燾之中其肯聴依末俗婚醮陷大有為之君于不義乎翹楚秀苕風雨奄瘁天其為哉禮素性孝友多可稱者予因録其尤哭之詩云春日果投車秋風茅捲廬不為獲雜行曾讀世遺書闗度鷄鳴早鄉還鶴唳餘黄泉二親見悲感謂何如同前進士鐵公毅張林泉夜宿朱良佐梅雪齋香動暮寒輕牕含月迥明寸心游太素萬物讓雙清半樹苔偏濕中庭鶴不驚孤山剡溪興異代一時并莫月鼎法師道行録為海虞山致道觀周元初題有序法師呉興人宋莫公提刑之後也諱起炎字月鼎生寶慶丙戌儀觀魁梧神情爽拔幼習舉子業嘗三試弗利遂究心𤣥學放浪江湖間縱酒任狂往往作字類霞僪雲佹靈異惚怳使人莫測其所為寶祐戊午秋紹興旱馬守裕齋迎禱雨雨大㴻理宗三十五代觀妙天師咸贈言有元至元戊子世皇徵如上京祈雪騐輒止師陛陳曰天氣中和萬彚順暢不宜抑也上悦賜上尊命典其教固辭歸呉癸巳冬微疾弟子王繼華奉湯藥殊謹因輾曰明年正月二十六日非爾所能療也至日浴更衣書辭世一章問繼華何時殮曰棺衾已具端坐曰當俟五事備既逝夜三鼓天洶洶雲風雷雨電俱時未驚蟄繼華愕然悟乃斂葬長洲陳公鄉元世皇三十一年也始師抵青城山丈人觀禮徐無極及聞建昌鄒一作鄞銕壁得王侍宸道妙即往備僮役鄒病且革欲厚遣師泣以實告特授張星一符訣自是行四十年如響影予惟師能雪夏雨暵者其術也憤世托狂逺蹈之操則君子有取焉序而詩曰南北動君王風霆雨雪將金花牋寵錦紫柘盌封黄叔世儒無效先天道大光何當閔焦涸隂殛幾桑羊題元故㕘政張公畫像有序公諱文虎字山雲江西㕘政瑄仲子也生而魁壘面如滿月善左右射至元十三年賊横海侍瑄擊獲之賊黨立季父背將緩縛覆害公覺拔刀斫賊踵仆一軍震驚十五年南征遂以勞授忠顯校尉管軍總把佩銀符明年征日本十九年宣力海道二十一年遷武畧將軍管軍千户佩金符督餉輸京師丞相引見上嘉歎公異呉産詔去㡌手撫公顱曰真吾國臣二十二年敗婺州揚老生二十四年鎮南王托歡征交阯陞定武將軍文阯海船萬户佩虎符轉粟從至松柏灣遇賊逆戰擊敗之既暑疫王議罷兵以後躡懼公屯巨艦于隘口約戰賊不能悟竟全師還二十五年超懷逺大將軍慶元總管兼領海船萬戸佩三珠虎符民庶乂安二十八年擢嘉議大夫行户部尚書海漕都漕運府事開便道有功二十九年拜中奉大夫湖廣㕘政賜翎甲兠鍪弓矢刀劍將兵復征交阯成宗即位徵還大徳三年冬移京畿漕運使尋改浙江㕘政五年領江淮財賦都總管七年家覆臨刑色不變有白氣上干識者寃之公性尤孝友太夫人疾侍藥不出户限者三月與宋處士陳雲岩為布衣交敬不少衰平章髙霸都素壯公聞公死太息曰水無張朱陸無劉二霸都則我亦死矣因哭喪明延祐二年姪天麟䕶喪歸葬妻夫人髙氏祝髪守志逢獲交公從孫守中式瞻畫像既題以詩且為序勲行如左云目電氣凌虹烏號左右弓家財金谷夢餉道鄼侯功畫像髙堂上皇圖落照中女孫守韋訓喬木耐飄風朱秦仲僉樞趙仲徳水軍婁江舟中夜宴席上二首大幕分開閫三邊罷枕戈春寒留水國天影落銀河年少孫征虜威名馬伏波樓船恨淹泊清話及隂一作夜如何澤腹解春氷方舟靜宴朋大魚跳白月馴鷺狎華燈漢有鴻門㑹齊多狗盜能清風滿揮麈不計酒如澠讀俞建徳詩稿有序附後白苧紛呉語芳蘭歇楚聲斯文天未喪諸老氣猶生烟火孤村僻江山故國横誰甘草同腐杯酒汚脩名公鎮名伯貞字崇徳人登鄉貢進士第累遷建徳路建徳縣尹卒其所遺詩稿凡百餘篇予盡讀之得文學行義尤著者八人其一曰䃺峯曾一作曹先生江西人負碩學當宋末屏居講授士多歸之有春秋凡例大學演正藏于家其二曰顧辰伯嘉禾人為國子生時淮荆多虞閫府檄屢辟卒隠徳終其三曰忠惠蔡公襄六世孫伯可師劉一有後字襲父廕官為郎既歸附即不仕其四曰禮部尚書衞公上達五世孫謙號山齋松江人明易元初忠武王版授温州路治中亦堅辭其五曰徐成仲善詩建徳巨族昆弟九人同井爨嵗饑輒捐廩賑之鄰火延燎若干户伐山木代繕完以居朝廷榜其門曰義門其六曰張彬之茅山人素泊於利一毫不競里有兵難冐鋒刃救止焉其七曰楊州蔡應祥事二親盡禮二親歿刻木肖像祀益謹其八曰歙女張適同郡汪三桂甫五旬而汪蚤世張誓守節孝奉舅姑嗣同姓子逢辰為後詔表其閭於乎采詩觀風之政並廢久矣而職太史者又多缺遺教弗復興俗益大壞間有才徳節義或見於野史又不必傳將來卒同澌􅌍草腐於乎天髙地逺一作還瞻望無及變遷離索吾誰與歸也按先生黍離之感慷慨激昻往往見諸篇什而於忠孝節烈大致尤三致意焉讀此序至末幅吾尤竦然起敬題費長文所藏徽廟暮雪寒鴉寒烏立枯槎翮鎩深噤舌似顧夷門雲却帶燕山雪梅一作楊東隠居士寄跡南山道院以其髙志因美二首飽更世故勇投閒自補仙曹洞府班赤汗黄塵猛火下翠𤓰紅酒石林間滿山怪石卧羊羣一水寒沙浸竹雲仙鶴似知新有主天風零亂羽衣裠題龔行可逃荒别後有序丁未大祲殍殣蔽埜當斯時雖抱道之君子礪志之丈夫靡有不困厄者若予里胡氏婦舉室危亡之際情有可矜者因紀以詩曰妾身雪中竹雪虐竹自持妾心水中石水流石不移自與郎合􅈟恩愛靡少衰賔闕誓偕老豈料遭年饑山田無稆採土銼斷烟炊索飯兒啼號埀白姑尫羸不見東家伯逆子獸獍為不見西舍叔尸蟲潰牀帷地赤草木殫云胡弗思惟五口相枕餓一口寧生離一口不生離五口死有期孰若鬻妾身倉卒乃得資得資糴官米可救姑兒飢董永尚自賣郭巨亦埋兒失節事極大疇昔已粗知計出不獲已舍此將安之姑兒命茍活臧獲役何辭姑健郎有恃兒長郎有依願郎篤慈孝天嘗相陳遺錦鴛兩分飛各免肝腸悲妾有贖歸日鏡有重圓時右逃荒别龔行可作也行可越人名轍有冷淡生活詩一帙烏涇王處野藏之久逢一日與隣友王壽櫟顧心月郭壽樗徐靜頤夏竒峰秀岩昆季過焉處野延憩茂樹下偶出帙共覽之皆幽人逸士也後得是詩紀胡氏婦予嘉歎曰行可庶仁者之存心也因題二詩期與詩事並傳焉困厄凶荒古有之詘身殉養婦堪悲將心若置良人腹坤道乾綱兩不虧奉粥黔敖絶後塵開倉汲黯愧今臣天王旰食朝元閣不道佳人自鬻身簡烏涇重陽道院儲無極鍊師風落天髙夜氣分神遊為謁紀星君酒材藥料凡三品付與山人老卧雲王處士袖四六啓謝製壽藏序銘因出示靜習稿為題絶句序銘後附露盥薔薇細細披朱弦疏越大音遺不同司馬論封禪尚少柴桑儗祭辭處士上海人名泳字季深姓王氏宋進士日輝之曾孫元故鎮江儒學教授遷衡山主簿鏞之子也性愛易自號靜習或問靜何習輒對曰習不由靜未㑹學也先是衡山君卒遺命以庶弟奉其生母處士悉畀舊田宅而所居地僅數弓廬十尺冬夏一裘葛日蔬飯晏如也配沈丹徒尹烈孫女生一女適邑儒呉茱一子上殤門生劉縜冠履昆季為置龍華之原營壽藏處士角巾藜杖消揺青松間而歌曰蠶何物兮繭是室兮吾其願畢兮抑亦二三子之力兮歌闋長嘯而返謂沈曰吾死貧無以斂特汝得為黔婁妻不既賢乎沈曰妾老尚績圖夫子暖老計妾不願賢如黔婁之妻也聞者多之至是請予壽藏銘予以髙朗令終處士其庶幾哉銘曰生斯游死斯藏古賢達是方雖晦也孔光經楊節婦故居有序龍華雨晴劉松屋老人同野步道經一故第曰楊節婦家也丁丑夏彗星見天下童男女訛惑皆成配時楊年十三贅張都水子裕十五生一女十七裕早世楊誓守節今幾五十矣昔蘇文忠有林氏媪詩請繼後響詩曰日度虀鹽嵗枲麻望中脩竹帶藂葭老人為説睂山叟詩紀青裙笑紫花一作紫笑十七孀居亂幾更隔溪聞得紡車聲却思臣妾書降表不獨南朝謝道清題張守中所藏祖父洎母陳夫人三器圖銘烏涇楊士中詩後附守道非難守器難圖銘復遣子孫㸔銅仙滴盡劉郎淚一夜秋風折露盤一目圖銘意也消孝承先世自前朝衣冠不似杯棬舊誰在羮牆復見堯仁廟曾稱孝順孫盤盂復保後來昆杜陵文熖輝星斗枉記田家老瓦盆李哥有序哥灞州倡女年甫十二三母教之歌舞哥泣曰女率有紅翳我獨為此乎母告以娼業不可廢哥曰若此聴媪媪亦當從我好母陽許之自是不粉澤茹葷所歌多仙曲道情有召者必詢客主姓名乃往人亦預相戒無戲狎哥凝立座間酒行歌闋賜之酒不飲灞州判官嘗忤哥逕還誓不與見孟津縣監賂哥母夜抵舍哥懷利刃閉卧内罵監曰汝職風化首而狗羯行不去血汚吾刃監慚去明日知州事者聞之歎曰州有貞女不知吾失也吾次子明經舉秀才真若配也以禮聘娶之未幾紅巾入冦夫婦被執以哥美將殺其夫哥前抱夫項大呼曰吾斷不從汝求活冦并殺之河南理幕沈昜云蟬蜕汙塵配鳳難亂中同死義尤安灞津落盡埀楊葉月魄清游奈薄寒女長倡優解愛身士遭離亂合安貧艾蕭荆棘蘭㕘伍畢竟幽香獨占春題讀碑圖銅臺花柳暖雲迷天塹雲山白浪齊若也孝娥碑果讀終身無愧漢征西寄題日本國飛梅有引國相管北野者剛正有為庭有紅梅雅好之一日被誣謫宰府未幾梅夜飛至北野卒死謫所國人立祠梅側僧進得中云瘴日雲霾不放歸精神解感禹梁飛水香霞艷渾無恙瘦比纍臣帶減圍陳生尚秋容軒中醉題芙蓉便面露莖月朶玉河干莫作仙人掌上㸔三十三天秋似洗通明前殿薄生寒白塔行有後引塔成始刺天塔壞漸平地一曲冬青花江山肅秋思冬青花不堪折南風吹凉積香雪揺揺華葢萬年枝上有鳳巢下龍穴羊兒年犬兒月霹靂一聲天地裂右雷門唐珏玉潛先生感雷震白塔而作也始宋諸陵被總統楊璉真伽遷置故内鎮以白塔先生嘗與尚書省架閣林景熙躬拾不盡遺骨别葬山中植冬青為識既先生遇寒食則密祭之一夕夢黄袍者數人率一嬰兒狀玉雪指示曰以此報掩埋之徳先生後得子因名珙今字温如豪于詩至正己亥予遊錢唐會平章張士信壞塔甃城人知恨楊璉真伽不知恨士信楊猶造塔張乃忍壊塔耶且聞松江僧慶講主道宣傳誦是詩宣幼從珙學有請乃為賦白塔行并系前後事歸之宣云先生極惋惜張楚公而不諱其弟之惡尤見公道梧溪集巻四
