body:
  text: 梧溪集巻五元王逢撰哀尹伯奇一首寄楊鐵崖有序鐵崖楊先生嘗擬古操十見寄且徵同賦逢豈敢當姑擬哀尹伯竒一首答之今附其四操其箕山操擬巢父作曰箕之山兮可畊而樵叶囚箕之水兮可飲而游牽牛何來兮飲吾上流彼以天下讓兮我以之逃叶投世豈無堯兮應堯之求吾與堯友兮不與堯憂其前旌操擬衛伋夀作曰爾乗舟兮河水濁且深我同舟兮誓與爾同沈母有命兮諌不我聴示旌以盗兮我先以旌衞有國兮國在兄殺兄及我兮我不如無生其履霜操擬尹伯奇作曰霜鮮鮮兮草戔戔兒有罪兮兒宿野田衣荷之葉兮業易穿采楟花以食兮食不下咽天吾父兮天胡有偏我不父順兮父寧不兒憐履晨霜兮泣吾天其殘形操擬曾子作曰我夢有獸兮其獸曰貍貍有恠兮身首異而告我以凶兮戒而戒而我丘有首兮誓死完以歸逢辭曰比屋可封兮孝微稱重華大孝兮後莫有承孝後母兮伯奇權輿彼楟荷兮天將用符晨霜涉兮尚俾寧遺軀擬古二首寄題金陵林氏永思堂春陽熙熙從侯于淇禄積萬鍾車服是維彼淇有源伊誰無親負米為養曽不滿豆飱淇水委委霜露亹亹載望故丘心曷能已右擬子路作秋日杲杲有培者棗載見之華及實之老言采于庭於粲于筐參也可嗜考也因亦作可忘口奉惟薄體愛惟厚庶幾全歸狐正丘首右擬曽子作張氏通波阡表辭有序張氏宋丞相商英裔也髙宗渡南子孫遂居杭之菜市八世祖某遊松愛千山櫻珠灣遂家焉六世祖八七居士又自灣遷鳳山陽祥澤匯躬職農畝奉親孝生通儉朴恬慎事繼母猶所生遇冬雪埽隙地撒粟以食凍禽翔集者以千數通往來慈烏或有翼而隨者夀至九十三生顯博閲書傳尤精梵典及星厯山經地誌之學攻苦恬淡如父風與儒釋唱和詩偈若干首傳于鄉夀八十四生俊廣顙豐耳美髯鬚音吐如鐘涉子史學長于刑書中慈而外剛見善若嗜視惡則疾如仇鄉閭共以其咈諾為曲直人負不平不之邑而之俊咸稱之曰張片言尤好施賑貧救難鑿義井造義舟建大石梁者三夀七十生三子愷悌瑶愷生子曰龍曰鳳悌生子曰興曰睢瑶謙厚長者䘏䕶一方生子曰麒女妙齡適盧祥龍生宗仁宗禮鳳生宗義興生英麒生斌桓麒讀書好禮以宗譜未修懼喪亂之餘彌逺彌失乃即祖塜通波之原徵前進士㑹稽楊公維禎為阡表復徵逢撰家廟辭勒之碑隂可謂知所本也已夫積善慶澤流衍五世迨麒緒業益修華聞益著公侯復始於是乎在辭曰鳳之秀兮維陽盤渦洑兮萃嘉祥田膏壤沃兮物無疵癘天秘地藏兮鬱鬱吉岡暑寒兮露雨甘有醴兮肥有羜紛頒白兮降登蘭忻忻兮玉語語雲隂凝兮風凄色怳凍禽兮下粒食伐石刳木兮以梁以舟民免掲厲兮鱷擾馴安流眷門閥兮宋相裔徳深植兮善廣萟顧無往兮不復被服䙬衮兮再世其世荒寒寂莫圖為分湖陸緒端叔題風捲藿水返壑天同雲兮雪雰落彼何人兮斯旅泊樂夫荒寒寂莫惟寂莫逺囂郭惟荒寒謝朝冠于以終盤桓濯足小像辭有序天台陶氏九成名宗儀號南村居士明經博學養髙雲間與予友善嘗為贊騎牛像曰望一男子冠裳清灑有青其犍騎之林下于是一作時白雲冐嶺黄落被野後則加鞭前則執靶雖心乎甯田官而於齊小白為曠世之交雖跡乎梁進士而于髙无賴無半面之雅蓋將徳業丘山富貴土苴尚友飲水上流之樊父度關西遊之老者也歟今復為題是像云水漉漉其流為谷爾濯爾足載捫爾跗兮無朔漠之􅏿谷沈沈其水則淺爾足爾澣載撫爾踵兮無關山之趼維沐彈冠兮維浴振衣敝屣忍棄兮疇知幾微孺子設作兮滄浪同歸審安齋二首有序顧彧孔文扁齋廬曰審安予為賦詩掲座左右以儆焉有皎者駒刷朝秣晡置之通衢弗蹶弗瘏子其驅有華者衣長佩帶埀蒙犯煙㙠以垢以淄子其辭噫富貴倘來尚相夫宜兮有圭者窬蒿蓬其居風雨攸俱四壁以虚而子晏如有磽者田勞力其千兵荒無年甔石以眠而子恬然噫貧賤不遷斯樂夫天兮知愧吟一首日吾齋兮書琴夕吾園兮冠衿冬洊熱兮春載隂薜絡垝垣兮菌彌中林弧無弦鏑兮天狼角岑屯泣旅瑣瑣兮楚音越吟啜醨于觩兮作麋于􅑄奚弗知愧兮猶有蓬心後㝡閒園辭園中雜題附天工覆兮地工載予㝡閒兮罪之大喪亂仍兮屢烖悔才力耗兮壯志怠霜露氣變隂草木流哀音淵逃頳尾魚野啄氄毛禽弗嘅以慷兮而歗且吟斯吟歗兮樂哉恒心有藻兮緑池類鷄蘇兮葉華滋彼衮摛兮梲施予芼湘兮祖禰其祠月中人一作天兮夜何其尚日新兮致思右藻徳池蛾睂兮曼睩聯翠袖兮湘澳有夫君兮配天泪奚必兮染竹水落兮歳晚予一作孑倚石兮兹坂手參差兮長年鳳不回兮愈逺右懷湘坂鳥下上兮和鳴花馧馞兮交榮日奄忽兮曽幾花就實兮鳥鷇鴲鳥鷇鴲兮魚亦有鮞幽草氣芳兮嘉藻緑滋世有殷周兮麥秀黍離墟傷道閔兮繼者其誰白駒考槃兮予淑諸私右樂意生香臺谷之小兮不量駝馬谷之卑兮不樹梧檟谷之僻兮庸衆攸舍散木薈蔚兮亂石􅛦砢庶全幽貞兮日尚羊其下右幽貞谷鑠石兮金流汗與喘兮莫匪馬牛古苔畝青兮岡木挺修凉飇沃如兮心神天游天無獨私兮馬牛其休右擢風軒雲結兮歳殘木脫兮草乾天地否一作坯塞兮氷雪沍寒閉關而卧兮莫敢士干莫敢干兮安所守也士之周兮亦可受也右卧雪窩中園兮溝斷跨石梁兮入竹坂春雨歇兮緑苔滿桃煜霞兮蒲刺水短忍濯足兮釣言消憂翠碧交飛兮天宇浄流境則勝兮終不如故丘右流春矼石岩碧一作茗兮嵌蒼勢迴瞰兮扶桒脫神鞭兮既驅將與延兮朝光霧祲維朝兮攙熒維夜草春怒長兮隂木翳夏穹日觀兮東岱邈雲臺兮西華天風泠泠兮空翠吹下靈或胥降兮攝衣擬謝金鷄鳴兮於焉夙駕右海曙岩澂懷三疊有序柘湖章仁正氏㪟善禮士有琴一其隂賛曰淳風雖遐正聲可招澂懷而作太古非遙予嘗取一作掇澂懷顔其樓居前進士錢公思復記之且屬予為三疊辭俾弦而歌之辭曰伊美人兮好修表嘉名兮兹樓謝璇題兮䦨橑帶蔬畦兮稼疇虹霓飲兮柘津魚鱉安兮横湫山迢迤兮屛列木翹秀兮幄周琴一疊兮旭旦神超然兮天游惟髙明兮樓栖惟善良兮徳躋充璆琳兮圖史逺壒囂兮輪蹄酒介夀兮伯氏穀稠直兮編黎魚影行兮藻囦雞聲梢兮桃蹊琴再疊兮晝寂豁然呈兮端倪懷之澂兮樓矗本漸義兮澹慾烟千突兮昣繚雨一成兮旁沃開北海兮碩尊送中散兮遐目龜何曳兮泥尾馬胡拔兮塵足諒勞生兮焉休庸詠歌兮于勗琴三疊兮斯夕月入窗兮露肅懷哲操有序懷哲美瑪嚕教授敬親愛弟也惟敬愛也不以禍亂窮羇少渝焉搆堂名一樂前朝儒公卿頌述備至而琴操缺遺故予補之云朝堂兮誦杳思君陳兮履絇暮闈兮詠詩思張仲兮履綦天道兮人事枘鑿兮齟齬兹樂兮蓋難匪人兮天歟作與孝友哉先哲兮是懷弦琅琅兮允諧樂安得兮众偕題復姓巻有引王吾有其先三世冒何姓吾有復之題復姓巻莒人滅鄫兮范母適朱君子有不幸兮奚獨是夫王氏鬼餒兮䰟神罔徂餘慶在孫兮克孝克儒吁三世克復兮一念孚李廷重先隴詩有序李氏世居揚曽大父汝楫墓在江都常樂鄉漫鑿橋之原大父邵棠祔焉大母周遭亂􅑼平山西金匱之原考秀成藏同軌鄉仙人溝之上妣王殁於戊申秋七月明年旅葬吳縣石湖山之北汝楫子五可知者邵棠也邵棠子二長秀實次秀成秀實子三長璹次瑛次珎璹子曰達道秀成子四長璧次瑄次瑞次璋璧子五曰恒曰錫曰剛曰貞曰載瑄子二曰晉曰升璋子二曰益曰謙璧過予拜泣曰璧不幸洊罹兵變自揚僑于蘓者十年載僑松者五年既未獲遷母櫬旋故丘又懼世裔所自出塋兆之所在歳逺茫昧且犬馬齒衰脫旦暮委道路則弟姪散仕四方者無所考徵願有請予聞李氏素富殷薄有禄位於槥殣飯飢衣寒藥疾義風行一門三葉迨璧廣問學而敦本復若是乃為序其言貽之詩曰蓬累鷇食兮聖居一作尼墓始封兮識之嗟世季兮纍纍翳椔人也弗㤀兮矧阡有表埀鴻征無方烏訛靡定丘首謂仁受命斯正世治伊邇天塹匪限宿草馴兎孰云其晚皜皜客衣寄潁上康氏曹氏伯仲二麥油油淮圻如裯若翟若獐充庶士羞伯也謂何畋須于秋弋亦匪我優五榖貿貿淮甸如綉若兎若鶬登百職豆仲也謂何須冬以狩兮亦莫我彀維物有殖維心有惻馳馬走狗祗益狂癖矧伯仲氏皜皜客衣􅆳歌月中勸酬落暉弗詭弗隨樂哉㤀歸夀晚潭一首時耆年作用自勉也竹石洞左潭水孔晦䵷蠙曳衣蔦木斾斾曜靈西駕始大輝明風休漪平龜曝魚行天其頃朝降于晡暮晬然飛霞顔若為駐擁腫櫟樗同一春秋聖貴聞道夷俟奚一作是尤維行維果維徳維育言非自文潭實予勗宻室一首中林有室小僅容膝匪膝是容于心于宻異彼馬牛奔靮蹶韁燕坐之頃泰山毫芒毫芒尚無須静學至渾焉天真泊然世味聖人同仁不一作否生藩籬非予獨善退藏維時感衷四首宋祖受周禪規模邁漢唐濓溪遡道統廬陵應文昌四嶽氣廓開二南風丕揚斯民躋夀域昆蟲被餘光禮容備毫髪天用啟後王奈何至元治首繼金源亡乾坤秉隂陽埀星竅山川圖書肇人文禮樂徐開宣王霸迭興夏熢燧紛横邊琴製自有虞遺響何眇綿朔風日云凉及此遂絶弦卓哉元魏髙後世疇比肩獨立望大荒白日淪照地驕闕衆馬驤怳惚流雲駟施之青絲絡被以黄金轡或空冀北羣間有河洛志蓬蒿長益肥苜蓿凋復稀生氣殆消竭何當馬知歸陸機賦狹斜劉琨詠扶風見幾詎不早卒斃豺虎叢私慕仲公理一作長統兼愛左太冲樂志洎招隠逸思邁雲鴻乾坤亂常多賢達命固窮由來商顔饑及見咸陽烽題俞東岡六有齋隠居古善人中歳稅塵鞅座陳五經傳􅎝揭六有㮄儼若上帝臨於焉岱宗仰昕曛貴循度瞬息戒或罔賔師臯比擁兒孫蚌珠朗將見一家學鄉術春浃盎世方騖虚逺俗復競浮奬不圖窺横渠葦航排風上予嗟清流輩既悼八㕑黨何階名教間浩然獨還往月林函疎影溪嶼臻灝爽良覯匪後遲朋酒置犠象素節堂詩有序素節堂詩為髙州劉宏母夫人作也夫人㢘姓思蘭名始良人克憲公以父諱道中憲使廕累遷西臺御史遭亂相望數千里外而夫人自儀真涉大江避地呉下時宏甫六歳氷檗自持教宏業詩書呉藩不守宏買田海鄉舁夫人就養予舊與宏之先兄判樞交㝡稔至是以通家好邀予遇焉堂適成庭梅盛花酒半拜請一作而曰堂未名敢請予曰以夫人懿行宜名素節之堂遂書置巻首贅詩云孤根上春梅下有磥砢石髙堂道冠帔徘徊暮雲碧石含望夫情梅結晚歳盟氷花影石面箇箇月華清婉愉綵服郎昔日錦褓嬰郎延客戾止借問母姓氏夫是劉西臺祖稱廉孟子試看南枝露恰似初源水二紀百劬勞一作艱諸孫聯珮環青驄北從狩應過玉門關留别張員外彦升虞棄百里奚齊賴管夷吾由來楚國材實為晉所需世傳魏王寳僅有徑寸珠光照十二乘何益邦家圖客遊東呉間行李筆硯俱登髙日作賦自比古大夫青青榛棘蠅或止几席隅秋蒸露不霜稚子候驪駒少微芒色正中天月同衢長嘯謝徐庶士元非鳳雛題心覺元上人觀露軒上人吾隣一作鄉人趺坐中竺嶺澹然觀朝露月落萬籟静豐林始如沐萎萃一作草颯以冷石牀仰嵌竇餘滴下微影世皆汩塵勞天或示短景忘言理深詣收視妙獨領茂陵和玉屑一作凄清蟬暫吸有愐鶴知警雲深粥魚鳴盂鉢躬自整題姚實甫遷葬事後有序姚本汴巨室属靖康之難徙吳咸復仕顯至有元海鹽學諭君少即孤家始衰微因贅華亭彭氏實甫其冡子既粗植門閥而先隴歳悠略無聞乃日夕惕厲皇皇然汲汲然咨諸婣舊而物色之延祐甲寅春抵越首賴𤣥妙袁鍊師指示下九里祖妣周氏墓踰明年於所廬載獲畫像五泰定甲子尋次餘杭之咸林丘地則為族黨鬻四顧榛篠又幸山人施姓質以曽祖承宣公曽妣劉氏葬所在繼叩古蕩僧舍并得祖保義公之骼函由是悉遷余山之隂元統初考妣殁遂祔藏焉夫以先世諸遺靈散滯客土莫之宗依而十數年圖囘經營乃獲安妥於斯迄今四十餘載實甫夀已八袠尚懼來者弗克遵所志而益惟先隴往轍之或蹈故著訓俾永戒儆於乎實甫可謂賢孝也已承宣諱日起保義諱鎔學諭諱仁榮實甫名碩號西疇負材猶弗仕子二禎泳咸讀書兵後予過焉徘徊霜厓風林之下實甫泫然流涕以紀詠請義不得辭因序其槩綴以詩曰郊畋弗射麛野乳猶名虎吁哉孰無生生焉詎無祖周基肇孔艱大雅莫殫數王風一淪變民俗日呰窳梟也前後巢顧影徒踽踽有美西疇翁孝軌克循古先隴曠隔世雙涕痛零雨蚤夜卼寐興乾坤跼仰俯越水上輕舸咸林艾藂莽窮搜導癯仙㫄詢得覡父遺骸幾孤露寸心百勞苦一旦暢幽鬱羣隂翕和煦巋巋四尺墓秩秩佘北岵劍佩儼丹青牲羞苾鉶簠凄其焄蒿達允矣精爽聚爝然既死灰系延絶埀縷實大聲必渢氣蒸澤斯溥翁用享期頤子復膺福祜于時多不弔異物走旁午巢焚蘇臺烏凍羈紇干羽爾松何丸丸落日予為撫江天雲彌極霜厓石森􅆆夢觀閭元賔有序元賔乃綽羅御史之母弟也始御史直衛英皇時以父宣慰公廕讓累官監杭郡三年報政而中外亂雖累遷仕意泊矣至正丁未秋九月吳藩為明兵所破故官例徵庸元賔至則歎曰國危身虜尚有頭戴南冠耶遂經死平生善書詩治蹟多可稱焉詩曰老存平生懷數夢忠良士大者為列星小者為厲鬼元賔髙昌胄氣幹岳􅠾㠑始如月闖門既猶風行水忘言異温序諒亦思故里隂陽剥西極江漢洶南紀乞憐毛羣中拭目歕死雉在官知苦晚狥國歎曷已鬱鬱舂陵作咄咄永和體琴鶴就淪亡髙樓笛誰倚梵隆羅漢為廣化寺道無二講師題應真將相姿云何與世逺時命殆齟齬㝠栖遂忘返麟洲水復淺螘磨日彌短花鳥春長年雲山不知晚題殊一原上人習静禪房霽虹跨飛梁二水滙祥澤僧堅菩薩行食衆業修白松隂地十柯三椽一菅席其徒兹習静灰念椔立脊肫肫鷄抱子亹亹龜存息徐徐月中庭湛湛天四碧大千入毫髪非住尚何適自得何可云人胡苦蠅役送簳山立侍者逺遊天台接雁蕩佛髻羅千峯萬石峭立壁儼若四果容青蓮出名藍練瀑懸長松樵漁與農賈雜沓仙人踪子持尺木桮欲盛百海龍霜降水且落中竺姑一作可過冬氷解羅刹江徑渡隻影從深雲蕨筍美一作雲深飛錫逺前嵐巾衲重暮棲忘虎隣曉劚避螘封諾師導禪學顗老指教宗益毋花錦香回首東一作思吳淞王播㑹載至慎叩闍黎鐘二烈詩有序義烏童徽母吳貴字良正同縣儒家女未笄歸徽父師姑嗜醇酎家固貧必思力致之盡驩姑沾醉乃已老而病滯下戊戌亂家人悉䑕竄呉獨侍側人呼曰汝不愛頭乎吳曰吾頭豈不愛姑在妾將安之居無何姑殁瀕葬㑹隣邑兵搆變四入殺人敓貨財哀號聲相聞人勸如前言吳曰姑骸未入土妾就刃下死不悔語畢撫棺長慟兵義釋之去卒克葬師痰疾每發輒欲絶或丁盛寒呉躬然松肪伐氷作湯飲久不倦越五年吳卒同郡宋公濓為誌墓烏傷里賈善妻宋㜪金華人性沈黙寡言笑事舅姑無違禮事賈亦甚謹家政一切身之不以煩賈賈因得為善士己亥冬兵駐蘭溪賈擕㜪避入浦昜城竇山中鄉無賴乘時亂肆掠俄突至勢且迫㜪懼侵已擲袖銀于地且紿曰吾有珠若干藏近所乃脫身走投絶澗以死明年郡守王宗顯為表墓立傳云徽一日奉予書一通連誌傳二且曰徽娶宋氏女庸乞詩文併埀將來予惟徽辭情懇至遂如其請風柔春月輝幾人百兩歸麗譙傳清漏芳園帶香闈魚魚藻波泳燕燕杏梁飛縁情豢養樂轉睇蔓露晞深山故家女釵荆澹衣苧姑病躬致漿兵臨命輕羽貞珉表令守遺墓式過旅洞溪爽氣合金婺耿光吐奢泆毋足嗤名節千世儀荈樹根裔壤本性移輒萎當階將離花為他􅆺韶姿二烈歌道逵奚翅規貿絲牡丹盛花因記靳利安總管言賀丞相惟一春帖詩有一門生二相獨樹發千花蓋牡丹也酒間遂述一首東風不成寒輕雲淡晴隂露朶曉殊重天香午彌深洛花入盈尺唐𤣥獨盲心迂思賀相第父老小車臨讀宋俞文蔚吹劍録一事有感有序上一一云文豹宋字本有杭字吹劍録載括蒼梁民懷首倡民兵捍禦方臘有功郡縣議上聞民懷不肯既得子名安世年十九登科民懷以夀終鄉先達江朝宗挽曰四郊多戰壘一郡少儒家氣槩劍三尺義方書五車野無人白骨門有子青緺隂徳看桃李無言春自華安世字次張官至司農丞廣西漕予竊感江隂東八鄉得免兵禍者再一以壬辰冬一以丙申秋此人所共知出於予言已畧見周侍御梧溪集序又秘書卿貢公題楊提學梧溪子小傳後云梧下忘年友兵聞著義名片言回楚使一作祲千里系周正奴返前州牧金辭巨室甥猶聞多士感蘇學與常城蓋補書遺事罕有聞者今漫録民懷序後非以安世望子而家全亂餘身老海上用自慰幸焉耳詩曰酒熟臘中水叢梅春復深池臺萃幽勝泳飛自魚禽偶觀吹劍録遂賦懷梁吟大功不受賞清瑟有遺音相如漢名儒蜀檄甚秦金崍嵐廓雲間梓餘蕭森千載一魯連全齊歸海潯先生自傳于此序此詩具見一斑宜録置巻首趙善長山水畫師今趙原東吳諒無雙寸毫九鼎重烏獲力靡扛翠樹擁羽旂深崦敞雲囱參差見罍斚不無酒盈缸老山石黄色挿脚琉璃江隠若赤壁壘勢壓曹魏邦何當柔猛虎蛟鰐遂我降欠伸列仙厓􅅉咳漁蠻矼曹雲西山水世治多福人時危多貴人貴人乃鬼朴福人真天民緬憶曹雲西生死太平辰髙秋下孤鶴想見英風神菀菀露攑間幽幽水石濵槳行甫里船角墊宗林巾往訪趙松雪滿載九峯春酒名斯圖作何年投筆為嘅呻池廢餘野鴇井渫揺青蘋奉覽龍井倡和什為曦南仲上人題有後序竺源龍象國齊州鳳麟苑千齡始彚應匪惟晉陶逺維岳萃秀靈梅栁並清婉湖飲六綵虹磬殷疊翠巘悠然氷雪外缾錫簉軒冕藻章㜶蘓黄泉思湧叅辯間含棘林香時味御厨雋遺珠信僧寳了不見兵燹蒼寒境四寂手之不釋巻藤花墜來深松巢白雲偃右鄧匪石虞道園二司業俞觀光先輩與澄湛堂闕無元齊天岸若季蘅四法師及匪石子衍同遊龍井倡和之什後和者張晉公仲舉時為布衣未起實出闕山村先生門徐則芝石虚谷方先生弟子也劉師魯則鄜後月心先生之子顧仁甫陳守中王性存並石塘胡先生之門人予聞之前進士錢唐錢思復云因附見焉使來者知當時朝野人物之盛蓋不減蘇黄叅辯諸公從遊之樂也夫湖山自吳越迨宋元數百年形勝今鞠為墟莽緇素文墨淪棄何限曦尚寳是巻哉曦湛堂曽孫信州靈山聞雲笑一作錬師言石丈峯甚軒特因獻之靈山七十峯石丈壓中外吐納日月華傲兀風雨晦瑶草春巻髪蒼松寒蟠蓋無時丁甲朝空翠鏘劒珮師還笑其下引領増爽槩倒影一壁隂魚鳥並驚潰今兹天悔禍請為除敵愾東岱西青城相望孰為大坐令丫頭岩辟易失狐􅆺静坐林屋餘清洞有懷旭元明長老郭柏岩尊師老惟一切澹所恬静觀獨團蒲躬夏擕就石坐幽緑衝波魚拱立入草雉馴伏雨露詎子私物物幾並育鶴回緱嶺駕虎禁東林足髙踪何當偕及兹藜笋熟題陳子章先世所居剡源九曲圖後有序陳氏為奉化著姓粤自始祖棠在季唐使吳越遭中國亂就吳越奉化尉卜居剡源鄉鄉介剡縣東距奉化二舍羣山夾嵩溪溪發源大雷岩谷中一曲曰六詒王右軍嘗宅是晉徵之凡六遺廟石研尚存二曲曰黄沙水合奉化子文雅以濳學稱吳越忠懿王枉駕顧之地因名蹕駐後文雅仕宋至殿中監三曲分兩湖厓壁翠峭林壑繡錯有石幞頭狀而濶潭靚湜魚巨細畢見號小盤谷焉臼坑石恠狀不一穴而深者井若窪而露者臼若此四曲也五曲循蓮葉峯峙三大石溪滸既而三峰挿雲一石室可坐數十百人其上字二曰丹霞殆類朱書中闢一洞尤冥窈莫測識即雲笈七籖所云丹霞赤穴之天者下乃陳文簡公顯故第六曲茅渚則奉化公始築之所七曲㑹于班溪八曲至于髙㠗于雪竇于公棠公棠者由孫興公植棠而名於是九曲盡矣溪與山綿迤北東百餘里直抵鄞江其佳隴膴田入陳氏十五六陳厯廿世四百年族蔓衍四方實唐相夷行後至今昆仍多才徳若朴其一也朴文簡公六世孫祖祕監著負直節賈似道忌之遂弗仕伯父深沆洽與父泌並仕元儒學官詎非山川所鍾造徳澤所深厚而得蕃且久耶朴字子章於逢㝡友善遭世運屯歸畊願阻因道地里家世特詳俾序詠圖後以攄孝衷云耳詩曰慶門日滋徳後昆代承儒匪惟守成緒將以宏前模三辰迭晦韜羣雄相剪屠始甘缾居井中駭矢脫弧矧復喪亂綿常與憂患俱葵葉衛本根鳥悲戀故都東風幾變栁落景尋照榆青山在在佳白雲悠悠孤金石保遺體詩書傳阿符予交二十霜情誼骨肉踰思釀栗里秫各厭松江菰載舟剡源圖重為吾道吁覽安東俞郎中詞翰為其子鎡鑑題軒軒吾故人不見十餘載雖無田園歸而有篇翰在長星彗朔野鉅水王淮海杖策投青齊郎署旦惟待華亭唳寉逺終焉同一嘅草春還萋萋雲午亦靄靄雙駒幽林下迥露五花采何必山公託孝行鑒真宰寄題歐陽文公所撰前侍御周公伯琦曽妣方氏宋封安人元贈鄱陽縣君墓道碑銘有序方氏浮梁素封之家也縣君性夙慧通書記女紅皆不習而能既笄擇配遂歸番昜周進士灼克奉舅姑謹宗祀嚴饋職進士以文聲多致賔客好治具用或不繼縣君每質貸應所須嘉定中進士年三十六貢于鄉尋卒縣君三十餘一子生五周星一女又少一本有其兄二字二齡進士之父廸功府君尚在而耄哭子不復理家事踰七年卒先疇幾何不為其强宗所牟敓縣君清儉勤苦堅自卓立恒躬機織子女啼飢則下機哺乳訖又織如初暑寒蚤暮治生不輟厯廿餘年撙積嬴羡教子娶婦且治其女歸歳歉穀踊視己所儲可以旁及即閷價并制其多寡咸使沾飫里人徳焉子垕刻志問學以才氣自奮年壯連舉明經為時巨公所推敬淳祐丙午免解遇明堂恩封母安人咸淳甲戌登進士第明年為徳祐改元宋事已亟天兵圍饒守臣唐公震偕江文忠公萬里城守縣君母子入保郡城俄疾卒夀八十二倉卒不能棺文忠雅善垕贈美檟又哭奠之如母治命毋用金玉歛饒陷環城墓皆發獨縣君殯無恙至元二十三年春徙殯浮梁之湖田鳳池山至正辛巳以授經郎階六品曽孫伯琦請于朝上特寵之乃以孫集賢待制應極五品秩推恩追封番昜縣君是年翰林學士歐陽𤣥銘其墓道碑曰縣君殁年宋已殆揆厥初生迄聖代其間一百五十載有形斯世靡不壞所不能壞節與槩周氏不絶憗如帶一婦人力俾昌大蟬聯簮纓至未艾祖父齎志日益邁惟爾曽孫富修能天光下燭朗幽僾造物章善不可蓋太史勒銘紀其㝡一言以蔽曰有待至是呉城破後時公致仕五年矣將盡室歸番也以書連歐陽公所誌徵詩且曰幸附梧溪集傳焉逢竊嘗感公贊先子庫使家訓母氏李賢行微以報效今承兹命義何敢辭敬敘而詩曰嘗觀瀧岡表西江月同耿兹讀鳯山碑畨湖天與永夫人夙秀慧猶玉潔珠冏琴瑟彌和樂枕席遽孤冷訓兒儒登第奉姑孝稱境勤勤寒機梭縷縷露甃綆駸駸鬒雲變斜日幾弔影夀終殯吉壤了不見兵梗姜嫄昌有姬宜爾後彪炳恩榮兩朝被操行百世景曽孫古端公五載謝朝請金湯夢震慴松檟思悲哽吳藩􅈥乆戰憗遺由天幸尚荷揚淑靈歸帆鰐魚静同楊道孚孫大年遊龍江寺觀宋家一作㝡法華碑潭泉滌煩悁凉風洒絺服間持長柄麈步繞東林竹宻含松蔦青迴帶川苔緑蓮花古石座昔者踞白足義天日月朗法席龍象蹴烈士漢沈光異事碑隂錄渙然兹氷釋鬱矣乆蝸縮同鄉厭辟地庶以縱游矚尋李景元醉眠亭故基既觀米元章所書塔碑落葉風日暮驚鴻關河夕聊托髙世情獨訪先賢跡涓涓張翰酒翛翛阮孚屐還念避世朋投詩慰孤寂題方徳玉提舉先隴瑞芝巻有序徳玉名廷瑾其先本河南人以武入官扈髙宗渡江遂家臨安至六世祖茂榮昭慶軍承宣使生椿年榮州防禦使生待舉恩州團練使生好問殿前都指揮使判太醫局生中廣東提刑亦判醫生壽孫仕元廣平路醫學教授咸葬龍井之方山其地負金鐘靈石粹淑氣實萃焉至正二十三年夏四月芝一本産指揮墓厲莫勉為誌廷瑾廣平子也由世業累遷江浙醫學提舉過予客樓有請因序而詩曰􅑬嵼金鐘山迤靡靈石原七世二百稔一夕芝秀繁恒心暢條葉武徳培本根華滋承珠瀣暖艷迎丹暾髙廕山上松㫄映石間蓀泉關一作闥久深閟玉氣逾清温盛事紀里儒嘉祥萃雲孫李陵諝闊疏單師蹂戎蕃敗降族致夷實階秦將門水樓動反照風蒲翳漁村京觀方塿然静言思岐軒斯民續命脉萬古春乾坤寄贈盧宜興希文名僧孺祖淇河南參政父景盤陽總管叔摯翰林待制昆侖秀磅礴厥産皆玉璧孔林植材榦後彫貴松栢盧侯澶淵英氣節金礦敵累遷義興守百里涵春澤鄒魯聲教被荆楚風俗易中更國務殷募壯親破賊謂壬辰冬蛟潭日澂碧闕帶桑麥後來二漂沸具區先盪激寸地銜犬牙四顧心獨赤夙駕放衙叅露香對紫極蕭條土著户効死仍戮力復覩司𨽻章遂謝廷尉客野馬飛空廐水鶴巢荒宅邂逅傷亂離慷慨數向昔妙年直中書天威違只尺花明太液午月朗未央夕鞘鳴慶雲擁鶯歇清漏滴后皇不愛寳累若咸率職大父與叔父竹帛映翰墨籍甚先府君八郡收殊蹟一門萃忠孝三世遺清白蹇予晚交好盡負崖谷僻跡忝王君公夢逺劉𤣥徳依依尚方劍戀戀陶侃甓時當天心回缾酒思對瀝馮唐元晚遇賈誼曽前席熙陽釋沍寒梅栁各有色願言副深期再舉扶揺翼讀余季女懷其夫水宗道詩有序予友賴良言鄉人余季女台州臨海儒家息也有容徳善属文當元盛時贅同郡水宗道甫踰月水具見余才過一作邁栁絮學不彼若輒辭歸閉門讀書久不返余取次裁九章招之水卒不赴及余病且死水夢余訣別曰某委蛻矣子盍送我既訃至今存五章其首章曰妾誰怨兮薄命一氣孔神兮化生若甑春山􅆺兮秋水淨秉貞潔兮妾之性聊復歌兮遣興二章曰夜夢兮食梨命靈氛兮與予占之曰行道兮遲遲歛角枕兮粲如風動帷兮心而悲三章曰雲黯黯兮雪飛棘夫子介兮如石苦復留兮不得望平原兮太息涕泗橫兮沾臆四章曰送子去兮春樹青望子來兮秋樹零樹有枝兮枝有英我胡為兮㷀㷀子在此兮山城五章曰織女兮牛郎豈謂化兮為參商欲往度兮河無梁霜露侵襲兮病偃在牀嗟嗟夫子兮誰與縫裳良以余生而淑敏不得于夫死而心聲託宣于世不亦幸乎因如良請而系以詩曰鴻鳥常分飛雎鳩無匹扂牛女永相望何但人間姝郎情澹琴瑟郎志敦詩書期攬日月光下照薄命軀雲衢諒髙逺霜露歳忽除思紉逢掖衣數振將迎琚豈謂朱陳邈乃至秦越如庭芳栖熠燿堦苔上䗂蝓疾缺大丹起神隨清漏徂九章極擬騷猶蜩蛻塵區鄙哉白頭吟文園歡若初團扇詠信美長信燈同孤暌合數繫天不繫才與愚藳砧茍富貴同穴義毋渝沈一中為修秋堂風露琴先寄八句期過最閒園館一日焦尾脫千一作十年孤鳯喑忻遭運斤手妙得斵輪心溪館茗烟薄石床蘿月深擕之肯枉過側耳陽春音贈雲外道者靈保治中有序予過吳江洞真觀黄碧岩丹房㑹雲外道者曰珠展氏名靈保字祐一作祐之嘗為鎮南王長史統騎兵五百人征汝蔡妖黨以功聞賜金幣上尊陞司馬至正十六年三月長鎗軍帥張鑑叛據揚州王退駐淮安時憲使楮布哈拒冦趙負城胡陳寨首䑕兩間靈保說胡誘獲趙人畜千百計既飢軍民相食數求老張平章援不為應復將王命間道走京師告危急狀大臣嘉授濟南路治中議督諸部救十月城陷布哈抗敵死王被執逾月不屈妃某偕水死焉靈保得王凶聞由海趨浙遂寄跡老氏蓋數年矣與之交旬日意氣殆欲相從于閬風之上者因壯其前髙其後序而詩曰菲衣麻屩今道者元是親王右司馬雪尾羔羊蒸瓠肥金盤露酒明河瀉主畫才優彤邸間督戰功收霍丘下濟南別駕本遥授誓欲勤王清草野先時張鑑叛揚州孤軍退在籌邊樓老張平章擁精銳間道蠟書躬逺投近郊雖順等狼子千里横亘長淮鰌鵠形徒志牛後熱龍種竟逐鴟夷浮申胥血淚霽雲鏃落景荒寒影慘獨去燕留吳百腄肚蘇臺又復遊麋鹿三萬頃湖七十峯一笻一篷娱老足胎禽將雛桐白華遇我黄石仙翁家蘂珠真經口暗誦滿月淡暈天東霞來者玩迅電往者歎逝水擬招安期生更拉偓佺子閬風共楫長𤓰姑試問蓬萊清淺還有幾覽宋幽嶺巡檢史公官誥為其十世孫女懿題有序公諱某鄭州良家子也勇而善騎射初川陜宣撫處置使司試進義副尉㑹金人深入遂補職戍關隘輒以能聞川陜不守公隨師單外擢下班祗應紹興二年都肄著勞改進義校尉髙宗駐蹕臨安徴扈駕遷進武校尉劉猊起草竊公計伏大黄殪所乗馬将跡捕之調役淮西至則陷堅攖銳率先士伍累陞㪟武郎時遐僻憸民胥煽暴掠公引老乞自效朝廷由是出為湖州安吉縣幽嶺巡檢凡數年萑澤政修夜户至不閉乾道三年冬十一月郊祀大赦以恩贈父宥忠訓郎未幾卒子姓遂家焉後八世孫昭富饒始徙松生文徳讀書好義生子翱一作翔女即懿配張守中予友也詩曰諸生張雷忽我造恭呈十世外祖誥且云母氏徵紀述風來如哀竹如譟一身是膽心匪粗角弓二石丈二殳掄材虎落假五百注視鹿柵空千夫陜氛障日川溢野隨師單外與頓舍殿前徵扈南渡龍草間掩殺横行馬金人踰淮數攖銳髪短宵長言輒涕甫忻幽嶺長厖氂竟卧寒雲歛猿臂君不見安吉山開天兩目塋直龍驤劍光燭梨花縞白薤葉青杜鵑弗為英魂哭夏畦馬醫鬼有祭幾多徳不稱位昆無續我招以歌酧以巵酒魂久屈蠖伸維時於乎女孫亦足輝門􅎝女孫亦足廣孝思題鳯山時思寺寧無為講師所藏嘉定己巳厯後前朝統天厯一本寧師裝潢藏益謹陵墟社屋埀百年恩澤在人元未冺當年君臣茍安計士馬逡巡畧無氣讜言幸斥􅇑胄黨儒林爭覩文公謚牢落乾坤又此時衣冠不競曷勝悲春頒鳯紀難再得泚筆龍池寫秋色海陵袁智周佩刀歌有序智周字濟道善醫世為丁溪鹵户至正間父不受户甲非辱死智誓復讐隂佩刀伺閒便凡六年甲為人所害既亂有司禁持兵者刀棄之䢴溝其終天鉅痛則無時釋焉儒先争唁以文予作佩刀歌云鹵豪煑海地沸蒸忽報孝子蒼天崩披髪誓雲雨若譍百金一片隂壑氷六年泣血絳雲一作雪凝悲風凄凄常夜興妖狐戴髏鬼物馮含沙射干左右肱陸阻習坎渡阻淜歕歌獨漉氣填膺刀亦汝知龍梭騰神鋒寒芒鐔威稜仰號彼蒼奚瞢瞢斯須間隙不可乘坐令骨立枯厓藤墓廬青冷松明燈矧有母老髽鬅鬙破涕為笑躬豆豋無何仇家死棘矜臭肉厭飫蚋與蠅天其假手俾世懲人生五倫首父子復讐義昭春秋禮見遺刑書著諸史宗元議足埀千祀倒行逆施伍員恥舞陽吉翂同轍軌老涉遲鈍幼超偉固闗時命非偶爾嗟卿避兵家轉徙事往行存宜繕紀酴醿花香鯉揺尾曜然寉行過客邸欲言復吞鬢颯耳􅑱􅑱猶嬰慕焉已酒酣問刀首如匕忍歸武庫投䢴水水收烟消淨霜葦電光霍霍無時起安得河伯以鐏授烈士來丹積寃同一灑來丹出列子哀張生處道有序淮人陷松生時營禄養于杭還省不可得行泣道左適某帥戍嘉興即馬下跪白故帥納焉從次茶院夜遇襲兵害松江二月吹淮塵彷徨道左作泣髙堂親側身以歸或得計赤眉曽全蔡順志託生寄死將軍義襲兵卒臨孝子斃一雌現妖蟇羣雄鬭長蛇羊棗隕實萱鏟芽風驚雨啼白脰鴉世罹亂殃子獨無嗟申之水三章題季子廟有序廟在申港大阜上去阜二十餘歩有田二畝名池子區相傳吕舍人花園也吕氏宋末官閣門舍人方治園時夜夢神人告曰吾吳季子也汝將鑿池處吾實葬焉汝能止鑿吾令汝世富貴不然將絶汝世吕不之信明鑿池及土深見巨首圍五尺許始驚絶亟移瘞今廟後己而吕氏貧喪果無後地主王明老嘗記以詩至正戊子予躬謁廟下因感其事為賦申之水三章用追弔云申之水黄瀰瀰上流孔湜言薦君子城過百雉地千里髙視雲霄同弊屣至徳餘風振隤靡嗚呼殁也諒若休惡戚戚髑髏延陵露白黍載秋申之水瀰瀰黄言載薦之采蘋盈裳昔者奉使聘上國腰下寒芒劍三尺心許徐君終不易嗚呼殁也諒速朽髑髏胡為有羸得草萋燐夜走申之水達于江巵酒載崇焱車來降素王轍跡絶南紀十大籕書日星暐髙名將同天壤毁嗚呼達人道與徒靈剡剡其俱劍池水赤虎亦徂題邢三姑廟祖龍之世邢三姑事蹟缺載鬼董狐相傳有功澱山湖百媪畚鍤當先驅地有百婆橋至今雕櫳映銅鋪祈祥弭患無日無我嘗舴艋駕𦕈軀遡風遥禱輙感孚幾年思報報以詩一作欲殊身寢衰病思一作詩澁枯兹夕天倒白玉壺初月迥朗長庚孤蒼蒼澹烟歛平蕪氷姨水仙率啟途異氛馞馞掠鷗漵妙音殷殷來鸞衢袿衣絳縁仿佛見采旄桂旗恍惚俱若將有意遺珮珠翛焉而臨倐爾徂坡陀肅入一嫗巫亦望文士如韓蘓二公湘廬神匪誣私恨不至呉東隅汞池盗摸金鴈鳧馳道海齧餘萑蒲長城隂靈夜哭天毛女來客猶避趨粲哉三姑應星漢一作須啖芝四皓隠徳符四皓一出名漢都孰愈萬祀澤誕敷邀與造化長為徒贈李隠居廷重李隠居生不願揚州寉老不願傳舍魚鳯凰崦西丈室廬瓮儲厚酒盤嘉葅小宗避亂忍􅈥祭義方教兒猶買書畊存寸田藥在籠杖策古道玫為琚長林送籟虎跡逺澹雲涵澗鷗巢虚奈何獨遊揺落餘李隠居小寒大雪歳且除鶯辰好伺山人車山人亦與世久疏完哲清卿宣慰寄玉佩環環後被盗追述一首古人佩玉不去體涵養性情非事靡粟蠶名義本衣食雲霞象文藻鑑徳將軍寄來玉三色金源大臣曽寳惜紫葡萄覆雙狻猊宣齗露爪相狎嬉黄猊下視威若怒青猊仆仰如知懼當時流習制度䟽匠氏矜能毛髪具我加帶束躬采薪兒童笑倒老父嗔雕螭盤繡珠飾巾鵠觜宫靴方稱珍君不見玉魚殉葬亦歸盗歌詩永識將軍好唐昭儀李漸榮辭日繫包桑地𤓰剖宫闈去尺非唐有庭春草合車斷音黍備昭儀奉巵酒御香紫袖纎埀手載拜載祝南山夀龍須席展蓮炬移狼角斬天豨突牖不辭隕命同君后女三禍前妾忠後無人為語巢賊奴莫使兒知環柱走宋婉容王氏辭有引徽宗北入四太子請王婉容妻尼瑪哈子上遣之婉容大哭曰何忍一身事兩主就輿中奪刀自刎死太子歎異擇地葬之且為立碑曰貞婦冡事載括蒼俞文豹吹劍録二宫有警無嚴蹕賤妾徒為厮養匹假如青塜向黄昏不若金刀照白日血濡一縷願隨終烟沙漫漫霜雪容令人想見旌貞石氣敵雙髙湖上峯覽曹架閣祖平章畫像父河中府君死蹟有序平章諱立大同懷仁縣人材器剛方獲侍武宗濳邸既國族不靖北征有功帝即位授浙省左丞厯䑓中丞中書平章宣政院使薨府君諱觀起一本有身字中書直舍内藏使出知浮梁州㑹徽冦入浮梁率義壯巷戰死詔贈中順大夫河中府知府爵譙國郡伯架閣名莊自中外亂野處餘二十年至是宴予別業奉平章畫像府君死蹟拜請文予嘉莊孝謹且聞客朱員外言天厯初東南飢重臣恬樂燕安民獨羅訴平章馬首大發廩賑之併録而系以詩曰前朝衛霍許史門如市如沸今荒村老夫散跡江海上目豁心快平章孫平章武宗潜邸日灑埽月窟安天根帳下虎牙嚴校尉道周鵠杖荷生恩劍鋒差差練光冷畫像凛凛英氣存中書直舍乃冡子精金美玉聯弟昆雪消秀出北臺翠雨過沙走長河渾醉看暮獵縹半臂躬扶春犂朱兩轓浮梁力戰死民社譙伯寵褒來帝閽遂令賣國闕郎等喘汗俯愧聞風奔傳曰仁者必有後況復忠節名乾坤將軍曹霸舊為庶孫也毁冕甘丘園菜無盗跡栁罷髠鵝鷖唼唼桃花源獨扉板白東瞰鹵九關雲紫西浮崑二雛犀角殊厖敦所衣尚是繡芷蕁一作蓀騁燕鳴岐蓋未易量也落日載舉雙犧尊夜過蒼墩江隠居白茅蕭蕭風色昏歸人自語烟際村我騎蹇驢童抱尊記得君家忘却門徑穿竹入背江路傍是梁朝敬宗墓月中對寉吹洞簫露水作葉琤然落髙樹崔白百雁圖為宣城黄宜之題老愚離羣影久孤客來笑示百雁圖揩眵試數失兩个莫喻畫意翻令吁得非長門報秋使或是大窖傳書奴不然一舉千里髙鴻俱其餘淟汨碌瑣徒且唼且息翔且呼營營鄭圃田之稷睢睢齊海隅之菰遑知爾更銜爾蘆瓠肥卒至充人㕑小而曰鶀亦就笯邇聞澤梁弛禁官罷虞麋鹿魚鱉同少蘇羽儀好在春雲衢金世宗太子允恭百駿圖為舒徳源題金家武元靖燕徼嘗誚徽宗癖花鳥允恭不作大訓方畫馬却慕江都王此圖遺脫前後幅尚餘龍媒羣角逐息鷄草黄霜殺菽王氣榮光等蕉鹿山人塵迷朔南目溪頭姑飲歸田犢髙尚書墨竹為何生性題有引公嘗寫竹自題云子昻寫竹神而不似仲賔寫竹似而不神其神而似者吾之兩此君也為浙省郎中時㑹經理田糧致甌婺小梗遂焚冊罷免民至今徳之子昻寫竹神而不似仲賔寫竹似而不神兹觀房山雙墨君素節抱霜臘翠葆擁露晨文蘇隔世同超倫左司昔焚經理冊至今遺民手加額使槎既泊桑落洲仙仗頻隨栁林陌大言非夸孰信之布衣埀老神交客維山有岳星有斗若趙若李俱不朽朱澤民雙松圖為夏老圃題于緑隂清晝堂江東提學古韋偃手寫落落雙樹松深根本托夏氏社髙節肯受嬴人封蒼然秀色入野濶勢擘蛟龍欲飛活白日風雨從震凌青陽造化先回斡散樗灌木不敢齊恍有仙鶴時來栖杜陵九原如可作拭目清晨應重題題徐子修為陸徳比畫溪山風雨圖羣山岋揺雲四襲大木低回小松揖隂舒陽翕神鬼交澗淫谷溢蛟鼉立一人正涉險畏途老馬旋濘僕且痡埀堂遺體弗戒謹卒跌利禄名貪愚泊舟者誰西一作曲沙澨恠雨盲風若知避茍能六鑿同天遊静觀大化真兒戲徐修徐修雙鬢皤盍為別畫瓢春窩老夫小車花外過葛稚川移居圖為友生朱仲矩題朱字下有禹方字典午三綱紊無紀賊奴内向伯仁死辭徵尚蹈公以此終托丹砂去朝市千年盛事傳畫史野夫獲睹朱氏邸壯肩餱糧幼琴几杖懸藥瓢風靡靡長襦老婢手執箠躬驅其羊羊顧子兩犍受牽頭角頗厖殿隨亦忻喜公披仙經瞳炯水琅琅餘音怳入耳後驂夫人謝釵珥膝上髫嬰玉雪美勾漏尚逺羅浮邇若有函闗氣騰紫天丁山靈狀僪佹開鑿空青洞扉啟雲霞輸漿石供髓二麗精華晨夜委金光秀發三花蕊飄飄上昇碧寥止同時許邁行加砥一門翁孫良可擬彼散豆者顙遺泚嗟今凡民苦流徙落木空村淚如洗唐子華知州山水為王駿致逺題天厯己巳庚午間每從鄉執承公顔公嘗任江隂校龍翔畫壁動宸聽歸來官舍餘清閒忽思霽雪溪山好溪光不流山色老懸崖恠石鬼呈面號寒枯梢鵲僵爪長途泥濺馬衣濕鮫宫鱗濳漁罟入擕琴伊誰興彌集蜿蜒雙松夾而立公乗白雲何所之此幅乃是臨郭熙亂中金玉軸焉有能以善守方世奇為拂爾塵題我詩我昔俊髦今老衰題光孝寺訥無言長老所藏畫龍柯敬仲博士題云道人畫龍龍絶奇何處人間曽見之上京清暑朝初退太液池邊看雨時畫龍者號宇南宇南自是冀北驄醉墨幻出朝天龍奎章博士既家食一詩寓意懷文宗鼎湖攀號不可得虬髯倒景風威黒似掀金陵之畫壁反顧蒼生望雲霓詩成怳覺龍能吼霖雨化作山人酒趙文敏公山水為董竹林山長題有引公於畫左題云至大三年六月望日為吳彦良畫并詩有岸静樹隂合溪晴雲氣流之句想在鷗波亭作也彦良嘉禾人何山弁山秀可掬上若下若薲苕緑翰林學士偶歸來亭倚鷗波送飛鵠鵠飛盡没滄茫境衣上青天倒揺影鹿頭舫子湖州歌想帶南風覺凄冷氷盤𤓰李進仲姬管夫人字生綃畫就復題詩鄭䖍三絶世無有於乎何幸再見至大三年時題趙善長為李原復所畫山水日光青寒殺氣白山童林髠水縮脉城舂墮指株送餒莽蒼坤輿大宵宅齋東趙原呉下客辭榮養母韓康伯酒狂忽憶雍熙時畫法荆關海岳窄魁峯傑嶺大將顔秀崖峭壁仙卿班雲嵐滃勃嵩華表石棧犖确崤函間翬飛樓閣深翠隠獸羣逺跡人烟近一瀑天埀雪練紳萬松花落黄金粉森蘿翳槲杳莫盡若聞行歌采芝菌旁觀众攫攘妙洒獨心苦神工精㑹合鬼物毛竦􅆆桂㸑扁舟露沙漵磨輪新坊俯塲圃雌伏鷄巢懸在梁磬折田翁飼其牯土膏不假酥雨潤帘脚似逐東風順貢聯包匭旅褁糧驢驅馬䭾力角奮怛然閣筆淚滿腮龍虎虚卧灤陽臺累朝徳澤百年運短褐老去江南哀我詩題罷春潑眼又見他鄉鴻雁回宋制置彭大雅瑪瑙一本有酒字椀歌周伯温參政一作大參徵賦有序今大尉開藩之三月適江浙叅政周公分省江淮延飲齋閣歡甚以予避地無錫說王左丞晟勸張楚公歸元特出瑪瑙椀曰此宋彭大雅燕饗舊物子才器足以當之遂引滿酧之再氣酣思湧率爾走筆以紀清賞非求知他人也詩曰三月下一本云命部將王左丞晟書使踵上闕至呉中以予無錫避地說晟勸張楚公歸元擢淮省事辭時浙歡甚下即接特出瑪瑙淮藩開吳豪俠滿歌鐘地屬姑蘓館相儒獨為緩頰生為出彭公瑪瑙椀血乾智伯髏不腥黄玉瑩錯紅水精妖蟇蝕月魄半死虹光霞氣飲一作歕且盈隠若陣偃邊將營彭公彭公古烈士重慶孤城亦勞止死作天忘西顧二十年畝盡東南數千里武侯祝文何乃偉敗由宋祚民今祀太湖底寧魚米豐官廨喜與閒門同酒波椀面動峽影想見制置師犒飄風中再酌庶沃磥磊胸君不見漢家將軍五郡封班氏天與世史功詩狂昭諫一作暕客吳越存心唐室人憐忠嗚呼尚友吾豈敢醉墨􅃤澹雲飛鴻嚴子魯叅政席上聞楊左丞旺扎勒死事藏六者龜窟三者兎百鳥俛啄既仰復顧二雄由來不共居楊也丞相防身殳他心隴得又望蜀遺鑑虢亡危在虞風霆大樹無幾緑武公軒餘拂雲竹私恨平生志士心今方移置將軍腹將軍國封八十親綵服行戴東山巾白簡論事諒可採笑出黃羊觴碧醇七月聞河南平章凶問六月妖星芒角白幾夜徘徊天市側尋聞盗殺李上公羈旅孤臣淚沾臆當時寛猛制萑澤安得受降反受敵上公忠名垂竹帛書生奚為費禕惜東南風動旗黃色蒲青柳緑長依北贈嘉定故吏尤鼎臣有序鼎臣少由海寧吏調鄊州嘉定就親養至正十三年閏三月海冦犯婁時寳哥叅政頓兵崑不進鼎從州倅率義壯守上游二年謀效居多十六年淮張入吳倅奉印降鼎沮之為其將縶且諭授以官抗不受杖百錮于家尋奔杭浙省叅政周伯琦舉興義烏縣史詔使開吳藩鼎復以勞遷桐廬典史理吏目秩即辭歸農及吳􅈥後㑹予中槎差謙家癯然類山澤儒而言確行厲殆有古節士風去尋常筐篚器逺矣昔漢符璽郎事殊壯烈然惜失其名今鼎得予詩亦足暴其心矣詩曰長貧故吏身姓尤一刀筆擁千夫矛南垣叅政但醉酒海若不敢東窺婁淮張崛起連呉臺屬臣買降恐後來躐階沮獻嘉定印杖錮非謫天全才座中老氣虹霓吐屋山亂葉吹黄雨舊除今辟置弗數鬼區冥冥蒿中柱吁嗟猶思石礱鼓題顧謹中外祖魏洵子美妻丁氏祠堂巻有序魏夫婦並呉興人洵嘗吏獄松有某忤權貴下獄賂白金五十兩洵脫其械封還金上海巨室威偪隣父死汚官欲抵罪其子㑹部使者至洵盡發巨室奸狀遂伏辜然由是見忌調鉛山及滿考歸行李蕭然惟餘一贈行巻既除仁和塲幕謝免夫婦日惟教謹中若已出而謹中為今之秀造于其殁築別室祠之具道所以拜請詩詩曰義伸枉獄金却還寧忤豪貴遷鉛山六年僅有贈行巻秀髯皓白如霜菅生憂敖氏鬼獨苦今得外孫祠外祖雞肥黍脫一作稌天風秋鵑哭棠梨寒食雨宅相魏舒良可敦黑頭江總何足一作不須論力田讀書姑養母莫賦逺遊勞倚門華劉二節婦有序二節婦並大同人華妻武州守張思孝生子亨劉其配也至正戊申秋閏七月河南軍帥珠展乗亂肆掠二節婦匿複壁中游卒闞得之驅迫以前華驚呼曰我命婦也驅我唯有死耳且謂劉曰汝芳年將若何劉泣曰忠烈不二宜聞之也審忍垢辱耶華曰刎無刃經無索奈何劉復對曰當激賊怒以就死遂大罵極口卒怒殺之劉不為動罵益厲卒又殺之華時年四十五平生嚴介馭下事或少枉弗貸舅殁姑老衣膳几枕必躬親之思孝由衛學官至伯爵位華累封雲中郡君每曰被服禕翟徒志狗馬耳訓亨機絲克承箕業懿聲賢聞穆然清風劉年二十一翰林待制翼之姪女莊重盛容性尤慧爽華愛甚嘗索賦庭栢應聲云羣卉枯落時挺節成孤秀既保歳寒心不在遐年夀殆先讖也郡士郝麟偹記行實亨稔知予名乃介瘍醫山振走拜予寓隠以哀挽請予維華劉志節亨孝義用序而詩曰雲中城無斫頭守一門雙貞光井臼黃河清淺渡淮泗雪峯巍峩掩星狗君不見釧金臂斷牙將辜肅宗并罷崔成都昨者寡人妻鰥人夫天不俾保家與孥望鄉臺霜磧草白還亦思之心鬱紆吾詩非為此特旌張婦姑陸縣尹時俊席上贈郭府判有後序袁州府判八十强徒步海曲何踉蹡世殊衣帽不肯改意氣忿激言慨慷天厯天王位九二衆蛇隨龍一蛇棄當年夙稱强項令餘生獨念厖睂尉蘄人崛然報一作起桑樞身急上馬一夜驅漕河風濤阻芻粟雷塘城郭埋萑蒲塞翁得失付大􅛐主家林涵紫微箔少時良晤別亦樂勿效謝公重作惡公諱額森布哈字彦楨順徳之内丘人也性剛峭有風槩中書右丞相哈喇哈遜引見成宗器之俾事太子累年以母王宜人齒邁告有㫖江浙左丞相特古勒德爾禄養之就養丞相尋薨公䕶喪還時拜布哈新拜相義壯之屬左丞張士瞻為娶名門鄧氏女補省之克埒穆爾齊克埒穆爾齊者漢言通事也調湖廣秩滿始官瓊山縣尹㑹文宗濳邸餼廩衣藥躬備如儀間以鯁戅差多忤意上每顧左右曰額森布哈昔寵遇先皇今復竭勞効忠于我茍得承祀纂統當以金䝉之瓊婦風尤媮靡帕胸禪髀製自公始黎聚蜑落順令傚使五年遷將樂尹闢建龜山書院洗寃鋤梗民肖像祠之文宗即位使南者傳詔公遂乗傳入凡一時重臣皆嘗約為昆弟既入見上掇賜所啜黑湯比退重臣以御史薦上曰彼居三日朕亦効作劾矣他日復召問曰卿宿拜布哈丞相家耶對曰然上曰卿從其求進耶公曰丞相念臣舊用館穀臣惟進退在陛下諸重臣猶儗省遷公公謝曰非出聖意竟不陛辭返上怒欲罪給傳内外官属大夫力諫曰陛下獨不記金䝉之㫖乎上由是霽威因賜閩醝引若干該楮鏹萬錠公損半受之沾丐親舊野處武昌適鎮南王世子封威順王出鎮物色得之日聆讜言恐後贈襲衣鞍馬文宗崩嗣君入繼召除湖廣省員外郎旋改華亭尹民有以偽鈔償物價告者公曰彼偶誤耳付諸火易真鈔予之他類此一縣傾嚮而府倅忌焉誣事叱去帽公自投帽仆地對了不為絀是日移文遷父贈内丘尹諱善葬祔先塋及還政聞大馳代士民羣拜馬首取鞾懸東門以存遺愛轉杭州宣課提舉地當要衝歳課鈔十餘萬逋負箠械率視常職公剔蟊剗弊㢘已寛稅商不忍欺吏莫敢私能聞擢彬州路判官行省檄搃湖南一道路軍餉先期而竣臨武宜章二縣猺蠻作亂官兵進討不克公單騎入諭福禍猺悉歸農移袁州路判官時蘄人叛僣由儲偫來江浙不乆袁䧟而公年當致仕慨然長嘯曰華亭禽魚草木不吾怪也遂隠跡凡二十載而卒子忠奉葬縣之横雲山從鄧宜人兆其先有諱瑞者仕金邢州節度使生震元初内丘主簿因占籍生定定生興興以從軍攻西川戰死興生善䕫路招討使司經厯出鎮思播田揚定逺等處以王事殁公善之次子也年甫十三奔父喪既抵漢陽殯所取骸骨有同姓者誤持函往公直于官咸稱孝云逢僅與公有一日雅讀錢衮所著行狀始得其詳於乎公四命為郎三命大夫所至籍甚雖材志不盡施而保身叔世登夀九袠子孫安全天之厚公侈矣衮于公為門吏有請因摭其槩并書前贈公詩以歸之寄題俞達㪟義軒有序達予里人也辛亥春兄牽車服賈數千里外他賈犯𣙜鹽禁坐連時達尚幼憫兄孱弱必客死毅然請代傭于濠凡三載例構公廨完乃放還黄常民既為序復徵予詩曰我家延陵君子鄉義讓遺俗戶相望亂中豈少趙與姜耳目不逮泯莫彰俞氏小弟今㝡良竊旌載車先􅂮盜剖棺起生事孔到疫鬼弗染出天造之三子者世爭道浚井從掩呼一作吁象傲黄常名軒義是敦我老作詩銘諸門出入維徳閑朝昏春風頌箎叶雅塤白頭毋㤀鴒在原送花生還懷逺縣有後序爾爺屈跡簿書吏众中㑹予輒師事里稱黄童扇枕孝士多竇十還金義於乎不幸死連獄寡妻孤兒徙荆麓終天恨抱王裒心長夜哀聞杞梁哭君不見老夫避地烏涇村豈徒親舊少生存木落洞庭悲帝子草萋南浦憶王孫酸風暮閭愛日短酒次贈言歸莫緩驚鴻銜蘆雲與逺大魚跳氷月應滿生之父貞予鄉友也性敦謹嘗典簿書浙省大官有以白金數十斤託貞世變後悉還之居家奉八十母孝甚扇枕温席暑寒㒺替鄰里稱焉今禮部凡三辟辭不獲起為佐吏未幾以事連死咸惋歎曰使天定貞豈有是耶有司没其産業徙生荆山下栖卑墾荒母子相弔歳甲寅冬十月始克還謁予寓隠且言復往有日予因飲之酒贈之詩用慰勉生之心焉耳查甲寅為洪武七年所云今禮部亦指明朝言也題何婦黃氏巻有序黃氏松之莆溪何某繼室也其家素饒洪武初罣名欺隠當沒産既上官至某貨殖它郡黄獨與老弱居官怒其帑藏空匱掠徵貲抶累百身無完膚昏頓就斃者屢言迄不紊次掠㚶又次掠其姑姑號呼婦黃方呻吟即狼狽起蔽翼之且告姑老不勝捶力丐身代辭氣欵惻官愍釋焉明日黃復扶傷詣官泣請某前室之子及㚶之子若婦凡在繫者少休私舍贏糧以俟遣里士范公亮誌焉予謂昔鄭休妻石鄭義宗妻盧遺事並著晉唐史今何婦兼類之可稱述也已詩曰江南枳花開妾當飛望灾孝義由中心㮄楚從百回古嘗亡猿禍林木今見青蠅憎白玉破鐺盡殁氣若絲官曹尚擬夫刑贖君不聞一鷹揚百鳥亡一犬走百兎僵騶虞麟趾周家祥極言明初刻削絶無忌諱贈孝僧琳有序琳號西玉予鄉人至正乙未出遊名山川㑹亂亟歸遇冦數兵之告以故免既聞父兄弟皆殁亂中餘母髙嫂薛在錢墅庄及至見母創甚嫂以不辱溺井死琳躬負土掩之匍匐乞食奉母養彌年母卒宻葬善地遂奔隠闕門一日擕血書華嚴經謁予海上予嘉琳學佛氏教尤克孝克義贈之以詩曰華嚴内典釋中尊書向吳臺獨樹村十指滴枯遺體血一心追報二親恩琅函夜繞金光粲黃壤春回淑氣温却恠亂離多死隔獨能奉養及生存江魚雪白思登饌野椹青紅夢倚門客舍題詩良有以頻年少見孝兒孫送呉藩錢郎中陞叅政分鎮淮徐邳三州公府䟽恩近九天復從苫次起籌邊江黄慎與齊桓㑹晋楚宜推向戍賢出胯故墟山寂厯露筋遺廟草芊綿闗中不盡英靈氣徼上新踈警急烟大雪弓刀千騎宻上元燈火萬星聯機乗暮夜初無定霸賤春秋夙有傳他日若求呉越後白頭昭諫一作暕正歸田嚴夀閒席上寄汀州同知曹文昭避地東來喜有兒竹林無恙仲能箎甌閩城郭三忠寺三忠謂福建平章陳闕僉樞拜特穆爾子夀漳州違嚕噶齊徳埒黙色子闕荆楚雲山幾故知老馬忍忘霜塞草孤猿甘抱雪松枝何時酒熟瑶池露且醉梅間藥玉巵寄劉小齋張溝南呉中洲夏師魯鄧毅夫丘宗大鄉里遺賢軫念多薦辭今聘守微疴前途絕望揚州鶴亂水嘗窺董養鵝季子有碑時打字莫王無鬼夜操戈東風凍解醅新熟試覺歸舟駛一梭奉懷集賢和和承㫖謝病徽州詔許還五千部曲沸如澘一帆風破三鯨浪兩鬢霜明九豹關西第月資全禄養中官時出上尊頒鳴笳滿地星牢落應憶㣲言俎豆間任子良縣尹除奉訓大夫台州判官逢避地相鄰而又姻婭之好承聞大軍駐汴經畧使已至浙東小康有日先詩致賀子良宣慰仁發子也名賢佐天香夜染紫烟衣喜氣春連白板扉陶令山中初酒熟劉郎溪上正花飛使臨奎璧新分象民望雲霓幾落暉宜早上官思補報大軍先破汴城圍謝中政院判敏珠爾昂霄枉過予龍江寓隠三年江館閉斜曛一日星軺下紫氛老我已非佳子弟壯公曽是故將軍未央雙闕雲端見長樂疎鐘月下聞還語中原檿絲盡六宫知愛石榴裙送呉照磨赴李司徒幕兼簡張郎中司徒分鎮越王臺甌婺山光入望來堂上修文閒將畧幕中求舊得賢才鑑湖木落魚梁見紫塞風髙鴈路開莫禁白頭狂賀老酒船仍蕩月明回時方禁酒題何上海一本有緝字新修瞿雅州義塾巻十畝宫圍數仞墻雅州開建寉沙陽流風逺被弦歌樂化日重輝黼黻章衡縣有詩稱陸宰魯城無宅壞恭王春歸檀杏青隂滿安得追趨弟子行題徐伯起水南漁隱巻幾人北戍幾南遷一日身閒一日仙囘首華亭鳴寉外繫舟長泖亂鷗邊屋圍楊栁清秋日星錯蠙珠薄暮烟不學秦民不終隠桃花傍岸是何年將㳺澱山承府倅張徳常郭宗唐聯過舟次留宴燈夕不果既得風帆走筆寄張郭天上春回城雪消人家梅栁帶河橋官無一事鼓鐘宴賢有兩驂環轡揺霽月華燈違後夜好風輕楫快今朝水生河渚雁鳧浴閣倚澱山心獨遥遊崑山清真觀放生池承盧知州孫萬户梅倅㑹宴有詩留錢尊師丹房鼓角沈雄晝漏稀羽人宫闕静含輝林間紫馬聞鸎過水上文鯨一作鰩趂寉飛霞氣暖流千日酒風光晴拂暮春衣不應客似瑶筝雁留滯南音斷北歸同朱節遊秦山詩留地主宋氏金赭二山名遥望亘海郊祖龍曾此駐雲旓為尋白堊朱沙洞首度蒼厓紫壁㘭木客夜過松籟作石人寒卧薜衣交一茶共話桃源隱不信河山有二崤重遊干山望機山有引干將山色倚空青獨立風生十二翎便合武當祠畔住布衣長謝紫微星予至正辛丑九月所題口號今十七年矣時洪武十年墨蹟如新而風烟草木與時變異西望二陸遺墟慨嘆久之老覡賀曰布衣得毋汚乎因留詩山中杖倚干將西紫苓望中連璧瘞雲深當時少為全歸計後進堪羞妄躐心京洛好風隨義犬華亭凉月怨胎禽斧斤浩浩山林歎辭賦蕭蕭麗則心一作音寄贈劉樞幕獻替雲臺黍一炊羈離江國髩全絲醉中罷落髙風帽夢裏猶聞湛露詩山檿葉乾知嵗短水楊花怒任春私静思舊斡君臣意足見平生志有為吕充閭復亨自陜還予過之懷文㑹于時康傷家徙於事連且慶其世徳有在而子孫保全也賦詩留希尚之第堂開來徳俯璜灣魚鳥熙熙晝靚間多士春行沂上服巨靈夜負澤中山蒼黄一氣千林變玉璧雙聯萬里還為醉阿咸狂走筆鬢絲香拂鷓鴣班一作斑寄婁上俞士平提學陸良貴秦文仲二教授朱紱青袍映後先邇來愁過買臣年壚頭相醵囊須罄地下誰逰劍莫懸淮浪白滔迴魯日塞氛黄隔姓劉天賤名忝在齊民版為報新無傍泖田寄龍江親舊二首四年不過醉眠亭白髪盈頭病始醒趙盾共知為畏日戴逵曾誤作賢星寉江列第花如淚龍鎮雙庠草又青親舊友生三五在幾時同謁聖儀形冥鴻東邁剰丘亭遭世艱虞幾醉醒淚化夢中雙好雨心周物表一閒星大江順駛沅湘白少室髙齊泰華青持此欲誇吳越地舊交多似木鷄形寄陸宅之進士錢思復提學金希言學正花開花落雪盈顱三地相望一信無梁震不慚前進士杜陵寧是老狂夫長淮浪接江逾濶南極星聯斗不孤想與窮經金學正酒香隣社杖同扶經游小來涇簡木仲毅髯叅歸隠小郊坰亂日曽聞險偹經風黑浪髙羅刹海月明天度使臣星東都先見逢萌得廣武重逰阮籍醒㝡是故家春草暗杜鵑啼殺忍同聽題董良用徵士釋畊所百畝私田十尺廬釋畊為樂野人知壠牛􅀈卧春犁後水鳥低飛午饁餘殷喪蕨薇元可食秦炎種樹獨存書老予擬就龎公隠歳暮相看兩鬢疎朱氏梅雪齋中㑹介夀仲祺髙昌公子忽重逢一飲玻瓈酒百鍾月夕屢聞愁繞鵲花時曽見喜乗龍仗邊風送昭陽漏軾上雲移太室松二十五年俱夢境石灣何日步從容贈劉易性初鵕䴊文采鶴癯形雖恨無家異水萍短褐山林工採藥破窗風雨夢傳經元規塵暗衣偏素孟徳臺荒隴自青材業有餘平治近莫隨王績寄沈冥同舍章千戶近歸江隂父老首詢予在多喜慶者癸丑春日小酌因述懷簡諸父老洪武六年得嗔如屋謗如山轉覺方心似石頑鄉巷復吪一作訛為異物一作類客居嘗夢抱一作把連環平安短札春湖緑睂夀深杯曙日殷食料不知餘有幾且從兒女慶童顔贈陳履信思有後序落落曙星江海陲每於士友頌陳思藩臣屏用防秋策縣令深嘉繼祀詩貧後小夫歸地利亂中闔室戴天知尤憐不受琴生粟長褐郊園自采葵思松人不茍殉俗雅志古道有田僅供饘粥遇族里貧甚者輙分食之敝廬數楹日授徒其下鄰人侵傍地自歌曰食且無魚奈何盤蔬無餘隣聞之歸其侵地鄉大姓張氏子翊嘗從學琴業成以巨舟載粟為謝思曰吾萟以售汝耶却不受呉藩地連十州守將咸以為安思上疏危之不報遁居海上因無後欲立弟之幼子為嗣求于弟三年弟不之䘏呉被圍思愈皇皇如無歸人或勸之思曰吾得弗殄先祀即兵死不憾因賦詩謁祝上海挺曰傳家忍學韓為賈失國驚聞莒滅鄫挺嘉嘆為讓其弟乃立其子後亂中民妻女多所汚思置家人閣上如平時且曰吾心鏡無醜迹醜影何由至竟如其言君子謂思行義所致云夢騎驢蹇驢雙耳卓東風前導青衣一小童石澗倒涵嵐氣白海霞髙貫日輪紅桃花芝草經行異鶴髪雞皮笑語同却待朝天驚夢失春醒無奈雨簾櫳題趙生克敏戲綵堂戲綵髙堂俯鶴沙孝承清獻故侯家一雙玉饌春氷鯉五色斑衣曙海霞夀酒宛涵池上竹酡顔聯映座頭花山人善禱非良佞更積詩書到五車題鶴坡長夀寺宋東南正將潘徳剛所報招提誰建鶴坡陽寳祐年間忠翊郎宋東南正將潘徳剛所剏將種久歸農版籍佛燈長似日容光六時螺貝潮音壯滿目烏鳶野色荒老我願為僧一日盡招新鬼上慈航癸丑正月三日述懷梅風峭寒微雨零仲荃季薫聯歸寧嬌小數遷兵燹地保全均賴祖宗靈園開鶴徑亂石白天入鯉山雙角青依舊素衣歸舊隠他年應忝聘君亭癸丑上元日試筆寄示外甥俞堇年踰富貴五看燈拙守丘園兩謝徵石上履聲多在竹月中吟影澹涵氷清溪道士居相近錦里先生醉自稱歸淚若沾原上土松風長嘯學孫登君山有松風亭補失題并失第一字障秀壁參錯輝隠者静坐敞囱扉長松不見蕣開落獨寉自與雲來歸銀潢雙星月露爽黄葉千家烟火微便當老袖鐵如意莫為珊瑚輕一揮題阮徳剛沂澳草堂草堂山水競清輝妻織兒經母在闈榆栁巷隂嬉繭角荇萍泥暖樂烏衣羈孤恨缺蛇珠報同姓恩深犴獄歸不貴榮名惟隱徳静中風雨亂花飛錢士修辭學職歸養地主徐去奢為築草堂居之詩以相賀博士辭官奉二親東家為築草堂新殺鷄作黍歡難得走馬看花夢不真風雨倒衣恭候旦林